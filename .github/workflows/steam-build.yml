name: Steam Build & Deploy

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build'
        required: true
        type: choice
        options:
          - windows
          - macos
          - linux
          - all
        default: 'windows'
      branch:
        description: 'Steam branch to set live after upload'
        required: false
        type: string
        default: 'development'

env:
  NODE_VERSION: '22'
  APP_ID: '4547570'
  DEPOT_WINDOWS: '4547572'
  DEPOT_LINUX: '4547573'
  DEPOT_MACOS: '4547574'

# ─── Windows Build ────────────────────────────────────────────────────────────
jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    if: ${{ inputs.platforms == 'windows' || inputs.platforms == 'all' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (Vite + curated DB + obfuscation)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri (Windows — raw exe, no installer bundle)
        # --no-bundle skips NSIS installer creation; we only need the raw exe for Steam.
        # The steamworks crate downloads steam_api64.dll automatically via cargo build.
        run: |
          cd src-tauri
          cargo tauri build --no-bundle
        shell: pwsh

      - name: Copy steam_api64.dll into release directory
        # The steamworks-sys build script places steam_api64.dll in an out/ subdirectory
        # under target/release/build/steamworks-sys-*/out/. We copy it next to the exe.
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path src-tauri/target/release/build -Recurse -Filter "steam_api64.dll" `
            | Where-Object { $_.DirectoryName -like "*steamworks-sys*" } `
            | Select-Object -First 1
          if (-not $dll) {
            Write-Error "steam_api64.dll not found under src-tauri/target/release/build/"
            exit 1
          }
          Write-Host "Found DLL at: $($dll.FullName)"
          Copy-Item $dll.FullName -Destination src-tauri/target/release/
          Write-Host "Copied steam_api64.dll to src-tauri/target/release/"

      - name: Copy steam_appid.txt into release directory
        shell: pwsh
        run: |
          Copy-Item src-tauri/steam_appid.txt -Destination src-tauri/target/release/
          Write-Host "Copied steam_appid.txt (app ID: $(Get-Content src-tauri/steam_appid.txt))"

      - name: Verify Windows release contents
        shell: pwsh
        run: |
          $files = Get-ChildItem src-tauri/target/release/ -File | Where-Object { $_.Extension -in '.exe','.dll','.txt' }
          $files | Format-Table Name, Length
          $required = @('recall-rogue.exe', 'steam_api64.dll', 'steam_appid.txt')
          foreach ($f in $required) {
            if (-not (Test-Path "src-tauri/target/release/$f")) {
              Write-Error "Missing required file: $f"
              exit 1
            }
          }
          Write-Host "All required files present."

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/recall-rogue.exe
            src-tauri/target/release/steam_api64.dll
            src-tauri/target/release/steam_appid.txt
          retention-days: 7

      - name: Install SteamCMD (Windows)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://steamcdn-a.akamaihd.net/client/installer/steamcmd.zip" -OutFile steamcmd.zip
          Expand-Archive steamcmd.zip -DestinationPath steamcmd
          Write-Host "SteamCMD installed."

      - name: Authenticate SteamCMD
        shell: pwsh
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
        run: |
          # First run: steamcmd self-updates. Then login with username+password.
          # Steam Guard must be disabled for the CI account, OR use app-based
          # authenticator with STEAM_TOTP secret (not implemented yet).
          & .\steamcmd\steamcmd.exe +login $env:STEAM_USERNAME $env:STEAM_PASSWORD +quit
          if ($LASTEXITCODE -ne 0) {
            Write-Error "SteamCMD login failed (exit code $LASTEXITCODE)"
            exit 1
          }
          Write-Host "SteamCMD authenticated."

      - name: Generate Windows depot VDF
        shell: pwsh
        env:
          STEAM_BRANCH: ${{ inputs.branch }}
        run: |
          $contentRoot = (Resolve-Path "src-tauri/target/release").Path
          $outputDir = (New-Item -ItemType Directory -Force -Path "steamcmd/output").FullName

          # Depot VDF
          @"
          "DepotBuildConfig"
          {
            "DepotID" "4547572"
            "contentroot" "$contentRoot"
            "FileMapping"
            {
              "LocalPath" "recall-rogue.exe"
              "DepotPath" "."
            }
            "FileMapping"
            {
              "LocalPath" "steam_api64.dll"
              "DepotPath" "."
            }
            "FileMapping"
            {
              "LocalPath" "steam_appid.txt"
              "DepotPath" "."
            }
          }
          "@ | Set-Content -Path "steamcmd/depot_4547572.vdf"

          # App build VDF
          $depotVdf = (Resolve-Path "steamcmd/depot_4547572.vdf").Path
          @"
          "appbuild"
          {
            "appid" "4547570"
            "desc" "Recall Rogue Windows build (CI)"
            "buildoutput" "$outputDir"
            "contentroot" ""
            "setlive" "$env:STEAM_BRANCH"
            "depots"
            {
              "4547572" "$depotVdf"
            }
          }
          "@ | Set-Content -Path "steamcmd/app_build.vdf"

          Write-Host "Depot VDF:"
          Get-Content "steamcmd/depot_4547572.vdf"
          Write-Host "App build VDF:"
          Get-Content "steamcmd/app_build.vdf"

      - name: Upload to Steam via SteamCMD
        shell: pwsh
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
        run: |
          $appBuild = (Resolve-Path "steamcmd/app_build.vdf").Path
          & .\steamcmd\steamcmd.exe +login $env:STEAM_USERNAME +run_app_build $appBuild +quit

# ─── macOS Build ─────────────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    if: ${{ inputs.platforms == 'macos' || inputs.platforms == 'all' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (Vite + curated DB + obfuscation)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Add Rust targets for universal binary
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Build Tauri (macOS — ARM64)
        run: |
          cd src-tauri
          cargo tauri build --bundles app --target aarch64-apple-darwin

      - name: Build Tauri (macOS — x86_64)
        run: |
          cd src-tauri
          cargo tauri build --bundles app --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          ARM_APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Recall Rogue.app"
          X86_APP="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/Recall Rogue.app"
          UNIVERSAL_APP="src-tauri/target/release/bundle/macos/Recall Rogue.app"

          # Start with ARM64 app as base
          mkdir -p "$(dirname "$UNIVERSAL_APP")"
          cp -R "$ARM_APP" "$UNIVERSAL_APP"

          # Merge binaries with lipo
          lipo -create \
            "$ARM_APP/Contents/MacOS/Recall Rogue" \
            "$X86_APP/Contents/MacOS/Recall Rogue" \
            -output "$UNIVERSAL_APP/Contents/MacOS/Recall Rogue"

          echo "Universal binary architectures:"
          lipo -archs "$UNIVERSAL_APP/Contents/MacOS/Recall Rogue"

      - name: Copy libsteam_api.dylib into .app bundle
        # steamworks-sys builds the dylib under the aarch64 build path.
        # The binary links against @loader_path/libsteam_api.dylib, so it must be
        # co-located with the recall-rogue binary inside the universal .app's MacOS/ directory.
        run: |
          DYLIB=$(find src-tauri/target/aarch64-apple-darwin/release/build -name "libsteam_api.dylib" \
            -path "*/steamworks-sys-*/out/*" | head -1)
          if [[ -z "$DYLIB" ]]; then
            echo "ERROR: libsteam_api.dylib not found"
            exit 1
          fi
          echo "Found dylib at: $DYLIB"
          APP_BUNDLE="src-tauri/target/release/bundle/macos/Recall Rogue.app"
          cp "$DYLIB" "$APP_BUNDLE/Contents/MacOS/libsteam_api.dylib"
          echo "Copied libsteam_api.dylib into bundle."

      - name: Upload macOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: src-tauri/target/release/bundle/macos/
          retention-days: 7

# ─── Linux Build ─────────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    if: ${{ inputs.platforms == 'linux' || inputs.platforms == 'all' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (Vite + curated DB + obfuscation)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri (Linux AppImage)
        run: |
          cd src-tauri
          cargo tauri build --bundles appimage

      - name: Upload Linux build artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: src-tauri/target/release/bundle/appimage/
          retention-days: 7

      - name: Copy libsteam_api.so into release directory
        run: |
          SO=$(find src-tauri/target/release/build -name "libsteam_api.so" \
            -path "*/steamworks-sys-*/out/*" | head -1)
          if [[ -z "$SO" ]]; then
            echo "ERROR: libsteam_api.so not found"
            exit 1
          fi
          echo "Found SO at: $SO"
          cp "$SO" src-tauri/target/release/
          echo "Copied libsteam_api.so to src-tauri/target/release/"

      - name: Copy steam_appid.txt into release directory
        run: |
          cp src-tauri/steam_appid.txt src-tauri/target/release/
          echo "Copied steam_appid.txt (app ID: $(cat src-tauri/steam_appid.txt))"

      - name: Verify Linux release contents
        run: |
          ls -la src-tauri/target/release/recall-rogue src-tauri/target/release/libsteam_api.so src-tauri/target/release/steam_appid.txt
          file src-tauri/target/release/recall-rogue
          echo "All required files present."

      - name: Upload Linux Steam build artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-steam-build
          path: |
            src-tauri/target/release/recall-rogue
            src-tauri/target/release/libsteam_api.so
            src-tauri/target/release/steam_appid.txt
          retention-days: 7

      - name: Install SteamCMD (Linux)
        run: |
          sudo apt-get install -y steamcmd || {
            mkdir -p steamcmd
            cd steamcmd
            curl -sSL "https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz" | tar xz
            cd ..
          }

      - name: Authenticate SteamCMD
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
        run: |
          steamcmd +login "$STEAM_USERNAME" "$STEAM_PASSWORD" +quit || \
          ./steamcmd/steamcmd.sh +login "$STEAM_USERNAME" "$STEAM_PASSWORD" +quit

      - name: Generate Linux depot VDF
        env:
          STEAM_BRANCH: ${{ inputs.branch }}
        run: |
          CONTENT_ROOT="$(pwd)/src-tauri/target/release"
          OUTPUT_DIR="$(pwd)/steamcmd/output"
          mkdir -p "$OUTPUT_DIR"

          cat > steamcmd/depot_4547573.vdf << DVDF
          "DepotBuildConfig"
          {
            "DepotID" "4547573"
            "contentroot" "$CONTENT_ROOT"
            "FileMapping"
            {
              "LocalPath" "recall-rogue"
              "DepotPath" "."
            }
            "FileMapping"
            {
              "LocalPath" "libsteam_api.so"
              "DepotPath" "."
            }
            "FileMapping"
            {
              "LocalPath" "steam_appid.txt"
              "DepotPath" "."
            }
          }
          DVDF

          DEPOT_VDF="$(pwd)/steamcmd/depot_4547573.vdf"
          cat > steamcmd/app_build.vdf << AVDF
          "appbuild"
          {
            "appid" "4547570"
            "desc" "Recall Rogue Linux build (CI)"
            "buildoutput" "$OUTPUT_DIR"
            "contentroot" ""
            "setlive" "$STEAM_BRANCH"
            "depots"
            {
              "4547573" "$DEPOT_VDF"
            }
          }
          AVDF

          echo "Depot VDF:"
          cat steamcmd/depot_4547573.vdf
          echo "App build VDF:"
          cat steamcmd/app_build.vdf

      - name: Upload to Steam via SteamCMD
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
        run: |
          APP_BUILD="$(pwd)/steamcmd/app_build.vdf"
          steamcmd +login "$STEAM_USERNAME" +run_app_build "$APP_BUILD" +quit || \
          ./steamcmd/steamcmd.sh +login "$STEAM_USERNAME" +run_app_build "$APP_BUILD" +quit

# ─── Steam Deploy ─────────────────────────────────────────────────────────────
# Deploy now happens directly in each platform's build job (above).
# This avoids downloading large artifacts between jobs and cross-platform
# credential issues. Each build job installs steamcmd and uploads its depot.
