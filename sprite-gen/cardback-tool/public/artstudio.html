<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recall Rogue — Art Studio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100vh;
  }

  header {
    background: #1a1a2e;
    border-bottom: 2px solid #333;
    padding: 12px 20px;
    position: sticky;
    top: 0;
    z-index: 200;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  h1 {
    font-size: 1.25rem;
    color: #4ecca3;
    white-space: nowrap;
  }

  .nav-link {
    font-size: 0.8rem;
    color: #88aadd;
    text-decoration: none;
    padding: 4px 10px;
    border: 1px solid #446;
    border-radius: 6px;
    background: #1a2a4a;
  }
  .nav-link:hover { background: #2a3a5a; }
  .nav-link.active { background: #1a3a4a; border-color: #4ecca3; color: #4ecca3; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-top: 12px;
    border-bottom: 2px solid #333;
    padding-bottom: 0;
  }

  .tab-btn {
    padding: 7px 20px;
    background: #151525;
    border: 1px solid #333;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    color: #aaa;
    cursor: pointer;
    font-size: 0.88rem;
    font-weight: 600;
    transition: background 0.15s, color 0.15s;
    position: relative;
    bottom: -2px;
  }
  .tab-btn:hover { background: #1e1e3a; color: #ddd; }
  .tab-btn.active {
    background: #0f0f1a;
    border-color: #4ecca3;
    border-bottom: 2px solid #0f0f1a;
    color: #4ecca3;
  }

  /* Controls bar */
  .controls-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 12px 20px;
    background: #111120;
    border-bottom: 1px solid #252535;
  }

  .btn {
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
    border: 1px solid #444;
    transition: background 0.15s;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-primary {
    background: #1a4a3a;
    color: #4ecca3;
    border-color: #2a6a4a;
  }
  .btn-primary:hover:not(:disabled) { background: #2a5a4a; }

  .btn-danger {
    background: #4a1a1a;
    color: #ff6666;
    border-color: #6a2a2a;
  }
  .btn-danger:hover:not(:disabled) { background: #5a2a2a; }

  .btn-secondary {
    background: #2a2a4a;
    color: #aabbdd;
    border-color: #446;
  }
  .btn-secondary:hover:not(:disabled) { background: #3a3a5a; }

  .btn-accept {
    background: #1a3a2a;
    color: #4ecca3;
    border-color: #2a5a3a;
    font-size: 0.75rem;
    padding: 4px 12px;
  }
  .btn-accept:hover { background: #2a4a3a; }
  .btn-accept.accepted {
    background: #2a5a3a;
    border-color: #4ecca3;
    color: #fff;
  }

  .btn-generate-item {
    background: #1a2a4a;
    color: #88aadd;
    border-color: #335;
    font-size: 0.8rem;
    padding: 5px 14px;
  }
  .btn-generate-item:hover:not(:disabled) { background: #2a3a5a; }

  .search-input {
    padding: 6px 12px;
    background: #1a1a2e;
    border: 1px solid #444;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 0.85rem;
    min-width: 200px;
  }
  .search-input::placeholder { color: #666; }
  .search-input:focus { outline: none; border-color: #4ecca3; }

  .count-select {
    padding: 6px 10px;
    background: #1a1a2e;
    border: 1px solid #444;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .count-select:focus { outline: none; border-color: #4ecca3; }

  .status-text {
    font-size: 0.8rem;
    color: #888;
    margin-left: auto;
  }

  /* Main content */
  .content {
    padding: 20px;
    max-width: 1600px;
  }

  /* Item card */
  .item-card {
    background: #151525;
    border: 1px solid #2a2a3a;
    border-radius: 10px;
    margin-bottom: 24px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .item-card:hover { border-color: #3a3a5a; }

  .item-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 14px 16px;
    background: #1a1a30;
    border-bottom: 1px solid #252535;
    flex-wrap: wrap;
  }

  .item-meta {
    flex: 1;
    min-width: 200px;
  }

  .item-name {
    font-size: 1rem;
    font-weight: 700;
    color: #e0e0e0;
    margin-bottom: 4px;
  }

  .item-id {
    font-size: 0.72rem;
    color: #4ecca3;
    font-family: monospace;
    margin-bottom: 6px;
  }

  .item-concept {
    font-size: 0.8rem;
    color: #999;
    line-height: 1.4;
  }

  .item-dims {
    font-size: 0.75rem;
    color: #666;
    margin-top: 4px;
  }

  .item-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    align-self: center;
  }

  .variant-count-label {
    font-size: 0.78rem;
    color: #777;
  }

  /* Prompt section */
  .item-prompt-section {
    padding: 10px 16px;
    border-bottom: 1px solid #1e1e2e;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .prompt-label {
    font-size: 0.75rem;
    color: #667;
    padding-top: 6px;
    white-space: nowrap;
  }

  .prompt-textarea {
    flex: 1;
    background: #0f0f1a;
    border: 1px solid #333;
    border-radius: 6px;
    color: #ccc;
    font-size: 0.78rem;
    padding: 6px 10px;
    resize: vertical;
    min-height: 60px;
    font-family: inherit;
    line-height: 1.4;
  }
  .prompt-textarea:focus { outline: none; border-color: #4ecca3; }

  .btn-save-prompt {
    padding: 5px 12px;
    background: #1a2a1a;
    border: 1px solid #3a5a3a;
    border-radius: 6px;
    color: #88cc88;
    font-size: 0.75rem;
    cursor: pointer;
    align-self: flex-end;
    white-space: nowrap;
  }
  .btn-save-prompt:hover { background: #2a3a2a; }

  /* Variants row */
  .variants-row {
    display: flex;
    gap: 12px;
    padding: 14px 16px;
    overflow-x: auto;
    min-height: 80px;
    align-items: flex-start;
  }

  .variant-empty {
    color: #444;
    font-size: 0.82rem;
    align-self: center;
    padding: 20px 0;
    font-style: italic;
  }

  .variant-card {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }

  .variant-img-wrap {
    position: relative;
    width: 140px;
    height: 200px;
    background: #111;
    border: 2px solid #333;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .variant-img-wrap:hover { border-color: #4ecca3; }
  .variant-img-wrap.accepted { border-color: #4ecca3; box-shadow: 0 0 12px rgba(78,204,163,0.3); }

  .variant-img-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
    cursor: zoom-in;
  }

  .variant-status-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    font-size: 0.6rem;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .badge-pending { background: #333; color: #888; }
  .badge-generating { background: #1a3a4a; color: #66aacc; }
  .badge-done { background: #1a3a2a; color: #4ecca3; }
  .badge-error { background: #3a1a1a; color: #ff6666; }

  .accepted-badge {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 4px;
    background: #4ecca3;
    color: #0f0f1a;
    font-weight: 700;
  }

  .variant-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #333;
    border-top-color: #4ecca3;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .variant-label {
    font-size: 0.72rem;
    color: #666;
  }

  .variant-btn-row {
    display: flex;
    gap: 4px;
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    image-rendering: pixelated;
    border: 2px solid #444;
    border-radius: 8px;
  }

  .lightbox-meta {
    color: #aaa;
    font-size: 0.85rem;
    text-align: center;
  }

  .lightbox-close {
    position: fixed;
    top: 16px;
    right: 20px;
    background: #2a2a4a;
    border: 1px solid #446;
    color: #e0e0e0;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  .lightbox-close:hover { background: #3a3a5a; }

  /* Add item modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 900;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #1a1a2e;
    border: 1px solid #4ecca3;
    border-radius: 10px;
    padding: 24px;
    width: 540px;
    max-width: 95vw;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .modal h2 { color: #4ecca3; font-size: 1rem; }

  .form-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .form-label { font-size: 0.8rem; color: #aaa; }

  .form-input {
    padding: 7px 12px;
    background: #0f0f1a;
    border: 1px solid #444;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 0.85rem;
    font-family: inherit;
  }
  .form-input:focus { outline: none; border-color: #4ecca3; }
  textarea.form-input { resize: vertical; min-height: 80px; }

  .form-row-2col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 4px;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #555;
  }
  .empty-state h2 { font-size: 1.2rem; margin-bottom: 8px; color: #667; }

  /* Tab panel */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-left">
      <h1>Recall Rogue &mdash; Art Studio</h1>
      <a class="nav-link" href="/">Dashboard</a>
      <a class="nav-link" href="/stylelab.html">Style Lab</a>
      <a class="nav-link" href="/promptlab.html">Prompt Lab</a>
      <a class="nav-link" href="/relics.html">Relics</a>
      <a class="nav-link active" href="/artstudio.html">Art Studio</a>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('cardframes')">Card Frames</button>
    <button class="tab-btn" onclick="switchTab('enemies')">Enemies</button>
    <button class="tab-btn" onclick="switchTab('cardart')">Card Art</button>
  </div>
</header>

<div class="controls-bar">
  <input class="search-input" id="searchInput" type="text" placeholder="Search items..." oninput="renderItems()">
  <label style="font-size:0.82rem;color:#888">Variants per gen:</label>
  <select class="count-select" id="variantCount">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3" selected>3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>
  <button class="btn btn-secondary" onclick="openAddModal()">+ Add Item</button>
  <button class="btn btn-secondary" onclick="loadItems()">&#8635; Refresh</button>
  <span class="status-text" id="statusText">Loading...</span>
</div>

<!-- Tab panels -->
<div class="content">
  <div class="tab-panel active" id="panel-cardframes"></div>
  <div class="tab-panel" id="panel-enemies"></div>
  <div class="tab-panel" id="panel-cardart"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">Close</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-meta" id="lightboxMeta"></div>
</div>

<!-- Add Item Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Add New Item</h2>
    <div class="form-row">
      <label class="form-label">ID (slug, no spaces)</label>
      <input class="form-input" id="formId" type="text" placeholder="e.g. flame-knight-v1">
    </div>
    <div class="form-row">
      <label class="form-label">Name</label>
      <input class="form-input" id="formName" type="text" placeholder="Display name">
    </div>
    <div class="form-row">
      <label class="form-label">Concept (short description)</label>
      <textarea class="form-input" id="formConcept" placeholder="Brief concept description..."></textarea>
    </div>
    <div class="form-row">
      <label class="form-label">Prompt</label>
      <textarea class="form-input" id="formPrompt" placeholder="Full generation prompt..."></textarea>
    </div>
    <div class="form-row-2col">
      <div class="form-row">
        <label class="form-label">Target Width</label>
        <input class="form-input" id="formWidth" type="number" value="512">
      </div>
      <div class="form-row">
        <label class="form-label">Target Height</label>
        <input class="form-input" id="formHeight" type="number" value="512">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddItem()">Add Item</button>
    </div>
  </div>
</div>

<script>
  let currentTab = 'cardframes';
  let allItems = { cardframes: [], enemies: [], cardart: [] };
  let pollTimers = {};

  // ── Tab switching ──────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      const tabs = ['cardframes', 'enemies', 'cardart'];
      b.classList.toggle('active', tabs[i] === tab);
    });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${tab}`).classList.add('active');
    renderItems();
  }

  // ── Load items from API ────────────────────────────────────
  async function loadItems() {
    document.getElementById('statusText').textContent = 'Loading...';
    try {
      const results = await Promise.all(['cardframes', 'enemies', 'cardart'].map(async cat => {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);
        try {
          const r = await fetch(`/api/artstudio/items?category=${cat}`, { signal: controller.signal });
          clearTimeout(timeout);
          if (!r.ok) return [];
          return await r.json();
        } catch { clearTimeout(timeout); return []; }
      }));
      allItems.cardframes = results[0];
      allItems.enemies = results[1];
      allItems.cardart = results[2];
      renderItems();
      document.getElementById('statusText').textContent = `Loaded`;
    } catch (e) {
      document.getElementById('statusText').textContent = `Error: ${e.message}`;
    }
  }

  // ── Render items for current tab ──────────────────────────
  function renderItems() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const panel = document.getElementById(`panel-${currentTab}`);
    const items = allItems[currentTab].filter(i =>
      !q || i.name.toLowerCase().includes(q) || i.id.toLowerCase().includes(q) || (i.concept || '').toLowerCase().includes(q)
    );

    if (!items.length) {
      panel.innerHTML = `<div class="empty-state"><h2>No items yet</h2><p>Click "+ Add Item" to get started.</p></div>`;
      return;
    }

    panel.innerHTML = '';
    for (const item of items) {
      panel.appendChild(buildItemCard(item));
    }
  }

  // ── Build a single item card DOM element ──────────────────
  function buildItemCard(item) {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.id = `item-${item.id}`;

    const generatingCount = item.variants.filter(v => v.status === 'generating' || v.status === 'pending').length;

    card.innerHTML = `
      <div class="item-header">
        <div class="item-meta">
          <div class="item-name">${esc(item.name)}</div>
          <div class="item-id">${esc(item.id)}</div>
          <div class="item-concept">${esc(item.concept || '')}</div>
          <div class="item-dims">${item.targetWidth} &times; ${item.targetHeight} px</div>
        </div>
        <div class="item-actions">
          <span class="variant-count-label">${item.variants.length} variant${item.variants.length !== 1 ? 's' : ''}</span>
          <button class="btn btn-generate-item" id="btn-gen-${item.id}"
            onclick="generateVariants('${esc(item.id)}')"
            ${generatingCount > 0 ? 'disabled' : ''}>
            ${generatingCount > 0 ? `Generating (${generatingCount})...` : 'Generate Variants'}
          </button>
          <button class="btn btn-danger" style="font-size:0.75rem;padding:4px 10px"
            onclick="deleteItem('${esc(item.id)}')">Delete</button>
        </div>
      </div>
      <div class="item-prompt-section">
        <span class="prompt-label">Prompt</span>
        <textarea class="prompt-textarea" id="prompt-${esc(item.id)}" rows="3">${esc(item.prompt || '')}</textarea>
        <button class="btn-save-prompt" onclick="savePrompt('${esc(item.id)}')">Save</button>
      </div>
      <div class="variants-row" id="variants-${esc(item.id)}">
        ${item.variants.length === 0
          ? '<span class="variant-empty">No variants yet. Click "Generate Variants" to create some.</span>'
          : item.variants.map(v => buildVariantHTML(item, v)).join('')}
      </div>
    `;

    // Start polling if any variants are in-progress
    if (generatingCount > 0) {
      startPolling(item.id);
    }

    return card;
  }

  function buildVariantHTML(item, v) {
    const imgUrl = `/api/artstudio/image/${currentTab}/${item.id}/${v.variant}?t=${Date.now()}`;
    const hasImage = v.status === 'done' || v.status === 'error';
    return `
      <div class="variant-card" id="vc-${item.id}-${v.variant}">
        <div class="variant-img-wrap ${v.accepted ? 'accepted' : ''}"
             onclick="${v.status === 'done' ? `openLightbox('${imgUrl}', '${esc(item.name)} — Variant ${v.variant}')` : ''}">
          ${v.status === 'generating' || v.status === 'pending'
            ? '<div class="variant-spinner"></div>'
            : v.status === 'error'
              ? `<span style="color:#ff6666;font-size:0.7rem;padding:8px;text-align:center">Error</span>`
              : `<img src="${imgUrl}" alt="Variant ${v.variant}" loading="lazy">`}
          <span class="variant-status-badge badge-${v.status}">${v.status}</span>
          ${v.accepted ? '<span class="accepted-badge">Accepted</span>' : ''}
        </div>
        <div class="variant-label">Variant ${v.variant}</div>
        <div class="variant-btn-row">
          ${v.status === 'done' ? `<button class="btn-accept ${v.accepted ? 'accepted' : ''}"
            onclick="acceptVariant('${item.id}', ${v.variant})">${v.accepted ? 'Accepted' : 'Accept'}</button>` : ''}
        </div>
      </div>
    `;
  }

  // ── Generate variants ──────────────────────────────────────
  async function generateVariants(id) {
    const count = parseInt(document.getElementById('variantCount').value) || 3;
    const btn = document.getElementById(`btn-gen-${id}`);
    if (btn) { btn.disabled = true; btn.textContent = 'Queuing...'; }

    try {
      const r = await fetch('/api/artstudio/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, category: currentTab, count })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || r.statusText);
      await loadItems();
      startPolling(id);
    } catch (e) {
      alert(`Generation failed: ${e.message}`);
      if (btn) { btn.disabled = false; btn.textContent = 'Generate Variants'; }
    }
  }

  // ── Poll for completion ────────────────────────────────────
  function startPolling(id) {
    if (pollTimers[id]) return;
    pollTimers[id] = setInterval(async () => {
      const r = await fetch(`/api/artstudio/items?category=${currentTab}`);
      if (!r.ok) return;
      const items = await r.json();
      allItems[currentTab] = items;
      const item = items.find(i => i.id === id);
      if (!item) { clearInterval(pollTimers[id]); delete pollTimers[id]; return; }
      const inProgress = item.variants.filter(v => v.status === 'generating' || v.status === 'pending').length;
      // Update variants row
      const varRow = document.getElementById(`variants-${id}`);
      if (varRow) {
        varRow.innerHTML = item.variants.length === 0
          ? '<span class="variant-empty">No variants yet.</span>'
          : item.variants.map(v => buildVariantHTML(item, v)).join('');
      }
      // Update button
      const btn = document.getElementById(`btn-gen-${id}`);
      if (btn) {
        btn.disabled = inProgress > 0;
        btn.textContent = inProgress > 0 ? `Generating (${inProgress})...` : 'Generate Variants';
      }
      // Update count label
      const countLabel = document.querySelector(`#item-${id} .variant-count-label`);
      if (countLabel) countLabel.textContent = `${item.variants.length} variant${item.variants.length !== 1 ? 's' : ''}`;

      if (inProgress === 0) {
        clearInterval(pollTimers[id]);
        delete pollTimers[id];
      }
    }, 3000);
  }

  // ── Accept a variant ──────────────────────────────────────
  async function acceptVariant(id, variant) {
    try {
      const r = await fetch('/api/artstudio/accept', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, category: currentTab, variant })
      });
      if (!r.ok) throw new Error(await r.text());
      const item = allItems[currentTab].find(i => i.id === id);
      if (item) {
        for (const v of item.variants) v.accepted = false;
        const v = item.variants.find(x => x.variant === variant);
        if (v) v.accepted = !v.accepted;
      }
      // Re-render this item's variants row
      const varRow = document.getElementById(`variants-${id}`);
      if (varRow && item) {
        varRow.innerHTML = item.variants.map(v => buildVariantHTML(item, v)).join('');
      }
    } catch (e) {
      alert(`Accept failed: ${e.message}`);
    }
  }

  // ── Save prompt ───────────────────────────────────────────
  async function savePrompt(id) {
    const ta = document.getElementById(`prompt-${id}`);
    if (!ta) return;
    const item = allItems[currentTab].find(i => i.id === id);
    if (!item) return;
    try {
      const r = await fetch('/api/artstudio/items', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...item, prompt: ta.value, category: currentTab })
      });
      if (!r.ok) throw new Error(await r.text());
      item.prompt = ta.value;
      // Flash feedback
      ta.style.borderColor = '#4ecca3';
      setTimeout(() => ta.style.borderColor = '', 800);
    } catch (e) {
      alert(`Save failed: ${e.message}`);
    }
  }

  // ── Delete item ───────────────────────────────────────────
  async function deleteItem(id) {
    if (!confirm(`Delete "${id}" and all its variants?`)) return;
    try {
      const r = await fetch(`/api/artstudio/item/${currentTab}/${id}`, { method: 'DELETE' });
      if (!r.ok) throw new Error(await r.text());
      allItems[currentTab] = allItems[currentTab].filter(i => i.id !== id);
      renderItems();
    } catch (e) {
      alert(`Delete failed: ${e.message}`);
    }
  }

  // ── Add item modal ────────────────────────────────────────
  function openAddModal() {
    document.getElementById('formId').value = '';
    document.getElementById('formName').value = '';
    document.getElementById('formConcept').value = '';
    document.getElementById('formPrompt').value = '';
    document.getElementById('formWidth').value = currentTab === 'cardframes' ? '512' : '256';
    document.getElementById('formHeight').value = currentTab === 'cardframes' ? '729' : '256';
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  async function submitAddItem() {
    const id = document.getElementById('formId').value.trim().replace(/\s+/g, '-').toLowerCase();
    const name = document.getElementById('formName').value.trim();
    const concept = document.getElementById('formConcept').value.trim();
    const prompt = document.getElementById('formPrompt').value.trim();
    const targetWidth = parseInt(document.getElementById('formWidth').value) || 512;
    const targetHeight = parseInt(document.getElementById('formHeight').value) || 512;
    if (!id || !name) { alert('ID and Name are required.'); return; }
    try {
      const r = await fetch('/api/artstudio/items', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, category: currentTab, name, concept, prompt, targetWidth, targetHeight })
      });
      if (!r.ok) throw new Error(await r.text());
      closeModal();
      await loadItems();
    } catch (e) {
      alert(`Add failed: ${e.message}`);
    }
  }

  // ── Lightbox ──────────────────────────────────────────────
  function openLightbox(src, meta) {
    event.stopPropagation();
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightboxMeta').textContent = meta;
    document.getElementById('lightbox').classList.add('open');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeLightbox();
      closeModal();
    }
  });

  document.getElementById('modalOverlay').addEventListener('click', closeModal);

  // ── Utility ───────────────────────────────────────────────
  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ── Init ──────────────────────────────────────────────────
  loadItems();
</script>
</body>
</html>
