type: number
# Numbers are medium gravity at most; used only when context makes them meaningful
templates:
  - id: number_counted
    text: "The dungeon counts too. It arrived at a different answer — but it has been counting longer."
    min_gravity: medium

  - id: number_the_walls_know
    text: "That number is carved into the wall three rooms below. The dungeon anticipated the question."
    min_gravity: medium

  - id: number_weight_in_stone
    text: "Numbers have weight in the deep. The stone records them differently from words — more precisely, less forgivingly."
    min_gravity: medium

  - id: number_the_precise_fact
    text: "Precision. The dungeon respects precision. Approximation is how things get forgotten."
    min_gravity: medium

  - id: number_counted_the_dead
    text: "The dungeon has counted the dead using numbers like that. It does not share the totals. The totals are not encouraging."
    min_gravity: medium
