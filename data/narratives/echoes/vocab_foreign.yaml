# data/narratives/echoes/vocab_foreign.yaml
# Echo templates for the VocabForeignAdapter family.
# {entity} is replaced at runtime by VocabForeignAdapter.extractEchoText() output
# — the foreign word itself (e.g. "abandonar", "食べる", "величина").
# These supplement the existing foreign_word templates with adapter-specific framing.
id: vocab_foreign_echoes
family: vocab_foreign
templates:
  - "'{entity}.' The word lands differently down here — stripped of context, returned to its root meaning."
  - "You know what '{entity}' means now. The dungeon has been using it for centuries in its own communications, which you cannot read."
  - "'{entity}' — a word from somewhere the dungeon has never been, and yet it recognizes the sound. It recognizes all sounds."
  - "The dungeon adds '{entity}' to its vocabulary. It already had a word for the same thing. The meanings are not identical."
  - "Every foreign word is a key to a different architecture of thought. '{entity}' unlocks something specific. The dungeon noticed."
  - "'{entity}' was carried here by someone who spoke it without thinking. The effortlessness was the impressive part. You are still building toward it."
  - "There is a room in the lower archive that contains every word from every language brought into this dungeon. '{entity}' is in there now."
  - "The word '{entity}' does not translate cleanly. The dungeon approves of words that resist translation. They are more interesting to hold."
  - "Fluency is the goal the dungeon respects — the point where '{entity}' ceases to be a learned thing and becomes a known one."
  - "'{entity}.' A sound that means something specific to millions of people on the surface, and now something specific to you too."
  - "The dungeon's oldest inscriptions are in a language no one has spoken for three centuries. Several of the glyphs resemble '{entity}' too closely to be coincidence."
  - "You will forget '{entity}' eventually, unless you return to it. The dungeon banks on forgetting. It is why there are so many floors."
