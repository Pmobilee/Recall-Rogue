# data/narratives/echoes/science.yaml
# Echo templates for the ScienceAdapter family.
# {entity} is replaced at runtime by ScienceAdapter.extractEchoText() output
# — typically a concept term, law name, or named phenomenon.
id: science_echoes
family: science
templates:
  - "The principle of {entity} applies here too. The dungeon obeys the same rules, mostly."
  - "{entity} was named by someone who thought naming it would contain it. It did not."
  - "What {entity} describes was already happening before anyone had a word for it."
  - "The dungeon demonstrates {entity} in ways no laboratory permits."
  - "{entity}. A law that holds everywhere — even here, where most laws negotiate."
  - "You understand {entity} now. The dungeon understood it before the discipline that named it existed."
  - "The discovery of {entity} changed what was possible. Down here, the change is still propagating."
  - "{entity} — a truth that does not care whether you believe it. The dungeon appreciates that quality."
  - "Something in the deep runs on {entity}. Has always run on it. Will continue to after you are gone."
  - "The scientists who named {entity} would not survive the floor you are currently on. Their names are on plaques in the upper levels."
  - "{entity} cannot be unseen once understood. The dungeon counts on this. You cannot now un-know what you know."
  - "Every specimen in the lower archive confirms {entity}. The dungeon is one large ongoing experiment with conclusions it does not share."
