# data/narratives/mystery-pools/riddle_stranger.yaml
# Per-mystery-room narration templates for the Riddle Stranger event.
# Fires when mysteryRoomId === "riddle_stranger".
# Thread values: inhabitants | seeker | ambient
id: riddle_stranger
templates:
  - thread: inhabitants
    text: "The stranger has no face that you can hold in memory afterward. Only the question remains, persistent and needle-sharp."
  - thread: seeker
    text: "You solved it. Or you did not. The stranger's expression did not change either way. That is the most unsettling part."
  - thread: ambient
    text: "The air in this corridor still holds the shape of a question asked and answered — or unanswered — moments ago."
  - thread: inhabitants
    text: "The stranger appears in different forms to different seekers. The riddles, however, are always the same. The dungeon has only so many questions."
  - thread: seeker
    text: "You traded knowledge for something else, or something else for knowledge. The stranger accepts both currencies without preference."
  - thread: ambient
    text: "An empty corridor now. The stranger left when the exchange was complete. You cannot remember which direction."
  - thread: inhabitants
    text: "The stranger's riddles are not tests of intelligence. They are tests of what you are willing to admit you do not know."
  - thread: seeker
    text: "Whatever the stranger offered, it was not charity. This dungeon does not produce charity. It produces transactions."
  - thread: ambient
    text: "A footprint in the dust, pointing toward you. No second footprint. The stranger arrived differently than they left."
