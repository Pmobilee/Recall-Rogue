lens_id: history_ancient
lines:
  - id: hist_anc_names
    text: "Names carved into the walls. Some you recognize. Some have been scratched out."

  - id: hist_anc_war
    text: "A war was fought here once. Not with swords."

  - id: hist_anc_dynasty
    text: "The stonework changes as you descend — different hands, different centuries, layered like sediment. Whatever dynasty built this level did not expect to be forgotten."

  - id: hist_anc_inscription
    text: "An inscription above the doorway. The language is older than the dungeon itself. The dungeon built around it rather than through it."

  - id: hist_anc_dust_of_armies
    text: "The dust here has a specific composition — ash, bronze filings, and something organic that analysis would prefer not to identify. Empires leave this kind of residue."

  - id: hist_anc_the_dead_vote
    text: "The dead outvote the living at this depth. Their knowledge — what they built, what they knew, what they believed — outnumbers yours. The dungeon knows this and calibrates accordingly."

  - id: hist_anc_stone_absorbs
    text: "The stone absorbs history the way it absorbs everything — without judgment, without emphasis. The greatest and worst events of the ancient world are equally preserved here."

  - id: hist_anc_the_scribe
    text: "A scribe worked in this room. The indentations in the floor where they sat are still present. Whatever they were recording, they did it for decades."

  - id: hist_anc_the_map_is_wrong
    text: "The map of this level is incorrect. It was drawn by someone who never descended below the first chamber. The rooms extend further than the survey suggests."

  - id: hist_anc_bronze_and_silence
    text: "Bronze and silence. The specific combination that means antiquity — things built to last, built by hands that knew they would not."
