lens_id: science_physics
lines:
  - id: phys_ozone
    text: "The smell of ozone — something nearby operates at voltages that should not be possible without an external power source. There is no external power source visible."

  - id: phys_equations_on_walls
    text: "Equations cover every surface. Not decorative — someone was working through a problem that required all available space. They did not finish."

  - id: phys_the_collapse
    text: "The observatory collapsed inward. The architectural investigation concluded that the collapse was caused by forces generated inside the structure, not external impact. The report's implications were not published."

  - id: phys_the_constant
    text: "Several of the constants inscribed on the walls differ slightly from the accepted values. The dungeon does not say whether the accepted values or these values are correct."

  - id: phys_cold
    text: "Absolute cold — not the absence of heat, but the specific presence of something colder than heat's absence. The dungeon maintains this level at a temperature that requires explanation."

  - id: phys_the_crystal
    text: "The crystal instruments are undamaged. Everything else in this level is damaged. The crystals chose to survive whatever happened here — or were chosen by it."

  - id: phys_the_anomaly
    text: "An anomaly in the lower section that the physics cannot account for. The dungeon did not create it. The dungeon did not find it when it built here. It was already present. Waiting."

  - id: phys_the_equation_solved
    text: "One equation on the far wall has been solved — the final step completed in handwriting that differs from the rest. The completion was not celebrated. The handwriting that finished it does not match anyone who worked in this observatory."

  - id: phys_the_forces
    text: "Four fundamental forces operate in the dungeon — plus, in the deeper levels, several that have not been named and are awaiting a seeker with sufficient knowledge to identify them."

  - id: phys_the_wire
    text: "Crystal and wire — the dungeon's physics level looks like a theory rendered in materials. The theory is not entirely wrong. It is not entirely right. The dungeon finds this condition more interesting than either extreme."
