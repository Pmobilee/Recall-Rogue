lens_id: history_medieval
lines:
  - id: hist_med_candle
    text: "The candles are still burning. They have been burning for longer than candles burn. The dungeon maintains certain atmospheres for reasons it does not articulate."

  - id: hist_med_monastery
    text: "The monks who built this level were preserving something they believed would be needed after the world they knew ended. They were correct about the world ending. Less certain about the need."

  - id: hist_med_the_illuminated
    text: "An illuminated page — gold leaf still bright, the text too small to read at this light level. Whatever was worth that effort was worth keeping. The dungeon agreed."

  - id: hist_med_the_margins
    text: "The margins of the manuscripts down here contain more than the main text — the scribes wrote what they actually thought in the spaces the doctrine didn't reach."

  - id: hist_med_cold_stone
    text: "Cold stone and candlesmoke. The dungeon has maintained this level at the exact temperature and atmosphere of a monastery library in winter. It is either faithful or obsessive."

  - id: hist_med_the_revision
    text: "The revision marks on the wall tell a longer story than the text they corrected. Several generations of scholars disagreed here. None of them resolved it cleanly."

  - id: hist_med_vellum
    text: "Vellum survives everything. The documents in this level have outlasted the institutions that produced them, the languages they were written in, and the questions they were answering."

  - id: hist_med_the_anathema
    text: "Something in the lower section of this level was declared anathema and sealed. The seal is the original — still intact. The dungeon chose not to break it. It simply built around it."

  - id: hist_med_knight
    text: "A knight's passage through this level is recorded in the stonework — marks, scratches, the specific damage pattern of armor against narrow corridors. Whoever it was, they were thorough."

  - id: hist_med_the_last_entry
    text: "The last entry in the monastery's record: an incomplete sentence, interrupted mid-thought. Whatever interrupted it never allowed the sentence to be finished. The dungeon preserved the interruption."
