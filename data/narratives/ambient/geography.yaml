lens_id: geography
lines:
  - id: geo_the_blank
    text: "Blank spaces on the map. The cartographer who worked here filled in every edge, every coast, every inland feature — except for a region in the lower section. The blank space was deliberate."

  - id: geo_the_borders
    text: "Borders drawn in different inks — original survey, revised survey, revised again. The territory remained constant. The politics around it did not."

  - id: geo_salt_wind
    text: "The air carries salt. There is no ocean within kilometers of the surface entrance. The dungeon imports certain atmospheres from the places it maps."

  - id: geo_the_projection
    text: "Every map projection distorts something. The maps on these walls distort differently than the standard projections — the dungeon chose a projection that accurately represents what it finds important about the world."

  - id: geo_the_cartographer
    text: "The cartographer's vault was built to hold the maps that could not be allowed to circulate — coastlines too accurately drawn, territories too honestly bounded. Accurate geography has always been a controlled substance."

  - id: geo_the_names
    text: "The names on these maps are not the current names. Territories renamed, cities rebuilt under new identities, rivers called by their older words. The dungeon prefers the version that was here first."

  - id: geo_the_elevation
    text: "Elevation marks on the wall — this level sits at a depth corresponding to a specific altitude in the outside world. The dungeon chose its depths to correspond. It does not explain the correspondence."

  - id: geo_parchment
    text: "Parchment and bone — old maps used both. The frames of the documents down here are not decorative. The dungeon had access to the same materials the original cartographers used."

  - id: geo_the_scale
    text: "The scale of the maps increases as you descend. Surface level maps the world. This level maps a country. The floor below maps a city. What the lowest level maps is not discussed."

  - id: geo_the_territory
    text: "The territory exists. The map is a different thing from the territory. The dungeon contains both — the maps on the wall and the territory they represent, compressed into the same space by means that resist explanation."
