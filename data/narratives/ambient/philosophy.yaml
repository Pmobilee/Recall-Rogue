lens_id: philosophy
lines:
  - id: phil_the_debate
    text: "The debate was never resolved. The dungeon sealed the chamber at the precise moment of maximum disagreement — the most honest record of how the question stood at the time."

  - id: phil_stillness
    text: "Stillness and the residue of difficult questions. The debating chamber absorbed centuries of argument and holds it in suspension — the questions still active, the speakers gone."

  - id: phil_the_treatise
    text: "The treatise in the corner has been refuted twelve times. Each refutation is bound with the original. The dungeon considers refutation part of the text."

  - id: phil_the_argument
    text: "The argument inscribed on the north wall is valid. Whether it is sound is a different question — one that requires verifying the premises, which requires leaving the room and returning with evidence."

  - id: phil_the_interlocutor
    text: "The interlocutor of this level was designed to ask the question the seeker cannot answer. It has been waiting. The dungeon calibrated it to the specific gaps in your knowledge."

  - id: phil_text_and_silence
    text: "Text and silence. The philosophical tradition held here believed that what could not be said was as important as what could — and the dungeon, which stores both, agrees."

  - id: phil_the_contradiction
    text: "A contradiction is sealed in the lowest section of this level. The dungeon did not resolve it before sealing it. Resolution was not the point. The contradiction was the artifact."

  - id: phil_the_question
    text: "The question written on the floor was asked here for the first time by someone who did not know it was the most important question in this domain. The dungeon saw them ask it and began building this level around the moment."

  - id: phil_the_examined
    text: "Every system of thought examined here was found to contain something worth preserving and something worth questioning. The dungeon preserved both, in the same container."

  - id: phil_the_record
    text: "The record of every argument made in this chamber covers the walls from floor to ceiling. The dungeon ran out of wall space on the third renovation. It began writing in the floor."
