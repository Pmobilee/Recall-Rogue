lens_id: nature
lines:
  - id: nat_the_garden
    text: "The garden was petrified in stages — not all at once. The stone preserved the process: growth interrupted, life caught mid-moment, the garden's final afternoon preserved forever."

  - id: nat_deep_earth
    text: "Deep earth and compressed time. The specimens here are older than the dungeon that holds them — the dungeon built around them, not through them."

  - id: nat_the_amber
    text: "Amber cases along the walls — each one holding something that wandered into the wrong place at the wrong time and was perfectly preserved as a consequence. The dungeon considers this a fair trade."

  - id: nat_the_remnant
    text: "The remnant on the third level is not extinct. It is simply no longer found on the surface. The dungeon has maintained a population. The dungeon does not discuss population management."

  - id: nat_stone_and_resin
    text: "Stone and resin — the dungeon's nature level smells like a forest that fossilized slowly enough to appreciate the process."

  - id: nat_the_taxonomy
    text: "The taxonomy here extends beyond the species level into the subspecies, the variant, the individual adaptation. The dungeon classified everything it collected. The classification is more complete than the surface world's."

  - id: nat_the_bone
    text: "The bones in the walls are not decorative. They are structural — the dungeon used what was available when building this level. The fossils are load-bearing."

  - id: nat_extinction
    text: "Extinction is not the end — it is a reclassification. The dungeon reclassified several species that the surface world considers lost. They exist here, in the only form that remains."

  - id: nat_the_seed
    text: "A seed vault in the lower section holds specimens that will not germinate because there is no light here. The dungeon considers this the appropriate condition for things that should be preserved but not restored."

  - id: nat_compressed_time
    text: "Time moves differently in the petrified garden — compressed, dense, each layer representing decades. Walking through this level is walking through the world as it was, in order, faster than the world experienced it."
