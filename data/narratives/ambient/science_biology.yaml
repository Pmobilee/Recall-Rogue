lens_id: science_biology
lines:
  - id: bio_specimens_preserved
    text: "The specimens are preserved perfectly. Too perfectly — nothing natural lasts this well. The dungeon supplemented the formaldehyde with something the label does not describe."

  - id: bio_the_culture
    text: "A culture grows in the corner. Slowly. It has been growing since before the laboratory was abandoned. It knows something the researchers who left it behind did not."

  - id: bio_taxonomy
    text: "The classification system on the walls is extensive and internally consistent and wrong about approximately twelve percent of its entries. The dungeon has noted the errors but did not correct them."

  - id: bio_the_membrane
    text: "Glass and membrane — the dungeon's biology level is both delicate and resilient. The two properties define the life it studies."

  - id: bio_contamination
    text: "The contamination protocols were followed correctly until they weren't. The record of exactly when 'weren't' began is stored in a sealed room three floors below. The dungeon knows. It is not telling."

  - id: bio_the_construct
    text: "The guardian on this level was built from biological principles — not born, designed. The distinction is philosophically important. The dungeon has been exploring the distinction for some time."

  - id: bio_the_branching
    text: "Life branches at every junction. The dungeon recorded the branches — the paths evolution took, the paths it declined. The declined paths are stored here."

  - id: bio_the_naming
    text: "Every organism gets a name. The naming system extends below the species level, below the strain level, into specificity the surface world has no category for. This dungeon has categories."

  - id: bio_the_cell
    text: "At the smallest level, the dungeon and the cell operate on similar principles — compartmentalization, specialization, information transfer. The dungeon finds this interesting."

  - id: bio_the_closed_lab
    text: "The laboratory was sealed from the outside. This was a decision made for reasons the briefing documents do not specify. The dungeon read the briefing documents. It understood the reasons."
