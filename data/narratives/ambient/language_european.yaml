lens_id: language_european
lines:
  - id: lang_eu_borrowed_words
    text: "Every language in this level borrowed from every other. The borrowings are noted in the margins — a genealogy of sound and meaning that the dungeon finds more interesting than any pure lineage."

  - id: lang_eu_the_prison
    text: "The translator's prison was built to contain those who knew too much of the wrong language at the wrong time. The dungeon repurposed it. The bars are now archives."

  - id: lang_eu_the_wall
    text: "Three languages on the same wall, the same sentence — the first draft and its translations, each one changed slightly by the act of translation. The dungeon preserved all three. They are not identical."

  - id: lang_eu_the_lexicon
    text: "The locked lexicon contains words that were removed from the official language — considered dangerous, considered obsolete, considered too precise for comfortable use. The dungeon has them all."

  - id: lang_eu_the_echo
    text: "Words echo differently in this level — not from the stone, but from the walls absorbing language over centuries and releasing it slowly. You may hear, faintly, words you have not yet said."

  - id: lang_eu_the_cipher
    text: "The cipher on the wall is not for secrecy. It was used for compression — the translator's shorthand for concepts that required ten words in one language and two in another."

  - id: lang_eu_mistranslation
    text: "A mistranslation in the record altered the meaning of a document that changed the course of events the dungeon was watching at the time. The dungeon preserved the mistranslation alongside the correction."

  - id: lang_eu_foreign_silence
    text: "Borrowed words and foreign silence. The specific quiet of a room that has held many languages — each one occupying the space, leaving traces, yielding to the next."

  - id: lang_eu_the_word
    text: "A word exists in this language for which there is no translation in any other. The dungeon sealed it here so it would not be lost when the speakers were."

  - id: lang_eu_the_ink
    text: "The ink runs in this level. Not damaged — the letters extend beyond the edges of the paper, beyond the borders of the walls, into spaces where ink should not reach. The words are still legible. Just longer than expected."
