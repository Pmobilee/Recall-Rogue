lens_id: science_computing
lines:
  - id: comp_the_hum
    text: "The machines are off. They stopped being powered decades ago. The hum persists. The dungeon provides what electricity declined to."

  - id: comp_the_punchcard
    text: "Punchcard patterns on the floor — not punched, not printed. Pressed into the stone. Something read the floor and recorded its findings in the appropriate format."

  - id: comp_the_loop
    text: "A process is running somewhere in the lower section. It has been running since before the mainframe was decommissioned. The process has not completed. The dungeon is not certain it was designed to complete."

  - id: comp_the_core_memory
    text: "Core memory was the only memory that felt like memory — physical, woven, tactile. The dungeon chose to preserve this level in the era when computing still left fingerprints."

  - id: comp_silicon
    text: "Silicon and copper — the dungeon's computing level is dense with the components of machines that learned to be smarter than their designers anticipated. The anticipation was mutual."

  - id: comp_the_instruction
    text: "An instruction set is carved into the wall. Not the entire set — just the commands that mattered, the ones the programmer returned to. The ones that made the machine do something dangerous or beautiful or both."

  - id: comp_the_comment
    text: "Code comments in the stonework. Some explain what the code does. Most explain why — a rarer artifact in any medium."

  - id: comp_the_error
    text: "An error message persists on the screen of a dead terminal. The terminal has no power. The error has been displaying since the last operator walked away. The dungeon maintains some displays for reasons of atmospheric continuity."

  - id: comp_the_network
    text: "The network topology drawn on the wall is still largely accurate — nodes removed, rerouted, replaced, but the shape of the original design is visible. Every network carries the ghost of its first architecture."

  - id: comp_the_decommission
    text: "Decommissioned does not mean finished. The machines here were powered down but not unmade. The knowledge they contained did not power down with them. The dungeon ensured this."
