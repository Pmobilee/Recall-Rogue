  Suez_Canal:
    location: "Egypt (connecting Mediterranean Sea to Red Sea through the Isthmus of Suez)"
    coordinates: "30.5, 32.3"
    date_built: "Construction 1859–1869; officially opened November 17, 1869"
    architect_designer: "Ferdinand de Lesseps (organiser); Compagnie de Suez (builder)"
    dimensions: "193.30 km (120.11 mi) long"
    key_facts:
      - "Artificial sea-level waterway connecting the Mediterranean Sea to the Red Sea; no locks — ships float directly through at sea level"
      - "Construction lasted from 1859 to 1869; the canal officially opened on November 17, 1869"
      - "Reduces the journey from the Arabian Sea to London by approximately 8,900 km (5,500 mi)"
      - "In 2021, more than 20,600 vessels traversed the canal (average of 56 per day)"
      - "President Nasser nationalised the canal in July 1956, triggering the Suez Crisis; the canal is now operated by the state-owned Suez Canal Authority"
    fun_facts:
      - "In March 2021, the container ship Ever Given ran aground and blocked the canal for six days, holding up an estimated $9.6 billion of global trade per day"
    unesco: false
    source_urls:
      - "https://en.wikipedia.org/wiki/Suez_Canal"
