deck_id: french_a1_grammar
name: "French A1 Grammar"
domain: vocabulary
sub_domain: french_grammar
target_facts: 200
minimum_facts: 120
language: fr

data_sources:
  - name: Référentiel A1 pour le français (Beacco et al., Didier)
    url: https://www.didier.fr/livre/referentiel-pour-le-cadre-europeen-commun-a1.html
    license: Reference only — scope/structure. Conseil de l'Europe / Didier, 2007.
    usage: Authoritative A1 grammar scope. Determines which grammar points are included and their canonical descriptions. Cross-referenced against DELF A1 scope and Grammaire progressive du français (CLE International).
  - name: Tatoeba
    url: https://tatoeba.org/
    license: CC BY 2.0
    usage: Verified example sentences with French text + English translation + sentence ID. All sentence IDs documented in data/deck-architectures/_research/french/tatoeba_a1_sentences.tsv.

# -----------------------------------------------------------------
# Grammar Point Categories
#
# Chain Themes (by grammar area):
#   0 — present_er      : regular present -ER verbs (parler, aimer, travailler)
#   1 — etre_avoir      : être and avoir (the two essential auxiliaries)
#   2 — articles_genre  : articles (défini, indéfini, partitif) + gender agreement
#   3 — pronoms_poss    : subject pronouns, tonic pronouns, possessives
#   4 — questions_neg   : interrogatives + ne…pas negation
#   5 — present_ir_re   : -IR and -RE verbs (finir, partir, prendre, comprendre)
#   6 — temps_peri      : futur proche, passé récent, il y a
#   7 — prepositions    : prepositions of place + c'est/il est structure
#
# Answer Type Pools (one pool per semantically homogeneous answer type):
#   present_er_forms         : -er verb conjugations (parle, parles, etc.)
#   etre_forms               : être conjugations (suis, es, est, sommes, êtes, sont)
#   avoir_forms              : avoir conjugations (ai, as, a, avons, avez, ont)
#   aller_forms              : aller conjugations (vais, vas, va, allons, allez, vont)
#   faire_forms              : faire conjugations (fais, fais, fait, faisons, faites, font)
#   venir_forms              : venir conjugations (viens, viens, vient, venons, venez, viennent)
#   pouvoir_forms            : pouvoir conjugations (peux, peux, peut, pouvons, pouvez, peuvent)
#   vouloir_forms            : vouloir conjugations (veux, veux, veut, voulons, voulez, veulent)
#   present_ir_forms         : -ir verb conjugations (finis, pars, sortez, etc.)
#   present_re_forms         : -re verb conjugations (prends, comprends, attend, etc.)
#   reflexive_forms          : pronominal verb forms (m'appelle, te lèves, se couche, etc.)
#   articles_definis         : le, la, l', les (+ contractions au, aux, du, des)
#   articles_indefinis       : un, une, des
#   articles_partitifs       : du, de la, de l', de
#   possessifs_sg            : mon, ma, mes, ton, ta, tes, son, sa, ses
#   possessifs_pl            : notre, nos, votre, vos, leur, leurs
#   demonstratifs            : ce, cet, cette, ces
#   pronoms_sujets           : je, tu, il, elle, on, nous, vous, ils, elles
#   pronoms_toniques         : moi, toi, lui, elle, nous, vous, eux, elles
#   mots_interrogatifs       : où, quand, comment, pourquoi, combien, quel, qui, que
#   negation_ne_pas          : ne…pas forms and structures
#   futur_proche_forms       : aller + infinitif patterns (vais + inf, vas + inf, etc.)
#   passe_recent_forms       : venir de + infinitif patterns (viens de + inf, etc.)
#   prepositions_lieu        : à, de, en, dans, sur, sous, chez, devant, derrière
# -----------------------------------------------------------------

chain_themes:
  - id: 0
    name: "Present: -er Verbs"
    description: "Regular present indicative conjugations for -ER verbs: parler, aimer, travailler, habiter"
    color: "#4A9E6B"
    icon: "verb"
  - id: 1
    name: "Être & Avoir"
    description: "The two essential irregular verbs — être and avoir — backbone of all compound tenses"
    color: "#C44B4B"
    icon: "verb"
  - id: 2
    name: "Articles & Genre"
    description: "Definite, indefinite, and partitive articles plus noun gender and agreement"
    color: "#3E7BC4"
    icon: "article"
  - id: 3
    name: "Pronoms & Possessifs"
    description: "Subject pronouns, tonic pronouns, possessive adjectives, and demonstratives"
    color: "#7B4EA6"
    icon: "pronoun"
  - id: 4
    name: "Questions & Négation"
    description: "Interrogative words (où, quand, comment…) and basic negation with ne…pas"
    color: "#D99A2E"
    icon: "question"
  - id: 5
    name: "Present: -ir et -re"
    description: "Regular and common -IR verbs (finir, partir) and -RE verbs (prendre, comprendre)"
    color: "#5EA05E"
    icon: "verb"
  - id: 6
    name: "Temps Périphrastiques"
    description: "Near future (aller + inf), recent past (venir de + inf), and il y a existence"
    color: "#C45EA0"
    icon: "structure"
  - id: 7
    name: "Prépositions & Structure"
    description: "Prepositions of place and time (à, en, dans, chez, sur…) and c'est/il est patterns"
    color: "#A67C52"
    icon: "particle"

