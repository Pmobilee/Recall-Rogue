    Feuerbach:
      dates: "1804–1872 (Ludwig Andreas von Feuerbach)"
      school: "Young Hegelianism, materialism, anthropological philosophy of religion"
      key_works:
        - "The Essence of Christianity (Das Wesen des Christentums, 1841)"
        - "Principles of the Philosophy of the Future (Grundsätze der Philosophie der Zukunft, 1843)"
        - "Lectures on the Essence of Religion (1851)"
      key_doctrines:
        - "Projection theory of religion — 'God' is a projection of humanity's own highest qualities (reason, love, will); religion alienates humans from their own nature by externalizing it into a transcendent being"
        - "'Man made God in his own image' — the inversion of traditional theology"
        - "Sensuous materialism — philosophy must return from abstract thought to the sensuous human being; the basis of knowledge is sensory experience and intersubjective love"
        - "'Der Mensch ist was er ißt' ('Man is what he eats') — pithy formulation of his materialism (though possibly coined by a critic)"
        - "Critique of Hegel — Hegel's Geist is a theologized abstraction; the real subject is the concrete human being"
      students_or_influences: "Student of Hegel; direct influence on the young Marx (Economic and Philosophical Manuscripts, 1844); Engels described reading Feuerbach as a 'liberating' experience"
      notes: >
        The Essence of Christianity (1841) was the most influential book in Germany in the decade
        before the 1848 revolutions. George Eliot (Mary Ann Evans) translated it into English (1854).
        Marx wrote his Theses on Feuerbach (1845) as a critique: Feuerbach correctly showed that
        religion is a human product, but he didn't ask why humans produce such alienated self-images —
        the answer requires analyzing material-social conditions, not just sensuous nature. Engels
        summarized this: Feuerbach completed the theoretical criticism of religion; Marx showed the
        practical conditions that generate it.
      source_url: "https://plato.stanford.edu/entries/feuerbach/"
