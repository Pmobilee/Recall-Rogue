notes: >
  AP CHEMISTRY CED UNIT WEIGHTS (approximate exam distribution, effective Fall 2024):
  Unit 1 (Atomic Structure and Properties): 7-9%
  Unit 2 (Compound Structure and Properties): 7-9%
  Unit 3 (Properties of Substances and Mixtures): 18-22%
  Unit 4 (Chemical Reactions): 7-9%
  Unit 5 (Kinetics): 7-9%
  Unit 6 (Thermochemistry): 7-9%
  Unit 7 (Equilibrium): 7-9%
  Unit 8 (Acids and Bases): 11-15%
  Unit 9 (Thermodynamics and Electrochemistry): 7-9%

  Chain theme to exam weight mapping:
  - The Atomic Forge (Theme 0) covers Units 1-2 ~16% combined — foundation for all subsequent units
  - States & Solutions (Theme 1) covers Unit 3 ~20% — HIGHEST single-unit weight; IMFs are core concept
  - The Reaction Engine (Theme 2) covers Unit 4 ~8% — procedural mastery; stoichiometry + redox
  - Speed & Energy (Theme 3) covers Units 5-6 ~16% combined — kinetics + thermochem (both ~8%)
  - The Balance Point (Theme 4) covers Units 7-8 ~21% combined — second-highest weight; Units 7 (~8%) + 8 (~13%)
  - Power & Entropy (Theme 5) covers Unit 9 ~8% — capstone unit connecting thermo to electrochemistry

  GENERATION PRIORITY ORDER:
  1. acid_base_equilibrium_terms pool facts (Themes 4-5 — highest combined exam weight)
  2. bond_and_imf_types and molecular_geometries (Theme 0-1 — structure determines all)
  3. thermodynamic_quantities and law_and_equation_names (Theme 3-5 — most equations on exam)
  4. chemical_formulas and compound_names (Themes 2-4 — used in reactions and equilibrium expressions)
  5. reaction_types and redox-related facts (Theme 2 — systematic but lower weight)
  6. electrode_half_reactions (Theme 5 — specific but critical for electrochemistry)
  7. element_names and element_symbols (Theme 0 — foundational but straightforward)
  8. scientist_names (All themes — fewer than in history decks, but Hess, Le Chatelier, Nernst essential)

  VOLATILE DATA — DO NOT HARD-CODE:
  - Exact ΔHf° values — use CED table or OpenStax Appendix G values only; do not use LLM-recalled values
  - Standard reduction potentials — use CED-provided table values; minor source discrepancies exist
  - Ka and Kb values — use College Board reference or OpenStax Appendix H; textbooks vary slightly
  - Exact molar masses — use periodic table values; note that CED uses slightly rounded values
  - Kw = 1.0 × 10^-14 at 25°C (exact value temperature-dependent — specify 25°C in all Kw facts)

  LAB INVESTIGATION FACTS (is_lab_fact: true):
  AP Chemistry has 16 guided inquiry labs. Key labs generating facts:
  - Lab 1: What is the Relationship between the Structures of Molecules and the Properties of Substances?
  - Lab 4: How Much Heat Is Produced? — calorimetry, ΔH measurement
  - Lab 5: Beer-Lambert Law — spectrophotometry, concentration measurement
  - Lab 8: How Can the Kinetics of a Reaction Be Studied? — rate law determination
  - Lab 12: Acid-Base Titrations — equivalence point, indicators, stoichiometry
  - Lab 16: Electrochemical Cells and Cell Potentials — galvanic cell construction
  Lab facts are enrichment content; core CED topics must be fully covered first.

  CED EQUATIONS REQUIRED FOR AP EXAM (students provided reference sheet):
  All of the following require is_equation_fact: true on relevant facts:
  - PV = nRT (Ideal Gas Law)
  - E = hν, E = hc/λ (photon energy)
  - Beer-Lambert: A = εlc
  - Rate law: rate = k[A]^m[B]^n
  - Arrhenius: k = Ae^(−Ea/RT); ln(k2/k1) = (Ea/R)(1/T1 − 1/T2)
  - Integrated rate laws (0th, 1st, 2nd order)
  - q = mcΔT, q = mΔH
  - ΔHrxn = Σ ΔHf°(products) − Σ ΔHf°(reactants) (Hess's Law)
  - ΔG = ΔH − TΔS; ΔG° = −RT ln K
  - E°cell = E°cathode − E°anode
  - ΔG° = −nFE°cell
  - Nernst: E = E° − (0.0592/n) log Q at 25°C
  - Henderson-Hasselbalch: pH = pKa + log([A−]/[HA])
  - pH = −log[H+]; pOH = −log[OH−]; pH + pOH = 14

