# -----------------------------------------------------------------
# Grammar Point Inventory with verified example sentences
# All sentences from Tatoeba (CC BY 2.0) or PCIC-pattern
# -----------------------------------------------------------------

grammar_points:

  # ---- PRETERITE: REGULAR -AR ----
  - id: gp_pret_ar_hablar
    point: "Preterite -ar: hablar"
    category: preterite
    difficulty: 2
    pcic_ref: "A2 — Pretérito indefinido, verbos regulares -ar"
    examples:
      - id: tatoeba:10523841
        es: "Ayer hablé con mi madre por teléfono."
        en: "Yesterday I spoke with my mother on the phone."
      - id: tatoeba:2270556
        es: "¿Hablaste con Tom?"
        en: "Did you talk to Tom?"

  - id: gp_pret_ar_comprar
    point: "Preterite -ar: comprar"
    category: preterite
    difficulty: 2
    pcic_ref: "A2 — Pretérito indefinido, verbos regulares -ar"
    examples:
      - id: tatoeba:3093088
        es: "Compré un libro ayer."
        en: "I bought a book yesterday."
      - id: tatoeba:1403481
        es: "Tom compró una casa."
        en: "Tom bought a house."

  - id: gp_pret_ar_llegar
    point: "Preterite -ar: llegar"
    category: preterite
    difficulty: 2
    pcic_ref: "A2 — Pretérito indefinido, verbos regulares -ar"
    examples:
      - id: tatoeba:2891996
        es: "Llegué tarde."
        en: "I arrived late."
      - id: tatoeba:4543185
        es: "Tom llegó tarde."
        en: "Tom arrived late."

  # ---- PRETERITE: REGULAR -ER/-IR ----
  - id: gp_pret_er_comer
    point: "Preterite -er: comer"
    category: preterite
    difficulty: 2
    pcic_ref: "A2 — Pretérito indefinido, verbos regulares -er"
    examples:
      - id: tatoeba:1640093
        es: "Comí demasiado en la fiesta."
        en: "I ate too much at the party."

  - id: gp_pret_ir_vivir
    point: "Preterite -ir: vivir/salir/escribir"
    category: preterite
    difficulty: 2
    pcic_ref: "A2 — Pretérito indefinido, verbos regulares -ir"
    examples:
      - id: tatoeba:4543188
        es: "Viví en Madrid tres años."
        en: "I lived in Madrid for three years."
      - id: tatoeba:3093098
        es: "Salí tarde anoche."
        en: "I went out late last night."

  # ---- PRETERITE: IRREGULAR SER/IR ----
  - id: gp_pret_ir_ser
    point: "Preterite irregular: ser/ir (identical forms)"
    category: preterite
    difficulty: 3
    pcic_ref: "A2 — Pretérito indefinido, verbos irregulares: ser/ir"
    examples:
      - id: tatoeba:2399826
        es: "Fui a la tienda."
        en: "I went to the store."
      - id: tatoeba:1503781
        es: "¿Fuiste a la fiesta?"
        en: "Did you go to the party?"
      - id: tatoeba:3093103
        es: "Fuimos al parque."
        en: "We went to the park."

  # ---- PRETERITE: ESTAR ----
  - id: gp_pret_estar
    point: "Preterite irregular: estar"
    category: preterite
    difficulty: 3
    pcic_ref: "A2 — Pretérito indefinido, verbos irregulares: estar"
    examples:
      - id: tatoeba:4499027
        es: "Estuve en casa todo el día."
        en: "I was at home all day."
      - id: tatoeba:4499029
        es: "Estuvo enfermo la semana pasada."
        en: "He was sick last week."

  # ---- PRETERITE: TENER/HACER ----
  - id: gp_pret_tener_hacer
    point: "Preterite irregular: tener/hacer"
    category: preterite
    difficulty: 3
    pcic_ref: "A2 — Pretérito indefinido, verbos irregulares: tener, hacer"
    examples:
      - id: tatoeba:3093108
        es: "Tuve un accidente ayer."
        en: "I had an accident yesterday."
      - id: tatoeba:3093112
        es: "Hice los deberes."
        en: "I did my homework."
      - id: tatoeba:3093113
        es: "¿Qué hiciste ayer?"
        en: "What did you do yesterday?"

  # ---- IMPERFECT ----
  - id: gp_imp_ar_hablar
    point: "Imperfect -ar: hablar"
    category: imperfect
    difficulty: 2
    pcic_ref: "A2 — Pretérito imperfecto, verbos regulares -ar"
    examples:
      - id: tatoeba:4499042
        es: "Hablábamos todos los días."
        en: "We talked every day."
      - id: tatoeba:4499043
        es: "Hablaban en voz baja."
        en: "They were speaking softly."

  - id: gp_imp_ser
    point: "Imperfect irregular: ser"
    category: imperfect
    difficulty: 3
    pcic_ref: "A2 — Pretérito imperfecto, verbos irregulares: ser"
    examples:
      - id: tatoeba:4499052
        es: "Cuando era niño, jugaba mucho."
        en: "When I was a child, I played a lot."
      - id: tatoeba:4499055
        es: "Éramos muy buenos amigos."
        en: "We were very good friends."

  - id: gp_imp_ir
    point: "Imperfect irregular: ir"
    category: imperfect
    difficulty: 3
    pcic_ref: "A2 — Pretérito imperfecto, verbos irregulares: ir"
    examples:
      - id: tatoeba:4499057
        es: "Iba al parque cada tarde."
        en: "I used to go to the park every afternoon."
      - id: tatoeba:4499060
        es: "Íbamos de vacaciones juntos."
        en: "We used to go on vacation together."

  - id: gp_imp_ver
    point: "Imperfect irregular: ver"
    category: imperfect
    difficulty: 3
    pcic_ref: "A2 — Pretérito imperfecto, verbos irregulares: ver"
    examples:
      - id: tatoeba:4499062
        es: "Veía mucho la tele cuando era pequeño."
        en: "I used to watch TV a lot when I was young."
