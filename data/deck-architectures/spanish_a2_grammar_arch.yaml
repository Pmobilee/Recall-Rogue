deck_id: spanish_a2_grammar
name: "Spanish A2 Grammar"
domain: vocabulary
sub_domain: spanish_grammar
target_facts: 400
minimum_facts: 280
language: es

data_sources:
  - name: Instituto Cervantes PCIC A2 Grammar Inventory
    url: https://cvc.cervantes.es/ensenanza/biblioteca_ele/plan_curricular/niveles/02_gramatica_inventario_a1-a2.htm
    license: Reference only — scope/structure. Instituto Cervantes, 2011.
    usage: Authoritative A2 grammar scope. Determines which grammar points are included and their canonical descriptions.
  - name: Tatoeba
    url: https://tatoeba.org/
    license: CC BY 2.0
    usage: Verified example sentences with Spanish text + English translation + sentence ID. All sentence IDs documented in tatoeba_a2_sentences.tsv.

# -----------------------------------------------------------------
# Chain Themes (by grammar area):
#   0 — preterite        : pretérito indefinido (simple past)
#   1 — imperfect        : pretérito imperfecto
#   2 — perfect_progressive : present perfect (haber+PP) + present progressive
#   3 — object_pronouns  : direct + indirect object pronouns
#   4 — reflexive_verbs  : reflexive verb conjugations
#   5 — comparatives_superlatives : más/menos/tan...como, mayor/mejor/peor, superlatives
#   6 — por_para_future  : por vs para basics + ir a + infinitivo
#   7 — imperative_impersonal : affirmative tú imperative + impersonal se
#
# Answer Type Pools:
#   preterite_ar       : regular -ar preterite forms (hablé, hablaste, habló, etc.)
#   preterite_er_ir    : regular -er/-ir preterite forms (comí, viví, etc.)
#   preterite_ser_ir   : ser/ir preterite (fui, fuiste, fue, fuimos, fueron)
#   preterite_estar    : estar preterite (estuve, estuviste, estuvo, etc.)
#   preterite_tener_hacer : tener/hacer preterite (tuve, hice, hizo, etc.)
#   preterite_decir_ver_dar : decir/ver/dar preterite (dije, vi, di, etc.)
#   preterite_poder_poner_venir : poder/poner/venir preterite (pude, puse, vine, etc.)
#   preterite_querer_saber : querer/saber preterite (quise, supe, etc.)
#   preterite_time_expressions : ayer, la semana pasada, hace X tiempo
#   imperfect_ar       : regular -ar imperfect (hablaba, hablabas, etc.)
#   imperfect_er_ir    : regular -er/-ir imperfect (comía, vivía, etc.)
#   imperfect_ser      : ser imperfect (era, eras, éramos, etc.)
#   imperfect_ir       : ir imperfect (iba, ibas, íbamos, etc.)
#   imperfect_ver      : ver imperfect (veía, veías, etc.)
#   past_participles_regular : hablado, comido, vivido (regular PP forms)
#   past_participles_irregular : hecho, dicho, visto, vuelto, escrito, puesto
#   haber_forms        : he, has, ha, hemos, habéis, han
#   do_pronouns        : lo, la, los, las, me, te, nos, os
#   io_pronouns        : le, les, me, te, nos, os, se
#   reflexive_conjugations : me levanto, te levantas, se levanta, etc.
#   gerund_forms       : hablando, comiendo, viviendo, durmiendo, pidiendo, leyendo
#   comparative_words  : más, menos, tan, como, que (comparative function words)
#   comparative_irregular : mayor, menor, mejor, peor
#   superlative_forms  : el/la más+adj phrases
#   imperative_tu      : habla, come, escribe, ven, ten, pon, sal, di, haz, ve, sé
#   por_para_choice    : por / para (choosing the correct preposition)
#   muy_mucho_forms    : muy, mucho, mucha, muchos, muchas
# -----------------------------------------------------------------

chain_themes:
  - id: 0
    name: "Preterite"
    description: "Pretérito indefinido — completed past actions, regular and irregular"
    color: "#C44B4B"
    icon: "verb"
  - id: 1
    name: "Imperfect"
    description: "Pretérito imperfecto — ongoing, habitual, or descriptive past"
    color: "#7B4EA6"
    icon: "verb"
  - id: 2
    name: "Perfect & Progressive"
    description: "Present perfect (he hablado) and present progressive (estoy hablando)"
    color: "#3A7BD5"
    icon: "phrase"
  - id: 3
    name: "Object Pronouns"
    description: "Direct and indirect object pronouns — lo/la, le/les, me/te/nos"
    color: "#E87E2E"
    icon: "pronoun"
  - id: 4
    name: "Reflexive Verbs"
    description: "Reflexive verbs — levantarse, acostarse, vestirse, sentirse, etc."
    color: "#4A9E6B"
    icon: "pronoun"
  - id: 5
    name: "Comparatives & Superlatives"
    description: "más...que, menos...que, tan...como, mayor/mejor/peor, el más..."
    color: "#D4A017"
    icon: "contrast"
  - id: 6
    name: "Por, Para & Future"
    description: "por vs. para basics, ir a + infinitivo (near future), muy vs. mucho"
    color: "#2E8B57"
    icon: "structure"
  - id: 7
    name: "Imperative & Impersonal"
    description: "Affirmative tú imperative (habla/ven/haz) and impersonal se"
    color: "#8B5E3C"
    icon: "command"

