# ═══════════════════════════════════════════════
# COMMON CONFUSIONS — seeded into confusion matrix
# ═══════════════════════════════════════════════

common_confusions:
  # Rulers confused with each other
  - ["Louis XIV", "Louis XVI"]  # Both French kings, very different eras
  - ["Charles V", "Charles I"]  # HRE vs English Civil War
  - ["Peter the Great", "Catherine the Great"]  # Both Russian reformers
  - ["Frederick the Great", "Frederick William I"]  # Prussian kings
  - ["Henry VIII", "Henry IV"]  # English vs French

  # Thinkers confused with each other
  - ["Locke", "Hobbes"]  # Both social contract, opposite conclusions
  - ["Voltaire", "Rousseau"]  # Both Enlightenment, different views
  - ["Luther", "Calvin"]  # Both Protestant reformers
  - ["Copernicus", "Galileo"]  # Both heliocentrism

  # Events confused with each other
  - ["Treaty of Westphalia", "Treaty of Versailles"]  # Both ended major wars
  - ["Congress of Vienna", "Treaty of Versailles"]  # Both post-war settlements
  - ["Glorious Revolution", "French Revolution"]  # Both revolutions, very different
  - ["Thirty Years' War", "Seven Years' War"]  # Named wars

  # Concepts confused with each other
  - ["mercantilism", "capitalism"]  # Both economic systems
  - ["absolutism", "constitutionalism"]  # Opposing governance models
  - ["socialism", "communism"]  # Related but distinct ideologies
  - ["nationalism", "imperialism"]  # Both 19th century forces
  - ["Renaissance", "Enlightenment"]  # Both intellectual movements, different eras

# ═══════════════════════════════════════════════
# SYNONYM GROUPS
# ═══════════════════════════════════════════════

synonym_groups:
  - id: reformation_terms
    members: ["Protestant Reformation", "the Reformation"]
    reason: "Same event"
  - id: counter_reformation
    members: ["Counter-Reformation", "Catholic Reformation"]
    reason: "Same movement"
  - id: wwi_names
    members: ["World War I", "WWI", "The Great War"]
    reason: "Same conflict"
  - id: wwii_names
    members: ["World War II", "WWII"]
    reason: "Same conflict"
  - id: hre
    members: ["Holy Roman Empire", "HRE"]
    reason: "Same entity"

# ═══════════════════════════════════════════════
# SUB-DECKS (one per CED unit)
# ═══════════════════════════════════════════════

sub_decks:
  - id: unit1_renaissance
    name: "Unit 1: Renaissance & Exploration"
    period: "c. 1450–1648"
    exam_weight: "10–15%"
    target_facts: 60
    topics:
      - "1.1 Context of Renaissance & Discovery"
      - "1.2 Italian Renaissance — humanism, art, civic life (Florence, Venice)"
      - "1.3 Northern Renaissance — Christian humanism, Erasmus, Dürer"
      - "1.4 Printing — Gutenberg, spread of ideas"
      - "1.5 New Monarchies — state centralization (Henry VII, Ferdinand & Isabella, Louis XI)"
      - "1.6 Age of Exploration — navigation tech, Portuguese/Spanish voyages"
      - "1.7 Colonial Rivals — competing European powers overseas"
      - "1.8 Columbian Exchange — crops, animals, diseases"
      - "1.9 Slave Trade — development of Atlantic slave trade"
      - "1.10 Commercial Revolution — finance, markets, demographic effects"
      - "1.11 Causation in Renaissance & Discovery"
    key_figures:
      - Leonardo da Vinci, Michelangelo, Raphael, Machiavelli
      - Petrarch, Erasmus, Thomas More
      - Gutenberg
      - Henry VII, Ferdinand & Isabella, Louis XI, Charles V
      - Vasco da Gama, Columbus, Magellan, Cortés, Pizarro
    key_concepts:
      - humanism, secularism, individualism
      - movable type printing press
      - new monarchies, state building
      - Columbian Exchange, mercantilism
      - encomienda, Middle Passage

  - id: unit2_reformation
    name: "Unit 2: Age of Reformation"
    period: "c. 1450–1648"
    exam_weight: "10–15%"
    target_facts: 55
    topics:
      - "2.1 Context of 16th–17th Century Challenges"
      - "2.2 Luther and the Protestant Reformation — 95 Theses, justification by faith"
      - "2.3 Protestant Reform Continues — Calvin, Zwingli, Anabaptists, Anglicanism"
      - "2.4 Wars of Religion — French Wars of Religion, Thirty Years' War, Westphalia"
      - "2.5 Catholic Reformation — Council of Trent, Jesuits, Inquisition"
      - "2.6 16th-Century Society & Politics — hierarchies, gender, witchcraft"
      - "2.7 Mannerism and Baroque Art — El Greco, Bernini, Caravaggio"
      - "2.8 Causation in Reformation & Wars of Religion"
    key_figures:
      - Martin Luther, John Calvin, Ulrich Zwingli, Henry VIII
      - Ignatius of Loyola, Pope Paul III
      - Philip II, Elizabeth I, Gustavus Adolphus
      - El Greco, Bernini, Caravaggio
    key_concepts:
      - justification by faith alone (sola fide)
      - predestination (Calvin)
      - Act of Supremacy, Anglican Church
      - Peace of Augsburg, Peace of Westphalia
      - cuius regio eius religio

  - id: unit3_absolutism
    name: "Unit 3: Absolutism & Constitutionalism"
    period: "c. 1648–1815"
    exam_weight: "10–15%"
    target_facts: 55
    topics:
      - "3.1 Context of State Building (1648–1815)"
      - "3.2 English Civil War & Glorious Revolution"
      - "3.3 Continuities & Changes in Economic Practice"
      - "3.4 Economic Development & Mercantilism"
      - "3.5 Dutch Golden Age — Republic as commercial/cultural power"
      - "3.6 Balance of Power — diplomatic strategies"
      - "3.7 Absolutist Approaches — Louis XIV, Peter the Great"
      - "3.8 Comparison: Absolutism vs Constitutionalism"
    key_figures:
      - Louis XIV, Peter the Great, Frederick the Great
      - Oliver Cromwell, William & Mary, Charles I, Charles II, James II
      - Colbert, Cardinal Richelieu, Cardinal Mazarin
      - William of Orange (William III)
    key_concepts:
      - divine right of kings
      - absolute monarchy vs constitutional monarchy
      - English Bill of Rights 1689
      - mercantilism, balance of trade
      - Dutch East India Company (VOC)
      - Versailles as symbol of absolutism

  - id: unit4_scientific_enlightenment
    name: "Unit 4: Scientific Revolution & Enlightenment"
    period: "c. 1648–1815"
    exam_weight: "10–15%"
    target_facts: 55
    topics:
      - "4.1 Context of Scientific Revolution & Enlightenment"
      - "4.2 Scientific Revolution — Copernicus, Galileo, Newton, Vesalius, Harvey"
      - "4.3 Enlightenment — Locke, Rousseau, Voltaire, Montesquieu, Diderot"
      - "4.4 18th-Century Society & Demographics — Agricultural Revolution"
      - "4.5 18th-Century Culture & Arts — Baroque to Neoclassicism"
      - "4.6 Enlightened Absolutism — Frederick the Great, Catherine the Great, Joseph II"
      - "4.7 Causation in the Scientific Revolution"
    key_figures:
      - Copernicus, Galileo, Kepler, Newton, Francis Bacon, Descartes
      - Vesalius, Harvey, Boyle
      - Locke, Voltaire, Montesquieu, Rousseau, Diderot
      - Mary Wollstonecraft, Adam Smith
      - Frederick the Great, Catherine the Great, Joseph II
    key_concepts:
      - heliocentrism, empiricism, scientific method
      - natural rights, social contract, separation of powers
      - deism, religious tolerance
      - Encyclopédie
      - enlightened absolutism/despotism
      - Agricultural Revolution (enclosure, crop rotation)

  - id: unit5_revolution_napoleon
    name: "Unit 5: French Revolution & Napoleon"
    period: "c. 1648–1815"
    exam_weight: "10–15%"
    target_facts: 60
    topics:
      - "5.1 Context of 18th-Century States"
      - "5.2 Rise of Global Markets"
      - "5.3 Britain's Ascendancy — commercial/imperial dominance"
      - "5.4 French Revolution — causes, outbreak, early phases"
      - "5.5 Effects of French Revolution — mass conscription, Haiti"
      - "5.6 Napoleon — rise, Napoleonic Code, continental system, defeat"
      - "5.7 Congress of Vienna — restoration, balance of power"
      - "5.8 Romanticism — emotion over reason, national identity"
      - "5.9 Continuity & Change in 18th-Century States"
    key_figures:
      - Louis XVI, Marie Antoinette, Robespierre, Danton
      - Napoleon Bonaparte, Talleyrand, Metternich
      - Toussaint Louverture (Haiti connection)
      - Lord Nelson, Duke of Wellington
      - Goethe, Beethoven, Delacroix (Romanticism)
    key_concepts:
      - Estates-General, Tennis Court Oath, storming of the Bastille
      - Declaration of Rights of Man and Citizen
      - Reign of Terror, Committee of Public Safety
      - Napoleonic Code, Continental System
      - Congress of Vienna, Concert of Europe, legitimacy
      - Romanticism as reaction to Enlightenment rationalism

  - id: unit6_industrialization
    name: "Unit 6: Industrialization & Its Effects"
    period: "c. 1815–1914"
    exam_weight: "10–15%"
    target_facts: 55
    topics:
      - "6.1 Context of Industrialization"
      - "6.2 Spread of Industry Across Europe"
      - "6.3 Second-Wave Industrialization — steel, electricity, chemicals"
      - "6.4 Social Effects — family, gender roles, class"
      - "6.5 Concert of Europe & European Conservatism"
      - "6.6 Revolutions 1815–1914 (including 1848)"
      - "6.7 Ideologies of Change — liberalism, socialism, anarchism"
      - "6.8 19th-Century Social Reform — labor, feminism"
      - "6.9 Institutional Reform — public health, education"
      - "6.10 Causation in Industrialization"
    key_figures:
      - James Watt, George Stephenson, Henry Bessemer
      - Robert Owen, Karl Marx, Friedrich Engels
      - Emmeline Pankhurst, Flora Tristan
      - Louis Kossuth, Giuseppe Mazzini
    key_concepts:
      - factory system, steam power, textile mills
      - urbanization, child labor, working conditions
      - proletariat, bourgeoisie, class consciousness
      - utopian socialism, Marxism, anarchism
      - liberalism, conservatism
      - Revolutions of 1848 — "Springtime of Peoples"

  - id: unit7_nationalism_imperialism
    name: "Unit 7: 19th-Century Nationalism & Imperialism"
    period: "c. 1815–1914"
    exam_weight: "10–15%"
    target_facts: 55
    topics:
      - "7.1 Context of 19th-Century Politics"
      - "7.2 Nationalism — unification movements"
      - "7.3 National Unification & Diplomatic Tensions — Italy, Germany, Balkans"
      - "7.4 Darwinism & Social Darwinism"
      - "7.5 Age of Progress & Modernity — positivism, Freud"
      - "7.6 New Imperialism — motivations, methods"
      - "7.7 Imperialism's Global Effects"
      - "7.8 19th-Century Culture & Arts — Romanticism to Modernism"
      - "7.9 Causation in 19th-Century Developments"
    key_figures:
      - Otto von Bismarck, Giuseppe Garibaldi, Camillo di Cavour
      - Napoleon III, Queen Victoria, Alexander II
      - Charles Darwin, Herbert Spencer, Sigmund Freud
      - Cecil Rhodes, King Leopold II
      - Monet, Zola, Dostoevsky
    key_concepts:
      - nationalism, self-determination
      - Realpolitik, blood and iron
      - Italian unification (Risorgimento)
      - German unification, Ems Dispatch
      - Berlin Conference 1884, Scramble for Africa
      - Social Darwinism, "White Man's Burden"
      - Impressionism, Realism, Modernism

  - id: unit8_global_conflicts
    name: "Unit 8: 20th-Century Global Conflicts"
    period: "c. 1914–present"
    exam_weight: "10–15%"
    target_facts: 65
    topics:
      - "8.1 Context of 20th-Century Conflicts"
      - "8.2 World War I — causes, trench warfare, effects"
      - "8.3 Russian Revolution — Bolsheviks, Lenin, civil war"
      - "8.4 Versailles Peace Settlement"
      - "8.5 Great Depression — global economic crisis"
      - "8.6 Fascism & Totalitarianism — Hitler, Mussolini, Stalin"
      - "8.7 Interwar Period — appeasement, remilitarization"
      - "8.8 World War II — blitzkrieg, theaters, turning points"
      - "8.9 Holocaust — genocide of six million Jews"
      - "8.10 20th-Century Cultural/Intellectual Developments"
      - "8.11 Continuity & Change in Global Conflict"
    key_figures:
      - Archduke Franz Ferdinand, Kaiser Wilhelm II
      - Lenin, Trotsky, Stalin
      - Woodrow Wilson, Clemenceau, Lloyd George
      - Hitler, Mussolini, Franco
      - Churchill, de Gaulle, Eisenhower
      - Picasso, Kafka, Orwell
    key_concepts:
      - alliance systems, militarism, imperialism (causes of WWI)
      - trench warfare, total war, war of attrition
      - Bolshevism, Soviet collectivization, Five-Year Plans
      - Treaty of Versailles, war guilt clause, reparations
      - fascism, Nazism, totalitarianism
      - appeasement (Munich Agreement), Anschluss
      - blitzkrieg, D-Day, Holocaust, Nuremberg Trials
      - existentialism, surrealism, modernism

  - id: unit9_cold_war_contemporary
    name: "Unit 9: Cold War & Contemporary Europe"
    period: "c. 1945–present"
    exam_weight: "10–15%"
    target_facts: 55
    topics:
      - "9.1 Context of Cold War & Contemporary Europe"
      - "9.2 Rebuilding Europe — Marshall Plan, recovery"
      - "9.3 Cold War — ideological conflict, Berlin, Cuba"
      - "9.4 Two Superpowers Emerge"
      - "9.5 Postwar Nationalism & Ethnic Conflict"
      - "9.6 Contemporary Western Democracies"
      - "9.7 Fall of Communism — 1989, collapse of Soviet Union"
      - "9.8+ Contemporary Issues — EU, migration, decolonization, feminism, globalization"
    key_figures:
      - Truman, Marshall, Khrushchev, Gorbachev
      - Adenauer, de Gaulle, Thatcher, Willy Brandt
      - Lech Walesa, Vaclav Havel
      - Jean Monnet (EU founding)
      - Simone de Beauvoir
    key_concepts:
      - Marshall Plan, Truman Doctrine, containment
      - Iron Curtain, Berlin Wall, NATO vs Warsaw Pact
      - détente, Ostpolitik
      - decolonization — Africa, Asia
      - Solidarity movement, Velvet Revolution
      - glasnost, perestroika
      - Maastricht Treaty, European Union
      - fall of Berlin Wall 1989, dissolution of USSR 1991

# ═══════════════════════════════════════════════
# DIFFICULTY TIERS
# ═══════════════════════════════════════════════

difficulty_tiers:
  easy:
    description: "Universally known — any educated person knows these"
    examples: ["French Revolution started 1789", "Luther wrote 95 Theses", "Napoleon defeated at Waterloo", "Berlin Wall fell 1989"]
  medium:
    description: "Commonly known by AP students — core curriculum"
    examples: ["Peace of Westphalia ended Thirty Years' War", "Bismarck unified Germany", "Locke wrote Two Treatises", "Marshall Plan rebuilt Europe"]
  hard:
    description: "Requires deeper study — advanced AP content"
    examples: ["Carlsbad Decrees suppressed liberal movements", "Zollverein was Prussian customs union", "Joseph II abolished serfdom in Austria", "Willy Brandt's Ostpolitik"]

# ═══════════════════════════════════════════════
# CHAIN THEMES — generic slots (0-5)
# ═══════════════════════════════════════════════
# Not required for initial decks. Facts assigned to generic chain slots
# distributed evenly across all facts. Named themes are a future enhancement.

volatile_facts: []
# AP Euro covers history through "present" — contemporary Europe facts
# about current EU membership, current leaders etc. would be volatile.
# We avoid these by keeping facts anchored to historical events with fixed dates.
