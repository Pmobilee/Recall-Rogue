deck_id: ap_european_history
name: "AP European History"
domain: history
sub_domain: european_history
target_facts: 520
minimum_facts: 450
description: "Master the complete AP European History curriculum — from the Renaissance through contemporary Europe. Covers all 9 CED units tested on the AP Euro exam, spanning c. 1450 to the present."

# ═══════════════════════════════════════════════
# DATA SOURCES
# ═══════════════════════════════════════════════

data_sources:
  - name: College Board AP European History CED
    url: https://apcentral.collegeboard.org/courses/ap-european-history
    license: educational reference (scope/structure only — no content copied)
    usage: Unit structure, topic numbering, exam weightings
  - name: Wikipedia
    url: https://en.wikipedia.org/
    license: CC-BY-SA-4.0
    usage: Fact text, explanations, narrative context
  - name: Wikidata
    url: https://www.wikidata.org/
    license: CC0
    usage: Structured data (dates, locations, participants)
  - name: Encyclopaedia Britannica (verification)
    url: https://www.britannica.com/
    license: verification only — no text copied
    usage: Cross-reference for factual accuracy

# ═══════════════════════════════════════════════
# ANSWER TYPE POOLS — The educational backbone
# ═══════════════════════════════════════════════

answer_type_pools:
  - id: person_names
    format: name
    estimated_count: 130
    min_distractors: 4
    note: "Rulers, thinkers, reformers, generals, artists. The largest pool — European history IS the history of its key figures."
    example_members:
      - "Martin Luther"
      - "Louis XIV"
      - "Napoleon Bonaparte"
      - "Otto von Bismarck"
      - "Voltaire"
      - "Galileo Galilei"
      - "Peter the Great"
      - "Robespierre"
      - "Metternich"
      - "Leonardo da Vinci"
      - "Elizabeth I"
      - "Oliver Cromwell"
      - "Adam Smith"
      - "Karl Marx"
      - "Copernicus"
      - "Isaac Newton"

  - id: event_names
    format: name
    estimated_count: 70
    min_distractors: 4
    note: "Wars, battles, revolutions, treaties, conferences. High confusability — students mix up wars and their treaties constantly."
    example_members:
      - "Thirty Years' War"
      - "French Revolution"
      - "Congress of Vienna"
      - "Treaty of Westphalia"
      - "Battle of Waterloo"
      - "Reign of Terror"
      - "Glorious Revolution"
      - "Franco-Prussian War"
      - "Treaty of Versailles"
      - "Battle of the Somme"

  - id: concept_terms
    format: term
    estimated_count: 110
    min_distractors: 4
    note: "Ideologies, economic terms, political concepts, social movements. The conceptual backbone of AP Euro — students must understand these to pass."
    example_members:
      - "mercantilism"
      - "absolutism"
      - "humanism"
      - "laissez-faire"
      - "nationalism"
      - "socialism"
      - "imperialism"
      - "balance of power"
      - "divine right of kings"
      - "social contract"
      - "Romanticism"
      - "Realism"
      - "totalitarianism"

  - id: year_dates
    format: bracket_number
    estimated_count: 60
    min_distractors: 4
    note: "Bracket notation for key dates. Runtime generates numeric distractors. Students MUST know key dates for the AP exam."
    example_members:
      - "{1517}"  # 95 Theses
      - "{1648}"  # Peace of Westphalia
      - "{1789}"  # French Revolution
      - "{1815}"  # Congress of Vienna
      - "{1848}"  # Revolutions
      - "{1914}"  # WWI begins
      - "{1917}"  # Russian Revolution
      - "{1939}"  # WWII begins
      - "{1945}"  # WWII ends
      - "{1989}"  # Fall of Berlin Wall

  - id: place_names
    format: place
    estimated_count: 45
    min_distractors: 4
    note: "Cities, countries, regions significant in European history."
    example_members:
      - "Florence"
      - "Wittenberg"
      - "Versailles"
      - "Vienna"
      - "Waterloo"
      - "Sarajevo"
      - "Berlin"
      - "St. Petersburg"
      - "Geneva"
      - "Paris"

  - id: document_names
    format: name
    estimated_count: 35
    min_distractors: 4
    note: "Treaties, manifestos, works, laws, declarations. Highly confusable — students mix up Ninety-Five Theses with other proclamations."
    example_members:
      - "Ninety-Five Theses"
      - "The Prince"
      - "Leviathan"
      - "Two Treatises of Government"
      - "The Social Contract"
      - "Declaration of the Rights of Man"
      - "Communist Manifesto"
      - "Edict of Nantes"
      - "Napoleonic Code"
      - "Treaty of Versailles"

  - id: movement_names
    format: term
    estimated_count: 40
    min_distractors: 4
    note: "Artistic, intellectual, religious, political movements. Students confuse Renaissance/Reformation/Enlightenment terminology."
    example_members:
