    difficulty: 2

  - id: discovery_year
    format: "In what year was {element} discovered?"
    answer_pool: bracket_numbers
    available_from_mastery: 3
    difficulty: 4

# === SEEDED CONFUSION PAIRS ===

common_confusions:
  - ["Sodium", "Potassium"]           # Both alkali metals, both Latin-derived symbols (Na/K)
  - ["Iron", "Copper"]                # Both common metals, both Latin symbols (Fe/Cu)
  - ["Gold", "Silver"]                # Both precious metals, both Latin symbols (Au/Ag)
  - ["Helium", "Neon"]                # Both noble gases, both used in lighting/signs
  - ["Fluorine", "Chlorine"]          # Both halogens, similar reactivity confusion
  - ["Bromine", "Iodine"]             # Both halogens, confused properties
  - ["Nitrogen", "Oxygen"]            # Both atmospheric gases, neighbors
  - ["Platinum", "Palladium"]         # Both precious metals, similar uses
  - ["Cobalt", "Nickel"]              # Neighbor transition metals
  - ["Uranium", "Plutonium"]          # Both nuclear, confused roles
  - ["Tin", "Lead"]                   # Both Latin symbols (Sn/Pb), both soft metals
  - ["Tungsten", "Titanium"]          # Both "T" metals, confused properties
  - ["Silicon", "Carbon"]             # Both group 14, both form basis of chemistry
  - ["Aluminium", "Silicon"]          # Neighbors, both abundant in Earth's crust
  - ["Mercury", "Lead"]               # Both toxic heavy metals
  - ["Osmium", "Iridium"]             # Both densest element competitors
  - ["Rhodium", "Platinum"]           # Both catalytic converter metals, precious
  - ["Caesium", "Francium"]           # Both most reactive alkali metals
  - ["Argon", "Neon"]                 # Both noble gases in common lighting uses
  - ["Technetium", "Promethium"]      # Both radioactive, no stable isotopes

