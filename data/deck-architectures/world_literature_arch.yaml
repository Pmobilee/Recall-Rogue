# Question templates
question_templates:
  - id: author_from_work
    format: "Who wrote {work}?"
    answer_pool: author_names
    available_from_mastery: 0
    difficulty: 1-3

  - id: work_from_author
    format: "Which novel was written by {author}?"
    answer_pool: work_titles
    available_from_mastery: 1
    difficulty: 2-3

  - id: character_from_work
    format: "Which novel features the character {character}?"
    answer_pool: work_titles
    available_from_mastery: 1
    difficulty: 2

  - id: author_from_character
    format: "Who created the character {character}?"
    answer_pool: author_names
    available_from_mastery: 2
    difficulty: 3

  - id: work_from_opening
    format: "Which novel opens with: '{opening_line}'?"
    answer_pool: opening_line_sources
    available_from_mastery: 2
    difficulty: 3-4

  - id: movement_from_description
    format: "Which literary movement {description}?"
    answer_pool: movement_names
    available_from_mastery: 1
    difficulty: 2-3

  - id: country_from_author
    format: "Which country was {author} from?"
    answer_pool: country_names
    available_from_mastery: 1
    difficulty: 2

  - id: genre_from_description
    format: "What literary form {description}?"
    answer_pool: genre_form_names
    available_from_mastery: 2
    difficulty: 3

