deck_id: world_literature
name: "World Literature"
domain: art_architecture
sub_domain: literature
target_facts: 280
minimum_facts: 200

description: >
  From Homer's wine-dark sea to Marquez's butterflies — master the authors, works,
  characters, and movements that shaped world literature across 3,000 years. Follow
  Odysseus home, solve a murder with Raskolnikov, survive dystopia with Winston Smith,
  and discover why Kafka turned a man into a beetle. When you finish this deck, you
  will KNOW world literature.

# Sourcing & licensing
data_sources:
  - name: Wikipedia
    url: https://en.wikipedia.org/wiki/Western_canon
    license: CC-BY-SA-4.0
    usage: fact text, biographical data, plot summaries, publication dates
  - name: Wikidata
    url: https://www.wikidata.org
    license: CC0
    usage: structured data (dates, nationalities, movements)
  - name: Project Gutenberg
    url: https://www.gutenberg.org
    license: public domain
    usage: verification of opening lines and quotes (all works pre-1928)
  - name: Norton Anthology / Great Books lists
    url: https://en.wikipedia.org/wiki/Great_Books_of_the_Western_World
    license: CC-BY-SA-4.0 (Wikipedia article about the list)
    usage: canon selection guidance only — no content copied

# Answer Type Pools
answer_type_pools:
  - id: author_names
    format: name
    estimated_count: 65
    min_distractors: 4
    note: "Core pool. Highly confusable within eras/nationalities. Russian authors, Victorian novelists, Modernists all cluster."

  - id: work_titles
    format: name
    estimated_count: 80
    min_distractors: 4
    note: "Second-largest pool. 'Who wrote X?' and 'Which novel features Y?' — strong confusability within movements."

  - id: character_names
    format: name
    estimated_count: 40
    min_distractors: 4
    note: "Fictional characters. Confusable within same era/genre. Austen heroines, Dickens protagonists, Russian novel characters."

  - id: movement_names
    format: term
    estimated_count: 12
    min_distractors: 4
    note: "Literary movements/periods. Romanticism, Realism, Modernism, Naturalism, Magic Realism, Existentialism, etc."
    syntheticDistractors:
      - "Imagism"
      - "Dadaism"
      - "Aestheticism"
      - "Decadence"
      - "Objectivism"
      - "Futurism"
      - "Sentimentalism"

  - id: country_names
    format: place
    estimated_count: 18
    min_distractors: 4
    note: "Countries/literary traditions. Confusable for less-known authors."
    syntheticDistractors:
      - "Portugal"
      - "Poland"
      - "Sweden"
      - "Greece"
      - "Turkey"
      - "Egypt"
      - "South Korea"

  - id: genre_form_names
    format: term
    estimated_count: 12
    min_distractors: 4
    note: "Literary forms/genres: bildungsroman, epistolary novel, stream of consciousness, picaresque, etc."
    syntheticDistractors:
      - "Pastoral"
      - "Picaresque"
      - "Epistolary"
      - "Roman à clef"
      - "Allegory"
      - "Farce"
      - "Panegyric"

  - id: opening_line_sources
    format: name
    estimated_count: 20
    min_distractors: 4
    note: "Which novel has this famous opening line? Answers are work titles."

  - id: publication_years
    format: bracket_number
    estimated_count: 30
    note: "When was X published? Bracket notation — runtime generates nearby year distractors."

