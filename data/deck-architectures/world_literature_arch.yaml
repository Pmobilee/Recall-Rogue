# Synonym groups
synonym_groups:
  - id: twain_names
    members: ["Mark Twain", "Samuel Clemens"]
    reason: "Pen name and real name"
  - id: eliot_names
    members: ["George Eliot", "Mary Ann Evans"]
    reason: "Pen name and real name"
  - id: orwell_names
    members: ["George Orwell", "Eric Arthur Blair"]
    reason: "Pen name and real name"

# Difficulty tiers
difficulty_tiers:
  easy:
    - Shakespeare, Homer, Dickens, Austen, Tolstoy, Orwell, Fitzgerald
    - Hamlet, Pride and Prejudice, 1984, Great Gatsby, Romeo and Juliet
    - "Call me Ishmael", "It was the best of times"
  medium:
    - Dostoevsky, Hugo, Woolf, Hemingway, Kafka, García Márquez, Morrison
    - Crime and Punishment, Les Misérables, The Metamorphosis, One Hundred Years of Solitude
    - Romanticism, Realism, Modernism
  hard:
    - Proust, Borges, Beckett, Faulkner, Nabokov, Bulgakov, Solzhenitsyn
    - In Search of Lost Time, Ficciones, Waiting for Godot, The Master and Margarita
    - Naturalism, Stream of consciousness, Bildungsroman, Magic Realism
