# ============================================================
# ANSWER TYPE POOLS
# ============================================================
answer_type_pools:

  - id: term_definitions
    label: "Term Definitions (Chemistry of Life vocabulary)"
    format: definition
    estimated_count: 45
    note: >
      Definitions for core terms: hydrogen bond, cohesion, adhesion, surface tension,
      capillary action, specific heat capacity, heat of vaporization, hydrophobic,
      hydrophilic, pH, buffer, CHNOPS, isotope, monomer, polymer, dehydration synthesis,
      hydrolysis, covalent bond, peptide bond, glycosidic bond, phosphodiester bond,
      functional group, structural isomer, geometric isomer, enantiomer, triglyceride,
      saturated fat, unsaturated fat, phospholipid, steroid, wax, nucleotide, purine,
      pyrimidine, Chargaff's rules, antiparallel, primary structure, secondary structure,
      tertiary structure, quaternary structure, denaturation, active site, cofactor,
      coenzyme, competitive inhibitor, allosteric inhibitor, feedback inhibition.
      Key confusions: cohesion vs. adhesion; saturated vs. unsaturated; purine vs. pyrimidine;
      competitive vs. noncompetitive inhibition; coenzyme vs. cofactor.

  - id: process_names
    label: "Biological Process Names"
    format: term
    estimated_count: 12
    note: >
      Process names: dehydration synthesis (condensation), hydrolysis, denaturation,
      evaporative cooling, capillary action, feedback inhibition, competitive inhibition,
      allosteric inhibition, induced fit, lock-and-key model, hydrogen bonding, ester linkage.
      Key confusions: dehydration synthesis vs. hydrolysis (opposite reactions);
      lock-and-key vs. induced fit (rigid vs. flexible active site model).

  - id: molecule_names
    label: "Named Molecules and Macromolecules"
    format: name
    estimated_count: 20
    note: >
      Molecule names: ATP, DNA, RNA, cholesterol, cellulose, starch, glycogen, glucose,
      fructose, galactose, glycerol, fatty acid, phospholipid, triglyceride, hemoglobin,
      insulin, collagen, keratin, chitin, adenine, guanine, cytosine, thymine, uracil.
      Key confusions: cellulose vs. starch (same monomer, different glycosidic linkages);
      DNA vs. RNA (deoxyribose vs. ribose, thymine vs. uracil);
      ATP vs. ADP (three phosphates vs. two).

  - id: bracket_numbers
    label: "Numerical Facts (fill-in bracket format)"
    format: number
    estimated_count: 18
    syntheticDistractors:
      - "3"
      - "6"
      - "8"
      - "22"
      - "100"
    note: >
      Numerical values: 4.184 J/(g·°C) [specific heat of water], 2260 J/g [heat of vaporization],
      0-14 [pH scale range], 7 [neutral pH], 4 [carbon covalent bonds], 20 [amino acids],
      9 [kcal/g for fats], 4 [kcal/g for carbs/proteins], 2 [H-bonds in A-T pairing],
      3 [H-bonds in G-C pairing], 4 [protein structure levels], 4 [subunits of hemoglobin],
      5 [carbon atoms in ribose/deoxyribose], 6 [CHNOPS elements], 3 [phosphate groups in ATP],
      2 [fatty acids in phospholipid], 3 [fatty acids in triglyceride], 4 [fused rings in steroids].
      Key confusions: specific heat 4.184 vs. heat of vaporization 2260 (J/g units differ);
      20 amino acids vs. 4 DNA bases; 9 kcal/g fat vs. 4 kcal/g carb/protein.

  - id: function_terms
    label: "Functional Role Descriptions"
    format: description
    estimated_count: 25
    note: >
      Function facts: what enzymes do (lower activation energy), what cholesterol does
      (regulate membrane fluidity), what ATP does (energy currency), what buffers do
      (resist pH change), what cohesion enables (surface tension), what adhesion enables
      (capillary action), what high specific heat does (moderate temperature), what
      heat of vaporization enables (evaporative cooling), what ice floating does
      (insulates aquatic life), what phospholipid bilayer does (selectively permeable membrane),
      what primary structure determines (all higher structure levels), what R-groups determine
      (protein function and folding), what denaturation destroys (shape/function not sequence).
      Key confusions: enzyme lowers Ea but does not change ΔG; denaturation destroys
      3°/4° structure first, primary structure last (covalent peptide bonds remain intact).

