generation_notes: >
  Workers receive individual entities and produce DeckFact JSON. Key rules:

  1. TERM DEFINITIONS pool: quizQuestion = "What is [term]?" OR "Define [term]." Answer = definition field.
  2. PROCESS NAMES pool: quizQuestion = "What is the name of the process in which [description]?" Answer = term field.
  3. MOLECULE NAMES pool: quizQuestion = "What molecule [description]?" Answer = term field.
  4. BRACKET NUMBERS pool: Use {___} fill-in format, e.g. "Water has a specific heat of {___} J/(g·°C)."
     Answer must match verified_value exactly.
  5. FUNCTION TERMS pool: quizQuestion = "What is the function/role of [term]?" Answer = function description.

  For all entities with verified_value: the correctAnswer MUST use that exact value.
  Distractors are LLM-generated — plausible but WRONG. Never pull from other correctAnswer fields.
  Assign funScore 1-5 and difficulty 1-5 matching the entity difficulty field.
  Use explanation field to add 1 sentence of biological context beyond the definition.
