# ============================================================
# GENERATION INSTRUCTIONS FOR WORKERS
# ============================================================

generation_instructions: >
  WORKERS: You are a FORMATTER, not a researcher. Every fact above is pre-verified
  source data. Your job is to convert each verified_facts entry into a valid
  DeckFact JSON object. You do NOT invent facts, modify meanings, or add claims
  not present in the source data above.

  REQUIRED FIELDS per DeckFact:
    - id: "ap_bio_u4_NNN" (3-digit zero-padded, sequential within topic)
    - correctAnswer: exact canonical answer (concise, ≤15 words where possible)
    - acceptableAlternatives: [] or list of synonymous correct answers
    - distractors: 8-12 LLM-generated plausible wrong answers (NEVER from database)
    - quizQuestion: clear question targeting the fact
    - explanation: 1-2 sentence post-answer explanation reinforcing the fact
    - difficulty: 1-5 (use value from architecture)
    - funScore: 1-10 (use value from architecture)
    - chainThemeId: "signal_transduction" or "cell_cycle_mitosis" (as assigned above)
    - answerTypePoolId: pool id from above (term_definitions / process_names /
                        molecule_names / function_terms / comparison_terms)
    - examTags: ["AP_Biology", "AP_Bio_Unit4", "AP_Bio_4_{topic_number}"]

  DISTRACTOR RULES:
    - ALL distractors must be LLM-generated by reading the specific question
    - Distractors must be plausible wrong answers (same format, semantically related)
    - NEVER pull distractors from correctAnswer fields of other facts
    - Use common_confusions pairs to guide distractor selection
    - Verify no distractor is accidentally correct

  POOL ASSIGNMENT CHECK:
    - Every fact's answerTypePoolId MUST match a pool id listed in answer_type_pools
    - Pool factIds in the final deck JSON are populated by scanning facts — do NOT
      hand-craft factIds lists during generation

  TARGET: 140 facts total (100 minimum).
  Current verified source data: ~100 fact seeds across 6 topics.
  Workers should expand each seed into 1-2 quiz questions as appropriate
  (e.g., a seed about GPCRs can yield one "what is a GPCR" and one "what are the
  7 transmembrane domains of" question if both add distinct learning value).

# ============================================================
# NOTES
# ============================================================

notes: >
  Unit 4 covers 10-15% of the AP Biology exam (College Board CED).
  This is one of the more conceptually dense units — students must understand
  molecular mechanisms (receptor types, second messengers, kinase cascades)
  AND apply them to cell biology (cell cycle control, cancer).

  TWO CHAIN THEMES: signal_transduction (Topics 4.1-4.4) and cell_cycle_mitosis
  (Topics 4.5-4.6). These align with the parent deck's chain theme definitions
  in ap_biology_arch.yaml. The unit deck will draw from both theme pools.

  CANCER BIOLOGY NOTE: Facts about proto-oncogenes, tumor suppressors, p53, Rb,
  contact inhibition, and metastasis are high-priority for exam prep and have
  high funScore values (8-10). These facts appear frequently on AP exam FRQs.

  PARENT DECK: ap_biology (data/deck-architectures/ap_biology_arch.yaml).
  This file provides verified source data for generating ap_biology_unit4.json
  (or for populating the unit4_cell_communication sub-deck of ap_biology.json).
