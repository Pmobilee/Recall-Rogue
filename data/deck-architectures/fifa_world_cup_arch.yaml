  - "men_player_names pool at 40+ members risks length heterogeneity: 'Pelé' (4 chars) vs 'Salvatore Schillaci' (19 chars). Run pool-homogeneity-analysis after generation. If max/min ratio > 3x, split into men_player_names_short (≤8 chars) and men_player_names_full (>8 chars)."
  - "winner_country_names_womens has only 5 real facts — pad aggressively with synthetic distractors to reach 15 total."
  - "womens_host_country_names has only 7 real facts — same padding requirement."
  - "year_values_mens and year_values_womens MUST be separate pools. A question about 'What year did Japan win the Women's World Cup?' should not have 1930 as a plausible distractor."
  - "final_scores pool: Extra-time and penalty notation ('0-0 (3-2 pens)') is longer than regular scores ('4-2'). Check length homogeneity before shipping. If heterogeneous, split into regular_final_scores and decided_final_scores."
  - "venue_names pool: Include both Men's and Women's WC famous venues but verify all names are ~10-25 chars; 'Estadio Nacional Julio Martínez Prádanos' is too long — use 'Estadio Nacional'."
  - "golden_ball_winners pool needs separation from golden_boot_winners if the deck has both — never mix pool types."

