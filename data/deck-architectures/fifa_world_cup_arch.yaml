# ============================================================
# QUESTION TEMPLATES
# ============================================================
# 4-8 templates per sub-deck. Each specifies:
#   template_id, target_sub_deck, quizMode, template_string,
#   answerTypePoolId, example_rendered
# Anti-self-answering: templates MUST NOT contain the correct answer.
# ============================================================
question_templates:

  # --- SUB-DECK 1: Men's World Cup Tournaments ---

  - template_id: mens_wc_winner
    target_sub_deck: mens_world_cup_tournaments
    quizMode: multiple_choice
    template_string: "Which country won the {year} FIFA World Cup?"
    answerTypePoolId: winner_country_names_mens
    notes: "Year is in the question; answer is the winning country. No self-answering risk."
    example_rendered:
      question: "Which country won the 1970 FIFA World Cup?"
      correct: "Brazil"
      distractors: ["Italy", "West Germany", "England"]

  - template_id: mens_wc_host
    target_sub_deck: mens_world_cup_tournaments
    quizMode: multiple_choice
    template_string: "Which country hosted the {year} FIFA World Cup?"
    answerTypePoolId: mens_host_country_names
    notes: "Host is distinct from winner in 20+ editions — low ambiguity risk."
    example_rendered:
      question: "Which country hosted the 1986 FIFA World Cup?"
      correct: "Mexico"
      distractors: ["Argentina", "Brazil", "Colombia"]

  - template_id: mens_wc_runner_up
    target_sub_deck: mens_world_cup_tournaments
    quizMode: multiple_choice
    template_string: "Which country was the runner-up in the {year} FIFA World Cup Final?"
    answerTypePoolId: runner_up_country_names_mens
    notes: "Phrasing avoids saying 'lost' — more neutral. Runner-up is unambiguous."
    example_rendered:
      question: "Which country was the runner-up in the 2022 FIFA World Cup Final?"
      correct: "France"
      distractors: ["Morocco", "Croatia", "Netherlands"]

  - template_id: mens_wc_top_scorer
    target_sub_deck: mens_world_cup_tournaments
    quizMode: multiple_choice
    template_string: "Who was the top scorer (Golden Boot) at the {year} FIFA World Cup?"
    answerTypePoolId: golden_boot_winners_mens
    notes: >
      Do NOT generate this template for 1962 (6-way tie) or 1994 (2-way tie) or
      2010 (4-way tie) — use the goal tally template instead for those editions.
    example_rendered:
      question: "Who was the top scorer (Golden Boot) at the 1966 FIFA World Cup?"
      correct: "Eusébio"
      distractors: ["Bobby Charlton", "Garrincha", "Just Fontaine"]

  - template_id: mens_wc_golden_ball
    target_sub_deck: mens_world_cup_tournaments
    quizMode: multiple_choice
    template_string: "Who won the Golden Ball (best player) award at the {year} FIFA World Cup?"
    answerTypePoolId: golden_ball_winners_mens
    notes: "Only for editions 1982-2022 where the award was officially given."
    example_rendered:
      question: "Who won the Golden Ball (best player) award at the 2006 FIFA World Cup?"
      correct: "Zinedine Zidane"
      distractors: ["Miroslav Klose", "Gianluigi Buffon", "Ronaldo"]

  - template_id: mens_wc_final_score
    target_sub_deck: mens_world_cup_tournaments
    quizMode: multiple_choice
    template_string: "What was the final score of the {year} FIFA World Cup Final between {winner} and {runner_up}?"
    answerTypePoolId: regulation_final_scores_mens
    notes: >
      Winner and runner-up are in the question (both known) — no self-answering risk for the
      score itself. Only use this template for regulation/AET finals (not penalty shootouts).
      For penalty finals, use the penalty_final_scores pool and include 'decided on penalties' in stem.
    example_rendered:
      question: "What was the final score of the 1970 FIFA World Cup Final between Brazil and Italy?"
      correct: "4-1"
      distractors: ["3-1", "5-2", "2-1"]

  - template_id: mens_wc_year_of_host
    target_sub_deck: mens_world_cup_tournaments
    quizMode: multiple_choice
    template_string: "In what year did {country} first host the FIFA World Cup?"
    answerTypePoolId: mens_wc_years
    notes: >
      'First host' framing avoids ambiguity for repeat hosts (Mexico hosted 1970 and 1986).
      For non-repeat hosts, just 'In what year did {country} host the World Cup?'
    example_rendered:
      question: "In what year did Japan co-host the FIFA World Cup?"
      correct: "2002"
      distractors: ["1998", "2006", "2010"]

  - template_id: mens_wc_tournament_venue
    target_sub_deck: mens_world_cup_tournaments
    quizMode: multiple_choice
    template_string: "In which stadium was the {year} FIFA World Cup Final played?"
    answerTypePoolId: venue_names
    notes: "Venue name is fully separate from winner/host — no self-answering risk."
    example_rendered:
      question: "In which stadium was the 1950 FIFA World Cup Final played?"
      correct: "Maracanã Stadium"
      distractors: ["Estadio Centenario", "Estadio Azteca", "Rose Bowl"]

  # --- SUB-DECK 2: Women's World Cup Tournaments ---

  - template_id: womens_wc_winner
    target_sub_deck: womens_world_cup_tournaments
    quizMode: multiple_choice
    template_string: "Which country won the {year} FIFA Women's World Cup?"
    answerTypePoolId: winner_country_names_womens
    notes: "Women's tournament specified explicitly to prevent men's/women's confusion."
    example_rendered:
      question: "Which country won the 2011 FIFA Women's World Cup?"
      correct: "Japan"
      distractors: ["United States", "Germany", "Sweden"]

  - template_id: womens_wc_host
    target_sub_deck: womens_world_cup_tournaments
    quizMode: multiple_choice
    template_string: "Which country hosted the {year} FIFA Women's World Cup?"
    answerTypePoolId: womens_host_country_names
    notes: "2003 hosted by USA after SARS outbreak; correct answer is 'United States'."
    example_rendered:
      question: "Which country hosted the 2007 FIFA Women's World Cup?"
      correct: "China"
      distractors: ["Germany", "France", "Japan"]

  - template_id: womens_wc_golden_ball
    target_sub_deck: womens_world_cup_tournaments
    quizMode: multiple_choice
    template_string: "Who won the Golden Ball (best player) at the {year} FIFA Women's World Cup?"
    answerTypePoolId: golden_ball_winners_womens
    notes: "All 9 Women's WC editions have a Golden Ball winner."
    example_rendered:
      question: "Who won the Golden Ball (best player) at the 2019 FIFA Women's World Cup?"
      correct: "Megan Rapinoe"
      distractors: ["Carli Lloyd", "Alex Morgan", "Homare Sawa"]

  - template_id: womens_wc_golden_boot
    target_sub_deck: womens_world_cup_tournaments
    quizMode: multiple_choice
    template_string: "Who was the top scorer (Golden Boot) at the {year} FIFA Women's World Cup?"
    answerTypePoolId: golden_boot_winners_womens
    example_rendered:
      question: "Who was the top scorer (Golden Boot) at the 2007 FIFA Women's World Cup?"
      correct: "Marta"
      distractors: ["Birgit Prinz", "Abby Wambach", "Sun Wen"]

  - template_id: womens_wc_penalty_final
    target_sub_deck: womens_world_cup_tournaments
    quizMode: multiple_choice
    template_string: "What was the score (including penalty shootout) when {winner} beat {runner_up} in the {year} Women's World Cup Final?"
    answerTypePoolId: penalty_final_scores
    notes: "Only for 1999 and 2011 Women's WC finals."
    example_rendered:
      question: "What was the score (including penalty shootout) when the United States beat China in the 1999 Women's World Cup Final?"
      correct: "0-0 (5-4 pens)"
      distractors: ["1-0", "2-1", "0-0 (4-3 pens)"]

  - template_id: womens_wc_attendance_record
    target_sub_deck: womens_world_cup_tournaments
    quizMode: multiple_choice
    template_string: "How many fans attended the 1999 FIFA Women's World Cup Final at the Rose Bowl — a world record for women's sports at the time?"
    answerTypePoolId: world_cup_goal_tallies
    notes: >
      This is a fixed-fact question (one specific fact); the answer pool here is used loosely.
      Actually better as a fill_blank question. The answer '90,185' should be a separate
      numeric pool or a standalone fact with synthetic numeric distractors.
      Generate phase should handle this as a standalone fact with custom distractors.
    example_rendered:
      question: "How many fans attended the 1999 FIFA Women's World Cup Final at the Rose Bowl — a world record for women's sports at the time?"
      correct: "90,185"
      distractors: ["75,784", "85,000", "100,000"]

  # --- SUB-DECK 3: Legendary Players ---

  - template_id: legend_nationality
    target_sub_deck: legendary_players
    quizMode: multiple_choice
    template_string: "Which country did {player} represent at the FIFA World Cup?"
    answerTypePoolId: winner_country_names_mens
    notes: "Player name in the question; country is the answer. No self-answering risk."
    example_rendered:
      question: "Which country did Just Fontaine represent at the FIFA World Cup?"
      correct: "France"
      distractors: ["Belgium", "Italy", "Brazil"]

  - template_id: legend_wc_goals_career
    target_sub_deck: legendary_players
    quizMode: multiple_choice
    template_string: "How many goals did {player} score in total across their World Cup career?"
    answerTypePoolId: world_cup_goal_tallies
    example_rendered:
      question: "How many goals did Miroslav Klose score in total across his World Cup career?"
      correct: "16"
      distractors: ["15", "14", "12"]

  - template_id: legend_tournament_record
    target_sub_deck: legendary_players
    quizMode: multiple_choice
    template_string: "How many goals did {player} score at the {year} FIFA World Cup — an all-time record for a single tournament?"
    answerTypePoolId: world_cup_goal_tallies
    notes: "Only for Just Fontaine (1958, 13 goals) and similar single-tournament records."
    example_rendered:
      question: "How many goals did Just Fontaine score at the 1958 FIFA World Cup — an all-time record for a single tournament?"
      correct: "13"
      distractors: ["11", "10", "12"]

  - template_id: legend_world_cups_won
    target_sub_deck: legendary_players
    quizMode: multiple_choice
    template_string: "How many FIFA World Cup titles did {player} win during their career?"
    answerTypePoolId: national_title_counts
    notes: >
      Only use for players with a clear title count (Pelé 3, Messi 1, etc.).
      Do not use for players who won 0 titles unless question framing makes this interesting
      (e.g., Johan Cruyff — 0 despite reaching the 1974 final).
    example_rendered:
      question: "How many FIFA World Cup titles did Pelé win during his career?"
      correct: "3"
      distractors: ["2", "1", "4"]

  - template_id: legend_golden_ball_year
    target_sub_deck: legendary_players
    quizMode: multiple_choice
    template_string: "In which year did {player} win the FIFA World Cup Golden Ball (best player) award?"
    answerTypePoolId: mens_wc_years
    notes: "Player is in the question; the year is the answer. No self-answering risk."
    example_rendered:
      question: "In which year did Diego Maradona win the FIFA World Cup Golden Ball award?"
      correct: "1986"
      distractors: ["1990", "1982", "1978"]

  - template_id: legend_debut_year
    target_sub_deck: legendary_players
    quizMode: multiple_choice
    template_string: "In which year did {player} make their FIFA World Cup debut?"
    answerTypePoolId: mens_wc_years
    example_rendered:
      question: "In which year did Pelé make his FIFA World Cup debut?"
      correct: "1958"
      distractors: ["1962", "1966", "1954"]

  # --- SUB-DECK 4: Iconic Matches & Moments ---

  - template_id: moment_year
    target_sub_deck: iconic_matches_moments
    quizMode: multiple_choice
    template_string: "In which year did {moment_description} occur?"
    answerTypePoolId: mens_wc_years
    notes: >
      'Moment description' must not contain the year. Good phrasings:
      'the Maracanazo (Uruguay's shock win over Brazil)', 'the Hand of God goal',
      'Germany's 7-1 semi-final victory over Brazil'.
    example_rendered:
      question: "In which year did Uruguay's shock 2-1 victory over Brazil in the World Cup — the 'Maracanazo' — take place?"
      correct: "1950"
      distractors: ["1938", "1958", "1962"]

  - template_id: moment_score
    target_sub_deck: iconic_matches_moments
    quizMode: multiple_choice
    template_string: "What was the final score of {match_description}?"
    answerTypePoolId: regulation_final_scores_mens
    notes: "Match description must not contain the score."
    example_rendered:
      question: "What was the final score of Germany's 2014 World Cup semi-final demolition of host nation Brazil?"
      correct: "7-1"
      distractors: ["5-0", "6-1", "4-0"]

  - template_id: moment_player
    target_sub_deck: iconic_matches_moments
    quizMode: multiple_choice
    template_string: "Which player {action} in {match_context}?"
    answerTypePoolId: men_player_names
    notes: >
      'Action' must not name the player. E.g., 'scored the Hand of God goal',
      'headbutted Marco Materazzi in the 2006 final', 'missed the decisive penalty in 1994'.
    example_rendered:
      question: "Which player scored both the 'Hand of God' and the 'Goal of the Century' in the same 1986 World Cup quarter-final?"
      correct: "Diego Maradona"
      distractors: ["Jorge Valdano", "Pelé", "Lionel Messi"]

  - template_id: moment_host_country
    target_sub_deck: iconic_matches_moments
    quizMode: multiple_choice
    template_string: "Which country was hosting the World Cup when {moment_description} occurred?"
    answerTypePoolId: mens_host_country_names
    notes: "Host country is the answer; the moment is described in the question."
    example_rendered:
      question: "Which country was hosting the World Cup when the 'Miracle of Bern' took place?"
      correct: "Switzerland"
      distractors: ["West Germany", "France", "Italy"]

  - template_id: moment_women_player
    target_sub_deck: iconic_matches_moments
    quizMode: multiple_choice
    template_string: "Which player {action} in the Women's World Cup {context}?"
    answerTypePoolId: women_player_names
    notes: "Women's moments require women's player pool."
    example_rendered:
      question: "Which player scored the winning penalty and famously removed her jersey before 90,185 fans at the Rose Bowl?"
      correct: "Brandi Chastain"
      distractors: ["Mia Hamm", "Michelle Akers", "Carin Jennings"]

  # --- SUB-DECK 5: National Team Legacies ---

  - template_id: dynasty_title_count
    target_sub_deck: national_team_legacies
    quizMode: multiple_choice
    template_string: "How many FIFA World Cup titles has {country} won (as of 2023)?"
    answerTypePoolId: national_title_counts
    notes: >
      'As of 2023' future-proofs the question. Germany/West Germany combined = 4.
      Separate facts for Men's teams and Women's teams to avoid ambiguity.
    example_rendered:
      question: "How many FIFA World Cup titles has Brazil won (as of 2023)?"
      correct: "5"
      distractors: ["4", "3", "6"]

  - template_id: dynasty_first_title_year
    target_sub_deck: national_team_legacies
    quizMode: multiple_choice
    template_string: "In which year did {country} win its first FIFA World Cup?"
    answerTypePoolId: mens_wc_years
    notes: >
      'First' is critical to avoid ambiguity for multi-title nations.
      For single-title nations, use 'In which year did {country} win the World Cup?'
    example_rendered:
      question: "In which year did Argentina win its first FIFA World Cup?"
      correct: "1978"
      distractors: ["1986", "1990", "2022"]

  - template_id: dynasty_title_years_list
    target_sub_deck: national_team_legacies
    quizMode: multiple_choice
    template_string: "Which of the following correctly lists all the years {country} has won the FIFA World Cup?"
    answerTypePoolId: mens_wc_years
    notes: >
      This template uses a list-style answer and is more complex.
      Example: Brazil — [1958, 1962, 1970, 1994, 2002].
      The 'correct' answer must be the complete list; distractors are subtly wrong lists.
      Generate phase: write this as a special multi-year fact with a compound answer.
      Distractor answers must be the same format (comma-separated year lists).
    example_rendered:
      question: "Which of the following correctly lists all the years Italy has won the FIFA World Cup?"
      correct: "1934, 1938, 1982, 2006"
      distractors: ["1934, 1938, 1966, 2006", "1938, 1970, 1982, 2006", "1934, 1938, 1982, 1998"]

  - template_id: dynasty_defining_fact
    target_sub_deck: national_team_legacies
    quizMode: multiple_choice
    template_string: "Which nation is the only one to have qualified for all {N} FIFA World Cups ever held?"
    answerTypePoolId: winner_country_names_mens
    notes: "This is a single-answer fact (Brazil). The template creates a 'which nation' question."
    example_rendered:
      question: "Which nation is the only one to have qualified for all 22 FIFA World Cups ever held?"
      correct: "Brazil"
      distractors: ["Germany", "Argentina", "Italy"]

# ============================================================
# SYNONYM GROUPS
# ============================================================
synonym_groups:

  - group_id: ronaldo_disambiguation
    primary: "Ronaldo"
    note: >
      Two famous players share the name 'Ronaldo':
      1) Ronaldo Nazário (Brazilian, b. 1976) — played 1994-2006, 2 titles, 15 WC goals, 1998 Golden Ball
      2) Cristiano Ronaldo (Portuguese, b. 1985) — played 2006-2022, 0 titles, 8 WC goals
      These are DISTINCT entries in the player pools — NOT synonyms.
      Generate phase MUST always specify nationality in question stems:
        - 'Ronaldo (Brazil)' or 'Ronaldo Nazário' for the Brazilian
        - 'Cristiano Ronaldo' or 'Ronaldo (Portugal)' for the Portuguese
      NEVER use bare 'Ronaldo' as the correct answer — always disambiguate.
    player_pool_entries:
      - display: "Ronaldo (Brazil)"
        aliases: ["Ronaldo Nazário", "R9", "Ronaldo Luís Nazário de Lima"]
      - display: "Cristiano Ronaldo"
        aliases: ["CR7", "Cristiano Ronaldo dos Santos Aveiro"]
    distractor_rule: >
      'Ronaldo (Brazil)' and 'Cristiano Ronaldo' may appear as distractors for each other
      ONLY when the question makes the correct player's era/nationality absolutely clear.
      Otherwise, do not mix them in the same question.

  - group_id: usa_variants
    primary: "United States"
    synonyms:
      - "USA"
      - "United States of America"
      - "US"
    note: >
      The USA appears in both Men's and Women's tournaments. For display in facts
      and questions, use 'United States'. Pool member is 'United States'.
      Distractor selection treats all variants as the same entry.

  - group_id: south_korea_variants
    primary: "South Korea"
    synonyms:
      - "Korea Republic"
      - "Republic of Korea"
      - "Korea"
    note: >
      2002 tournament was co-hosted by 'South Korea / Japan' — use this combined form
      for the host country fact. Player nationality uses 'South Korea'.

  - group_id: england_vs_britain
    primary: "England"
    note: >
      England ≠ Great Britain. England competes separately in FIFA tournaments.
      'Great Britain' is NOT a synonym and should never appear as an alternate answer.
      The UK's Home Nations (England, Scotland, Wales, Northern Ireland) all compete
      separately. England won the 1966 World Cup — not 'Britain' or 'UK'.
      Flag this in generate phase: if any question uses 'Britain' or 'UK', it is wrong.
    distractor_rule: >
      Scotland, Wales, and Northern Ireland are valid distractors for some
      'which Home Nation...' questions but are never equivalent to England.

  - group_id: west_germany_vs_germany
    primary: "Germany"
    secondary: "West Germany"
    note: >
      Temporally distinct — NOT interchangeable synonyms.
      West Germany (BRD) competed 1954-1990. Unified Germany competed 1994 onward.
      Generate phase must use period-accurate names. See OQ6 resolution above.
      These are TWO separate pool members in winner_country_names_mens:
        - 'West Germany' (3 wins: 1954, 1974, 1990)
        - 'Germany' (1 win: 2014)
      Do NOT create a synonym mapping that makes them interchangeable.

# ============================================================
# COMMON CONFUSIONS — DISTRACTOR SEED PAIRS
# ============================================================
# These pairs drive distractor selection in the generate phase.
# Opus uses this list when writing distractors for related questions.
# ============================================================
common_confusions:

  - pair_id: pele_vs_garrincha
    players: ["Pelé", "Garrincha"]
    context: >
      Both played for Brazil in 1958 and 1962. Both won back-to-back titles.
      Garrincha carried the 1962 team after Pelé's injury. Both are Brazilian legends
      of the same era. Players easily confuse which player did what in which tournament.
    distractor_use: >
      When asking about Pelé's 1958 debut, offer Garrincha as a distractor.
      When asking who scored the winning goals in 1962, Pelé is a plausible wrong answer.

  - pair_id: ronaldo_brazil_vs_ronaldo_portugal
    players: ["Ronaldo (Brazil)", "Cristiano Ronaldo"]
    context: >
      The most common confusion in all of World Cup trivia. Different nationalities,
      different eras, different statistics. Ronaldo (Brazil): 2 titles, 15 WC goals, 1998 Golden Ball.
      Cristiano Ronaldo: 0 titles, 8 WC goals. Questions must always disambiguate.
    distractor_use: >
      Use each as a distractor for the other ONLY when the question makes the answer
      unambiguous from context (e.g., 'Who won the 2002 World Cup Golden Boot?' —
      the tournament context distinguishes them clearly).

  - pair_id: zidane_1998_vs_2006
    players: ["Zinedine Zidane"]
    context: >
      Zidane won the 1998 World Cup (scored 2 headers in the final).
      In 2006, he won the Golden Ball despite being sent off for headbutting Materazzi
      in the final — France lost. Same player, opposite tournament outcomes 8 years apart.
    distractor_use: >
      A question about '2006 Golden Ball winner' with answer 'Zinedine Zidane' should
      include '1998' as a distractor year. Questions about '1998 winner' should include
      '2006' as a distractor year.

  - pair_id: maradona_hand_of_god_vs_goal_of_century
    players: ["Diego Maradona"]
    context: >
      Both goals scored in the SAME match (1986 quarter-final, Argentina vs England).
      The Hand of God (deliberate handball, 51st minute) and the Goal of the Century
      (51-meter solo run, 55th minute) are both iconic but completely different.
    distractor_use: >
      Questions about the Hand of God should offer 'Goal of the Century' as a distractor
      (wrong goal, same match). Questions about the 1986 Golden Ball should offer the
      1982 winner (Paolo Rossi) as a distractor.

  - pair_id: marta_wambach_hamm_generation
    players: ["Marta", "Abby Wambach", "Mia Hamm"]
    context: >
      Three different generations of women's football greats:
      Mia Hamm (USA, 1991-2004 career), Abby Wambach (USA, 2001-2015), Marta (Brazil, 2003-present).
      Questions about 'all-time women's scorer' could trick players who know Mia Hamm's historical fame.
      Wambach's 184 international goals (not WC goals) is often confused with Marta's 17 WC goals.
    distractor_use: >
      For 'Women's WC all-time top scorer' (Marta, 17 goals), offer Wambach and Hamm as distractors.
      For 'USA 1999 World Cup final hero' context, Mia Hamm is a plausible distractor for Brandi Chastain.

  - pair_id: maracanazo_vs_mineirazo
    matches: ["1950 WC — Uruguay 2-1 Brazil", "2014 WC — Germany 7-1 Brazil"]
    context: >
      Both are iconic Brazilian defeats on home soil. 'Maracanazo' (1950) and 'Mineirazo' (2014).
      Different scores, different opponents, different decades. Players confuse which is which.
    distractor_use: >
      When asking about the Maracanazo, offer 2014 as a distractor year.
      When asking about the Mineirazo score (7-1), offer '5-0' or '6-1' as plausible numeric distractors.

  - pair_id: england_1966_home_win_vs_france_1998_home_win
    teams: ["England", "France"]
    context: >
      Both won the World Cup on home soil — England in 1966 at Wembley, France in 1998 at Stade de France.
      Both are Western European teams; both tournament years are memorable. Easy to confuse.
    distractor_use: >
      For 'who won on home soil in 1966?' offer France as a distractor. Vice versa for 1998.

  - pair_id: brazil_1950_host_vs_2014_host
    context: >
      Brazil hosted the 1950 and 2014 World Cups — the only nation to host twice and lose
      in both cases. The 1950 Maracanazo and 2014 Mineirazo are thus paired.
    distractor_use: >
      For questions about Brazil hosting, 1950 and 2014 are mutual distractors.

  - pair_id: just_fontaine_vs_sándor_kocsis_single_tournament
    players: ["Just Fontaine", "Sándor Kocsis"]
    context: >
      Both set extraordinary single-tournament records: Fontaine (13 goals in 1958, all-time record),
      Kocsis (11 goals in 1954). Often confused when answering 'most goals in one World Cup'.
    distractor_use: >
      For 'who scored 13 goals in one WC?' (Fontaine), offer Kocsis as a distractor.
      For '1954 top scorer' (Kocsis), offer Fontaine as a distractor.

  - pair_id: norway_women_vs_japan_women_vs_spain_women
    context: >
      Three single-title winners in the Women's WC — easily confused with each other.
      Norway won 1995, Japan won 2011, Spain won 2023. Different decades, different stories.
    distractor_use: >
      For any of these three, the other two are plausible distractors.

  - pair_id: messi_2014_golden_ball_vs_2022_golden_ball
    players: ["Lionel Messi"]
    context: >
      Messi is the only player to win two Men's World Cup Golden Balls (2014 and 2022).
      In 2014 Argentina LOST the final to Germany. In 2022 Argentina WON.
      Questions about Messi's Golden Balls must specify the year clearly.
    distractor_use: >
      For 'In which year did Messi first win the Golden Ball?' (2014), offer 2022 as a distractor.

  - pair_id: oliver_kahn_only_goalkeeper_golden_ball
    players: ["Oliver Kahn", "Gianluigi Buffon", "Gordon Banks"]
    context: >
      Oliver Kahn (Germany, 2002) is the only goalkeeper to win the World Cup Golden Ball.
      Gianluigi Buffon (Italy, 2006) is often confused with this honor.
      Gordon Banks (England, 1970) made the 'save of the century' from Pelé's header.
    distractor_use: >
      For 'only goalkeeper to win the Golden Ball?' offer Buffon and Banks as distractors.

  - pair_id: italy_1934_and_1938_back_to_back
    context: >
      Italy won back-to-back titles in 1934 and 1938 — the only nation to do so in
      the Men's tournament. West Germany won in 1954 then again in 1974 (not consecutive).
      Players may incorrectly attribute back-to-back wins to Germany or Brazil.
    distractor_use: >
      For 'who won back-to-back?' offer Germany and Brazil as wrong answers.

  - pair_id: brandi_chastain_vs_mia_hamm_1999
    players: ["Brandi Chastain", "Mia Hamm"]
    context: >
      Both were iconic USA 1999 players. Brandi Chastain scored the winning penalty
      and removed her jersey. Mia Hamm was the team's star forward and missed a penalty.
      Players often misremember who scored the deciding kick.
    distractor_use: >
      For 'who scored the winning penalty in 1999?' offer Mia Hamm as distractor.

  - pair_id: wambachs_122nd_minute_vs_sawas_117th_minute
    context: >
      Two of the most dramatic late goals in Women's WC history:
      Wambach: 122nd-minute header for USA vs Brazil in 2011 quarter-final.
      Sawa: 117th-minute equalizer for Japan vs USA in 2011 final.
      Same tournament, different players, different matches, different minutes.
    distractor_use: >
      For 'what minute was Wambach's header?' offer 117 as a distractor.
      For 'whose goal equalized in the 117th minute of the 2011 final?' offer Wambach.

  - pair_id: usa_women_4_titles_vs_germany_women_2_titles
    context: >
      USA has 4 Women's World Cup titles; Germany has 2 (back-to-back 2003/2007).
      Players often confuse these totals, especially since Germany has 4 Men's titles.
    distractor_use: >
      For 'how many Women's WC titles has USA won?' offer 3 and 5 as distractors.
      For 'how many Women's WC titles has Germany won?' offer 4 as a distractor (echoes Men's count).

  - pair_id: morocco_2022_vs_senegal_2002_vs_cameroon_1990
    context: >
      Three historic African football achievements at Men's World Cups:
      Morocco 2022: first African semi-finalist.
      Senegal 2002: also reached quarter-finals.
      Cameroon 1990: first African team to reach the quarter-finals.
    distractor_use: >
      For 'first African semi-finalist?' offer Senegal and Cameroon as distractors.
      For 'first African quarter-finalist?' offer Morocco as a distractor.

