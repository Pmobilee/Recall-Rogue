# ============================================================
# SUB-DECK 4: Iconic Matches & Moments
# ============================================================
  - id: iconic_matches_moments
    name: "Iconic Matches & Moments"
    chain_theme: "Unforgettable Moments"
    chain_theme_id: 3
    estimated_facts: 45
    notes: "~45 distinct moments/matches across both Men's and Women's tournaments. Each gets 1-2 facts."

    verified_data:
      - name: "Maracanazo"
        year: 1950
        match: "Uruguay 2-1 Brazil"
        context: "Decisive final round-robin match; Uruguay's shock victory before 173,850 fans (estimated — some sources say higher) in the Maracanã Stadium in Rio de Janeiro"
        why_iconic: "Brazil needed only a draw to win the tournament; the silence of 200,000 fans was described as the greatest shock in football history"
        source_url: https://en.wikipedia.org/wiki/1950_FIFA_World_Cup

      - name: "Miracle of Bern"
        year: 1954
        match: "West Germany 3-2 Hungary"
        context: "West Germany defeated Hungary's unbeaten 'Golden Team' in the final; Hungary had beaten West Germany 8-3 in the group stage"
        why_iconic: "Considered the greatest sporting upset of the 20th century in Germany; the match that gave West Germany its post-war identity"
        source_url: https://en.wikipedia.org/wiki/1954_FIFA_World_Cup_final

      - name: "Pelé's first World Cup goal"
        year: 1958
        context: "Pelé scored his first World Cup goal at age 17 against Wales in the quarter-final (1958); he went on to score 6 goals in the tournament"
        why_iconic: "Youngest player ever to score in a World Cup at the time; introduced the world to the future GOAT"
        architect_note: "Verify Pelé's first goal was vs Wales quarter-final 1958 via Wikipedia"

      - name: "Just Fontaine's 13 goals in 1958"
        year: 1958
        context: "Just Fontaine (France) scored 13 goals in 6 matches at the 1958 World Cup — the all-time record for a single tournament"
        why_iconic: "The record has stood for 66 years; Fontaine averaged more than 2 goals per game"
        source_url: https://en.wikipedia.org/wiki/List_of_FIFA_World_Cup_top_goalscorers

      - name: "Hand of God / Goal of the Century (1986)"
        year: 1986
        match: "Argentina 2-1 England (quarter-final)"
        context: "Maradona scored two goals in the same match: first using his hand (the 'Hand of God'), then a solo run from his own half beating 5 English players and the goalkeeper (the 'Goal of the Century')"
        why_iconic: "The two most famous goals in football history in one game; Maradona called the hand goal 'a little with the head of Maradona and a little with the hand of God'"
        source_url: https://en.wikipedia.org/wiki/Diego_Maradona

      - name: "Cruyff Turn (1974)"
        year: 1974
        context: "Johan Cruyff performed his iconic body feint and ball drag against Sweden defender Jan Olsson in the 1974 group stage"
        why_iconic: "Named after the player who invented it live in a match; became the most iconic skill move in football history"
        architect_note: "Verify opponent was Jan Olsson (Sweden) via Wikipedia before generate phase"

      - name: "Roberto Baggio's missed penalty (1994)"
        year: 1994
        match: "Brazil 0-0 Italy final (3-2 pens)"
        context: "Roberto Baggio, Italy's best player, missed the decisive penalty in the shootout, sending his shot over the crossbar"
        why_iconic: "The image of Baggio, hands on head, watching his penalty sail over is one of the defining images of World Cup history"
        source_url: https://en.wikipedia.org/wiki/1994_FIFA_World_Cup_final

      - name: "Zidane's headbutt (2006)"
        year: 2006
        match: "Italy vs France final"
        context: "Zinedine Zidane, in his final professional match, headbutted Marco Materazzi in the chest after a verbal altercation, received a red card, and retired minutes later"
        why_iconic: "France went on to lose on penalties; Zidane was still awarded the Golden Ball despite the red card"
        source_url: https://en.wikipedia.org/wiki/FIFA_World_Cup_awards

      - name: "Germany 7-1 Brazil (Mineirazo)"
        year: 2014
        match: "Germany 7-1 Brazil (semi-final)"
        context: "Germany demolished the host nation 7-1 in the semi-final at the Estádio Mineirão in Belo Horizonte; scored 5 goals in a 6-minute spell"
        why_iconic: "The most shocking result in World Cup semi-final history; Brazil fans wept openly in the stadium; became a cultural trauma for Brazil"
        source_url: https://en.wikipedia.org/wiki/Brazil_v_Germany_(2014_FIFA_World_Cup)

      - name: "Morocco's 2022 run"
        year: 2022
        context: "Morocco became the first African and first Arab nation to reach the World Cup semi-finals, defeating Spain and Portugal (World Cup holders) on the way"
        why_iconic: "Inspired a billion people across Africa and the Arab world; players celebrated with their mothers on the pitch"
        source_url: https://en.wikipedia.org/wiki/2022_FIFA_World_Cup

      - name: "Brandi Chastain's penalty (1999)"
        year: 1999
        match: "USA 0-0 China (5-4 pens)"
        context: "Brandi Chastain scored the winning penalty in the Women's World Cup final and famously removed her jersey in celebration before 90,185 fans at the Rose Bowl"
        why_iconic: "The photograph became one of the most iconic sports images of the 20th century; sparked the women's football movement in the USA"
        source_url: https://en.wikipedia.org/wiki/1999_FIFA_Women%27s_World_Cup_Final

      - name: "USA 13-0 Thailand (2019)"
        year: 2019
        match: "USA 13-0 Thailand (group stage)"
        context: "USA set the record for the largest margin of victory in Women's World Cup history; Alex Morgan scored 5 goals"
        why_iconic: "Most lopsided result in Women's World Cup history; generated controversy over goal celebrations"
        source_url: https://en.wikipedia.org/wiki/FIFA_Women%27s_World_Cup_records_and_statistics

      - name: "Abby Wambach 122nd-minute header (2011)"
        year: 2011
        match: "USA vs Brazil (quarter-final)"
        context: "With the USA about to be eliminated, Abby Wambach headed in an equalizer in the 122nd minute from a Megan Rapinoe cross; USA won on penalties"
        why_iconic: "Considered the greatest goal in Women's World Cup history; the latest goal from kickoff in WC history"
        source_url: https://en.wikipedia.org/wiki/FIFA_Women%27s_World_Cup_records_and_statistics

      - name: "Homare Sawa 117th-minute equalizer (2011 final)"
        year: 2011
        match: "Japan vs USA (final)"
        context: "With Japan losing 2-1 and seconds from elimination, Homare Sawa tapped in to level at 2-2 in the 117th minute; Japan won on penalties"
        why_iconic: "Japan had overcome tragedy (2011 Tōhoku earthquake) to reach the final; Sawa's equalizer sent the nation into euphoria"
        source_url: https://en.wikipedia.org/wiki/FIFA_Women%27s_World_Cup_awards

      - name: "2022 World Cup final (greatest ever)"
        year: 2022
        match: "Argentina 3-3 France (4-2 pens)"
        context: "Argentina led 2-0 at 80 minutes; Mbappé scored a hat-trick to level at 3-3 and force penalties; Argentina won; combined 6 goals and penalty drama"
        why_iconic: "Widely regarded as the greatest World Cup final ever played; 3.572 billion viewers worldwide (most-watched single event in history)"
        source_url: https://en.wikipedia.org/wiki/2022_FIFA_World_Cup_final

