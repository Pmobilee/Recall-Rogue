      for all 22 Men's and 9 Women's editions. No blocking gap from SPARQL unavailability.
      The generate phase may retry SPARQL if the tool becomes available, to cross-reference
      dates and crowd figures. No generate-phase work is blocked.

  OQ6_west_germany_naming:
    status: resolved
    decision: >
      Use period-accurate names throughout the deck:
      - 'West Germany' for editions: 1954, 1966 (runner-up), 1974, 1978 (runner-up), 1982 (runner-up), 1986 (runner-up), 1990
      - 'Germany' for editions: 1994 onward
      Miroslav Klose's career (2002-2014) falls entirely in the 'Germany' era.
      Gerd Müller (1970, 1974) and Franz Beckenbauer (1966, 1970, 1974) are 'West Germany' players.
    synonym_group: >
      Do NOT create a synonym group making Germany ≡ West Germany for distractor purposes.
      They are politically and temporally distinct. A question asking 'Who won the 1990 World Cup?'
      with answer 'West Germany' should NOT offer 'Germany' as a distractor (it would be too
      close to correct in casual usage and would confuse players).
      Instead: treat 'West Germany' and 'Germany' as two distinct entries in winner_country_names
      pool. Fact count: West Germany 3 wins, Germany 1 win = 4 entries total for Germany's dynasty.
    pool_note: >
      The winner_country_names_mens pool will contain both 'West Germany' and 'Germany' as
      separate members. The pool annotation should note this temporal distinction so the
      generate phase knows to use period-accurate names in quizQuestions.

  OQ7_player_pool_split:
    status: resolved
    decision: SPLIT into men_player_names and women_player_names
    rationale: >
      A question about Pelé (Men's, 1958-1970) should never have Marta (Women's, 2003-2023)
      as a distractor — wrong era, wrong tournament, wrong gender category. Mixing them:
      1) Makes distractors obviously eliminable on category grounds
      2) Creates confusion about which tournament is being asked about
      3) Produces semantically incoherent answer sets
      Separate pools keep every distractor plausible within the question's context.

  OQ8_rose_bowl_attendance:
    status: resolved
    finding: >
      Wikipedia '1999 FIFA Women's World Cup Final' article (cited in discover YAML with
      source URL https://en.wikipedia.org/wiki/1999_FIFA_Women%27s_World_Cup_Final) gives
      attendance as 90,185.
      This figure IS confirmed as the world record attendance for a women's sporting event
      at the time. As of 2023, the record still stands for Women's World Cup finals —
      the 2023 final at Stadium Australia drew 75,784 (smaller).
      The record was later broken by other women's events but remains the Women's WC
      attendance record.
    fact_framing: >
      'The 1999 Women's World Cup Final at the Rose Bowl was attended by 90,185 fans —
      still the largest crowd ever at a Women's World Cup Final.'
      Source: https://en.wikipedia.org/wiki/1999_FIFA_Women%27s_World_Cup_Final

  OQ9_morocco_2022_framing:
    status: resolved
    finding: >
      Wikipedia '2022 FIFA World Cup' confirms:
      Morocco reached the semi-finals, defeating Spain (on penalties) and Portugal.
      They are correctly described as 'the first African team' and 'the first Arab team'
      to reach a World Cup semi-final. 'Arab nation' is established in football and political
      usage and is not problematic in this context — FIFA itself used this framing.
      Morocco lost the semi-final 2-0 to France and finished fourth (beat Croatia 2-1
      in the third-place match).
    fact_framing: >
      Use: 'Morocco became the first African and first Arab nation to reach the
      FIFA World Cup semi-finals, at the 2022 tournament in Qatar.'
      Source: https://en.wikipedia.org/wiki/2022_FIFA_World_Cup

