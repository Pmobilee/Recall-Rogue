  # --- NUMERIC POOLS ---

  - id: national_title_counts
    name: "World Cup Title Counts by Nation"
    semantic_type: integer_count
    estimated_size_from_facts: 6
    syntheticDistractors_needed: 9
    homogeneity_notes: >
      Integer counts only: 1, 2, 3, 4, 5. No mixing with goal counts or years.
