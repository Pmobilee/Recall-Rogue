# ============================================================
# GENERATION INSTRUCTIONS FOR WORKERS
# ============================================================

generation_instructions: >
  WORKERS: You are a FORMATTER, not a researcher. Every fact above is pre-verified
  source data. Your job is to convert each verified_facts entry into a valid
  DeckFact JSON object. You do NOT invent facts, modify meanings, or add claims
  not present in the source data above.

  REQUIRED FIELDS per DeckFact:
    - id: "ap_bio_u7_NNN" (3-digit zero-padded, sequential within topic)
    - correctAnswer: exact canonical answer (concise, ≤15 words where possible)
    - acceptableAlternatives: [] or list of synonymous correct answers
    - distractors: 8-12 LLM-generated plausible wrong answers (NEVER from database)
    - quizQuestion: clear question targeting the fact
    - explanation: 1-2 sentence post-answer explanation reinforcing the fact
    - difficulty: 1-5 (use value from architecture)
    - funScore: 1-10 (use value from architecture)
    - chainThemeId: "natural_selection" or "speciation_phylogenetics" (as assigned above)
    - answerTypePoolId: pool id from above (term_definitions / process_names /
                        organism_names / bracket_numbers / comparison_terms /
                        experiment_terms / molecule_names)
    - examTags: ["AP_Biology", "AP_Bio_Unit7", "AP_Bio_7_{topic_number}"]

  DISTRACTOR RULES:
    - ALL distractors must be LLM-generated by reading the specific question
    - Distractors must be plausible wrong answers (same format, semantically related)
    - NEVER pull distractors from correctAnswer fields of other facts
    - Use common_confusions pairs to guide distractor selection — these are the terms
      students most commonly mix up and make excellent plausible-but-wrong distractors
    - Verify no distractor is accidentally correct
    - For numeric facts (bracket_numbers pool), distractors must be plausible nearby numbers

  POOL ASSIGNMENT CHECK:
    - Every fact's answerTypePoolId MUST match a pool id listed in answer_type_pools
    - Pool factIds in the final deck JSON are populated by scanning facts — do NOT
      hand-craft factIds lists during generation

  HARDY-WEINBERG MATH FACTS:
    - For H-W calculation facts, quizQuestion should present a specific scenario
      (e.g., "In a population where 16% of individuals show a recessive phenotype...")
    - Correct answer should be the specific numeric result AND the formula step used
    - Distractors should be mathematically plausible wrong calculations

  TARGET: 170 facts total (130 minimum).
  Current verified source data: ~137 fact seeds across 13 topics.
  Workers should expand key seeds into 1-2 quiz questions where each adds distinct
  learning value (e.g., a seed about Hardy-Weinberg can yield one "what does p + q = 1
  represent" and one "given q² = 0.16, what is 2pq?" question).

# ============================================================
# NOTES
# ============================================================

notes: >
  Unit 7 is the HIGHEST-WEIGHT unit on the AP Biology exam (13-20%), covering
  13 topics spanning Darwin through abiotic origins of life. This deck is
  exam-prep critical — prioritize facts that appear on AP FRQs (Hardy-Weinberg
  math, evidence of evolution, speciation barriers, phylogenetic tree interpretation).

  TWO CHAIN THEMES: natural_selection (Topics 7.1-7.5, 7.8, 7.11) and
  speciation_phylogenetics (Topics 7.6-7.7, 7.9-7.10, 7.12-7.13). These align
  with the parent deck's chain theme definitions in ap_biology_arch.yaml.

  HIGH-PRIORITY EXAM CONTENT (high funScore, frequent FRQ appearances):
    - Hardy-Weinberg calculations: always on the AP exam; students must be able to
      work from q² to find p, q, 2pq, and p² given phenotype frequency data
    - Evidence of evolution: homologous vs. analogous structures, transitional fossils
      (Tiktaalik, Archaeopteryx), molecular evidence — classic AP MCQ content
    - Natural selection modes: directional, stabilizing, disruptive — expect graph
      interpretation questions
    - Speciation: allopatric vs. sympatric, prezygotic vs. postzygotic barriers
    - Sickle cell / heterozygote advantage: the most famous balanced polymorphism
    - Industrial melanism (peppered moths): the iconic directional selection example

  WATCH FOR THESE STUDENT MISCONCEPTIONS (high-value distractor material):
    - "Evolution happens to individuals" (evolution acts on populations, not individuals)
    - Confusing genetic drift with natural selection (drift is random, selection is not)
    - Thinking Hardy-Weinberg populations actually exist in nature (they don't)
    - Confusing homologous with analogous structures
    - Thinking all speciation requires geographic isolation (sympatric via polyploidy)

