verified_facts:

  # ----------------------------------------------------------
  # Topic 7.1-7.2: Natural Selection (~20 facts)
  # Source: OpenStax Biology 2e Ch. 18-19; College Board CED 7.1-7.2
  # ----------------------------------------------------------
  topic_7_1_7_2_natural_selection:
    - fact: "Charles Darwin published 'On the Origin of Species' in 1859"
      pool: bracket_numbers
      chain_theme: natural_selection
      difficulty: 1
      fun_score: 8

    - fact: "Darwin made observations on his voyage on HMS Beagle (1831-1836) that informed his theory of natural selection"
      pool: organism_names
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 8

    - fact: "Darwin studied the beak shapes of Galápagos finches — different species had beaks adapted to different food sources"
      pool: organism_names
      chain_theme: natural_selection
      difficulty: 1
      fun_score: 9

    - fact: "Natural selection: differential survival and reproduction based on heritable traits; individuals with advantageous traits leave more offspring"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 1
      fun_score: 8

    - fact: "Four conditions required for natural selection: (1) variation in a trait exists in the population, (2) the trait is heritable (passed to offspring), (3) more offspring are produced than can survive (overproduction), (4) individuals with the trait have differential survival/reproduction"
      pool: process_names
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 9

    - fact: "Adaptation: a heritable trait that increases an organism's fitness (reproductive success) in a given environment"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 1
      fun_score: 7

    - fact: "Fitness: an organism's relative reproductive success; measured by the number of surviving offspring produced in a given environment"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 7

    - fact: "Evolution: a change in allele frequencies in a population over time; NOT change in individuals during their lifetimes"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 8

    - fact: "Population: a group of individuals of the same species living in the same area that can interbreed and share a gene pool"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 1
      fun_score: 6

    - fact: "Descent with modification: species change over time and share common ancestors; Darwin's core principle"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 8

    - fact: "Directional selection: favors one extreme phenotype; shifts the population mean in that direction (example: increased beak depth in Galápagos finches during drought)"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 8

    - fact: "Stabilizing selection: favors the intermediate phenotype and eliminates both extremes; reduces variation (example: human birth weight — too low or too high increases mortality)"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 8

    - fact: "Disruptive (diversifying) selection: favors both extreme phenotypes over the intermediate; can split a population into two distinct groups (example: beak size in seed-cracking birds where large and small beaks both outperform medium)"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 8

    - fact: "Sexual selection: a form of natural selection where traits that increase mating success are favored, even at a survival cost (examples: peacock tail feathers, elk antlers, bird song)"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 9

    - fact: "Intrasexual selection: competition between individuals of the same sex for mates (example: male elk fighting with antlers)"
      pool: comparison_terms
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 8

    - fact: "Intersexual selection: mate choice by one sex based on traits displayed by the other sex (example: female peahens selecting males with elaborate tail feathers)"
      pool: comparison_terms
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 8

    - fact: "Comparison — directional vs. stabilizing vs. disruptive selection: directional shifts the mean toward one extreme; stabilizing reduces variance around the mean; disruptive increases variance by favoring both extremes"
      pool: comparison_terms
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 9

  # ----------------------------------------------------------
  # Topic 7.3: Artificial Selection (~6 facts)
  # Source: OpenStax Biology 2e Ch. 18.1; College Board CED 7.3
  # ----------------------------------------------------------
  topic_7_3_artificial_selection:
    - fact: "Artificial selection (selective breeding): humans intentionally choose individuals with desired traits to reproduce, rapidly changing trait distributions in a population"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 1
      fun_score: 8

    - fact: "All modern dog breeds (Canis lupus familiaris) were derived from wolves through artificial selection over thousands of years"
      pool: organism_names
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 9

    - fact: "Modern corn (Zea mays) was derived from teosinte through thousands of years of artificial selection — the ancestral form looks dramatically different"
      pool: organism_names
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 9

    - fact: "Broccoli, cauliflower, kale, cabbage, kohlrabi, and Brussels sprouts are all derived from wild mustard (Brassica oleracea) by artificial selection"
      pool: organism_names
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 10

    - fact: "Darwin used artificial selection as an analogy to explain natural selection — the same mechanism of heritable variation + differential reproduction, but guided by human choice rather than nature"
      pool: comparison_terms
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 8

    - fact: "Selective breeding reduces genetic diversity and can lead to inbreeding depression — reduced fitness from homozygosity of deleterious recessive alleles"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 7

  # ----------------------------------------------------------
  # Topic 7.4: Population Genetics (~12 facts)
  # Source: OpenStax Biology 2e Ch. 19.1; College Board CED 7.4
  # ----------------------------------------------------------
  topic_7_4_population_genetics:
    - fact: "Gene pool: the total collection of all alleles present in all individuals in a population at a given time"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 1
      fun_score: 7

    - fact: "Allele frequency: the proportion of a specific allele in the gene pool; all allele frequencies at a locus sum to 1.0"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 7

    - fact: "Microevolution: change in allele frequencies within a population over one or more generations"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 7

    - fact: "Five agents of microevolutionary change: (1) mutation, (2) natural selection, (3) gene flow, (4) genetic drift, (5) nonrandom mating"
      pool: process_names
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 9

    - fact: "Mutation: the ultimate source of new alleles; mutations are random with respect to fitness; individual mutations are usually rare but accumulate over evolutionary time"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 7

    - fact: "Gene flow (migration): movement of alleles between populations due to organisms moving or gametes being transported; increases genetic variation in the receiving population and homogenizes allele frequencies between populations"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 7

    - fact: "Nonrandom mating: includes assortative mating (individuals mate preferentially with similar phenotypes) and sexual selection; changes genotype frequencies without necessarily changing allele frequencies"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 7

    - fact: "Genetic drift: random fluctuations in allele frequency due to chance sampling events in reproduction; has a stronger effect in small populations"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 8

    - fact: "Bottleneck effect: a drastic reduction in population size (e.g., disease, disaster) causes loss of genetic diversity and random changes in allele frequencies that may differ greatly from the original population"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 9

    - fact: "Founder effect: a small group of individuals colonizes a new area, establishing a population with limited genetic diversity and different allele frequencies from the original population (example: Amish community founder effect for Ellis-van Creveld syndrome)"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 9

    - fact: "Genetic drift can lead to fixation (an allele reaches 100% frequency) or loss (an allele reaches 0% frequency and is eliminated from the population)"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 8

    - fact: "Comparison — bottleneck effect vs. founder effect: both are examples of genetic drift in small populations; bottleneck = existing population drastically reduced; founder = small group colonizes new habitat"
      pool: comparison_terms
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 9

  # ----------------------------------------------------------
  # Topic 7.5: Hardy-Weinberg Equilibrium (~15 facts)
  # Source: OpenStax Biology 2e Ch. 19.1; College Board CED 7.5
  # ----------------------------------------------------------
  topic_7_5_hardy_weinberg:
    - fact: "Hardy-Weinberg principle: in the absence of evolution, allele frequencies and genotype frequencies in a population remain constant from generation to generation"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 8

    - fact: "Hardy-Weinberg allele frequency equation: p + q = 1 (where p = frequency of dominant allele, q = frequency of recessive allele)"
      pool: bracket_numbers
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 8

    - fact: "Hardy-Weinberg genotype frequency equation: p² + 2pq + q² = 1 (p² = homozygous dominant frequency, 2pq = heterozygous frequency, q² = homozygous recessive frequency)"
      pool: bracket_numbers
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 9

    - fact: "Five conditions for Hardy-Weinberg equilibrium: (1) no mutation, (2) no natural selection, (3) no gene flow, (4) no genetic drift (requires an infinitely large population), (5) random mating"
      pool: experiment_terms
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 9

    - fact: "If any one of the five Hardy-Weinberg conditions is violated, allele frequencies will change — the population IS evolving"
      pool: experiment_terms
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 8

    - fact: "Hardy-Weinberg equilibrium serves as a null hypothesis: real populations are compared to H-W expectations, and deviations indicate which evolutionary forces are acting"
      pool: experiment_terms
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 8

    - fact: "Hardy-Weinberg calculation step 1: if the homozygous recessive phenotype frequency is q², take the square root to find q (the recessive allele frequency)"
      pool: experiment_terms
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 8

    - fact: "Hardy-Weinberg calculation step 2: p = 1 - q (the dominant allele frequency equals 1 minus the recessive allele frequency)"
      pool: experiment_terms
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 8

    - fact: "Hardy-Weinberg worked example: if 16% of a population shows a recessive phenotype, then q² = 0.16 → q = 0.4 → p = 0.6 → 2pq (carrier frequency) = 2(0.6)(0.4) = 0.48 = 48%"
      pool: bracket_numbers
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 9

    - fact: "Heterozygote (carrier) frequency in Hardy-Weinberg: 2pq; this represents the frequency of individuals who carry one copy of the recessive allele but do not express the recessive phenotype"
      pool: bracket_numbers
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 8

    - fact: "Hardy-Weinberg applies to diploid, sexually reproducing organisms; it can be extended to X-linked loci and multiple alleles at a single locus"
      pool: experiment_terms
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 7

    - fact: "Homozygous dominant genotype frequency in H-W: p² (example: if p = 0.6, then p² = 0.36 = 36% of population is homozygous dominant)"
      pool: bracket_numbers
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 7

  # ----------------------------------------------------------
  # Topic 7.6-7.7: Evidence of Evolution and Common Ancestry (~20 facts)
  # Source: OpenStax Biology 2e Ch. 18.1-18.3; College Board CED 7.6-7.7
  # ----------------------------------------------------------
  topic_7_6_7_7_evidence_common_ancestry:
    - fact: "Fossil record: the preserved remains of organisms over geological time; shows a progression from simpler to more complex life forms; provides evidence of transitional forms"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 1
      fun_score: 8

    - fact: "Tiktaalik: a transitional fossil (~375 million years ago) with features intermediate between fish and tetrapods — lobed fins with wrist bones, flat head, neck; evidence for fish-to-land-vertebrate transition"
      pool: organism_names
      chain_theme: speciation_phylogenetics
      difficulty: 3
      fun_score: 10

    - fact: "Archaeopteryx: a transitional fossil with features of both non-avian dinosaurs (teeth, clawed wings, long bony tail) and birds (feathers, wishbone, partially reversed big toe); evidence for the dinosaur-to-bird transition"
      pool: organism_names
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 10

    - fact: "Biogeography: the geographic distribution of species; species found on oceanic islands most closely resemble those on the nearest mainland, not those in similar environments far away — evidence of descent from a common ancestor"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 8

    - fact: "Darwin's finches: 14-15 species found on the Galápagos Islands, each with beak shapes adapted to different food sources; evolved from a single South American finch ancestor — evidence of adaptive radiation from common ancestry"
      pool: organism_names
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 9

    - fact: "Homologous structures: anatomical structures derived from the same ancestral structure but modified for different functions in different species; evidence of common ancestry (example: human arm, whale flipper, bat wing, horse leg — all have humerus, radius, ulna)"
      pool: comparison_terms
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 9

    - fact: "Analogous structures: structures with similar functions that evolved independently in unrelated lineages (convergent evolution); NOT evidence of common ancestry (example: bird wing and insect wing are analogous — both enable flight but have completely different underlying structures)"
      pool: comparison_terms
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 9

    - fact: "Vestigial structures: anatomical structures that have been reduced or lost their ancestral function; evidence that organisms share ancestry with forms in which the structure was functional (examples: human appendix, whale pelvic bones, snake leg bones, flightless bird wings)"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 8

    - fact: "Comparison — homologous vs. analogous structures: homologous = same underlying anatomy, different functions, indicates common ancestry; analogous = different underlying anatomy, similar functions, indicates convergent evolution (NOT common ancestry)"
      pool: comparison_terms
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 9

    - fact: "Molecular evidence: similarity in DNA and protein sequences correlates with evolutionary relatedness — more similar sequences indicate a more recent common ancestor"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 8

    - fact: "Universal genetic code: nearly all living organisms use the same codons to encode the same amino acids; strong evidence for a single common origin of all life"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 8

    - fact: "Conserved genes: highly similar gene sequences found across distantly related species (example: Hox genes are structurally similar in all animals; cytochrome c protein differs by only 1 amino acid between humans and chimpanzees)"
      pool: organism_names
      chain_theme: speciation_phylogenetics
      difficulty: 3
      fun_score: 8

    - fact: "Embryological evidence: early embryos of diverse vertebrates (fish, reptiles, birds, humans) look remarkably similar — all share pharyngeal pouches and a post-anal tail — evidence of shared ancestry"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 8

    - fact: "Molecular clock: uses the rate of molecular changes (DNA mutations, amino acid substitutions) accumulated over time to estimate when two lineages diverged from their common ancestor"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 3
      fun_score: 8

  # ----------------------------------------------------------
  # Topic 7.8: Continuing Evolution (~8 facts)
  # Source: OpenStax Biology 2e Ch. 18.2; College Board CED 7.8
  # ----------------------------------------------------------
  topic_7_8_continuing_evolution:
    - fact: "Antibiotic resistance: bacteria with pre-existing resistance alleles survive antibiotic treatment and reproduce, increasing the frequency of resistance alleles in the population (example: MRSA — methicillin-resistant Staphylococcus aureus)"
      pool: organism_names
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 9

    - fact: "Pesticide resistance: insects or weeds with pre-existing resistance alleles survive pesticide application and reproduce; the same natural selection mechanism as antibiotic resistance"
      pool: comparison_terms
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 8

    - fact: "HIV evolution: HIV has a very high mutation rate (RNA virus with error-prone reverse transcriptase) and short generation time; natural selection rapidly produces drug-resistant strains, requiring combination therapy (HAART)"
      pool: organism_names
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 9

    - fact: "Industrial melanism in peppered moths (Biston betularia): dark-colored moths were rare before industrialization; pollution darkened tree bark → dark moths camouflaged, light moths visible to predators → dark allele increased in frequency; reversed after clean air acts"
      pool: organism_names
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 10

    - fact: "Peter and Rosemary Grant documented real-time beak evolution in Galápagos finches over decades: during the 1977 drought, large-seeded plants survived better → birds with deeper beaks could crack harder seeds → average beak depth increased in the population within one generation"
      pool: organism_names
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 10

    - fact: "Evolution is not just historical — it is an ongoing, observable process that occurs whenever populations face new selection pressures"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 1
      fun_score: 7

  # ----------------------------------------------------------
  # Topic 7.9: Phylogeny (~15 facts)
  # Source: OpenStax Biology 2e Ch. 20; College Board CED 7.9
  # ----------------------------------------------------------
  topic_7_9_phylogeny:
    - fact: "Phylogenetic tree: a branching diagram that shows the evolutionary relationships among taxa based on common ancestry and shared derived characters"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 1
      fun_score: 7

    - fact: "Cladogram: a branching diagram that groups organisms based on shared derived characters (synapomorphies); does not necessarily represent time or amount of evolutionary change"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 7

    - fact: "Node (branch point) on a phylogenetic tree: represents the most recent common ancestor of all lineages that diverge from that point"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 7

    - fact: "Root of a phylogenetic tree: the base of the tree; represents the most recent common ancestor of ALL taxa in the tree"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 6

    - fact: "Sister taxa: two groups or lineages that share the most recent common ancestor with each other — they are each other's closest evolutionary relatives"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 7

    - fact: "Outgroup: a taxon that diverged before the group of interest; used to determine which characters are ancestral (plesiomorphic) versus derived (apomorphic)"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 3
      fun_score: 7

    - fact: "Monophyletic group (clade): includes a common ancestor AND ALL of its descendants; the only valid grouping in cladistic classification"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 8

    - fact: "Paraphyletic group: includes a common ancestor and SOME but not all of its descendants; not considered a valid clade (example: 'Reptilia' excluding birds is paraphyletic because birds evolved from within reptiles)"
      pool: comparison_terms
      chain_theme: speciation_phylogenetics
      difficulty: 3
      fun_score: 8

    - fact: "Synapomorphies (shared derived characters): traits shared by all members of a clade that were absent in the outgroup; the basis for grouping organisms in cladistics"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 3
      fun_score: 7

    - fact: "Symplesiomorphies (shared ancestral characters): traits shared with the outgroup; present in the common ancestor; NOT useful for defining a clade"
      pool: comparison_terms
      chain_theme: speciation_phylogenetics
      difficulty: 3
      fun_score: 7

    - fact: "Parsimony principle in phylogenetics: the preferred tree topology is the one that requires the fewest total evolutionary changes (assumes evolution is parsimonious)"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 3
      fun_score: 7

    - fact: "Maximum likelihood in phylogenetics: a statistical method that selects the tree topology that makes the observed data (sequences) most probable given a model of evolution"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 4
      fun_score: 6

    - fact: "Molecular phylogenetics: building phylogenetic trees using DNA, RNA, or protein sequence data — the most powerful current method for determining evolutionary relationships"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 7

    - fact: "Comparison — monophyletic vs. paraphyletic group: monophyletic includes ancestor + ALL descendants (valid clade); paraphyletic includes ancestor + SOME descendants (invalid clade, excludes some lineages)"
      pool: comparison_terms
      chain_theme: speciation_phylogenetics
      difficulty: 3
      fun_score: 8

  # ----------------------------------------------------------
  # Topic 7.10: Speciation (~15 facts)
  # Source: OpenStax Biology 2e Ch. 18.3; College Board CED 7.10
  # ----------------------------------------------------------
  topic_7_10_speciation:
    - fact: "Biological species concept: a species is a group of populations whose members can interbreed and produce viable, fertile offspring; members of different species are reproductively isolated"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 1
      fun_score: 7

    - fact: "Reproductive isolation: the existence of biological barriers that prevent gene flow between populations; necessary for speciation to occur"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 7

    - fact: "Prezygotic barriers: reproductive isolating mechanisms that prevent mating or fertilization — they act BEFORE a zygote is formed"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 7

    - fact: "Habitat (ecological) isolation: two species live in the same geographic area but in different habitats and rarely encounter each other (example: two Drosophila species that breed on different host plants)"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 7

    - fact: "Temporal isolation: two species breed at different times (different seasons, times of day, or years) and thus never mate with each other"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 7

    - fact: "Behavioral (ethological) isolation: two species have different mating signals, courtship behaviors, or pheromones, so they do not recognize each other as potential mates"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 8

    - fact: "Mechanical isolation: incompatible reproductive structures prevent mating between species even when they meet and attempt to mate"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 7

    - fact: "Gametic isolation: sperm cannot fertilize the egg of a different species — incompatibility of gamete surface proteins prevents fusion"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 3
      fun_score: 7

    - fact: "Postzygotic barriers: reproductive isolating mechanisms that act AFTER a zygote is formed — the hybrid offspring has reduced viability or fertility"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 7

    - fact: "Reduced hybrid viability: hybrid embryos fail to develop normally or die before reproductive age (example: many inter-species crosses in plants produce inviable seeds)"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 7

    - fact: "Reduced hybrid fertility: hybrids survive but are sterile — cannot produce functional gametes (example: mule = horse × donkey cross; mules are sterile)"
      pool: organism_names
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 9

    - fact: "Allopatric speciation: geographic isolation of populations → independent evolution → reproductive isolation accumulates → new species form; the most common mode of speciation"
      pool: comparison_terms
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 8

    - fact: "Sympatric speciation: speciation without geographic isolation, occurring within the same area; common in plants via polyploidy (genome duplication), rare in animals"
      pool: comparison_terms
      chain_theme: speciation_phylogenetics
      difficulty: 3
      fun_score: 8

    - fact: "Adaptive radiation: rapid diversification from a single ancestral species into many species filling different ecological niches (examples: Darwin's finches, Hawaiian honeycreepers, cichlid fish in African Rift Lakes, Australian marsupials)"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 9

    - fact: "Punctuated equilibrium: the evolutionary pattern of long periods of little change (stasis) interrupted by relatively rapid bursts of evolutionary change; contrasts with phyletic gradualism (slow, continuous change)"
      pool: comparison_terms
      chain_theme: speciation_phylogenetics
      difficulty: 3
      fun_score: 8

  # ----------------------------------------------------------
  # Topic 7.11: Variations in Populations (~8 facts)
  # Source: OpenStax Biology 2e Ch. 19.2; College Board CED 7.11
  # ----------------------------------------------------------
  topic_7_11_variation:
    - fact: "Genetic variation: the raw material for natural selection and evolution; includes differences in alleles, genotypes, and phenotypes among individuals in a population"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 1
      fun_score: 7

    - fact: "Three sources of genetic variation: (1) mutation — creates new alleles; (2) sexual recombination — reshuffles existing alleles; (3) gene flow — introduces alleles from other populations"
      pool: process_names
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 8

    - fact: "Neutral variation: genetic differences that have no measurable effect on fitness; many single nucleotide polymorphisms (SNPs) are selectively neutral"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 7

    - fact: "Balanced polymorphism: the maintenance of two or more phenotypes in a population by natural selection (not just drift); both alleles are maintained above expected frequencies"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 7

    - fact: "Heterozygote advantage (overdominance): the heterozygous genotype has higher fitness than either homozygous genotype; maintains both alleles in the population (example: sickle cell trait — heterozygotes have malaria resistance without full sickle cell disease)"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 10

    - fact: "Sickle cell trait example: in malaria-endemic regions, HbA/HbS heterozygotes have higher survival than HbA/HbA (susceptible to malaria) or HbS/HbS (sickle cell disease); both alleles maintained by balancing selection"
      pool: organism_names
      chain_theme: natural_selection
      difficulty: 2
      fun_score: 10

    - fact: "Frequency-dependent selection: the fitness of a phenotype depends on how common it is in the population; rare phenotypes often have higher fitness (negative frequency-dependence) while common phenotypes are selected against"
      pool: term_definitions
      chain_theme: natural_selection
      difficulty: 4
      fun_score: 8

    - fact: "Measures of genetic diversity: number of alleles per locus, heterozygosity (proportion of heterozygous individuals), nucleotide diversity (average number of nucleotide differences between randomly chosen sequences)"
      pool: experiment_terms
      chain_theme: natural_selection
      difficulty: 3
      fun_score: 7

  # ----------------------------------------------------------
  # Topic 7.12-7.13: Origins of Life (~10 facts)
  # Source: OpenStax Biology 2e Ch. 22; College Board CED 7.12-7.13
  # ----------------------------------------------------------
  topic_7_12_7_13_origins_of_life:
    - fact: "Earth formed approximately 4.6 billion years ago; earliest evidence of life (stromatolites — layered structures formed by cyanobacteria-like organisms) dates to approximately 3.5 billion years ago"
      pool: bracket_numbers
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 8

    - fact: "Miller-Urey experiment (Stanley Miller and Harold Urey, 1953): simulated early Earth conditions — water, methane (CH₄), ammonia (NH₃), and hydrogen (H₂) with electrical sparks to simulate lightning — and produced amino acids and other organic molecules abiotically"
      pool: experiment_terms
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 9

    - fact: "Abiotic synthesis: the formation of organic molecules (amino acids, nucleotides, lipids) from simple inorganic precursors without the action of living organisms; demonstrated by Miller-Urey and subsequent experiments"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 8

    - fact: "RNA world hypothesis: RNA served as BOTH genetic material (like DNA) AND catalyst (like enzymes) in early life before the evolution of DNA and proteins; supported by the existence of ribozymes"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 3
      fun_score: 9

    - fact: "Ribozymes: RNA molecules with catalytic activity — they can catalyze chemical reactions including self-splicing of introns and peptide bond formation in the ribosome; key evidence for the RNA world hypothesis"
      pool: molecule_names
      chain_theme: speciation_phylogenetics
      difficulty: 3
      fun_score: 9

    - fact: "Protocells: lipid bilayer vesicles that could spontaneously form in early oceans; could have enclosed self-replicating RNA molecules, representing a precursor to the first true cells"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 3
      fun_score: 8

    - fact: "Endosymbiosis theory (Lynn Margulis, 1967): mitochondria evolved from engulfed aerobic bacteria and chloroplasts evolved from engulfed cyanobacteria; evidence: double membrane, own circular DNA, own 70S ribosomes, divide by binary fission"
      pool: term_definitions
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 9

    - fact: "Prokaryotes were the only life forms on Earth for approximately 2 billion years (from ~3.5 bya to ~1.5-1.8 bya) before the first eukaryotes evolved"
      pool: bracket_numbers
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 7

    - fact: "Great Oxidation Event: approximately 2.4 billion years ago, oxygen produced by cyanobacteria via photosynthesis began accumulating in the atmosphere; enabled aerobic respiration and eventually complex eukaryotic life"
      pool: bracket_numbers
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 9

    - fact: "Cambrian explosion: approximately 541 million years ago, most major animal body plans (phyla) appeared in the fossil record within a geologically short time span of ~20 million years; marks the beginning of the Phanerozoic Eon"
      pool: bracket_numbers
      chain_theme: speciation_phylogenetics
      difficulty: 2
      fun_score: 9

# ============================================================
# ANSWER TYPE POOLS
# ============================================================

answer_type_pools:

  # POOL 1: term_definitions
  # "What is [term]?" or "Which term describes [definition]?"
  # Definitions of biological terms, models, and concepts in evolution
  - id: term_definitions
    format: term
    estimated_count: 55
    note: >
      Natural selection, adaptation, fitness, evolution, gene pool, allele frequency,
      microevolution, genetic drift, bottleneck effect, founder effect, gene flow,
      Hardy-Weinberg equilibrium, biological species concept, reproductive isolation,
      adaptive radiation, allopatric speciation, sympatric speciation, phylogenetic tree,
      clade, monophyletic group, synapomorphy, molecular clock, RNA world hypothesis,
      protocells, endosymbiosis, vestigial structures, biogeography, artificial selection,
      inbreeding depression, balanced polymorphism, heterozygote advantage, neutral variation.
      Answers are single nouns or short phrases. Key confusions: evolution vs. adaptation,
      microevolution vs. macroevolution, genetic drift vs. natural selection.
    syntheticDistractors:
      - "A random change in allele frequency due to sampling error"
      - "The non-heritable changes an organism makes during its lifetime"
      - "The total number of organisms in a habitat"
      - "A trait that decreases reproductive success in all environments"

  # POOL 2: process_names
  # "What process [does X]?" or "What are the steps of [Y]?"
  # Names of evolutionary processes and mechanisms
  - id: process_names
    format: term
    estimated_count: 12
    note: >
      Natural selection, artificial selection, genetic drift, gene flow, mutation,
      sexual selection, adaptive radiation, speciation, abiotic synthesis, endosymbiosis,
      allopatric speciation, sympatric speciation. Answers are process names.
      Key confusions: natural vs. artificial selection, allopatric vs. sympatric speciation,
      microevolution vs. speciation.
    syntheticDistractors:
      - "Photosynthesis"
      - "Mitosis"
      - "Transcription"
      - "Chemiosmosis"
      - "Active transport"

  # POOL 3: organism_names
  # "Which organism [has trait X]?" or "What is [organism] an example of?"
  # Specific organisms used as examples in evolution
  - id: organism_names
    format: term
    estimated_count: 18
    note: >
      Galápagos finches, Darwin's finches, Tiktaalik, Archaeopteryx, peppered moths
      (Biston betularia), MRSA, HIV, mule (horse × donkey hybrid), dog breeds (from wolves),
      corn/maize (from teosinte), Brassica vegetables (from wild mustard), sickle cell
      (humans), cichlid fish, Hawaiian honeycreepers, Australian marsupials, Drosophila,
      cyanobacteria (Great Oxidation Event), stromatolites. Answers are organism or taxon names.
      Key confusions: Tiktaalik vs. Archaeopteryx (different transitions), mule sterility.
    syntheticDistractors:
      - "E. coli K-12"
      - "Saccharomyces cerevisiae"
      - "Arabidopsis thaliana"
      - "Caenorhabditis elegans"
      - "Xenopus laevis"

  # POOL 4: bracket_numbers
  # Facts containing numeric values testable as fill-in-the-blank
  # e.g., "Earth formed {4.6} billion years ago"
  - id: bracket_numbers
    format: numeric
    estimated_count: 14
    note: >
      4.6 bya (Earth formed), 3.5 bya (first life evidence/stromatolites), 2.4 bya
      (Great Oxidation Event), 1.5-1.8 bya (first eukaryotes), 541 mya (Cambrian
      explosion), 375 mya (Tiktaalik), 1859 (Darwin's publication), p + q = 1,
      p² + 2pq + q² = 1, H-W example: q² = 0.16 → q = 0.4 → p = 0.6 → 2pq = 0.48.
      Distractors must be nearby plausible numbers of the same magnitude.
    syntheticDistractors:
      - "4.1"
      - "2.8"
      - "0.32"
      - "0.25"
      - "650"

  # POOL 5: comparison_terms
  # Facts framing a comparison between two related concepts
  - id: comparison_terms
    format: term
    estimated_count: 20
    note: >
      Homologous vs. analogous structures, directional vs. stabilizing vs. disruptive
      selection, natural vs. artificial selection, bottleneck vs. founder effect,
      allopatric vs. sympatric speciation, prezygotic vs. postzygotic barriers,
      monophyletic vs. paraphyletic group, synapomorphy vs. symplesiomorphy,
      intrasexual vs. intersexual selection, punctuated equilibrium vs. gradualism,
      antibiotic vs. pesticide resistance (same mechanism), genetic drift vs. natural selection.
    syntheticDistractors:
      - "Both involve changes in an individual's phenotype during its lifetime"
      - "Both require geographic isolation to occur"
      - "Both result in increased genetic diversity"
      - "Both apply only to asexually reproducing organisms"
      - "Both are random with respect to fitness"

  # POOL 6: experiment_terms
  # Experimental evidence, hypotheses, and analytical methods
  - id: experiment_terms
    format: term
    estimated_count: 14
    note: >
      Hardy-Weinberg equilibrium (null hypothesis), Miller-Urey experiment (1953),
      RNA world hypothesis, molecular clock, maximum likelihood (phylogenetics),
      parsimony principle, Hardy-Weinberg allele frequency calculation steps,
      H-W five conditions (no mutation/selection/gene flow/drift/nonrandom mating),
      measures of genetic diversity (heterozygosity, nucleotide diversity, alleles per locus).
      Answers describe an experimental concept or analytical method.
    syntheticDistractors:
      - "PCR amplification of ancient DNA"
      - "CRISPR gene editing to test fitness effects"
      - "Gel electrophoresis for protein separation"
      - "Southern blotting for gene detection"
      - "Flow cytometry for cell sorting"

  # POOL 7: molecule_names
  # "What molecule [does X]?" or "Which molecule is [description]?"
  - id: molecule_names
    format: term
    estimated_count: 8
    note: >
      Ribozymes (catalytic RNA), RNA (genetic material + catalyst in RNA world),
      DNA (replaced RNA as primary genetic material), HbA (normal hemoglobin),
      HbS (sickle cell hemoglobin), cytochrome c (conserved across eukaryotes),
      Hox genes (conserved developmental genes). Answers are molecule or gene names.
    syntheticDistractors:
      - "tRNA"
      - "snRNA"
      - "microRNA"
      - "NADPH"
      - "ATP synthase"

