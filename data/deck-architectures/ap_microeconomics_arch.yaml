# COMPLETENESS PHILOSOPHY:
# This deck covers the COMPLETE College Board AP Microeconomics Course and Exam
# Description (CED). A student who masters this deck should be prepared for every
# question type on the AP Microeconomics exam. Scope is curriculum-driven — every
# CED topic across all 6 units is represented. Unit weights (percent of exam) directly
# inform fact counts per chain theme. Units 3 (22-25%) and 4 (15-22%) are the heaviest
# and their chain themes receive proportionally more facts.

# Sourcing & licensing
