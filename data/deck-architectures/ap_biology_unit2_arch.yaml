deck_id: ap_biology_unit2
name: "AP Biology — Unit 2: Cell Structure and Function"
domain: natural_sciences
sub_domain: biology
description: "Master AP Biology Unit 2 — Cell Structure and Function (10-13% of exam weight). Covers prokaryotic and eukaryotic cell organization, organelle structure and function, plasma membrane composition and the fluid mosaic model, all mechanisms of membrane transport (passive, active, bulk), water potential calculations, osmosis and tonicity, compartmentalization, the endomembrane system, and endosymbiotic theory. Aligned to the College Board AP Biology CED Topics 2.1-2.11 (Fall 2025)."
minimum_facts: 115
target_facts: 130

