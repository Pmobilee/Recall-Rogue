      - "First public demonstration was by Douglas Engelbart in 1968 as part of the 'Mother of All Demos'"
      - "Original mice used two wheels for x/y tracking; later designs used a rolling ball"
      - "Xerox PARC refined the mouse design in the 1970s for use with graphical user interfaces"
      - "Apple's Lisa (1983) and Macintosh (1984) made the mouse mainstream for personal computing"

  - name: DRAM (Dynamic RAM)
    year_invented: 1966
    year_patented: 1968
    creators: [Robert Dennard]
    wikidata: Q189396
    source_url: "https://en.wikipedia.org/wiki/Dynamic_random-access_memory"
    achievement: "Single-transistor memory cell invented by Robert Dennard at IBM in 1966; patented 1968"
    key_facts:
      - "Invented by Dr. Robert Dennard in 1966 at IBM's Thomas J. Watson Research Center"
      - "A DRAM cell stores one bit using a single MOS transistor and a capacitor"
      - "Dennard filed a patent in 1967; US patent 3,387,286 granted in 1968"
      - "DRAM offers higher density and lower cost than SRAM but requires periodic refreshing (charge leaks)"
      - "DRAM became and remains the dominant type of RAM used as main memory in computers"

  - name: Robert Dennard
    birth: 1932-09-05
    death: 2024-04-23
    country: United States
    wikidata: Q289023
    source_url: "https://en.wikipedia.org/wiki/Robert_H._Dennard"
    achievement: "Invented DRAM (1966) and formulated Dennard scaling rules for transistor miniaturisation"
    key_facts:
      - "Born 5 September 1932; died 23 April 2024"
      - "Invented DRAM in 1966 while working at IBM Thomas J. Watson Research Center"
      - "Formulated Dennard scaling (1974): as transistors get smaller, power density stays constant — enabled decades of CPU performance improvement"
      - "Dennard scaling broke down around 2006, leading to multi-core processor designs"
      - "Received the 2013 IEEE Medal of Honour"

  - name: Solid-State Drive (SSD)
    year: 1991
    wikidata: Q487343
    source_url: "https://en.wikipedia.org/wiki/Solid-state_drive"
    achievement: "Flash-memory-based storage with no moving parts; first commercial SSD by SunDisk (1991)"
    key_facts:
      - "SSDs use non-volatile NAND flash memory to store data with no moving parts"
      - "SunDisk (later SanDisk) introduced the first commercial flash-based SSD in 1991 with 20 MB capacity"
      - "Much faster random access than HDDs because there is no mechanical seek time"
      - "Became mainstream in laptops from approximately 2010 onwards"
      - "NAND flash was invented by Fujio Masuoka at Toshiba in 1984"

  - name: GeForce 256
    year: 1999
    location: "NVIDIA Corporation, Santa Clara, California, USA"
    wikidata: Q1028816
    source_url: "https://en.wikipedia.org/wiki/GeForce_256"
    achievement: "NVIDIA's first GPU; first 3D accelerator with hardware transform and lighting (T&L)"
    key_facts:
      - "Announced 31 August 1999; released 11 October 1999 by NVIDIA"
      - "First GPU (Graphics Processing Unit) — NVIDIA coined the term 'GPU' to describe it"
      - "First 3D accelerator to include a hardware transform and lighting (T&L) engine, offloading geometry calculations from the CPU"
      - "First fully Direct3D 7-compliant 3D accelerator; offered a major leap in 3D gaming performance"
      - "The GPU concept evolved from fixed-function to programmable shaders and eventually to general-purpose GPU computing (GPGPU)"

  - name: Assembly Language
    year: 1947
    wikidata: Q165436
    source_url: "https://en.wikipedia.org/wiki/Assembly_language"
    achievement: "Low-level symbolic representation of machine code; first described in Booth & Booth's 1947 work"
    key_facts:
      - "The use of a symbolic language to represent machine code instructions is found in Kathleen and Andrew Donald Booth's 1947 work 'Coding for A.R.C.'"
      - "The term 'assembler' is generally attributed to Wilkes, Wheeler and Gill in their 1951 book 'The Preparation of Programs for an Electronic Digital Computer'"
      - "Assembly language uses mnemonics (e.g., MOV, ADD, JMP) to represent binary machine instructions"
      - "Each CPU architecture has its own assembly language corresponding to its instruction set"
      - "Directly preceded high-level languages; FORTRAN (1957) was the first widely used alternative"

  - name: RAM vs ROM
    wikidata_ram: Q189396
    wikidata_rom: Q180531
    source_url: "https://en.wikipedia.org/wiki/Random-access_memory"
    achievement: "Two fundamental types of computer memory with distinct read/write and volatility properties"
    key_facts:
      - "RAM (Random-Access Memory) is volatile — loses data when power is removed; used for active working memory"
      - "ROM (Read-Only Memory) is non-volatile — retains data without power; used for firmware"
      - "Modern computers typically use DRAM for main memory and NAND flash (a type of ROM-like storage) for persistent storage"
      - "SRAM (Static RAM) is faster but more expensive than DRAM; used for CPU cache memory"
      - "The distinction between volatile and non-volatile memory is fundamental to computer architecture"

  - name: Vacuum Tube to Transistor to IC to Microprocessor
    wikidata: Q5339
    source_url: "https://en.wikipedia.org/wiki/Transistor"
    achievement: "The four generations of electronic computing components from 1940s to 1971"
    key_facts:
      - "First generation (1940s–mid 1950s): vacuum tubes — ENIAC used ~18,000 tubes; consumed enormous power, generated great heat"
      - "Second generation (mid 1950s–1960s): discrete transistors — transistor invented at Bell Labs in 1947; smaller, faster, more reliable"
      - "Third generation (1960s–early 1970s): integrated circuits — Jack Kilby's first IC demonstrated 1958; multiple transistors on one chip"
      - "Fourth generation (1971–present): microprocessors — Intel 4004 (1971) integrated entire CPU on a single chip"
      - "Transistor count per chip has grown from 2,300 (Intel 4004, 1971) to tens of billions in modern processors"
