# -----------------------------------------------------------------
# Chain Themes (8 grammar areas):
#   0 — subjonctif_passe_concordance : subjonctif passé (aie/ait + PP, sois/soit + PP) + concordance des temps
#   1 — conditionnel_passe_si_type3  : conditionnel passé (aurais + PP, serais + PP) + si-clauses type 3 + mixed conditionals
#   2 — discours_rapporte_passe      : full tense backshift + time marker shifts + reporting verbs (past form)
#   3 — passif_avance_causatif       : passif pronominal (se), passif aux temps composés, faire/laisser causatif
#   4 — accord_participe_passe       : accord PP avec avoir (COD préposé), avec être (pronominal complet)
#   5 — connecteurs_logiques_avances : concession, opposition, reformulation, addition (formal registers)
#   6 — nominalisation_mise_en_relief : verbe→nom transformation + c'est…qui/que + ce qui…c'est
#   7 — futur_anterieur_subordonnees : futur antérieur (aurai+PP, serai+PP) + subordonnées à subj avancées + opinion négative + au cas où
#
# Answer Type Pools (22 pools, each targeting factIds + syntheticDistractors >= 15):
#   subjonctif_passe_avoir            : que j'aie parlé, qu'il ait fini, qu'ils aient vu
#   subjonctif_passe_etre             : que je sois parti(e), qu'elle soit arrivée, qu'ils soient venus
#   subjonctif_passe_pronominal       : qu'elle se soit levée, qu'ils se soient couchés
#   subjonctif_imparfait_recognition  : fût, fussent, eût, eussent, fît — recognition forms only
#   concordance_subj_present_passe    : choice between subjonctif présent (ongoing) and passé (completed)
#   conditionnel_passe_avoir          : j'aurais parlé, il aurait fini, nous aurions vu
#   conditionnel_passe_etre           : je serais parti(e), elle serait venue, ils seraient arrivés
#   conditionnel_passe_modaux         : j'aurais dû, j'aurais pu, j'aurais voulu, j'aurais aimé
#   si_plus_que_parfait               : si j'avais su, si elle avait étudié — si-clause fragment
#   mixed_conditionals                : si + PQP → conditionnel présent (past/present mixed)
#   discours_rapporte_present_imparfait : présent→imparfait backshift constructions
#   discours_rapporte_pc_pqp          : passé composé→plus-que-parfait backshift
#   discours_rapporte_futur_cond      : futur→conditionnel backshift
#   discours_rapporte_temps_markers   : aujourd'hui→ce jour-là, hier→la veille, demain→le lendemain
#   passif_avec_se                    : se vendent, se parle, ça se fait, se mange, s'explique
#   passif_temps_composes             : a été élu, ont été abattus, avait été approuvé
#   causatif_faire_laisser            : fait réparer, fait venir, laissé entrer, laissé parler
#   accord_pp_avoir_cod_prepose       : les livres que j'ai lus, je les ai achetées, la lettre qu'il a écrite
#   accord_pp_pronominal_complet      : elle s'est levée, ils se sont couchés vs elle s'est lavé les mains
#   connecteurs_concession            : bien que + subj, quoique, malgré, en dépit de, certes…mais, néanmoins, toutefois
#   connecteurs_opposition            : tandis que, alors que, en revanche, par contre
#   connecteurs_reformulation         : autrement dit, en d'autres termes, c'est-à-dire
#   connecteurs_addition              : de plus, en outre, par ailleurs, qui plus est
#   nominalisation_verbe_nom          : décider→décision, arriver→arrivée, construire→construction
#   mise_en_relief_cest_qui_que       : c'est…qui (subject), c'est…que (object/adverb) structures
#   mise_en_relief_ce_qui_cest        : ce qui…c'est, ce que…c'est, ce dont…c'est pseudo-cleft
#   futur_anterieur_avoir             : j'aurai fini, tu auras fait, il aura vu, nous aurons pris
#   futur_anterieur_etre              : je serai parti(e), tu seras arrivé(e), il sera allé
#   subordonnees_subj_avancees        : de peur que, à condition que, pourvu que, à supposer que
#   opinion_negative_subj             : je ne pense pas que + subj, je ne crois pas que + subj, je doute que
#   hypothese_attenuee                : au cas où + conditionnel, si jamais + conditionnel
# -----------------------------------------------------------------

chain_themes:
  - id: 0
    name: "Subjonctif Passé & Concordance"
    description: "Subjonctif passé — que j'aie parlé (avoir), que je sois parti(e) (être), que je me sois levé(e) (pronominal) — for past/completed actions after past triggers. Concordance des temps: présent → subj présent (ongoing) vs subj passé (completed); passé → subj présent (modern rule). Literary imparfait/plus-que-parfait recognition (fût, eût)."
    color: "#8E44AD"
    icon: "verb"
  - id: 1
    name: "Conditionnel Passé & Si Type 3"
    description: "Conditionnel passé full mastery — j'aurais parlé (avoir), je serais parti(e) (être), j'aurais dû/pu/voulu (modal regret), j'aurais aimé (wish). Si-clauses type 3 (si + plus-que-parfait → conditionnel passé) and mixed conditionals (past hypothesis → present consequence)."
    color: "#9B59B6"
    icon: "verb"
  - id: 2
    name: "Discours Rapporté au Passé"
    description: "Full tense backshift with past reporting verb: présent→imparfait, passé composé→plus-que-parfait, futur→conditionnel, futur antérieur→conditionnel passé, impératif→de+infinitif. Time marker shifts: aujourd'hui→ce jour-là, hier→la veille, demain→le lendemain, maintenant→alors, ici→là."
    color: "#E74C3C"
    icon: "phrase"
  - id: 3
    name: "Passif Avancé & Causatif"
    description: "Passif pronominal (se + verb): ces livres se vendent, le français se parle, ça ne se fait pas. Passif aux temps composés: a été élu, avait été approuvé, sera pris. Faire causatif (cause to happen): faire réparer, faire venir. Laisser causatif (allow): laisser entrer, laisser parler."
    color: "#1ABC9C"
    icon: "structure"
  - id: 4
    name: "Accord du Participe Passé"
    description: "Full accord rules. Avoir: no accord when COD follows (j'ai lu des livres), accord when COD precedes (les livres que j'ai lus, je les ai achetées). Être: always agrees with subject. Pronominaux: réfléchi COD → agree (elle s'est levée); réfléchi COI → no agree (elle s'est lavé les mains). Exception verbs: se souvenir, se méfier (never agree)."
    color: "#3498DB"
    icon: "structure"
  - id: 5
    name: "Connecteurs Logiques Avancés"
    description: "Concession: bien que + subj, quoique + subj, malgré + nom, en dépit de + nom, certes…mais, néanmoins, toutefois. Opposition: tandis que, alors que, en revanche, par contre. Reformulation: autrement dit, en d'autres termes, c'est-à-dire. Addition: de plus, en outre, par ailleurs, qui plus est."
    color: "#27AE60"
    icon: "connector"
  - id: 6
    name: "Nominalisation & Mise en Relief"
    description: "Nominalisation: verb→noun transformations used in formal French (décider→décision, arriver→arrivée, construire→construction, partir→départ, développer→développement). Mise en relief: c'est…qui (subject cleft), c'est…que (object/adverbial cleft), ce qui…c'est / ce que…c'est (pseudo-cleft). Quant à, pour ce qui est de."
    color: "#F39C12"
    icon: "phrase"
  - id: 7
    name: "Futur Antérieur & Subordonnées Avancées"
    description: "Futur antérieur: j'aurai fini (avant que), je serai parti(e) — completed future action, probability speculation (il aura oublié). Advanced subjunctive subordinates: de peur que … ne, à condition que, pourvu que, à supposer que, sous réserve que. Opinion négative + subj: je ne pense pas que, je ne crois pas que. Au cas où + conditionnel, si jamais."
    color: "#E67E22"
    icon: "verb"

# -----------------------------------------------------------------
# Answer Type Pools — grammar form groupings for distractor selection
# All pools target factIds.length + syntheticDistractors.length >= 15
# factIds populated by scanning facts during deck generation (not hand-crafted here)
# -----------------------------------------------------------------

answer_type_pools:

  subjonctif_passe_avoir:
    description: "Subjonctif passé with avoir: que j'aie parlé, qu'il ait fini, qu'ils aient dit — completed actions after past/emotion triggers"
    homogeneityExempt: false
    example_answers:
      - "que j'aie parlé"
      - "qu'il ait fini"
      - "que tu aies compris"
      - "qu'elle ait réussi"
      - "que nous ayons vu"
      - "qu'ils aient dit"
      - "que j'aie pu venir"
      - "que vous ayez fait"
    syntheticDistractors:
      - "que j'avais parlé"
      - "que j'ai parlé"
      - "que j'aurais parlé"
      - "que j'aurai parlé"
      - "qu'il avait fini"
      - "qu'il a fini"
      - "que nous avons vu"

  subjonctif_passe_etre:
    description: "Subjonctif passé with être: que je sois parti(e), qu'elle soit arrivée, qu'ils soient venus — movement/change verbs"
    homogeneityExempt: false
    example_answers:
      - "que je sois parti(e)"
      - "que tu sois arrivé(e)"
      - "qu'il soit allé"
      - "qu'elle soit venue"
      - "que nous soyons rentrés"
      - "qu'ils soient sortis"
      - "qu'elle soit restée"
      - "que vous soyez partis"
    syntheticDistractors:
      - "que j'étais parti(e)"
      - "que je suis parti(e)"
      - "que je serais parti(e)"
      - "que je serai parti(e)"
      - "qu'elle était venue"
      - "qu'elle est venue"
      - "qu'ils soient allez"

  subjonctif_passe_pronominal:
    description: "Subjonctif passé with pronominal verbs: qu'elle se soit levée, qu'ils se soient couchés, qu'elle se soit habillée"
    homogeneityExempt: false
    example_answers:
      - "qu'elle se soit levée"
      - "qu'ils se soient couchés"
      - "qu'elle se soit habillée"
      - "que nous nous soyons habitués"
      - "qu'il se soit trompé"
      - "qu'elle se soit souvenue"
      - "que tu te sois reposé(e)"
      - "qu'ils se soient retrouvés"
    syntheticDistractors:
      - "qu'elle s'était levée"
      - "qu'elle s'est levée"
      - "qu'elle se serait levée"
      - "qu'elle se soit lever"
      - "qu'ils se soient couché"
      - "qu'ils s'étaient couchés"
      - "que tu te sois reposée — non"

  subjonctif_imparfait_recognition:
    description: "Subjonctif imparfait literary forms — RECOGNITION ONLY: fût, eût, fît, vînt, fussent, eussent — encountered in 19th-century literature"
    homogeneityExempt: false
    example_answers:
      - "fût"
      - "fussent"
      - "eût"
      - "eussent"
      - "fît"
      - "vînt"
      - "pût"
      - "voulût"
    syntheticDistractors:
      - "soit"
      - "ait"
      - "fasse"
      - "vienne"
      - "puisse"
      - "fut"
      - "eut"

  concordance_subj_present_passe:
    description: "Concordance des temps: choice questions — use subjonctif présent (ongoing/future action) vs subjonctif passé (completed action)"
    homogeneityExempt: true
    homogeneityExemptNote: "Choice constructions are phrase-level and inherently variable in length depending on verb and complement"
    example_answers:
      - "subjonctif présent — action future ou en cours"
      - "subjonctif passé — action déjà accomplie"
      - "qu'il vienne demain (présent — futur)"
      - "qu'il soit arrivé avant 9h (passé — complété)"
      - "qu'elle parte maintenant (présent)"
      - "qu'elle soit partie avant moi (passé — accompli)"
      - "qu'il fasse ses devoirs (présent — en cours)"
      - "qu'il ait fait ses devoirs (passé — accompli)"
    syntheticDistractors:
      - "qu'il venait — incorrect (indicatif imparfait)"
      - "qu'il est venu — incorrect (indicatif passé composé)"
      - "qu'il viendra — incorrect (indicatif futur)"
      - "qu'il aurait fait — incorrect (conditionnel passé)"
      - "qu'il avait fait — incorrect (indicatif plus-que-parfait)"
      - "subjonctif imparfait — uniquement littéraire en français moderne"
      - "indicatif — utilisé avec les verbes d'opinion à la forme affirmative"

  conditionnel_passe_avoir:
    description: "Conditionnel passé with avoir: j'aurais parlé, il aurait fini, nous aurions vu — counterfactual past result"
    homogeneityExempt: false
    example_answers:
      - "j'aurais parlé"
      - "tu aurais fini"
      - "il aurait fait"
      - "nous aurions vu"
      - "vous auriez dit"
      - "ils auraient pris"
      - "elle aurait compris"
      - "j'aurais réussi"
    syntheticDistractors:
      - "j'avais parlé"
      - "j'aurais parler"
      - "j'aurai parlé"
      - "j'avais fini"
      - "il a fini"
      - "nous avons vu"
      - "vous aviez dit"

  conditionnel_passe_etre:
    description: "Conditionnel passé with être: je serais parti(e), elle serait venue, ils seraient arrivés — counterfactual past with être verbs"
    homogeneityExempt: false
    example_answers:
      - "je serais parti(e)"
      - "tu serais arrivé(e)"
      - "il serait allé"
      - "elle serait venue"
      - "nous serions restés"
      - "vous seriez sortis"
      - "ils seraient arrivés"
      - "elle serait retournée"
    syntheticDistractors:
      - "j'étais parti(e)"
      - "je suis parti(e)"
      - "j'aurais parti"
      - "je serai parti(e)"
      - "elle était venue"
      - "elle aurait venue"
      - "ils auraient arrivés"

  conditionnel_passe_modaux:
    description: "Conditionnel passé with modal/wish verbs: j'aurais dû, j'aurais pu, j'aurais voulu, j'aurais aimé, j'aurais préféré — regret and wish about past"
    homogeneityExempt: false
    example_answers:
      - "j'aurais dû partir plus tôt"
      - "tu aurais pu m'appeler"
      - "j'aurais voulu être là"
      - "j'aurais aimé voir ce film"
      - "elle aurait préféré rester"
      - "nous aurions pu éviter ça"
      - "vous auriez dû me le dire"
      - "ils auraient voulu venir"
    syntheticDistractors:
      - "j'avais dû partir plus tôt"
      - "j'ai dû partir plus tôt"
      - "j'aurais dû partis"
      - "je devrais partir plus tôt"
      - "j'aurais aimer voir ce film"
      - "elle aurait préféré resté"
      - "vous auriez dû me dire — non"

  si_plus_que_parfait:
    description: "Si-clause type 3 — the si-clause fragment with plus-que-parfait: si j'avais su, si elle avait étudié, si nous avions pris le train"
    homogeneityExempt: false
    example_answers:
      - "si j'avais su"
      - "si elle avait étudié"
      - "si nous avions pris le train"
      - "si tu m'avais demandé"
      - "si j'avais mieux dormi"
      - "si elle n'avait pas quitté Paris"
      - "si vous aviez téléphoné"
      - "s'il avait fait attention"
    syntheticDistractors:
      - "si je savais"
      - "si j'aurais su"
      - "si j'avais su — non"
      - "si elle étudiait"
      - "si elle aurait étudié"
      - "si nous prendrions le train"
      - "si vous téléphoniez"

  mixed_conditionals:
    description: "Mixed conditionals: si + plus-que-parfait → conditionnel présent (past hypothesis, present consequence)"
    homogeneityExempt: true
    homogeneityExemptNote: "Full mixed conditional sentences have inherent length variation between subjects and verb phrases"
    example_answers:
      - "Si j'avais étudié la médecine, je serais médecin maintenant."
      - "Si elle n'avait pas quitté Paris, elle habiterait encore là-bas."
      - "Si j'avais mieux dormi hier, je serais moins fatigué aujourd'hui."
      - "Si tu avais suivi les cours, tu parlerais mieux français."
      - "Si nous avions économisé, nous pourrions voyager maintenant."
      - "S'il avait pris soin de sa santé, il se sentirait mieux."
      - "Si elle avait accepté le poste, elle travaillerait à Lyon."
    syntheticDistractors:
      - "Si j'avais étudié la médecine, j'aurais été médecin."
      - "Si elle n'avait pas quitté Paris, elle aurait habité là-bas."
      - "Si j'aurais mieux dormi, je serais moins fatigué."
      - "Si tu étudieras, tu parleras mieux français."
      - "Si nous économisions, nous pourrions voyager — type 2 pas mixte"

  discours_rapporte_present_imparfait:
    description: "Discours rapporté au passé: présent → imparfait backshift — il a dit qu'il était fatigué, elle a affirmé qu'elle travaillait"
    homogeneityExempt: true
    homogeneityExemptNote: "Reported speech constructions vary in length due to different reporting verbs and clause content"
    example_answers:
      - "Il a dit qu'il était fatigué."
      - "Elle a expliqué qu'elle travaillait à Lyon."
      - "Il a affirmé qu'il comprenait la situation."
      - "Elle a déclaré qu'elle préférait partir."
      - "Il a répondu qu'il ne savait pas."
      - "Elle a précisé qu'elle habitait là depuis dix ans."
      - "Il a avoué qu'il ne voulait pas y aller."
    syntheticDistractors:
      - "Il a dit qu'il est fatigué. — (erreur: présent conservé)"
      - "Elle a expliqué qu'elle a travaillé. — (erreur: PC non backshifté)"
      - "Il a affirmé qu'il avait compris. — (erreur: trop backshifté — PQP)"
      - "Il a dit qu'il sera fatigué. — (erreur: futur conservé)"
      - "Elle dit qu'elle travaillait. — (verbe de rapport au présent → pas de backshift)"
      - "Il a dit qu'il serait fatigué. — (erreur: conditionnel plutôt qu'imparfait)"

  discours_rapporte_pc_pqp:
    description: "Discours rapporté au passé: passé composé → plus-que-parfait backshift — il a dit qu'il avait fini, elle a avoué qu'elle était arrivée en retard"
    homogeneityExempt: true
    homogeneityExemptNote: "Reported speech constructions vary in length"
    example_answers:
      - "Il a dit qu'il avait fini."
      - "Elle a avoué qu'elle était arrivée en retard."
      - "Il a expliqué qu'il avait oublié son passeport."
      - "Elle a affirmé qu'elle avait déjà vu ce film."
      - "Il a reconnu qu'il s'était trompé."
      - "Elle a admis qu'elle n'avait pas compris."
      - "Il a précisé qu'il était parti à midi."
    syntheticDistractors:
      - "Il a dit qu'il a fini. — (erreur: PC non backshifté)"
      - "Elle a avoué qu'elle arrivait en retard. — (erreur: imparfait — backshift trop court)"
      - "Il a expliqué qu'il oubliait son passeport. — (erreur: imparfait)"
      - "Elle a affirmé qu'elle aurait déjà vu ce film. — (erreur: conditionnel passé)"
      - "Il a reconnu qu'il se trompait. — (erreur: imparfait pour une action achevée)"
      - "Elle dit qu'elle n'a pas compris. — (présent de rapport → pas de backshift requis)"

  discours_rapporte_futur_cond:
    description: "Discours rapporté au passé: futur → conditionnel présent, futur antérieur → conditionnel passé backshift"
    homogeneityExempt: true
    homogeneityExemptNote: "Reported speech constructions vary in length"
    example_answers:
      - "Il a dit qu'il viendrait demain."
      - "Elle a promis qu'elle téléphonerait."
      - "Il a annoncé que la réunion aurait lieu le lundi."
      - "Elle a prédit qu'il ferait beau le lendemain."
      - "Il a assuré qu'il aurait fini avant le soir."
      - "Elle a affirmé que le projet serait terminé à temps."
      - "Il a dit qu'il aurait réparé la voiture avant leur retour."
    syntheticDistractors:
      - "Il a dit qu'il viendra demain. — (erreur: futur conservé)"
      - "Elle a promis qu'elle a téléphoné. — (erreur: PC non backshifté)"
      - "Il a annoncé que la réunion a lieu. — (erreur: présent conservé)"
      - "Il a assuré qu'il avait fini. — (erreur: PQP — trop backshifté)"
      - "Elle a dit qu'elle aurait finit — (erreur: accord PP)"

  discours_rapporte_temps_markers:
    description: "Time marker shifts in reported speech au passé: aujourd'hui→ce jour-là, hier→la veille, demain→le lendemain, maintenant→alors, ici→là"
    homogeneityExempt: false
    example_answers:
      - "ce jour-là"
      - "la veille"
      - "le lendemain"
      - "alors / à ce moment-là"
      - "là / là-bas"
      - "la semaine suivante / cette semaine-là"
      - "le mois suivant"
      - "l'année suivante"
    syntheticDistractors:
      - "aujourd'hui — (forme directe, pas rapportée)"
      - "hier — (forme directe, pas rapportée)"
      - "demain — (forme directe, pas rapportée)"
      - "maintenant — (forme directe, pas rapportée)"
      - "ici — (forme directe, pas rapportée)"
      - "avant-hier"
      - "après-demain"

  passif_avec_se:
    description: "Passif pronominal (se + verb, 3rd person): ces livres se vendent, le français se parle, ça ne se fait pas, ce plat se mange chaud"
    homogeneityExempt: true
    homogeneityExemptNote: "Pronominal passive constructions vary in length due to different subject nouns and adverbial complements"
    example_answers:
      - "Ces livres se vendent bien."
      - "Le français se parle dans 29 pays."
      - "Ça ne se fait pas."
      - "Ce plat se mange chaud."
      - "Cela s'explique facilement."
      - "Les crayons se vendent par douzaines."
      - "Le vin rouge se boit chambré."
      - "Ce mot ne s'emploie plus."
    syntheticDistractors:
      - "Ces livres sont vendus bien. — (passif avec être, style différent)"
      - "Le français est parlé. — (passif avec être)"
      - "Ça ne fait pas. — (actif sans se)"
      - "Ce plat mange chaud. — (manque le pronom se)"
      - "Les crayons se vende par douzaines. — (accord sujet-verbe incorrect)"
      - "Cela s'est expliqué facilement. — (passé composé, pas présent)"
      - "Ce vin se boit chambrés. — (accord incorrect)"

  passif_temps_composes:
    description: "Passif aux temps composés: passé composé (a été élu), plus-que-parfait (avait été approuvé), futur (sera pris), conditionnel (serait lu)"
    homogeneityExempt: true
    homogeneityExemptNote: "Compound passive constructions vary in length due to different tenses and past participles"
    example_answers:
      - "Le parlement a été dissous."
      - "Mike a été élu président."
      - "Beaucoup d'arbres ont été abattus."
      - "Ma bicyclette a été réparée hier."
      - "Cookie a été élevé par Kate."
      - "Le projet avait été approuvé avant la réunion."
      - "La décision sera prise demain."
      - "Ce livre serait lu par des millions de lecteurs."
    syntheticDistractors:
      - "Le parlement a dissous. — (actif sans être)"
      - "Mike était élu président. — (imparfait, sens différent)"
      - "La décision était prise. — (imparfait résultatif, pas futur)"
      - "Le projet a approuvé. — (actif incorrect)"
      - "Ce livre était lu — (état, pas passif d'action)"
      - "La lettre avait envoyée. — (manque être)"
      - "Il a été élu — ¡correcto! — (filtre: non)"

  causatif_faire_laisser:
    description: "Faire causatif (cause to happen) + laisser causatif (allow to happen): J'ai fait réparer ma bicyclette. / Elle a laissé entrer les visiteurs."
    homogeneityExempt: true
    homogeneityExemptNote: "Causative constructions vary in length due to different infinitives and objects"
    example_answers:
      - "J'ai fait réparer ma bicyclette."
      - "Elle a fait venir le médecin."
      - "Il a fait apprendre la leçon aux élèves."
      - "Elle a laissé entrer les visiteurs."
      - "Il a laissé parler tout le monde."
      - "Elle a laissé tomber les clés."
      - "Il a fait construire une maison."
      - "Nous avons laissé partir les enfants."
    syntheticDistractors:
      - "J'ai réparé ma bicyclette. — (actif: je l'ai fait moi-même)"
      - "Elle a permis venir le médecin. — (permettre + à + infinitif, structure différente)"
      - "Il a laissé apprendre la leçon — (laissé: permission, not fait: causatif)"
      - "Elle a fait entrer les visiteurs — (faire: causatif fort, pas permission)"
      - "Il a fait parler tout le monde. — (causer vs laisser: sens différent)"
      - "J'ai eu ma bicyclette réparée. — (anglicisme — construction incorrecte)"

  accord_pp_avoir_cod_prepose:
    description: "Accord du participe passé avec avoir quand le COD est préposé: les livres que j'ai lus, je les ai achetées, la lettre qu'il a écrite"
    homogeneityExempt: false
    example_answers:
      - "les livres que j'ai lus"
      - "la lettre qu'il a écrite"
      - "je les ai achetées"
      - "les pommes que j'ai mangées"
      - "la chanson qu'elle a chantée"
      - "les enfants que nous avons vus"
      - "je l'ai vue partir"
      - "les robes qu'il a cousues"
    syntheticDistractors:
      - "les livres que j'ai lu — (sans accord: COD after verb manqué)"
      - "la lettre qu'il a écrit — (pas d'accord: erreur fréquente)"
      - "je les ai acheté — (pas d'accord avec pronom préposé)"
      - "les pommes que j'ai mangé — (pas d'accord)"
      - "je lui ai donné les livres — (COI: pas d'accord)"
      - "il leur a acheté les robes — (COI leur: pas d'accord)"
      - "j'ai achetées les livres — (COD postposé: pas d'accord)"

  accord_pp_pronominal_complet:
    description: "Accord du participe passé pronominal complet: réfléchi COD → accord (elle s'est levée) vs réfléchi COI → pas d'accord (elle s'est lavé les mains)"
    homogeneityExempt: true
    homogeneityExemptNote: "Pronominal PP constructions vary in length depending on presence of second object"
    example_answers:
      - "elle s'est levée (se = COD → accord)"
      - "ils se sont couchés (se = COD → accord)"
      - "elles se sont regardées (se = COD mutuel → accord)"
      - "elle s'est lavé les mains (les mains = COD postposé → pas d'accord)"
      - "il s'est cassé la jambe (la jambe = COD → pas d'accord)"
      - "ils se sont écrit des lettres (des lettres = COD → pas d'accord)"
      - "elle s'est souvenue de tout (se souvenir: toujours accord)"
      - "nous nous sommes bien amusés (se = COD → accord)"
    syntheticDistractors:
      - "elle s'est lavée les mains — (erreur: accord malgré COD postposé)"
      - "ils se sont couché — (pas d'accord: erreur)"
      - "elles se sont regardé — (pas d'accord: erreur)"
      - "il s'est cassée la jambe — (féminin incorrect)"
      - "ils se sont écrit — toujours sans accord — (pas toujours vrai)"
      - "elle s'est souvenu — (erreur: se souvenir prend accord)"

  connecteurs_concession:
    description: "Connecteurs de concession: bien que + subj, quoique + subj, malgré + nom, en dépit de + nom, certes…mais, néanmoins, toutefois"
    homogeneityExempt: false
    example_answers:
      - "bien que"
      - "quoique"
      - "malgré"
      - "en dépit de"
      - "certes…mais"
      - "néanmoins"
      - "toutefois"
      - "même si"
    syntheticDistractors:
      - "parce que"
      - "puisque"
      - "donc"
      - "ainsi"
      - "alors que"
      - "tandis que"
      - "en revanche"

  connecteurs_opposition:
    description: "Connecteurs d'opposition: tandis que (simultaneous contrast), alors que (contrast/temporal), en revanche (formal), par contre (spoken)"
    homogeneityExempt: false
    example_answers:
      - "tandis que"
      - "alors que"
      - "en revanche"
      - "par contre"
      - "au contraire"
      - "à l'inverse"
      - "d'un autre côté"
      - "en contrepartie"
    syntheticDistractors:
      - "bien que"
      - "quoique"
      - "malgré"
      - "néanmoins"
      - "donc"
      - "ainsi"
      - "puisque"

  connecteurs_reformulation:
    description: "Connecteurs de reformulation et précision: autrement dit, en d'autres termes, c'est-à-dire (que)"
    homogeneityExempt: false
    example_answers:
      - "autrement dit"
      - "en d'autres termes"
      - "c'est-à-dire"
      - "c'est-à-dire que"
      - "soit"
      - "en clair"
      - "pour ainsi dire"
      - "en un mot"
    syntheticDistractors:
      - "bien que"
      - "tandis que"
      - "de plus"
      - "en outre"
      - "par contre"
      - "en revanche"
      - "donc"

  connecteurs_addition:
    description: "Connecteurs d'addition et renforcement: de plus, en outre (formal), par ailleurs (separate point), qui plus est (furthermore, even more)"
    homogeneityExempt: false
    example_answers:
      - "de plus"
      - "en outre"
      - "par ailleurs"
      - "qui plus est"
      - "de surcroît"
      - "également"
      - "en sus"
      - "voire"
    syntheticDistractors:
      - "autrement dit"
      - "c'est-à-dire"
      - "en revanche"
      - "par contre"
      - "bien que"
      - "néanmoins"
      - "pourtant"

  nominalisation_verbe_nom:
    description: "Nominalisation: verb → noun transformations used in formal French — décider→décision, arriver→arrivée, construire→construction"
    homogeneityExempt: false
    example_answers:
      - "la décision"
      - "l'arrivée"
      - "la construction"
      - "le départ"
      - "la formation"
      - "la connaissance"
      - "la réflexion"
      - "l'augmentation"
      - "la réduction"
      - "l'utilisation"
      - "la gestion"
      - "le développement"
    syntheticDistractors:
      - "le décidement — (non-standard)"
      - "l'arriver — (infinitif, pas nom)"
      - "la construite — (forme incorrecte)"

  mise_en_relief_cest_qui_que:
    description: "Mise en relief: c'est…qui (subject cleft, emphatise sujet) + c'est…que (object/adverbial cleft, emphatise COD/lieu/temps)"
    homogeneityExempt: true
    homogeneityExemptNote: "Cleft constructions vary in length depending on the emphasized element and clause type"
    example_answers:
      - "C'est elle qui me l'a dit."
      - "C'est Tom qui a gagné."
      - "C'est moi qui ai raison."
      - "Ce sont eux qui sont partis."
      - "C'est le printemps que je préfère."
      - "C'est là que réside le problème."
      - "C'est toi que j'aimerai toujours."
      - "C'est lui que nous avons vu."
    syntheticDistractors:
      - "C'est elle que me l'a dit. — (que avec sujet: incorrect)"
      - "C'est Tom qui a gagné que. — (doublé: incorrect)"
      - "C'est moi qui ait raison. — (accord: je → ai, pas ait)"
      - "Ce sont eux que sont partis. — (que avec sujet intransitif: incorrect)"
      - "C'est le printemps qui je préfère. — (qui avec COD: incorrect)"
      - "Elle me l'a dit. — (pas de mise en relief)"

  mise_en_relief_ce_qui_cest:
    description: "Mise en relief pseudo-cleft: ce qui…c'est, ce que…c'est, ce dont…c'est — emphasises the complement after c'est"
    homogeneityExempt: true
    homogeneityExemptNote: "Pseudo-cleft constructions vary in length depending on the emphasized element"
    example_answers:
      - "Ce qui me plaît, c'est la musique."
      - "Ce que je veux, c'est du repos."
      - "Ce dont j'ai besoin, c'est du temps."
      - "Ce qui m'énerve, c'est le bruit."
      - "Ce que j'aime, c'est voyager."
      - "Ce dont elle rêve, c'est un voyage au Japon."
      - "Ce qui l'intéresse, c'est la politique."
    syntheticDistractors:
      - "Ce qui me plaît, c'est les musiques. — (accord article: la musique)"
      - "Ce que je veux, c'est du repose. — (forme nominale incorrecte)"
      - "Ce dont j'ai besoin, ce que du temps. — (ce que au lieu de c'est)"
      - "Ce qui m'énerve c'est le bruyant. — (adjectif au lieu de nom)"
      - "Ce que l'intéresse, c'est la politique. — (ce que avec sujet: incorrect)"
      - "Quant à la musique, ce qui me plaît. — (ordre inversé non idiomatique)"

  futur_anterieur_avoir:
    description: "Futur antérieur with avoir: j'aurai fini, tu auras fait, il aura vu, nous aurons pris — action completed before a future moment"
    homogeneityExempt: false
    example_answers:
      - "j'aurai fini"
      - "tu auras fait"
      - "il aura vu"
      - "nous aurons pris"
      - "vous aurez dit"
      - "ils auront compris"
      - "elle aura écrit"
      - "j'aurai réparé"
    syntheticDistractors:
      - "j'avais fini"
      - "j'ai fini"
      - "j'aurais fini"
      - "j'aurai finit — (PP incorrect)"
      - "tu auras faisais — (forme incorrecte)"
      - "nous aurons prit — (PP incorrect)"
      - "ils auront comprit — (PP incorrect)"

  futur_anterieur_etre:
    description: "Futur antérieur with être: je serai parti(e), tu seras arrivé(e), il sera allé, elle sera venue — avec accord du participe"
    homogeneityExempt: false
    example_answers:
      - "je serai parti(e)"
      - "tu seras arrivé(e)"
      - "il sera allé"
      - "elle sera venue"
      - "nous serons rentrés"
      - "vous serez sortis"
      - "ils seront partis"
      - "je serai parti avant votre retour"
    syntheticDistractors:
      - "j'étais parti(e)"
      - "je suis parti(e)"
      - "je serais parti(e)"
      - "j'aurai parti — (avoir avec être-verb: incorrect)"
      - "tu seras arrivée — toujours masc. — (accord dépend du sujet)"
      - "nous serons rentré — (pas d'accord au pluriel)"
      - "ils seront partis — ¡correcto! — (filtre: non)"

  subordonnees_subj_avancees:
    description: "Subordonnées de but/condition prenant le subjonctif: de peur que…ne, à condition que, pourvu que, à supposer que, sous réserve que"
    homogeneityExempt: false
    example_answers:
      - "de peur que … ne"
      - "à condition que"
      - "pourvu que"
      - "à supposer que"
      - "sous réserve que"
      - "de crainte que … ne"
      - "en admettant que"
      - "pour peu que"
    syntheticDistractors:
      - "parce que"
      - "puisque"
      - "au cas où — (+ conditionnel, pas subjonctif)"
      - "si — (+ indicatif, pas subjonctif)"
      - "quand — (+ futur avec indicatif)"
      - "lorsque — (+ futur avec indicatif)"
      - "dès que — (+ futur avec indicatif)"

  opinion_negative_subj:
    description: "Verbes d'opinion à la forme négative déclenchant le subjonctif: je ne pense pas que, je ne crois pas que, je ne trouve pas que, je doute que"
    homogeneityExempt: false
    example_answers:
      - "je ne pense pas que"
      - "je ne crois pas que"
      - "je ne trouve pas que"
      - "je doute que"
      - "je ne suis pas sûr(e) que"
      - "il ne croit pas que"
      - "je ne suis pas certain(e) que"
      - "il n'est pas évident que"
    syntheticDistractors:
      - "je pense que — (affirmatif → indicatif)"
      - "je crois que — (affirmatif → indicatif)"
      - "je trouve que — (affirmatif → indicatif)"
      - "il est sûr que — (certitude → indicatif)"
      - "il est certain que — (certitude → indicatif)"
      - "il est vrai que — (fait → indicatif)"
      - "je ne pense pas que — toujours indicatif — (incorrect: c'est subjonctif)"

  hypothese_attenuee:
    description: "Hypothèse atténuée: au cas où + conditionnel (in case), si jamais + conditionnel/indicatif (if ever)"
    homogeneityExempt: false
    example_answers:
      - "au cas où il pleuvrait"
      - "au cas où j'arriverais en retard"
      - "au cas où tu changerais d'avis"
      - "au cas où il y aurait un problème"
      - "si jamais tu changes d'avis"
      - "si jamais il revenait"
      - "si jamais vous avez besoin"
      - "au cas où elle ne pourrait pas venir"
    syntheticDistractors:
      - "au cas où il pleuve — (subjonctif: incorrect avec au cas où)"
      - "au cas où il pleuverait — (variante orthographique acceptable en réalité — distractor invalide)"
      - "si jamais il revient — (indicatif présent: acceptable mais moins fort)"
      - "à condition qu'il pleuve — (subjonctif: correct mais structure différente)"
      - "pourvu qu'il ne pleuve pas — (subjonctif: différent sens)"
      - "au cas où il pleuverait — (doublé)"

# -----------------------------------------------------------------
# Grammar Points — 80-130 items, one per identifiable sub-rule
# Tatoeba citations: ONLY from tatoeba_b2_sentences.tsv (45 verified rows)
# All other examples use sourceRef: "Referentiel-pattern" or "llm_authored"
# -----------------------------------------------------------------

grammar_points:

  # ======================================================
  # CHAIN THEME 0: Subjonctif Passé & Concordance
  # ======================================================

  - id: gp_b2_001
    point: "Subjonctif passé avec avoir — formation: que + subj présent de avoir + participe passé"
    category: subjonctif_passe_concordance
    difficulty: 4
    referentiel_ref: "Référentiel B2 §1 — Subjonctif passé formation"
    examples:
      - tatoeba_id: null
        sourceRef: "Referentiel-pattern"
        french: "que j'aie parlé, que tu aies fini, qu'il ait fait, que nous ayons vu, qu'ils aient dit"
        english: "that I have spoken, that you have finished, that he has done, that we have seen, that they have said"
        note: "Paradigm drill — no Tatoeba sentence available for full paradigm"

  - id: gp_b2_002
    point: "Subjonctif passé avec être — formation: que + subj présent de être + participe passé (avec accord)"
    category: subjonctif_passe_concordance
    difficulty: 4
    referentiel_ref: "Référentiel B2 §1 — Subjonctif passé avec être"
    examples:
      - tatoeba_id: null
        sourceRef: "Referentiel-pattern"
        french: "que je sois parti(e), que tu sois arrivé(e), qu'il soit allé, qu'elle soit venue, que nous soyons rentrés"
        english: "that I have left, that you have arrived, that he has gone, that she has come, that we have returned"
        note: "Paradigm drill — no Tatoeba sentence available for être paradigm"

  - id: gp_b2_003
    point: "Subjonctif passé: usage après doute/émotion sur action passée accomplie — Je doute qu'il ait dit cela."
    category: subjonctif_passe_concordance
    difficulty: 4
    referentiel_ref: "Référentiel B2 §1 — Uses of subjonctif passé"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Je doute qu'il ait dit cela."
        english: "I doubt he said that."
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Je suis content qu'elle soit arrivée à temps."
        english: "I'm glad she arrived on time."

  - id: gp_b2_004
    point: "Subjonctif passé: usage avec ne pas croire/penser sur action accomplie — Je ne crois pas qu'il ait terminé."
    category: subjonctif_passe_concordance
    difficulty: 4
    referentiel_ref: "Référentiel B2 §1 — Subjonctif passé after negative opinion verbs"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Je ne crois pas qu'il ait terminé son travail."
        english: "I don't think he has finished his work."

  - id: gp_b2_005
    point: "Subjonctif passé avec verbes pronominaux — accord du participe: qu'elle se soit levée, qu'ils se soient couchés"
    category: subjonctif_passe_concordance
    difficulty: 5
    referentiel_ref: "Référentiel B2 §1 + §8 — Pronominal verbs in subjonctif passé"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Je suis surpris qu'elle se soit levée si tôt."
        english: "I'm surprised she got up so early."

  - id: gp_b2_006
    point: "Subjonctif imparfait (reconnaissance littéraire): fût, fussent, eût, eussent — formes de être et avoir"
    category: subjonctif_passe_concordance
    difficulty: 5
    referentiel_ref: "Référentiel B2 §2 — Subjonctif imparfait recognition"
    examples:
      - tatoeba_id: 11001
        sourceRef: "tatoeba:11001"
        french: "Bien qu'il plût, je devais sortir."
        english: "Although it was raining, I had to go out."
        note: "Literary subjonctif imparfait of pleuvoir (plût)"

  - id: gp_b2_007
    point: "Subjonctif imparfait (reconnaissance): formes de faire (fît), venir (vînt), pouvoir (pût), vouloir (voulût)"
    category: subjonctif_passe_concordance
    difficulty: 5
    referentiel_ref: "Référentiel B2 §2 — Subjonctif imparfait recognition"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il fallait qu'elle partît. (littéraire)"
        english: "It was necessary that she leave. (literary form)"
        note: "Recognition only — partît = subjonctif imparfait de partir"

  - id: gp_b2_008
    point: "Subjonctif plus-que-parfait (reconnaissance littéraire): eût fait, fût parti — alternative littéraire au subjonctif passé"
    category: subjonctif_passe_concordance
    difficulty: 5
    referentiel_ref: "Référentiel B2 §2 — Subjonctif plus-que-parfait recognition"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il aurait voulu qu'elle fût là. (littéraire)"
        english: "He would have wanted her to be there. (literary)"
        note: "Recognition only — encountered in Flaubert, Balzac, legal texts"

  - id: gp_b2_009
    point: "Concordance des temps — règle moderne: verbe principal au présent → subjonctif présent (action future ou en cours)"
    category: subjonctif_passe_concordance
    difficulty: 3
    referentiel_ref: "Référentiel B2 §3 — Concordance des temps moderne"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Je veux qu'il vienne demain."
        english: "I want him to come tomorrow."
        note: "Présent → subjonctif présent: future/ongoing action"

  - id: gp_b2_010
    point: "Concordance des temps — règle moderne: verbe principal au présent + action accomplie → subjonctif passé"
    category: subjonctif_passe_concordance
    difficulty: 4
    referentiel_ref: "Référentiel B2 §3 — Concordance: subjonctif passé for completed action"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Je veux qu'il soit arrivé avant 9h."
        english: "I want him to have arrived before 9 am."
        note: "Présent → subjonctif passé: required completion before a deadline"

  - id: gp_b2_011
    point: "Concordance des temps — règle moderne: verbe principal au passé → subjonctif présent (règle moderne, imparfait littéraire évité)"
    category: subjonctif_passe_concordance
    difficulty: 4
    referentiel_ref: "Référentiel B2 §3 — Concordance: past main verb + modern subj present"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il fallait qu'elle parte. (règle moderne)"
        english: "It was necessary that she leave. (modern rule)"
        note: "Past main verb → subjonctif présent in modern French (not literary imparfait)"

  # ======================================================
  # CHAIN THEME 1: Conditionnel Passé & Si Type 3
  # ======================================================

  - id: gp_b2_012
    point: "Conditionnel passé avec avoir — formation: conditionnel présent de avoir + participe passé"
    category: conditionnel_passe_si_type3
    difficulty: 3
    referentiel_ref: "Référentiel B2 §4 — Conditionnel passé formation"
    examples:
      - tatoeba_id: 3162
        sourceRef: "tatoeba:3162"
        french: "C'est ce que j'aurais dit."
        english: "This is what I would have said."
      - tatoeba_id: 10302
        sourceRef: "tatoeba:10302"
        french: "Sans ton aide j'aurais échoué."
        english: "But for your help, I would have failed."

  - id: gp_b2_013
    point: "Conditionnel passé avec être — formation: conditionnel présent de être + participe passé (avec accord)"
    category: conditionnel_passe_si_type3
    difficulty: 3
    referentiel_ref: "Référentiel B2 §4 — Conditionnel passé avec être"
    examples:
      - tatoeba_id: null
        sourceRef: "Referentiel-pattern"
        french: "je serais parti(e), tu serais arrivé(e), il serait allé, elle serait venue, nous serions restés"
        english: "I would have left, you would have arrived, he would have gone, she would have come, we would have stayed"
        note: "Paradigm drill — no single Tatoeba sentence covers full être paradigm"

  - id: gp_b2_014
    point: "Conditionnel passé: regret avec devoir — j'aurais dû partir plus tôt / tu aurais dû te présenter"
    category: conditionnel_passe_si_type3
    difficulty: 3
    referentiel_ref: "Référentiel B2 §4 — Conditionnel passé: regret"
    examples:
      - tatoeba_id: 10152
        sourceRef: "tatoeba:10152"
        french: "Il aurait dû travailler plus."
        english: "He should have worked harder."
      - tatoeba_id: 2061650
        sourceRef: "tatoeba:2061650"
        french: "Tu aurais dû te présenter."
        english: "You should have introduced yourself."
      - tatoeba_id: 474105
        sourceRef: "tatoeba:474105"
        french: "Tu aurais dû voir l'exposition."
        english: "You ought to have seen the exhibition."
      - tatoeba_id: 563254
        sourceRef: "tatoeba:563254"
        french: "Tu aurais dû le voir."
        english: "You ought to have seen it."

  - id: gp_b2_015
    point: "Conditionnel passé: regret négatif avec devoir — je n'aurais pas dû (I shouldn't have)"
    category: conditionnel_passe_si_type3
    difficulty: 3
    referentiel_ref: "Référentiel B2 §4 — Conditionnel passé: negative regret"
    examples:
      - tatoeba_id: 3258
        sourceRef: "tatoeba:3258"
        french: "Je n'aurais pas dû me déconnecter."
        english: "I shouldn't have logged off."

  - id: gp_b2_016
    point: "Conditionnel passé: regret avec pouvoir — tu aurais pu le faire / nous aurions pu éviter ça"
    category: conditionnel_passe_si_type3
    difficulty: 3
    referentiel_ref: "Référentiel B2 §4 — Conditionnel passé avec pouvoir"
    examples:
      - tatoeba_id: 429507
        sourceRef: "tatoeba:429507"
        french: "Tu aurais pu le faire."
        english: "You could have done it."

  - id: gp_b2_017
    point: "Conditionnel passé: souhait irréalisé sur passé avec aimer — j'aurais aimé voir ce film / être un oiseau"
    category: conditionnel_passe_si_type3
    difficulty: 3
    referentiel_ref: "Référentiel B2 §4 — Conditionnel passé: wish"
    examples:
      - tatoeba_id: 8049
        sourceRef: "tatoeba:8049"
        french: "J'aurais aimé être un oiseau."
