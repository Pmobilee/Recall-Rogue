      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Si elle avait étudié, elle aurait réussi."
        english: "If she had studied, she would have succeeded."

  - id: gp_b2_020
    point: "Si-clause type 3: si + plus-que-parfait → conditionnel passé — variantes de sujets et verbes"
    category: conditionnel_passe_si_type3
    difficulty: 4
    referentiel_ref: "Référentiel B2 §5 — Si-clauses type 3 variants"
    examples:
      - tatoeba_id: null
