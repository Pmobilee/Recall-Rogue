      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Si tu m'avais demandé, je t'aurais aidé."
        english: "If you had asked me, I would have helped you."

  - id: gp_b2_021
    point: "Conditionnel mixte: si + plus-que-parfait (passé) → conditionnel présent (conséquence présente)"
    category: conditionnel_passe_si_type3
    difficulty: 5
    referentiel_ref: "Référentiel B2 §5 — Mixed conditionals"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Si j'avais étudié la médecine, je serais médecin maintenant."
        english: "If I had studied medicine, I would be a doctor now."
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Si elle n'avait pas quitté Paris, elle habiterait encore là-bas."
        english: "If she hadn't left Paris, she would still be living there."

  - id: gp_b2_022
    point: "Conditionnel mixte: si + plus-que-parfait → conditionnel présent — identification de la structure mixte"
    category: conditionnel_passe_si_type3
    difficulty: 5
    referentiel_ref: "Référentiel B2 §5 — Mixed conditionals identification"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Si j'avais mieux dormi hier, je serais moins fatigué aujourd'hui."
        english: "If I had slept better yesterday, I would be less tired today."

  # ======================================================
  # CHAIN THEME 2: Discours Rapporté au Passé
  # ======================================================

  - id: gp_b2_023
    point: "Discours rapporté au passé: présent → imparfait (backshift règle de base)"
    category: discours_rapporte_passe
    difficulty: 3
    referentiel_ref: "Référentiel B2 §6 — Discours rapporté: présent → imparfait"
    examples:
      - tatoeba_id: 7540
        sourceRef: "tatoeba:7540"
        french: "Je pensais qu'elle était mignonne."
        english: "I thought she was pretty."
        note: "Present 'est' backshifted to imparfait 'était'"

  - id: gp_b2_024
    point: "Discours rapporté au passé: futur simple → conditionnel présent backshift"
    category: discours_rapporte_passe
    difficulty: 3
    referentiel_ref: "Référentiel B2 §6 — Discours rapporté: futur → conditionnel"
    examples:
      - tatoeba_id: 3875
        sourceRef: "tatoeba:3875"
        french: "Je savais qu'aujourd'hui serait amusant."
        english: "I knew that today would be fun."
        note: "Futur 'sera' backshifted to conditionnel 'serait'"

  - id: gp_b2_025
    point: "Discours rapporté au passé: passé composé → plus-que-parfait backshift — il a dit qu'il avait fini"
    category: discours_rapporte_passe
    difficulty: 4
    referentiel_ref: "Référentiel B2 §6 — Discours rapporté: PC → PQP"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il a dit qu'il avait terminé son travail."
        english: "He said he had finished his work."
        note: "Passé composé 'a terminé' backshifted to PQP 'avait terminé'"

  - id: gp_b2_026
    point: "Discours rapporté au passé: futur antérieur → conditionnel passé backshift"
    category: discours_rapporte_passe
    difficulty: 4
    referentiel_ref: "Référentiel B2 §6 — Discours rapporté: futur antérieur → conditionnel passé"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il a assuré qu'il aurait fini avant le soir."
        english: "He assured us he would have finished before evening."
        note: "Futur antérieur 'aura fini' backshifted to conditionnel passé 'aurait fini'"

  - id: gp_b2_027
    point: "Discours rapporté au passé: impératif → de + infinitif (ordre indirect) — il m'a dit de venir"
    category: discours_rapporte_passe
    difficulty: 3
    referentiel_ref: "Référentiel B2 §6 — Discours rapporté: impératif → de + infinitif"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il m'a dit de venir immédiatement."
        english: "He told me to come immediately."
        note: "'Viens!' → 'Il m'a dit de venir'"

  - id: gp_b2_028
    point: "Discours rapporté au passé: marqueur temporel aujourd'hui → ce jour-là"
    category: discours_rapporte_passe
    difficulty: 3
    referentiel_ref: "Référentiel B2 §6 — Time marker shifts"
    examples:
      - tatoeba_id: null
        sourceRef: "Referentiel-pattern"
        french: "Direct: 'Aujourd'hui, je suis fatigué.' → Rapporté: Il a dit que ce jour-là, il était fatigué."
        english: "Direct: 'Today I am tired.' → Reported: He said that that day he was tired."

  - id: gp_b2_029
    point: "Discours rapporté au passé: hier → la veille, demain → le lendemain"
    category: discours_rapporte_passe
    difficulty: 3
    referentiel_ref: "Référentiel B2 §6 — Time marker shifts: hier/demain"
    examples:
      - tatoeba_id: null
        sourceRef: "Referentiel-pattern"
        french: "Direct: 'Hier j'ai vu Marie.' → Rapporté: Il a dit que la veille il avait vu Marie."
        english: "Direct: 'Yesterday I saw Marie.' → Reported: He said that the day before he had seen Marie."

  - id: gp_b2_030
    point: "Discours rapporté au passé: maintenant → alors / à ce moment-là, ici → là"
    category: discours_rapporte_passe
    difficulty: 3
    referentiel_ref: "Référentiel B2 §6 — Time/place marker shifts"
    examples:
      - tatoeba_id: null
        sourceRef: "Referentiel-pattern"
        french: "Direct: 'Maintenant, je comprends.' → Rapporté: Elle a dit qu'alors elle comprenait."
        english: "Direct: 'Now I understand.' → Reported: She said that at that moment she understood."

  - id: gp_b2_031
    point: "Discours rapporté au passé: verbes introducteurs au passé — il a dit que, elle a expliqué que, il a affirmé que"
    category: discours_rapporte_passe
    difficulty: 3
    referentiel_ref: "Référentiel B2 §6 — Reporting verbs"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Elle a expliqué qu'elle préférait partir tôt."
        english: "She explained that she preferred to leave early."

  - id: gp_b2_032
    point: "Discours rapporté au passé: questions indirectes — il a demandé si, elle a voulu savoir quand/où/comment"
    category: discours_rapporte_passe
    difficulty: 4
    referentiel_ref: "Référentiel B2 §6 — Indirect questions with past reporting verb"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il a demandé si je pouvais l'aider."
        english: "He asked if I could help him."
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Elle a voulu savoir où il était allé."
        english: "She wanted to know where he had gone."

  # ======================================================
  # CHAIN THEME 3: Passif Avancé & Causatif
  # ======================================================

  - id: gp_b2_033
    point: "Passif pronominal (se): formation se + verbe 3e personne — les livres se vendent bien"
    category: passif_avance_causatif
    difficulty: 3
    referentiel_ref: "Référentiel B2 §7 — Passif pronominal"
    examples:
      - tatoeba_id: 9757
        sourceRef: "tatoeba:9757"
        french: "Les crayons se vendent par douzaines."
        english: "Pencils are sold by the dozen."

  - id: gp_b2_034
    point: "Passif pronominal: le français se parle dans 29 pays — langue/usage culturel"
    category: passif_avance_causatif
    difficulty: 3
    referentiel_ref: "Référentiel B2 §7 — Passif pronominal: cultural/language use"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Le français se parle dans 29 pays."
        english: "French is spoken in 29 countries."

  - id: gp_b2_035
    point: "Passif pronominal: ça ne se fait pas — usage idiomatique (social norms)"
    category: passif_avance_causatif
    difficulty: 3
    referentiel_ref: "Référentiel B2 §7 — Passif pronominal: idioms"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Ça ne se fait pas de parler la bouche pleine."
        english: "It isn't done to speak with your mouth full."

  - id: gp_b2_036
    point: "Passif pronominal: ce plat se mange chaud / cela s'explique facilement — manière d'utiliser"
    category: passif_avance_causatif
    difficulty: 3
    referentiel_ref: "Référentiel B2 §7 — Passif pronominal with manner adverbs"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Ce plat se mange chaud."
        english: "This dish is eaten hot."
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Cela s'explique facilement."
        english: "That is easily explained."

  - id: gp_b2_037
    point: "Passif simple au présent: l'anglais est parlé en Australie — passif avec être au présent"
    category: passif_avance_causatif
    difficulty: 3
    referentiel_ref: "Référentiel B2 §7 — Passif aux temps composés: présent"
    examples:
      - tatoeba_id: 14105
        sourceRef: "tatoeba:14105"
        french: "L'anglais est parlé en Australie."
        english: "English is spoken in Australia."

  - id: gp_b2_038
    point: "Passif au passé composé: Mike a été élu président — passé composé passif"
    category: passif_avance_causatif
    difficulty: 3
    referentiel_ref: "Référentiel B2 §7 — Passif: passé composé"
    examples:
      - tatoeba_id: 8565
        sourceRef: "tatoeba:8565"
        french: "Le parlement a été dissous."
        english: "The Diet has been dissolved."
      - tatoeba_id: 13404
        sourceRef: "tatoeba:13404"
        french: "Mike a été élu président."
        english: "Mike was elected chairperson."
      - tatoeba_id: 15142
        sourceRef: "tatoeba:15142"
        french: "Beaucoup d'arbres ont été abattus."
        english: "A lot of trees were cut down."
      - tatoeba_id: 15474
        sourceRef: "tatoeba:15474"
        french: "Il a été élu président."
        english: "He was elected chairman."

  - id: gp_b2_039
    point: "Passif au passé composé: ma bicyclette a été réparée — passif avec objet féminin"
    category: passif_avance_causatif
    difficulty: 3
    referentiel_ref: "Référentiel B2 §7 — Passif: accord du participe avec sujet"
    examples:
      - tatoeba_id: 6478
        sourceRef: "tatoeba:6478"
        french: "Ma bicyclette a été réparée hier."
        english: "I had my bicycle fixed yesterday."
      - tatoeba_id: 6245
        sourceRef: "tatoeba:6245"
        french: "J'ai été grondé par mon professeur."
        english: "I was scolded by my teacher."
      - tatoeba_id: 11053
        sourceRef: "tatoeba:11053"
        french: "Cookie a été élevé par Kate."
        english: "Cookie was raised by Kate."

  - id: gp_b2_040
    point: "Passif au plus-que-parfait: le projet avait été approuvé avant la réunion"
    category: passif_avance_causatif
    difficulty: 4
    referentiel_ref: "Référentiel B2 §7 — Passif: plus-que-parfait"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Le projet avait été approuvé avant la réunion."
        english: "The project had been approved before the meeting."

  - id: gp_b2_041
    point: "Passif au futur: la décision sera prise demain — passif avec être au futur"
    category: passif_avance_causatif
    difficulty: 3
    referentiel_ref: "Référentiel B2 §7 — Passif: futur simple"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "La décision sera prise demain."
        english: "The decision will be made tomorrow."

  - id: gp_b2_042
    point: "Passif avec on: on dit qu'Anne est leur chef / on l'a averti — alternative au passif avec être"
    category: passif_avance_causatif
    difficulty: 3
    referentiel_ref: "Référentiel B2 §7 — Passif avec on"
    examples:
      - tatoeba_id: 10640
        sourceRef: "tatoeba:10640"
        french: "On dit qu'Anne est leur chef."
        english: "Ann is said to be their leader."
      - tatoeba_id: 4281
        sourceRef: "tatoeba:4281"
        french: "On l'a averti à plusieurs reprises."
        english: "He has been warned on several occasions."

  - id: gp_b2_043
    point: "Faire causatif: faire + infinitif — J'ai fait réparer ma bicyclette. (causer que quelqu'un d'autre fasse)"
    category: passif_avance_causatif
    difficulty: 4
    referentiel_ref: "Référentiel B2 §7 — Faire causatif"
    examples:
      - tatoeba_id: 6398
        sourceRef: "tatoeba:6398"
        french: "J'ai fait réparer ma bicyclette."
        english: "I got my bicycle repaired."

  - id: gp_b2_044
    point: "Faire causatif: faire venir quelqu'un — faire + infinitif de déplacement"
    category: passif_avance_causatif
    difficulty: 4
    referentiel_ref: "Référentiel B2 §7 — Faire causatif: movement verbs"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Elle a fait venir le médecin."
        english: "She had the doctor come."
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il a fait apprendre la leçon aux élèves."
        english: "He had the students learn the lesson."

  - id: gp_b2_045
    point: "Laisser causatif: laisser + infinitif — permettre que l'action se produise (vs faire = causer)"
    category: passif_avance_causatif
    difficulty: 4
    referentiel_ref: "Référentiel B2 §7 — Laisser causatif"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Elle a laissé entrer les visiteurs."
        english: "She let the visitors in."
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il a laissé parler tout le monde."
        english: "He let everyone speak."

  - id: gp_b2_046
    point: "Distinction faire vs laisser causatif: faire = provoquer activement, laisser = permettre/ne pas empêcher"
    category: passif_avance_causatif
    difficulty: 4
    referentiel_ref: "Référentiel B2 §7 — Faire vs laisser: semantic distinction"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "J'ai fait travailler les enfants. (je les ai obligés) / J'ai laissé travailler les enfants. (je ne les ai pas empêchés)"
        english: "I made the children work (I obliged them) / I let the children work (I didn't stop them)"

  # ======================================================
  # CHAIN THEME 4: Accord du Participe Passé
  # ======================================================

  - id: gp_b2_047
    point: "Accord PP avec avoir: pas d'accord si le COD suit le verbe — J'ai lu des livres. (no accord)"
    category: accord_participe_passe
    difficulty: 3
    referentiel_ref: "Référentiel B2 §8 — Accord PP avoir: COD après le verbe"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "J'ai lu des livres. (pas d'accord — COD 'des livres' après le verbe)"
        english: "I read some books. (no agreement — COD follows verb)"

  - id: gp_b2_048
    point: "Accord PP avec avoir: accord si le COD précède le verbe (pronom COD) — Je les ai lus. / Je l'ai vue."
    category: accord_participe_passe
    difficulty: 4
    referentiel_ref: "Référentiel B2 §8 — Accord PP avoir: COD précède avec pronom"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Je les ai lus. (accord: les = masc. plur. = COD précédant)"
        english: "I read them. (agreement: les is masculine plural preceding COD)"
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Je l'ai vue partir. (accord: l' = féminin singulier)"
        english: "I saw her leave. (agreement: l' is feminine singular)"

  - id: gp_b2_049
    point: "Accord PP avec avoir: accord avec pronom relatif que précédant — les livres que j'ai lus / la lettre qu'il a écrite"
    category: accord_participe_passe
    difficulty: 4
    referentiel_ref: "Référentiel B2 §8 — Accord PP avec que relatif"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Les livres que j'ai lus étaient intéressants."
        english: "The books (that) I read were interesting."
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "La lettre qu'il a écrite est longue."
        english: "The letter he wrote is long."

  - id: gp_b2_050
    point: "Accord PP avec avoir: pas d'accord avec COI (lui, leur) — Je lui ai parlé. / Il leur a donné les livres."
    category: accord_participe_passe
    difficulty: 4
    referentiel_ref: "Référentiel B2 §8 — Accord PP: no agreement with indirect object"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Je lui ai parlé. (pas d'accord — 'lui' est COI, pas COD)"
        english: "I spoke to him. (no agreement — 'lui' is indirect object)"

  - id: gp_b2_051
    point: "Accord PP avec être: toujours accord avec le sujet — Elle est partie. / Ils sont arrivés."
    category: accord_participe_passe
    difficulty: 3
    referentiel_ref: "Référentiel B2 §8 — Accord PP avec être"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Elle est partie. (accord féminin) / Ils sont arrivés. (accord masculin pluriel)"
        english: "She left. / They arrived."

  - id: gp_b2_052
    point: "Accord PP pronominal réfléchi COD: se = COD → accord — elle s'est levée / ils se sont couchés"
    category: accord_participe_passe
    difficulty: 4
    referentiel_ref: "Référentiel B2 §8 — Accord PP pronominal: se as COD"
    examples:
      - tatoeba_id: 4288
        sourceRef: "tatoeba:4288"
        french: "Hier, nous nous sommes bien amusés."
        english: "Yesterday we had fun."

  - id: gp_b2_053
    point: "Accord PP pronominal réfléchi COI: se = COI → pas d'accord si COD suit — elle s'est lavé les mains"
    category: accord_participe_passe
    difficulty: 5
    referentiel_ref: "Référentiel B2 §8 — Accord PP pronominal: se as COI"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Elle s'est lavé les mains. (les mains = COD postposé → se est COI → pas d'accord)"
        english: "She washed her hands. (les mains is the COD after verb — se is COI — no agreement)"
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il s'est cassé la jambe. (la jambe = COD postposé → pas d'accord)"
        english: "He broke his leg. (la jambe is COD — no agreement on cassé)"

  - id: gp_b2_054
    point: "Accord PP pronominal action réciproque: ils se sont regardés / elles se sont saluées"
    category: accord_participe_passe
    difficulty: 4
    referentiel_ref: "Référentiel B2 §8 — Accord PP: mutual action"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Ils se sont regardés. (accord: se = COD mutuel)"
        english: "They looked at each other. (agreement: se is mutual COD)"

  - id: gp_b2_055
    point: "Verbes pronominaux sans accord PP: se souvenir de, se méfier de, se douter de, se rire de — jamais d'accord"
    category: accord_participe_passe
    difficulty: 5
    referentiel_ref: "Référentiel B2 §8 — PP pronominal: exception verbs"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Elle s'est souvenu de tout. (se souvenir de: pas d'accord — règle d'exception)"
        english: "She remembered everything. (se souvenir de: no agreement — exception verb)"

  # ======================================================
  # CHAIN THEME 5: Connecteurs Logiques Avancés
  # ======================================================

  - id: gp_b2_056
    point: "Connecteur de concession: bien que + subjonctif — Bien qu'il fasse froid, nous sortirons."
    category: connecteurs_logiques_avances
    difficulty: 4
    referentiel_ref: "Référentiel B2 §9 — Connecteurs concession: bien que"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Bien qu'il fasse froid, nous sortirons."
        english: "Although it's cold, we will go out."

  - id: gp_b2_057
    point: "Connecteur de concession: quoique + subjonctif — Quoiqu'il soit riche, il vit simplement."
    category: connecteurs_logiques_avances
    difficulty: 4
    referentiel_ref: "Référentiel B2 §9 — Connecteurs concession: quoique"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Quoiqu'il soit riche, il vit simplement."
        english: "Although he is rich, he lives simply."

  - id: gp_b2_058
    point: "Connecteur de concession: malgré + nom — Je suis sorti malgré la pluie."
    category: connecteurs_logiques_avances
    difficulty: 3
    referentiel_ref: "Référentiel B2 §9 — Connecteurs concession: malgré"
    examples:
      - tatoeba_id: 6814
        sourceRef: "tatoeba:6814"
        french: "Je suis sorti malgré la pluie."
        english: "In spite of the rain, I went out."

  - id: gp_b2_059
    point: "Connecteur de concession: en dépit de + nom — En dépit de ses efforts, il a échoué."
    category: connecteurs_logiques_avances
    difficulty: 4
    referentiel_ref: "Référentiel B2 §9 — Connecteurs concession: en dépit de"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "En dépit de ses efforts, il a échoué."
        english: "Despite his efforts, he failed."

  - id: gp_b2_060
    point: "Connecteur de concession: certes…mais / certes…néanmoins — concession formelle suivie de nuance"
    category: connecteurs_logiques_avances
    difficulty: 4
    referentiel_ref: "Référentiel B2 §9 — Connecteurs concession: certes…mais"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Certes, il travaille bien, mais il est souvent absent."
        english: "Granted, he works well, but he is often absent."

  - id: gp_b2_061
    point: "Connecteur de concession (registre formel): néanmoins — La quantité est incorrecte ; néanmoins, le produit est bon."
    category: connecteurs_logiques_avances
    difficulty: 4
    referentiel_ref: "Référentiel B2 §9 — Connecteurs concession: néanmoins"
    examples:
      - tatoeba_id: 11691
        sourceRef: "tatoeba:11691"
        french: "Néanmoins, la quantité est incorrecte."
        english: "However, the quantity is not correct."

  - id: gp_b2_062
    point: "Connecteur de concession (registre formel): toutefois — synonyme formel de néanmoins/cependant"
    category: connecteurs_logiques_avances
    difficulty: 4
    referentiel_ref: "Référentiel B2 §9 — Connecteurs concession: toutefois"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il a réussi l'examen ; toutefois, ses résultats sont en dessous de la moyenne."
        english: "He passed the exam; however, his results are below average."

  - id: gp_b2_063
    point: "Connecteur d'opposition: tandis que — contraste simultané (Il travaille tandis qu'elle se repose.)"
    category: connecteurs_logiques_avances
    difficulty: 3
    referentiel_ref: "Référentiel B2 §9 — Connecteurs opposition: tandis que"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il travaille tandis qu'elle se repose."
        english: "He works while she rests."

  - id: gp_b2_064
    point: "Connecteur d'opposition: alors que — contraste (Elle réussit alors qu'il échoue.)"
    category: connecteurs_logiques_avances
    difficulty: 3
    referentiel_ref: "Référentiel B2 §9 — Connecteurs opposition: alors que"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Elle réussit alors qu'il échoue."
        english: "She succeeds while he fails."

  - id: gp_b2_065
    point: "Connecteur d'opposition: en revanche (registre formel) — Il parle bien français ; en revanche, son anglais est limité."
    category: connecteurs_logiques_avances
    difficulty: 4
    referentiel_ref: "Référentiel B2 §9 — Connecteurs opposition: en revanche"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il parle bien français ; en revanche, son anglais est limité."
        english: "He speaks French well; on the other hand, his English is limited."

  - id: gp_b2_066
    point: "Connecteur d'opposition: par contre (registre courant oral) — alternative parlée à en revanche"
    category: connecteurs_logiques_avances
    difficulty: 3
    referentiel_ref: "Référentiel B2 §9 — Connecteurs opposition: par contre"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Je n'aime pas le sport ; par contre, j'adore la lecture."
        english: "I don't like sport; on the other hand, I love reading."

  - id: gp_b2_067
    point: "Connecteur de reformulation: autrement dit — Il est parti ; autrement dit, il ne reviendra plus."
    category: connecteurs_logiques_avances
    difficulty: 3
    referentiel_ref: "Référentiel B2 §9 — Connecteurs reformulation: autrement dit"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il est parti ; autrement dit, il ne reviendra plus."
        english: "He left; in other words, he won't come back."

  - id: gp_b2_068
    point: "Connecteur de reformulation: en d'autres termes / c'est-à-dire (que) — reformulation explicative"
    category: connecteurs_logiques_avances
    difficulty: 3
    referentiel_ref: "Référentiel B2 §9 — Connecteurs reformulation: en d'autres termes / c'est-à-dire"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il est bilingue, c'est-à-dire qu'il parle deux langues couramment."
        english: "He is bilingual, meaning he speaks two languages fluently."

  - id: gp_b2_069
    point: "Connecteur d'addition: de plus / en outre (formel) — Il est compétent ; de plus, il est motivé."
    category: connecteurs_logiques_avances
    difficulty: 3
    referentiel_ref: "Référentiel B2 §9 — Connecteurs addition: de plus / en outre"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Ce produit est économique ; en outre, il est écologique."
        english: "This product is economical; furthermore, it is ecological."

  - id: gp_b2_070
    point: "Connecteur d'addition: par ailleurs (introduce additional separate point) / qui plus est (even more so)"
    category: connecteurs_logiques_avances
    difficulty: 4
    referentiel_ref: "Référentiel B2 §9 — Connecteurs addition: par ailleurs / qui plus est"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "C'est faux, et qui plus est, dangereux."
        english: "It is false, and what's more, dangerous."

  # ======================================================
  # CHAIN THEME 6: Nominalisation & Mise en Relief
  # ======================================================

  - id: gp_b2_071
    point: "Nominalisation: décider → la décision — transformation verbe → nom dans le registre formel"
    category: nominalisation_mise_en_relief
    difficulty: 3
    referentiel_ref: "Référentiel B2 §10 — Nominalisation"
    examples:
      - tatoeba_id: 8853
        sourceRef: "tatoeba:8853"
        french: "Je vous laisserai la décision."
        english: "I'll leave the decision to you."

  - id: gp_b2_072
    point: "Nominalisation: arriver → l'arrivée — noms d'action féminins en -ée"
    category: nominalisation_mise_en_relief
    difficulty: 3
    referentiel_ref: "Référentiel B2 §10 — Nominalisation: -ée nouns"
    examples:
      - tatoeba_id: 6957
        sourceRef: "tatoeba:6957"
        french: "J'ai attendu l'arrivée du bus."
        english: "I waited for a bus to come."

  - id: gp_b2_073
    point: "Nominalisation: construire → la construction, partir → le départ, développer → le développement"
    category: nominalisation_mise_en_relief
    difficulty: 3
    referentiel_ref: "Référentiel B2 §10 — Nominalisation: common pairs"
    examples:
      - tatoeba_id: null
        sourceRef: "Referentiel-pattern"
        french: "construire → la construction / partir → le départ / développer → le développement / réfléchir → la réflexion / augmenter → l'augmentation"
        english: "to build → construction / to leave → departure / to develop → development / to reflect → reflection / to increase → increase"

  - id: gp_b2_074
    point: "Nominalisation: utiliser → l'utilisation, gérer → la gestion, former → la formation — registre administratif"
    category: nominalisation_mise_en_relief
    difficulty: 3
    referentiel_ref: "Référentiel B2 §10 — Nominalisation: administrative register"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "L'utilisation des ressources naturelles doit être limitée."
        english: "The use of natural resources must be limited."

  - id: gp_b2_075
    point: "Nominalisation: connaître → la connaissance, réduire → la réduction — transformations moins régulières"
    category: nominalisation_mise_en_relief
    difficulty: 4
    referentiel_ref: "Référentiel B2 §10 — Nominalisation: irregular pairs"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il faut approfondir ses connaissances en chimie."
        english: "You need to deepen your knowledge of chemistry."

  - id: gp_b2_076
    point: "Mise en relief: c'est…qui — emphase sur le sujet (subject cleft) — C'est elle qui me l'a dit."
    category: nominalisation_mise_en_relief
    difficulty: 3
    referentiel_ref: "Référentiel B2 §11 — Mise en relief: c'est…qui"
    examples:
      - tatoeba_id: 7879
        sourceRef: "tatoeba:7879"
        french: "C'est elle qui me l'a dit."
        english: "It was she who has told me."

  - id: gp_b2_077
    point: "Mise en relief: c'est…que — emphase sur le COD/lieu/temps (object/adverbial cleft)"
    category: nominalisation_mise_en_relief
    difficulty: 3
    referentiel_ref: "Référentiel B2 §11 — Mise en relief: c'est…que"
    examples:
      - tatoeba_id: 9733
        sourceRef: "tatoeba:9733"
        french: "C'est toi que j'aimerai toujours."
        english: "You're the one I'll always love."
      - tatoeba_id: 7562
        sourceRef: "tatoeba:7562"
        french: "C'est le printemps que je préfère."
        english: "I like spring the best."
      - tatoeba_id: 3281
        sourceRef: "tatoeba:3281"
        french: "C'est là que réside le problème."
        english: "Therein lies the problem."

  - id: gp_b2_078
    point: "Mise en relief: accord de c'est vs ce sont — Ce sont eux qui sont partis."
    category: nominalisation_mise_en_relief
    difficulty: 4
    referentiel_ref: "Référentiel B2 §11 — Mise en relief: c'est vs ce sont"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Ce sont eux qui sont partis en premier."
        english: "They are the ones who left first."

  - id: gp_b2_079
    point: "Mise en relief pseudo-cleft: ce qui…c'est — emphase sur le complément — Ce qui me plaît, c'est la musique."
    category: nominalisation_mise_en_relief
    difficulty: 4
    referentiel_ref: "Référentiel B2 §11 — Mise en relief: ce qui…c'est"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Ce qui me plaît, c'est la musique."
        english: "What I like is music."
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Ce qui m'énerve, c'est le bruit constant."
        english: "What annoys me is the constant noise."

  - id: gp_b2_080
    point: "Mise en relief pseudo-cleft: ce que…c'est / ce dont…c'est — Ce que je veux, c'est du repos."
    category: nominalisation_mise_en_relief
    difficulty: 4
    referentiel_ref: "Référentiel B2 §11 — Mise en relief: ce que / ce dont"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Ce que je veux, c'est du repos."
        english: "What I want is rest."
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Ce dont j'ai besoin, c'est du temps."
        english: "What I need is time."

  - id: gp_b2_081
    point: "Mise en relief: quant à + sujet — introduction formelle d'un thème contrasté — Quant à moi, je préfère rester."
    category: nominalisation_mise_en_relief
    difficulty: 4
    referentiel_ref: "Référentiel B2 §11 — Mise en relief: quant à"
    examples:
      - tatoeba_id: 7969
        sourceRef: "tatoeba:7969"
        french: "Quant à moi, je préfère celui-ci."
        english: "For me, I like this better."

  # ======================================================
  # CHAIN THEME 7: Futur Antérieur & Subordonnées Avancées
  # ======================================================

  - id: gp_b2_082
    point: "Futur antérieur avec avoir: formation aurai/auras/aura/aurons/aurez/auront + participe passé"
    category: futur_anterieur_subordonnees
    difficulty: 3
    referentiel_ref: "Référentiel B2 §13 — Futur antérieur formation"
    examples:
      - tatoeba_id: 10294
        sourceRef: "tatoeba:10294"
        french: "J'aurai réparé votre montre d'ici demain."
        english: "I will have repaired your watch by tomorrow."

  - id: gp_b2_083
    point: "Futur antérieur avec être: serai/seras/sera/serons/serez/seront + participe passé (avec accord)"
    category: futur_anterieur_subordonnees
    difficulty: 3
    referentiel_ref: "Référentiel B2 §13 — Futur antérieur avec être"
    examples:
      - tatoeba_id: 9056
        sourceRef: "tatoeba:9056"
        french: "Je serai parti avant votre retour."
        english: "I will have left when you return."

  - id: gp_b2_084
    point: "Futur antérieur: action achevée avant un moment futur — J'aurai fini avant que tu arrives."
    category: futur_anterieur_subordonnees
    difficulty: 3
    referentiel_ref: "Référentiel B2 §13 — Futur antérieur: completed future action"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "J'aurai fini le rapport avant que tu arrives."
        english: "I will have finished the report before you arrive."

  - id: gp_b2_085
    point: "Futur antérieur dans subordonnées temporelles: quand/dès que/aussitôt que + futur antérieur"
    category: futur_anterieur_subordonnees
    difficulty: 4
    referentiel_ref: "Référentiel B2 §13 — Futur antérieur: temporal clauses"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Quand tu auras fini, tu pourras sortir."
        english: "When you have finished, you can go out."
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Dès qu'il sera arrivé, nous commencerons la réunion."
        english: "As soon as he has arrived, we will start the meeting."

  - id: gp_b2_086
    point: "Futur antérieur: probabilité sur le passé (spéculation) — Il aura oublié. / Elle aura raté le bus."
    category: futur_anterieur_subordonnees
    difficulty: 4
    referentiel_ref: "Référentiel B2 §13 — Futur antérieur: probability/speculation"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il n'est pas encore là ? Il aura raté le bus."
        english: "He's not here yet? He must have missed the bus."

  - id: gp_b2_087
    point: "Subordonnée de but avec de peur que … ne + subjonctif — Il murmure de peur qu'on ne l'entende."
    category: futur_anterieur_subordonnees
    difficulty: 5
    referentiel_ref: "Référentiel B2 §12 — Subordonnées: de peur que … ne"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il murmure de peur qu'on ne l'entende."
        english: "He whispers for fear that someone might hear him."
        note: "de peur que + ne expletif + subjonctif — ne is not negation here"

  - id: gp_b2_088
    point: "Subordonnée de but avec de crainte que … ne + subjonctif — Elle a tout vérifié de crainte qu'il y ait une erreur."
    category: futur_anterieur_subordonnees
    difficulty: 5
    referentiel_ref: "Référentiel B2 §12 — Subordonnées: de crainte que … ne"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Elle a tout vérifié de crainte qu'il y ait une erreur."
        english: "She checked everything for fear that there might be a mistake."

  - id: gp_b2_089
    point: "Subordonnée de condition avec à condition que + subjonctif — Tu peux partir à condition que tu reviennes avant minuit."
    category: futur_anterieur_subordonnees
    difficulty: 4
    referentiel_ref: "Référentiel B2 §12 — Subordonnées: à condition que"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Tu peux partir à condition que tu reviennes avant minuit."
        english: "You can leave provided you come back before midnight."

  - id: gp_b2_090
    point: "Subordonnée de condition avec pourvu que + subjonctif — Je l'aiderai pourvu qu'il fasse un effort."
    category: futur_anterieur_subordonnees
    difficulty: 4
    referentiel_ref: "Référentiel B2 §12 — Subordonnées: pourvu que"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Je l'aiderai pourvu qu'il fasse un effort."
        english: "I will help him provided he makes an effort."

  - id: gp_b2_091
    point: "Subordonnée hypothétique avec à supposer que + subjonctif — À supposer que vous ayez le temps, feriez-vous ce voyage ?"
    category: futur_anterieur_subordonnees
    difficulty: 5
    referentiel_ref: "Référentiel B2 §12 — Subordonnées: à supposer que"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "À supposer que vous ayez le temps, feriez-vous ce voyage ?"
        english: "Supposing you had the time, would you make this trip?"

  - id: gp_b2_092
    point: "Opinion négative + subjonctif: je ne pense pas que + subj (vs affirmatif + indicatif)"
    category: futur_anterieur_subordonnees
    difficulty: 4
    referentiel_ref: "Référentiel B2 §14 — Opinion négative + subjonctif"
    examples:
      - tatoeba_id: 8385
        sourceRef: "tatoeba:8385"
        french: "J'ai peur qu'il pleuve ce soir."
        english: "I'm afraid it'll rain tonight."
        note: "avoir peur que = emotion trigger → subjonctif (related structure)"

  - id: gp_b2_093
    point: "Opinion négative + subjonctif: je ne crois pas que ce soit vrai / je ne trouve pas que ce soit juste"
    category: futur_anterieur_subordonnees
    difficulty: 4
    referentiel_ref: "Référentiel B2 §14 — Opinion négative: ne croire/trouver pas que"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Je ne crois pas qu'il puisse venir ce soir."
        english: "I don't believe he can come this evening."
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Je ne trouve pas que ce soit juste."
        english: "I don't think that's fair."

  - id: gp_b2_094
    point: "Opinion interrogative + subjonctif: Penses-tu qu'il vienne ? — doute impliqué → subjonctif"
    category: futur_anterieur_subordonnees
    difficulty: 4
    referentiel_ref: "Référentiel B2 §14 — Opinion interrogative + subjonctif"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Crois-tu qu'elle soit déjà arrivée ?"
        english: "Do you think she has already arrived?"

  - id: gp_b2_095
    point: "Hypothèse atténuée: au cas où + conditionnel — Prends un parapluie au cas où il pleuvrait."
    category: futur_anterieur_subordonnees
    difficulty: 4
    referentiel_ref: "Référentiel B2 §15 — Hypothèse atténuée: au cas où"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Prends un parapluie au cas où il pleuvrait."
        english: "Take an umbrella in case it rains."
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Laisse la clé sous le pot au cas où j'arriverais en retard."
        english: "Leave the key under the pot in case I arrive late."

  - id: gp_b2_096
    point: "Hypothèse atténuée: si jamais + conditionnel — Si jamais tu changes d'avis, appelle-moi."
    category: futur_anterieur_subordonnees
    difficulty: 3
    referentiel_ref: "Référentiel B2 §15 — Hypothèse atténuée: si jamais"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Si jamais tu changes d'avis, n'hésite pas à m'appeler."
        english: "If you ever change your mind, don't hesitate to call me."

  - id: gp_b2_097
    point: "Subordonnée de concession avec infinitif même sujet: avoir beau + infinitif — no matter how (subject same)"
    category: futur_anterieur_subordonnees
    difficulty: 5
    referentiel_ref: "Référentiel B2 §12 — Concession avec infinitif: avoir beau"
    examples:
      - tatoeba_id: null
        sourceRef: "llm_authored"
        french: "Il a beau travailler, il n'y arrive pas."
        english: "No matter how hard he works, he can't manage it."

  - id: gp_b2_098
    point: "Comme si + imparfait/plus-que-parfait — comparaison hypothétique — Ken parle comme s'il savait tout."
    category: futur_anterieur_subordonnees
    difficulty: 4
    referentiel_ref: "Référentiel B2 §15 — Comme si hypothétique"
    examples:
      - tatoeba_id: 11119
        sourceRef: "tatoeba:11119"
        french: "Ken parle comme s'il savait tout."
        english: "Ken talks as if he knew everything."

  - id: gp_b2_099
    point: "Gérondif de simultanéité: en + participe présent — J'ai lu un livre en mangeant."
