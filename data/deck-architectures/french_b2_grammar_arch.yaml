      - tatoeba_id: 13626
        sourceRef: "tatoeba:13626"
        french: "J'aurais aimé avoir meilleure mémoire."
        english: "I wish I had a better memory."
      - tatoeba_id: 14178
        sourceRef: "tatoeba:14178"
        french: "J'aurais aimé être plus grand."
        english: "I wish I were taller."

  - id: gp_b2_018
