        english: "The fire reportedly caused several casualties according to initial reports."
        note: "Journalistic/unverified past conditional — common in French press"

  - id: gp_b2_019
    point: "Si-clause type 3: si + plus-que-parfait → conditionnel passé (counterfactual past)"
