# ============================================================
# DIFFICULTY TIERS — CED-aligned difficulty calibration
# ============================================================

difficulty_tiers:
  description: >
    Five difficulty tiers aligned to AP Macroeconomics exam skill levels.
    Facts must have difficulty assigned (1-5). Tier weights reflect typical
    AP exam question distribution and CED skill emphasis.

  tiers:
    - level: 1
      label: "Definition/Identification"
      description: >
        Pure recall — name to definition, term identification, basic relationships.
        Examples: "What does GDP stand for?", "What are the four factors of production?",
        "What type of unemployment is caused by recession?"
      target_percentage: 15
      ced_skill: "Skill 1: Principles and Models"

    - level: 2
      label: "Conceptual Understanding"
      description: >
        Explain a concept, identify cause-and-effect in a single-step scenario.
        Examples: "Why does the AD curve slope downward?", "What happens to the unemployment
        rate if discouraged workers re-enter the labor force?", "Why is LRAS vertical?"
      target_percentage: 25
      ced_skill: "Skill 1: Principles and Models"

    - level: 3
      label: "Applied Analysis"
      description: >
        Multi-step reasoning, graph shifts, policy effect analysis.
        Examples: "If the Fed buys bonds, what happens to the money supply, interest rates,
        and investment?", "How does expansionary fiscal policy affect the AD-AS model?",
        "Given MPC = 0.8, calculate the spending multiplier."
      target_percentage: 35
      ced_skill: "Skill 2: Graphs and Visuals / Skill 3: Calculations"

    - level: 4
      label: "Cross-Market Connections"
      description: >
        Connect multiple markets (money market + loanable funds + AD/AS), trace policy
        through multiple transmission mechanisms, integrate domestic and international effects.
        Examples: "How does a budget deficit affect exchange rates through the loanable funds
        market?", "Trace the effects of contractionary monetary policy on the Phillips curve."
      target_percentage: 20
      ced_skill: "Skill 4: Short-Answer Reasoning"

    - level: 5
      label: "Policy Design and Evaluation"
      description: >
        Compare policy options, evaluate trade-offs, integrate crowding out with exchange rate
        effects, assess long-run vs. short-run consequences, analyze self-correction.
        Examples: "Compare the effectiveness of fiscal vs. monetary policy when interest rates
        are near zero", "Explain why stagflation poses a policy dilemma."
      target_percentage: 5
      ced_skill: "Skill 4: Short-Answer Reasoning"

# ============================================================
# EXAM TAGS SCHEMA — CED-aligned metadata for each fact
# ============================================================

exam_tags_schema:
  description: >
    Every fact MUST include an examTags object. These drive difficulty calibration
    and allow filtering by CED unit/topic for targeted study. AP Macroeconomics has
    6 units and 20 topics (1.1 through 6.6).

  fields:
    unit:
      type: integer
      range: [1, 6]
      description: >
        CED unit number: 1=Basic Economic Concepts, 2=Economic Indicators and Business Cycle,
        3=National Income and Price Determination, 4=Financial Sector,
        5=Long-Run Consequences of Stabilization Policies, 6=Open Economy

    topic:
      type: string
      description: "CED topic code, e.g. '3.2' (Unit 3, Topic 2 — Multipliers)"

    skill:
      type: string
      enum: ["principles_and_models", "graphs_and_visuals", "calculations", "short_answer_reasoning"]
      description: >
        AP Macroeconomics skill category alignment (College Board 4 skills):
        principles_and_models = Skill 1, graphs_and_visuals = Skill 2,
        calculations = Skill 3, short_answer_reasoning = Skill 4
      required: false

    exam_weight:
      type: string
      enum: ["high", "medium", "low"]
      description: >
        Estimated AP exam frequency. High = core concept tested most years (AD/AS, multipliers,
        monetary policy), medium = appears regularly, low = depth/enrichment or edge cases.

    is_calculation_fact:
      type: boolean
      description: "True if the fact involves a numerical calculation (multiplier, unemployment rate, GDP deflator, etc.)"

    is_graph_fact:
      type: boolean
      description: "True if the fact requires interpreting or drawing a graph (AD/AS, Phillips curve, money market, etc.)"

    is_policy_fact:
      type: boolean
      description: "True if the fact is primarily about the design or effect of fiscal or monetary policy"

  example: >
    examTags:
      unit: 3
      topic: "3.2"
      skill: "calculations"
      exam_weight: "high"
      is_calculation_fact: true
      is_graph_fact: false
      is_policy_fact: false

# ============================================================
# IMAGE FACTS NOTES — Guidelines for image-based questions
# ============================================================

image_facts_notes:
  description: >
    AP Macroeconomics has significant graph-interpretation content (Skill 2). Image-based
    facts allow students to practice reading unlabeled or partially labeled graphs.

  guidelines:
    - All image-based facts must use quizMode "image_question" and be in the visual_macro_graphs pool
    - Images should show standard AP-style graphs: axis labels, curve labels, equilibrium points
    - For graph-shift questions, show before and after curves with arrows indicating direction
    - Priority graphs for image facts (most tested on AP exam):
        - AD/AS diagram showing recessionary gap and inflationary gap
        - AD/AS diagram showing effects of fiscal/monetary policy
        - Short-run and long-run Phillips curve together
        - Money market equilibrium and Fed intervention
        - Loanable funds market with crowding out
        - Foreign exchange market showing appreciation/depreciation
        - Business cycle diagram
        - PPC showing growth shift
    - Keep image descriptions precise enough to reconstruct if art is regenerated
    - Image asset naming convention: macro_{graph_type}_{variant}.png
      e.g., macro_adas_recessionary_gap.png, macro_phillips_stagflation.png
