deck_id: ap_macroeconomics
name: "AP Macroeconomics"
domain: social_sciences
sub_domain: macroeconomics
description: "Master the full AP Macroeconomics curriculum — from GDP measurement to international finance. Covers all 6 CED units: Basic Economic Concepts, Economic Indicators and the Business Cycle, National Income and Price Determination, Financial Sector, Long-Run Consequences of Stabilization Policies, and Open Economy International Trade and Finance. Aligned to the College Board AP Macroeconomics Course and Exam Description. Includes GDP calculations, multiplier effects, money creation, Phillips curve analysis, and exchange rate determination."
minimum_facts: 400
target_facts: 440

# COMPLETENESS PHILOSOPHY:
# This deck covers the COMPLETE College Board AP Macroeconomics Course and Exam
# Description (CED). A student who masters this deck should be prepared for every
# question type on the AP Macroeconomics exam. Scope is curriculum-driven, not
# topic-sampled — every CED topic (1.1 through 6.6) across all 6 units is represented.
# Unit weights (percent of exam) directly inform fact counts per chain theme.
# Units 3 (17-27%) and 4 (18-23%) are the heaviest, and their chain themes receive
# proportionally more facts.

# Sourcing & licensing
data_sources:
  - name: College Board AP Macroeconomics Course and Exam Description (CED)
    url: https://apcentral.collegeboard.org/media/pdf/ap-macroeconomics-course-and-exam-description.pdf
    license: public educational resource
    usage: Authoritative unit/topic structure, learning objectives, essential knowledge statements, exam weight distribution
  - name: OpenStax Principles of Macroeconomics 3e
    url: https://openstax.org/books/principles-macroeconomics-3e/pages/1-introduction
    license: CC-BY-4.0
    usage: Concept definitions, explanations, worked examples
  - name: Wikipedia — Economics
    url: https://en.wikipedia.org/wiki/Economics
    license: CC-BY-SA-4.0
    usage: Economist biographies, concept summaries, historical context
  - name: Wikidata
    url: https://www.wikidata.org/
    license: CC0
    usage: Economist birth/death dates, Nobel Prize years, verified numerical values

