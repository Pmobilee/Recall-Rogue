  Large_Hadron_Collider:
    location: "Beneath the France-Switzerland border near Geneva — primarily at CERN, Meyrin, Switzerland"
    coordinates: "46°14'N, 6°3'E (CERN main site)"
    date_built: "construction 1998–2008; first collisions achieved in 2010"
    architect_designer: "CERN (European Organization for Nuclear Research); built with over 10,000 scientists from more than 100 countries"
    dimensions: "tunnel circumference: 27 km (17 mi); maximum tunnel depth: 175 m (574 ft); collision energy (Run 3): up to 13.6 TeV total"
    key_facts:
      - "World's largest and highest-energy particle accelerator, built by CERN between 1998 and 2008"
      - "Tunnel circumference of 27 km (17 mi), as deep as 175 m (574 ft) beneath the France-Switzerland border near Geneva"
      - "Built in collaboration with over 10,000 scientists from more than 100 countries"
      - "First collisions achieved in 2010; the Higgs boson was discovered using the LHC and announced in July 2012"
