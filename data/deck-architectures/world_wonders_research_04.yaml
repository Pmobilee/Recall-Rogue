subdeck_7_modern_marvels:
  description: "Ten of humanity's most remarkable modern engineering and architectural achievements"

  Sydney_Opera_House:
    location: "Bennelong Point, Sydney Harbour, New South Wales, Australia"
    coordinates: "33°51'24\"S, 151°12'54\"E"
    date_built: "construction began 1 March 1959; opened 20 October 1973"
    architect_designer: "Jørn Utzon (Danish; won 1957 international design competition); completed by Australian team led by Peter Hall"
    dimensions: "height: 65 m (213 ft); length: 183 m (600 ft); width: 120 m (394 ft); total seating: 5,738 across all venues"
    key_facts:
      - "Multi-venue performing arts centre located on Bennelong Point on Sydney Harbour"
      - "Designed by Danish architect Jørn Utzon, who won an international design competition in 1957"
      - "Formally opened by Queen Elizabeth II on 20 October 1973 — 16 years after the competition was won"
      - "Height 65 m (213 ft); hosts over 1,800 performances annually, attended by more than 1.4 million people"
      - "Designated a UNESCO World Heritage Site in 2007"
      - "Original cost estimate: AUD $7 million; final cost: AUD $102 million"
    fun_facts:
      - "Jørn Utzon's winning design was almost rejected — it was retrieved from the discard pile by Finnish architect Eero Saarinen and went on to become one of the most recognized buildings on Earth"
    unesco: true
    source_urls:
      - "https://en.wikipedia.org/wiki/Sydney_Opera_House"

  Channel_Tunnel:
    location: "Beneath the English Channel — connecting Folkestone, UK to Coquelles (near Calais), France"
    coordinates: "entrance UK: approx. 51°6'N, 1°8'E; entrance France: approx. 50°54'N, 1°47'E"
    date_built: "construction 1988–1994; opened 6 May 1994"
    architect_designer: "Transmanche-Link (Anglo-French consortium of 10 construction and engineering companies)"
    dimensions: "total length: 50.46 km (31.35 mi); underwater section (longest of any tunnel): 37.9 km (23.5 mi); maximum depth: 75 m (246 ft) below sea level; average depth below seabed: 45 m (148 ft)"
    key_facts:
      - "Railway tunnel 50.46 km (31.35 mi) long beneath the English Channel, opened in 1994"
      - "Longest underwater section of any tunnel in the world at 37.9 km (23.5 mi)"
      - "Reaches a maximum depth of 75 m (246 ft) below sea level"
      - "The only fixed link between Great Britain and the European mainland"
      - "Consists of three tunnels: two rail tunnels and one central service tunnel"
      - "Carries Eurostar passenger trains, LeShuttle vehicle trains, and freight trains; designed for speeds up to 200 km/h"
    fun_facts:
      - "The first tunnel proposals date back to 1802 — Napoleon reportedly considered it — but it took nearly two centuries for national security concerns to be overcome and construction to begin"
    unesco: false
    source_urls:
      - "https://en.wikipedia.org/wiki/Channel_Tunnel"

