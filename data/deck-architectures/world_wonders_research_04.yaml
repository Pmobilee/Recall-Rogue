      - "Largest human spacecraft ever constructed: 109 m (358 ft) wide with solar arrays — roughly the size of a football field"
      - "First module (Zarya) launched 20 November 1998; humans have lived aboard continuously since 2 November 2000"
      - "Travels at 7.67 km/s (27,600 km/h), completing one orbit every ~93 minutes — about 15.5 orbits per day"
      - "Internal volume of 1,005 m³ — comparable to a Boeing 747 airliner"
      - "Mass approximately 450,000 kg (990,000 lb) — assembled in orbit from modules launched on over 40 missions"
