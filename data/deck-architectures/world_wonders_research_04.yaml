  Dead_Sea:
    location: "Jordan Rift Valley — bordered by Jordan (east), West Bank (west), and Israel (southwest)"
    coordinates: "31°30'N, 35°30'E"
    date_built: "natural formation"
    architect_designer: "N/A — natural"
    dimensions: "surface (2025): 439.78 m (1,443 ft) below sea level; depth: 304 m (997 ft); length of main basin: 50 km; width: 15 km; salinity: 34.2% (approximately 9.6× saltier than ocean)"
    key_facts:
      - "Landlocked hypersaline lake in the Jordan Rift Valley with shores at 439.78 m (1,443 ft) below sea level — lowest land-based elevation on Earth (as of 2025)"
      - "Salinity of approximately 34.2% — about 9.6 times saltier than the ocean — making it one of the world's saltiest bodies of water"
      - "At 304 m (997 ft) deep, it is the deepest hypersaline lake in the world"
      - "The high density (1.24 kg/litre) makes floating effortless — humans cannot sink"
      - "Its main tributary is the Jordan River; due to water diversion, the sea has shrunk significantly and continues to drop by approximately 1 m per year"
      - "Was one of the world's first health resorts and has supplied products from Egyptian mummification asphalt to modern potash fertilizers"
    fun_facts:
      - "The Dead Sea is so salty that almost nothing can live in it — not fish, not most bacteria — yet its mineral-rich mud has been used for skin treatments for thousands of years"
