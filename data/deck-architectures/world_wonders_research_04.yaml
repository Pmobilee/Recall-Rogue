subdeck_6_natural_wonders:
  description: "Ten of Earth's most spectacular natural wonders"

  Grand_Canyon:
    location: "Arizona, United States"
    coordinates: "36.3°N, 112.75°W"
    date_built: "natural formation — carved over ~5-6 million years by Colorado River"
    architect_designer: "N/A — natural"
    dimensions: "277 miles (446 km) long; up to 18 miles (29 km) wide; over 1 mile (1,857 m / 6,093 ft) deep"
    key_facts:
      - "Carved by the Colorado River in Arizona; 277 miles (446 km) long, up to 18 miles wide, over 1 mile deep (6,093 ft / 1,857 m)"
      - "Exposes nearly 2 billion years of Earth's geological history in its rock layers"
      - "The Colorado River established its current course through the canyon approximately 5 to 6 million years ago"
      - "First European to view it was Spanish explorer García López de Cárdenas in 1540"
      - "The Pueblo people considered the Grand Canyon a holy site and made pilgrimages to it for thousands of years"
      - "Became Grand Canyon National Park in 1919; designated a UNESCO World Heritage Site in 1979"
    fun_facts:
      - "The canyon walls expose rock strata spanning nearly 2 billion years — nearly half the age of the Earth itself"
    unesco: true
    source_urls:
      - "https://en.wikipedia.org/wiki/Grand_Canyon"

  Great_Barrier_Reef:
    location: "Coral Sea, off Queensland coast, Australia"
    coordinates: "approx. 18°S, 147°E (central region)"
    date_built: "natural formation — current reef system approx. 6,000–8,000 years old; older reef systems millions of years old"
    architect_designer: "N/A — built by coral polyps"
    dimensions: "over 2,300 km (1,400 mi) long; area of approximately 344,400 km² (133,000 sq mi); separated from coast by channel up to 160 km wide and over 61 m deep"
    key_facts:
      - "World's largest coral reef system, composed of over 2,900 individual reefs and 900 islands"
      - "Stretches over 2,300 km (1,400 mi) along the coast of Queensland, Australia"
      - "Can be seen from outer space — the world's biggest single structure made by living organisms"
      - "Built by billions of tiny organisms called coral polyps"
      - "Designated a UNESCO World Heritage Site in 1981"
      - "CNN listed it as one of the Seven Natural Wonders of the World in 1997"
    fun_facts:
      - "The Great Barrier Reef is the world's biggest single structure made by living organisms and is visible from outer space"
    unesco: true
    source_urls:
      - "https://en.wikipedia.org/wiki/Great_Barrier_Reef"

  Victoria_Falls:
    location: "Zambezi River, on the border between Zambia and Zimbabwe"
    coordinates: "17°55'28\"S, 25°51'24\"E"
    date_built: "natural formation"
    architect_designer: "N/A — natural"
    dimensions: "width: 1,708 m (5,604 ft); height: 108 m (355 ft); average flow: 1,088 m³/s"
    key_facts:
      - "Waterfall on the Zambezi River on the border between Zambia and Zimbabwe"
      - "Width of 1,708 m (5,604 ft) — one of the world's largest waterfalls"
      - "Height of 108 m (355 ft) with an average flow of approximately 1,088 m³/s"
      - "Local Lozi name is Mosi-oa-Tunya, meaning 'The Smoke That Thunders'"
      - "Scottish missionary David Livingstone named the falls Victoria Falls in 1855 in honor of Queen Victoria"
      - "Designated a UNESCO World Heritage Site in 1989"
    fun_facts:
      - "During peak flood season, the spray from Victoria Falls can be seen from 50 km away and the thunder of the water heard 40 km away"
    unesco: true
    source_urls:
      - "https://en.wikipedia.org/wiki/Victoria_Falls"

  Mount_Everest:
    location: "Mahalangur Himal, Himalayas — on the China-Nepal border"
    coordinates: "27°59'17\"N, 86°55'31\"E"
    date_built: "natural formation"
    architect_designer: "N/A — natural"
    dimensions: "height: 8,848.86 m (29,031.7 ft) above sea level — most recent 2020 measurement by Chinese and Nepali authorities"
    key_facts:
      - "Earth's highest mountain above sea level at 8,848.86 m (29,031.7 ft), measured in 2020"
      - "Located in the Mahalangur Himal sub-range of the Himalayas, on the China-Nepal border"
      - "Known as Sagarmatha in Nepal and Qomolangma in Tibet"
      - "As of May 2024, 340 people have died on Everest; over 200 bodies remain on the mountain"
      - "Two main climbing routes: southeast ridge from Nepal (standard) and north ridge from Tibet"
      - "First confirmed summit: Edmund Hillary (New Zealand) and Tenzing Norgay (Nepal) on 29 May 1953"
    fun_facts:
      - "Mount Everest grows approximately 4 mm taller each year due to tectonic uplift of the Indian plate"
    unesco: false
    source_urls:
      - "https://en.wikipedia.org/wiki/Mount_Everest"

  Northern_Lights_Aurora_Borealis:
    location: "High-latitude regions — primarily Arctic Circle (Canada, Norway, Iceland, Sweden, Finland, Alaska, Russia)"
    coordinates: "N/A — atmospheric phenomenon"
    date_built: "natural phenomenon"
    architect_designer: "N/A — natural"
    dimensions: "Can cover entire sky; occurs in thermosphere/exosphere at altitudes of roughly 100–300 km"
    key_facts:
      - "Natural light display in Earth's upper atmosphere caused by charged particles from the Sun colliding with atmospheric atoms"
      - "Collisions excite oxygen and nitrogen, emitting light in colors including green, red, and purple"
      - "Called aurora borealis in the Arctic (northern lights) and aurora australis in the Antarctic (southern lights)"
      - "Result of disturbances in Earth's magnetosphere caused by solar wind from coronal holes and coronal mass ejections"
      - "Display dynamic patterns appearing as curtains, rays, spirals, or flickers covering the entire sky"
      - "Best observed from high-latitude regions such as Norway, Iceland, Canada, and Alaska"
    fun_facts:
      - "The lights occur because solar particles are funneled toward Earth's poles by its magnetic field — the same process creates both the northern and southern lights simultaneously"
    unesco: false
    source_urls:
      - "https://en.wikipedia.org/wiki/Aurora"

  Giants_Causeway:
    location: "County Antrim, Northern Ireland (approximately 4.8 km northeast of Bushmills)"
    coordinates: "55°14'27\"N, 6°30'42\"W"
    date_built: "natural formation — ancient volcanic fissure eruption during Paleogene period (approx. 50–60 million years ago)"
    architect_designer: "N/A — natural"
    dimensions: "approximately 40,000 interlocking basalt columns; tallest columns approximately 12 m (39 ft) high; solidified lava in cliffs up to 28 m (92 ft) thick"
    key_facts:
      - "Area of approximately 40,000 interlocking basalt columns, result of an ancient volcanic fissure eruption"
      - "Located in County Antrim on the north coast of Northern Ireland"
      - "Part of the North Atlantic Igneous Province active during the Paleogene period"
      - "Most columns are hexagonal, though some have four, five, seven, or eight sides"
      - "Tallest columns are approximately 12 m (39 ft) high; solidified lava in cliffs is 28 m (92 ft) thick in places"
      - "Designated a UNESCO World Heritage Site in 1986 and a national nature reserve in 1987"
    fun_facts:
      - "Irish legend says giant Fionn mac Cumhaill (Finn McCool) built the causeway to walk to Scotland for a fight — the same basalt formations appear at Fingal's Cave in Scotland"
    unesco: true
    source_urls:
      - "https://en.wikipedia.org/wiki/Giant%27s_Causeway"

  Paricutin_Volcano:
    location: "Michoacán, Mexico (near Uruapan, approximately 322 km west of Mexico City)"
    coordinates: "approx. 19°28'N, 102°15'W"
    date_built: "natural formation — erupted starting 20 February 1943 from a cornfield; active 1943-1952"
    architect_designer: "N/A — natural"
    dimensions: "height at peak (1952): approximately 424 m (1,391 ft) above original ground level; cone base diameter approximately 1.5 km"
    key_facts:
      - "Cinder cone volcano in Michoacán, Mexico that suddenly erupted from a farmer's cornfield on 20 February 1943"
      - "Farmer Dionisio Pulido witnessed the eruption begin in his cornfield, making it one of the few volcanoes whose birth was observed by humans"
      - "One of the Seven Natural Wonders of the World (as listed by CNN in 1997)"
      - "The eruption lasted nine years, from 1943 to 1952, burying the town of San Juan Parangaricutiro under lava"
      - "Grew to approximately 424 m above the original ground level by the end of its active period"
      - "Located approximately 322 km (200 mi) west of Mexico City in the state of Michoacán"
    fun_facts:
      - "Paricutin is one of the very few volcanoes whose birth was actually witnessed — the eruption started in a corn farmer's field and was watched from the beginning"
    unesco: false
    source_urls:
      - "https://en.wikipedia.org/wiki/Paricutin_volcano"

