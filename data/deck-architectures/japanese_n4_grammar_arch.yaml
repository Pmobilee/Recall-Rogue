  - name: JLPT Sensei
    url: https://jlptsensei.com/jlpt-n4-grammar-list/
    license: Reference only (list verified against multiple sources)
    usage: Canonical N4 grammar point inventory (132 points)

# -------------------------------------------------------------------
# Grammar Points
# Categories:
#   conditional       — if/then, hypothetical, case patterns
#   te_form           — て-form auxiliary constructions
#   appearance        — visual inference, hearsay, resemblance
#   causative_passive — causative, passive, combined forms
#   honorific         — polite/formal/humble speech registers
#   obligation        — must, should, expectation patterns
#   temporal          — while, during, just finished, by the time
#   comparison        — more than, easy/hard to do, excessive
#   quotation         — named, called, it is said that
#   purpose           — goal-oriented patterns, intention, decision
#   particle          — post-noun/verb grammatical particles
#   verb_modification — verb auxiliary patterns (start, finish, etc.)
#   negation          — negative emphasis patterns
#   question          — interrogative patterns and expressions
#   adverb            — standalone adverbial expressions
#   other             — connectors, discourse markers, misc patterns
#
# Difficulty:
#   1 — basic particles, core expressions (N5 overlap/foundation)
#   2 — common N4 patterns, frequent constructions
#   3 — complex patterns, formal/casual variants, nuanced usage
#   4 — honorific system, advanced combinations, subtle distinctions
# -------------------------------------------------------------------

grammar_points:

  # ---- CONDITIONALS & HYPOTHETICALS ----------------------------------

  - id: "n4-cond-ba"
    point: "ば"
    reading: "ba"
    meaning: "conditional if/then"
    category: conditional
    usages:
      - "Verb condition form (e-ba) + result clause"
      - "い-adjective stem + ければ + result clause"
      - "な-adjective / Noun + であれば + result clause"
    fjsd_id: null
    difficulty: 3

  - id: "n4-cond-baai-wa"
    point: "場合は"
    reading: "baai wa"
    meaning: "in the event of; in case"
    category: conditional
    usages:
      - "Verb dictionary form + 場合は"
      - "Verb た-form + 場合は"
      - "Noun + の + 場合は"
    fjsd_id: null
    difficulty: 3

  - id: "n4-cond-tara"
    point: "たら"
    reading: "tara"
    meaning: "if; after; when (conditional/temporal)"
    category: conditional
    usages:
      - "Verb past た-form + ら"
    fjsd_id: "729"
    difficulty: 2

  - id: "n4-cond-tara-dou"
    point: "たらどう"
    reading: "tara dou"
    meaning: "why don't you; how about doing"
    category: conditional
    usages:
      - "Verb た-form + らどう(ですか)"
    fjsd_id: null
    difficulty: 2

  - id: "n4-cond-tara-ii-desu-ka"
    point: "たらいいですか"
    reading: "tara ii desu ka"
    meaning: "what should I do?; what would be good?"
    category: conditional
    usages:
      - "Verb た-form + らいいですか"
      - "どう + したらいいですか"
    fjsd_id: null
    difficulty: 2

  - id: "n4-cond-nara"
    point: "なら"
    reading: "nara"
    meaning: "if; in the case that; if it is the case that"
    category: conditional
    usages:
      - "Verb dictionary form + なら"
      - "Noun + なら"
      - "な-adjective + なら"
    fjsd_id: null
    difficulty: 3

  - id: "n4-cond-to"
    point: "と"
    reading: "to"
    meaning: "whenever A happens, B naturally happens; if (natural consequence)"
    category: conditional
    usages:
      - "Verb dictionary form + と + result clause (habitual/natural)"
      - "Noun + だと"
    fjsd_id: null
    difficulty: 3

  # ---- TE-FORM AUXILIARIES -------------------------------------------

  - id: "n4-te-ageru"
