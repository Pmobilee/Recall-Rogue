  # ---- CAUSATIVE / PASSIVE -------------------------------------------

  - id: "n4-caus-saseru"
    point: "させる"
    reading: "saseru"
    meaning: "causative; to make someone do; to let someone do"
    category: causative_passive
    usages:
      - "Group 1 verb: consonant stem + a + せる"
      - "Group 2 verb: stem + させる"
      - "Irregular: する → させる, くる → こさせる"
    fjsd_id: null
    difficulty: 3

  - id: "n4-caus-rareru"
    point: "られる"
    reading: "rareru"
    meaning: "potential form; to be able to do; can do"
    category: causative_passive
    usages:
      - "Group 2 verb stem + られる"
      - "Irregular: する → できる, くる → こられる"
    fjsd_id: null
    difficulty: 3

  - id: "n4-caus-saserareru"
    point: "させられる"
    reading: "saserareru"
    meaning: "causative-passive; to be made to do (by someone else)"
    category: causative_passive
    usages:
      - "Causative form + られる"
      - "Group 1: consonant stem + a + せられる (or contracted: される)"
    fjsd_id: null
    difficulty: 4

  - id: "n4-caus-sasete-kudasai"
    point: "させてください"
    reading: "sasete kudasai"
    meaning: "please let me do; may I do (polite request for permission)"
    category: causative_passive
    usages:
      - "Verb causative て-form + ください"
    fjsd_id: null
    difficulty: 3

