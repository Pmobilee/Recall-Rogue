    category: appearance
    usages:
      - "Verb ます-stem + そう(だ)"
      - "い-adjective stem (without い) + そう(だ)"
      - "な-adjective (without な) + そう(だ)"
    fjsd_id: "684"
    difficulty: 2

  - id: "n4-app-sou-da-hearsay"
    point: "そうだ (hearsay)"
    reading: "sou da"
    meaning: "I heard that; it is said that (second-hand information)"
