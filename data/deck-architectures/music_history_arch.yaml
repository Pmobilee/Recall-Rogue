# ============================================================
# COMMON CONFUSIONS (seeded for confusion matrix)
# ============================================================
common_confusions:
  - [Bach, Handel]           # Both Baroque, born 1685
  - [Mozart, Haydn]          # Both Classical, contemporaries
  - [Beethoven, Brahms]      # Germanic symphonists
  - [Debussy, Ravel]         # French Impressionists
  - [Schubert, Schumann]     # Similar names, both Romantic
  - [Verdi, Puccini]         # Italian opera composers
  - [Chopin, Liszt]          # Romantic piano virtuosos
  - [Beatles, Rolling Stones] # British Invasion rivals
  - [Miles Davis, John Coltrane]  # Jazz innovators
  - [Charlie Parker, Dizzy Gillespie]  # Bebop co-creators
  - [symphony, concerto]     # Orchestral forms
  - [sonata, concerto]       # Musical forms
  - [Baroque, Classical]     # Adjacent eras

# ============================================================
# QUESTION TEMPLATES
# ============================================================
question_templates:
  - id: who_composed
    format: "Who composed {work}?"
    answer_pool: composer_names
    available_from_mastery: 0
    difficulty: 1
  - id: era_of_composer
    format: "Which musical era is {composer} associated with?"
    answer_pool: era_names
    available_from_mastery: 1
    difficulty: 2
  - id: instrument_of_artist
    format: "What instrument is {artist} famous for?"
    answer_pool: instrument_names
    available_from_mastery: 1
    difficulty: 2
  - id: genre_origin
    format: "Which genre originated in {context}?"
    answer_pool: genre_names
    available_from_mastery: 2
    difficulty: 3
  - id: term_definition
    format: "What is the musical term for {description}?"
    answer_pool: music_terms
    available_from_mastery: 0
    difficulty: 1
  - id: album_artist
    format: "Which artist recorded the album {album}?"
    answer_pool: artist_names
    available_from_mastery: 1
    difficulty: 2
  - id: work_composer_reverse
    format: "What famous work is {composer} known for?"
    answer_pool: work_names
    available_from_mastery: 2
    difficulty: 3

# ============================================================
# DIFFICULTY TIERS
# ============================================================
difficulty_tiers:
  easy:
    - "Mozart, Beethoven, Bach, Beatles, Elvis, guitar, piano, violin"
    - "Basic theory terms, universally known works"
  medium:
    - "Chopin, Tchaikovsky, Debussy, Miles Davis, Led Zeppelin"
    - "Era identification, album-artist matching"
  hard:
    - "Rimsky-Korsakov, Bartók, Schoenberg, bebop pioneers"
    - "Musical form distinctions, obscure theory terms"

# ============================================================
# SYNONYM GROUPS
# ============================================================
synonym_groups:
  - id: beethoven_ninth
    facts: [symphony_no_9, ode_to_joy]
    reason: "Same work, different names"
  - id: bach_family
    facts: [js_bach, cpe_bach]
    reason: "Both 'Bach' — must never be distractors for each other"
