  - id: instruments_theory
    name: "Instruments & Theory"
    chainThemeId: 1
    target_facts: 40
    description: "Musical instruments, theory fundamentals, and how music works"
    topics:
      # String family
      - violin (highest string, Stradivarius)
      - viola (alto voice of strings)
      - cello (tenor/bass voice)
      - double bass (lowest string)
      - harp (oldest string instrument type)
      - guitar (most popular instrument worldwide)
      # Woodwind family
      - flute (no reed)
      - clarinet (single reed)
      - oboe (double reed)
      - bassoon (double reed, bass)
      - saxophone (invented by Adolphe Sax, 1846)
      # Brass family
      - trumpet (highest brass)
      - French horn
      - trombone (uses slide)
      - tuba (lowest brass)
      # Keyboard
      - piano (invented by Bartolomeo Cristofori, ~1700)
      - harpsichord (plucked strings, predecessor to piano)
      - organ (pipes, oldest keyboard instrument)
      # Percussion
      - timpani (tuned drums in orchestra)
      - drums/drum kit
      # Theory terms
      - tempo (speed of music)
      - dynamics (volume: pp, p, mp, mf, f, ff)
      - crescendo (gradually louder)
      - diminuendo/decrescendo (gradually softer)
      - allegro (fast), adagio (slow), andante (walking pace)
      - staccato (detached), legato (smooth)
      - fermata (hold note)
      - time signatures (4/4, 3/4 waltz, 6/8)
      # Musical forms
      - sonata (multi-movement work for solo/duo)
      - symphony (multi-movement orchestral work)
      - concerto (soloist + orchestra)
      - opera (sung drama)
      - aria (solo song in opera)
      - cadence (harmonic resolution)
      - opus (work number)
      - libretto (opera text)

