deck_id: french_b1_grammar
name: "French B1 Grammar"
domain: vocabulary
sub_domain: french_grammar
target_facts: 450
minimum_facts: 270
language: fr

data_sources:
  - name: Référentiel B1 pour le français (Beacco et al., Didier)
    url: https://www.didier.fr/livre/referentiel-pour-le-cadre-europeen-commun-b1.html
    license: Reference only — scope/structure. Conseil de l'Europe / Didier, 2011.
    usage: Authoritative B1 grammar scope. Determines which grammar points are included and their canonical descriptions. Cross-referenced against DELF B1 scope (France Éducation International) and Grammaire progressive du français — niveau intermédiaire (CLE International).
  - name: Tatoeba
    url: https://tatoeba.org/
    license: CC BY 2.0
    usage: Verified example sentences with French text + English translation + sentence ID. All sentence IDs documented in data/deck-architectures/_research/french/tatoeba_b1_sentences.tsv.

# -----------------------------------------------------------------
# Chain Themes (by grammar area):
#   0 — subjonctif_present       : subjonctif présent — regular and irregular forms + trigger expressions
#   1 — conditionnel_si_clauses  : conditionnel présent (regular + irregular stems) + si+imparfait→conditionnel + conditionnel passé intro
#   2 — plus_que_parfait         : plus-que-parfait (avais/étais + PP) + temporal sequence
#   3 — pronoms_relatifs_avances : dont / où / ce qui / ce que / ce dont / celui qui / celle que
#   4 — double_pronominalization : me-te-se-nous-vous < le-la-les < lui-leur < y < en order + imperative placement
#   5 — gerondif_participe       : gérondif (en + -ant) uses + participe présent (bare -ant) adjectival/verbal uses
#   6 — passif_discours_rapporte : passif (être + PP + par) + discours rapporté au présent (dire que, demander si, etc.)
#   7 — peripherastiques_connect : verbes périphrastiques (commencer à, finir de, être en train de, venir de) + connecteurs causaux/consécutifs + temps futur avec quand/dès que
#
# Answer Type Pools:
#   subj_er_regular               : subjonctif présent -er verbs (parle, parles, parle, parlions, parliez, parlent)
#   subj_ir_regular               : subjonctif présent -ir verbs (finisse, finisses, finisse, finissions, finissiez, finissent)
#   subj_re_regular               : subjonctif présent -re verbs (vende, vendes, vende, vendions, vendiez, vendent)
#   subj_etre_avoir               : subjonctif présent être (sois/soit/soyons/soyez/soient) + avoir (aie/aies/ait/ayons/ayez/aient)
#   subj_irregulier               : other irregular subjonctifs (aille, fasse, veuille, puisse, sache, faille, vaille)
#   subj_triggers_necessite       : necessity trigger phrases (il faut que, il est nécessaire que, il vaut mieux que, il est important que)
#   subj_triggers_desir_emotion   : desire/emotion trigger phrases (je veux que, j'aimerais que, j'ai peur que, c'est dommage que, bien que)
#   subj_triggers_conjonctions    : purpose/time/condition conjunctions (pour que, avant que, à condition que, à moins que, jusqu'à ce que)
#   conditionnel_present_forms    : conditionnel présent forms — regular and irregular (parlerais, serais, aurais, ferais, irais, viendrais, etc.)
#   conditionnel_passe_forms      : conditionnel passé forms (j'aurais parlé, je serais parti(e), j'aurais dû, tu aurais pu, etc.)
#   si_imparfait_patterns         : full si + imparfait → conditionnel constructions (homogeneityExempt — phrase-level)
#   plus_que_parfait_avoir        : plus-que-parfait with avoir (avais/avait/avions/avaient + PP)
#   plus_que_parfait_etre         : plus-que-parfait with être + agreement (étais parti(e), était arrivé(e), s'étaient couchés)
#   pronoms_relatifs_dont_ou      : dont and où as relative pronouns (short single-word answers for identification)
#   pronoms_ce_qui_ce_que         : ce qui (subject) / ce que (object) / ce dont (de + complement)
#   pronoms_demonstratifs         : celui qui / celui que / celle qui / celle que / ceux qui / celles que
#   double_pronoms_me_te_le       : me/te/nous/vous + le/la/les combinations (me le, te la, nous les, je te le donne)
#   double_pronoms_le_lui_leur    : le/la/les + lui/leur combinations (le lui, la leur, les leur — correct order)
#   double_pronoms_en_y           : m'en, t'en, nous en / il y en a constructions
#   double_pronoms_imperatif      : imperative double pronoun constructions (donne-le-lui, montre-la-leur, ne me le dis pas)
#   gerondif_forms                : en + -ant gerondif forms (en parlant, en faisant, en sortant, en souriant, en travaillant)
#   participe_present_forms       : bare -ant participe présent forms used adjectivally (souriant, vivant, travaillant, obéissant)
#   passif_etre_pp                : passif forms — être (various tenses) + past participle + par (est écrit par, a été élu par, sera envoyé par)
#   discours_rapporte_verbs       : reporting verb structures (dit que, demande si, se demande pourquoi, demande ce que, explique que)
#   peripherastiques_debut_fin    : beginning/end periphrases (commencer à, se mettre à, finir de, arrêter de, cesser de + infinitive)
#   peripherastiques_continuite   : ongoing/recent periphrases (être en train de, venir de, continuer à/de + infinitive)
#   connecteurs_causals           : causal connectors (parce que, puisque, comme, à cause de, grâce à, en raison de, faute de)
#   connecteurs_consecutifs       : consecutive connectors (donc, alors, c'est pourquoi, si bien que, de sorte que, tellement…que)
#   temps_futur_conjonctions      : temporal conjunctions + futur (quand + futur, dès que + futur, une fois que + futur, aussitôt que)
# -----------------------------------------------------------------

chain_themes:
  - id: 0
    name: "Subjonctif Présent"
    description: "Subjonctif présent — regular -er/-ir/-re forms + all irregular paradigms (être, avoir, aller, faire, vouloir, pouvoir, savoir) + trigger expressions (necessity, desire, emotion, purpose, concession, time, condition)"
    color: "#9B59B6"
    icon: "verb"
  - id: 1
    name: "Conditionnel & Si-Clauses"
    description: "Conditionnel présent (regular + irregular stems) + si + imparfait → conditionnel (hypothesis) + conditionnel passé intro (j'aurais dû, tu aurais pu, j'aurais aimé)"
    color: "#E67E22"
    icon: "verb"
  - id: 2
    name: "Plus-que-parfait & Temps Composés"
    description: "Plus-que-parfait with avoir (j'avais parlé, il avait pris) and être (j'étais parti(e), elle était arrivée) + temporal sequence (quand j'ai appelé, il était déjà parti)"
    color: "#1ABC9C"
    icon: "phrase"
  - id: 3
    name: "Pronoms Relatifs Avancés"
    description: "Dont (replaces de + noun) / où (place and time) / ce qui (subject) / ce que (object) / ce dont (de + complement) / celui qui / celle que — indefinite and demonstrative relative forms"
    color: "#27AE60"
    icon: "pronoun"
  - id: 4
    name: "Double Pronominalization"
    description: "Pronoun order: me-te-se-nous-vous < le-la-les < lui-leur < y < en — combinations me le, te la, le lui, les leur, m'en, il y en a + placement with imperatives (donne-le-lui, ne me le dis pas)"
    color: "#F39C12"
    icon: "pronoun"
  - id: 5
    name: "Gérondif & Participe Présent"
    description: "Gérondif (en + -ant): simultaneity, manner, condition, cause — subject must match main clause / Participe présent (bare -ant): adjectival agreement (souriant, vivant, travaillant) + verbal/literary uses"
    color: "#3498DB"
    icon: "verb"
  - id: 6
    name: "Passif & Discours Rapporté"
    description: "Passif: être (any tense) + PP (agreement with subject) + par + agent / Discours rapporté au présent: dire que, demander si, demander ce que/ce qui, se demander pourquoi (tense unchanged with present reporting verb)"
    color: "#E74C3C"
    icon: "structure"
  - id: 7
    name: "Verbes Périphrastiques & Connecteurs Avancés"
    description: "Aspect periphrases: commencer à, se mettre à, finir de, arrêter de, être en train de, venir de + causal connectors (puisque, grâce à, en raison de) + consecutive connectors (si bien que, tellement…que) + quand/dès que + futur"
    color: "#8E44AD"
    icon: "phrase"

