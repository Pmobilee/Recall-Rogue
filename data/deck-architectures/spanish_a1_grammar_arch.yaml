# -----------------------------------------------------------------
# Grammar Point Categories
#
# Chain Themes (by grammar area):
#   0 — present_tense   : regular present indicative (-ar/-er/-ir)
#   1 — ser_estar       : ser vs. estar contrasts
#   2 — irregular_verbs : tener/ir/hacer/querer/poder
#   3 — articles_agreement : articles + gender/number agreement
#   4 — pronouns_possessives : subject pronouns, possessives, demonstratives
#   5 — questions_negation : interrogatives + negation
#   6 — verb_phrases    : ir a, tener que, hay que, estar+gerundio
#   7 — hay_gustar      : hay (existence) + gustar structure
#
# Answer Type Pools (one pool per semantically homogeneous answer type):
#   present_tense_ar   : -ar verb conjugations (hablo, hablas, habla, etc.)
#   present_tense_er   : -er verb conjugations (como, comes, come, etc.)
#   present_tense_ir   : -ir verb conjugations (vivo, vives, vive, etc.)
#   ser_forms          : ser conjugations (soy, eres, es, somos, sois, son)
#   estar_forms        : estar conjugations (estoy, estás, está, estamos, estáis, están)
#   irregular_verb_forms: tener/ir/hacer/querer/poder present forms
#   articles_definite  : el, la, los, las
#   articles_indefinite: un, una, unos, unas
#   demonstratives     : este/esta/estos/estas, ese/esa/esos/esas, aquel/aquella
#   possessives        : mi/mis, tu/tus, su/sus, nuestro/nuestra/nuestros/nuestras
#   subject_pronouns   : yo, tú, él, ella, nosotros, vosotros, ellos, ellas, usted
#   interrogatives     : qué, quién, dónde, cuándo, cómo, por qué, cuánto/a
#   negation_words     : no, nada, nadie, nunca, tampoco
#   verb_phrase_patterns: va a, tiene que, hay que, está + gerundio
# -----------------------------------------------------------------

chain_themes:
  - id: 0
    name: "Present Tense"
    description: "Regular present indicative conjugations for -ar, -er, and -ir verbs"
    color: "#4A9E6B"
    icon: "verb"
  - id: 1
    name: "Ser vs. Estar"
    description: "The two 'to be' verbs — identity/origin (ser) vs. location/state (estar)"
    color: "#C44B4B"
    icon: "contrast"
  - id: 2
    name: "Irregular Verbs"
    description: "Core irregular verbs: tener, ir, hacer, querer, poder in present tense"
    color: "#7B4EA6"
    icon: "star"
  - id: 3
    name: "Articles & Agreement"
    description: "Definite/indefinite articles and noun-adjective gender/number agreement"
    color: "#3A7BD5"
    icon: "article"
  - id: 4
    name: "Pronouns & Possessives"
    description: "Subject pronouns, possessive adjectives, and demonstratives"
    color: "#E87E2E"
    icon: "pronoun"
  - id: 5
    name: "Questions & Negation"
    description: "Interrogative words (qué, dónde, cómo...) and negation with no/nada/nunca"
    color: "#D4A017"
    icon: "question"
  - id: 6
    name: "Verb Phrases"
    description: "ir a + infinitivo, tener que + infinitivo, hay que + infinitivo, estar + gerundio"
    color: "#2E8B57"
    icon: "phrase"
  - id: 7
    name: "Hay & Gustar"
    description: "Hay (existence: there is/are) and the gustar structure (me gusta/me gustan)"
    color: "#8B5E3C"
    icon: "structure"

