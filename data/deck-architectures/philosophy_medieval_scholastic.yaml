description: >
  Christian medieval thought, the Islamic Golden Age, and Jewish medieval
  philosophy (~500–1400 CE). Covers scholasticism, Neoplatonic synthesis,
  the universals debate, and the transmission of Aristotle through Arabic
  into Latin Christendom.

