    verified_data:
      - fact: "First Asian Summer Olympics host"
        answer: "Tokyo 1964"
        context: "Japan hosted the 1964 Summer Olympics in Tokyo — first Summer Olympics in Asia; 1972 Sapporo was first Winter Olympics in Asia"
        source_url: https://en.wikipedia.org/wiki/List_of_Olympic_Games_host_cities

      - fact: "First Winter Olympics in Asia"
        answer: "Sapporo 1972"
        context: "Japan hosted the 1972 Winter Olympics in Sapporo — first Winter Olympics in Asia; preceded Asia's first Summer Olympics (Tokyo 1964)"
        source_url: https://en.wikipedia.org/wiki/List_of_Olympic_Games_host_cities

      - fact: "First Summer Olympics in Southern Hemisphere"
        answer: "Melbourne 1956"
        context: "Australia hosted the 1956 Summer Olympics in Melbourne — first time the Games were held in the Southern Hemisphere"
        source_url: https://en.wikipedia.org/wiki/List_of_Olympic_Games_host_cities

      - fact: "First Summer Olympics in South America"
        answer: "Rio de Janeiro 2016"
        context: "Brazil hosted the 2016 Summer Olympics in Rio de Janeiro — first time Summer Olympics were held in South America"
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - fact: "No African Summer Olympics host"
        answer: "No African city has hosted the Summer Olympics as of 2026"
        context: "Despite Africa being the world's second-largest continent by population, no African city has ever hosted the Summer Olympics. This is the most glaring geographic gap in Olympic hosting history."
        source_url: https://en.wikipedia.org/wiki/List_of_Olympic_Games_host_cities

      - fact: "USA-led boycott of 1980 Moscow Olympics"
        answer: "Soviet invasion of Afghanistan"
        context: "US President Jimmy Carter led a boycott of the 1980 Moscow Summer Olympics in protest of the Soviet Union's invasion of Afghanistan (December 1979); approximately 65 nations did not attend"
        source_url: https://en.wikipedia.org/wiki/1980_Summer_Olympics_boycott

      - fact: "Soviet-led boycott of 1984 Los Angeles Olympics"
        answer: "Retaliation for 1980 US boycott (Soviet-led Eastern Bloc)"
        context: "The Soviet Union and approximately 14 Eastern Bloc nations boycotted the 1984 Los Angeles Summer Olympics, citing security concerns — widely seen as retaliation for the 1980 US-led Moscow boycott"
        source_url: https://en.wikipedia.org/wiki/1984_Summer_Olympics_boycott

      - fact: "All-time most Olympic medals — nation (combined)"
        answer: "United States"
        context: "The United States has won the most combined Olympic medals of any nation in history, with over 2,600 medals (Summer + Winter combined) as of 2024. Note: Soviet Union medals are counted separately in all-time tables."
        source_url: https://en.wikipedia.org/wiki/All-time_Olympic_Games_medal_table

      - fact: "All-time most Winter Olympics golds — nation"
        answer: "Norway"
        context: "Norway has won more Winter Olympic gold medals than any other nation, with 166+ gold medals through 2022. Norway's dominance in Nordic skiing and biathlon drives its Winter medal superiority."
        source_url: https://en.wikipedia.org/wiki/All-time_Olympic_Games_medal_table

      - fact: "City that has hosted Summer Olympics three times"
        answer: "London"
        context: "London has hosted the Summer Olympics three times: 1908, 1948, and 2012 — more than any other city. Paris also reached three times with 1900, 1924, 2024."
        source_url: https://en.wikipedia.org/wiki/List_of_Olympic_Games_host_cities

      - fact: "Olympic rings introduced"
        answer: "1920 Antwerp"
        context: "The Olympic flag bearing five interlocking rings was first raised at the 1920 Antwerp Olympics. The rings represent the five continents whose athletes participate; designed by Pierre de Coubertin in 1913."
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - fact: "First Olympic flame at Games"
        answer: "1928 Amsterdam"
        context: "The first symbolic flame at the Olympic Games was lit at the 1928 Amsterdam Olympics — by an Amsterdam Electric Utility employee in the Marathon Tower. It was not yet a relay from Olympia."
        source_url: https://en.wikipedia.org/wiki/Olympic_flame

      - fact: "Olympic torch relay introduced"
        answer: "1936 Berlin"
        context: "The Olympic torch relay from Olympia, Greece to the host city was first held for the 1936 Berlin Olympics, covering 3,187 km with 3,331 runners in 12 days. It was designed by Carl Diem and promoted heavily by Nazi Germany."
        source_url: https://en.wikipedia.org/wiki/Olympic_flame

      - fact: "South Africa Olympic ban duration"
        answer: "1964-1988 (excluded from 5 Summer Games)"
        context: "South Africa was banned from Olympic competition from 1964 to 1988 due to its apartheid policies. The ban lasted 24 years across 5 Summer Games; South Africa returned at the 1992 Barcelona Olympics."
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - fact: "First city to host both Summer and Winter Olympics"
        answer: "Beijing"
        context: "Beijing hosted the 2008 Summer Olympics and the 2022 Winter Olympics, becoming the first city to host both Summer and Winter Games"
        source_url: https://en.wikipedia.org/wiki/List_of_Olympic_Games_host_cities

      - fact: "Olympic Games cancelled for World Wars"
        answer: "1916, 1940, 1944 (three editions)"
        context: "Three Summer Olympics and two Winter Olympics were cancelled due to World Wars: 1916 Berlin (WWI), and 1940 and 1944 editions for both Summer and Winter (WWII)"
        source_url: https://en.wikipedia.org/wiki/List_of_Olympic_Games_host_cities

      - fact: "2020 Tokyo postponed"
        answer: "COVID-19 pandemic"
        context: "The 2020 Tokyo Summer Olympics were postponed to 2021 due to the COVID-19 pandemic — the first Olympic postponement in history; the Games were held without spectators"
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

