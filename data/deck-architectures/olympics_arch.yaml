    verified_data:
      - name: "Jesse Owens — four golds in Nazi Germany"
        year: 1936
        games: Summer
        host: Berlin
        fact: "Jesse Owens won 4 gold medals (100m, 200m, long jump, 4x100m relay) in front of Adolf Hitler at the 1936 Berlin Games, directly contradicting Nazi Aryan supremacy propaganda"
        source_url: https://en.wikipedia.org/wiki/Jesse_Owens

      - name: "First Olympic torch relay"
        year: 1936
        games: Summer
        host: Berlin
        fact: "The first Olympic torch relay, introduced for the 1936 Berlin Games, carried flame from Olympia, Greece to Berlin over 3,187 km by 3,331 runners in 12 days — designed by Carl Diem, promoted by Nazi propaganda minister Joseph Goebbels"
        source_url: https://en.wikipedia.org/wiki/Olympic_flame

      - name: "Nadia Comaneci's perfect 10"
        year: 1976
        games: Summer
        host: Montreal
        fact: "On July 18, 1976, Romanian gymnast Nadia Comăneci (age 14) became the first person to receive a perfect score of 10 in Olympic gymnastics — the scoreboard, not designed to show 10.00, displayed '1.00'"
        source_url: https://en.wikipedia.org/wiki/Nadia_Com%C4%83neci

      - name: "Munich Massacre"
        year: 1972
        games: Summer
        host: Munich
        fact: "On September 5-6, 1972, members of the Palestinian militant group Black September took 11 Israeli Olympic team members hostage at the Munich Olympic Village; all 11 Israeli hostages and 1 German officer were killed in the ensuing events"
        sensitive_content_note: "Factual framing; include respectfully. One fact max."
        source_url: https://en.wikipedia.org/wiki/Munich_massacre

      - name: "Mark Spitz — 7 golds and 7 world records"
        year: 1972
        games: Summer
        host: Munich
        fact: "Mark Spitz (USA) won 7 gold medals at the 1972 Munich Olympics, setting a world record in every single event — a feat unmatched for 36 years until Michael Phelps's 8 golds at 2008 Beijing"
        source_url: https://en.wikipedia.org/wiki/Mark_Spitz

      - name: "Bob Beamon's long jump world record"
        year: 1968
        games: Summer
        host: Mexico City
        fact: "Bob Beamon (USA) jumped 8.90 metres at the 1968 Mexico City Olympics, shattering the previous long jump world record by 55 cm — the record stood for 23 years until Mike Powell broke it in 1991"
        source_url: https://en.wikipedia.org/wiki/Bob_Beamon

      - name: "Black Power salute — 1968 podium"
        year: 1968
        games: Summer
        host: Mexico City
        fact: "Tommie Smith and John Carlos (USA), gold and bronze medalists in the 200m at 1968 Mexico City, raised black-gloved fists during the US national anthem on the podium — both were expelled from the US team"
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - name: "Miracle on Ice"
        year: 1980
        games: Winter
        host: Lake Placid
        fact: "On February 22, 1980, the US ice hockey team — average age 21, mostly college players — defeated the heavily favored Soviet Union 4-3 at the Lake Placid Winter Olympics; the US went on to win gold by beating Finland"
        source_url: https://en.wikipedia.org/wiki/Miracle_on_Ice

      - name: "Torvill and Dean's perfect Bolero"
        year: 1984
        games: Winter
        host: Sarajevo
        fact: "British ice dancers Jayne Torvill and Christopher Dean performed their Bolero routine at the 1984 Sarajevo Winter Olympics and received 12 perfect 6.0 scores — all 9 judges gave them maximum marks for artistic impression"
        source_url: https://en.wikipedia.org/wiki/List_of_Olympic_Games_host_cities

      - name: "Eric Heiden's speed skating sweep"
        year: 1980
        games: Winter
        host: Lake Placid
        fact: "Eric Heiden (USA) won all 5 individual speed skating events at the 1980 Lake Placid Winter Olympics — from the 500m sprint to the 10,000m — setting a world record in every distance event"
        source_url: https://en.wikipedia.org/wiki/List_of_Olympic_Games_host_cities

