    rule: "Use the designation active during specific Games"
    entries:
      - name: Germany
        period: "1896-1912, 1928-1936, 1952-1964 (as unified Gesamtdeutsche Mannschaft), 1994-present"
      - name: "West Germany"
        period: "1968-1988 Summer and Winter"
        ioc_code: FRG
      - name: "East Germany"
        period: "1968-1988 Summer and Winter"
        ioc_code: GDR
        note: "Birgit Fischer's 1980 Canoeing gold is under East Germany. Her 1992-2004 golds are under Germany."

