sub_decks:
  - id: summer_olympics_games
    name: "Summer Games — Host & History"
    chain_theme: "Summer Games"
    chain_theme_id: 0
    estimated_facts: 90
    notes: >
      ~3 facts per edition × 29 editions = ~87 facts.
      Covers: host city/country, year, notable first/record, top medal nation, opening ceremony notable.
      SKIP: 1916 (WWI cancelled), 1940 (WWII cancelled), 1944 (WWII cancelled).
      NOTE: 1906 Intercalated Games are NOT IOC-recognized — exclude entirely.
      NOTE: 2020 Tokyo held in 2021 due to COVID-19 — use "2020 Summer Olympics" as the official name.

    verified_data:
      - edition: 1
        year: 1896
        host_city: Athens
        host_country: Greece
        top_medal_nation: United States
        notable: "First modern Olympic Games; organized by Pierre de Coubertin; 14 nations, 241 athletes, 9 sports"
        notable_first: "First modern Olympics since ancient Greek era ended in 393 CE"
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: 2
        year: 1900
        host_city: Paris
        host_country: France
        top_medal_nation: United States
        notable: "Part of World's Fair; first Games to allow women; 997 athletes, 26 nations"
        notable_first: "First Olympic Games to include women athletes"
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: 3
        year: 1904
        host_city: St. Louis
        host_country: United States
        top_medal_nation: United States
        notable: "Part of Louisiana Purchase Exposition World's Fair; only 12 non-US nations competed due to travel cost"
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: 4
        year: 1908
        host_city: London
        host_country: Great Britain
        top_medal_nation: Great Britain
        notable: "Originally awarded to Rome; moved to London after Mount Vesuvius eruption (1906). First marathon measured at 26.2 miles to accommodate royal family viewing"
        source_url: https://en.wikipedia.org/wiki/List_of_Olympic_Games_host_cities

      - edition: 5
        year: 1912
        host_city: Stockholm
        host_country: Sweden
        top_medal_nation: United States
        notable: "First use of electrical timing and photo-finish technology. First Games with athletes from all 5 continents"
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: "1916 CANCELLED"
        year: 1916
        host_city: Berlin
        host_country: Germany
        cancelled_reason: "World War I"
        source_url: https://en.wikipedia.org/wiki/List_of_Olympic_Games_host_cities

      - edition: 6
        year: 1920
        host_city: Antwerp
        host_country: Belgium
        top_medal_nation: United States
        notable: "First Games after WWI; Olympic flag with five rings debuted; Olympic oath introduced"
        notable_first: "First use of the Olympic flag (five interlocking rings)"
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: 7
        year: 1924
        host_city: Paris
        host_country: France
        top_medal_nation: United States
        notable: "Paavo Nurmi won 5 gold medals in 6 days. Inspired the film Chariots of Fire (Harold Abrahams, Eric Liddell)"
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: 8
        year: 1928
        host_city: Amsterdam
        host_country: Netherlands
        top_medal_nation: United States
        notable: "First time Olympic flame lit at the Games (not a relay yet; employee of Amsterdam Electric Utility lit it)"
        notable_first: "First Olympic flame at the Games"
        source_url: https://en.wikipedia.org/wiki/Olympic_flame

      - edition: 9
        year: 1932
        host_city: Los Angeles
        host_country: United States
        top_medal_nation: United States
        notable: "First use of the Olympic Village for athletes. Great Depression reduced athlete attendance by ~50%"
        notable_first: "First Olympic Village purpose-built for athletes"
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: 10
        year: 1936
        host_city: Berlin
        host_country: Germany
        top_medal_nation: Germany
        notable: "Jesse Owens won 4 gold medals (100m, 200m, long jump, 4x100m relay), embarrassing Nazi regime's Aryan supremacy narrative. First Olympics broadcast on television. First torch relay from Olympia to host city."
        notable_first: "First Olympic torch relay from Olympia to the host city (Carl Diem, Nazi Germany)"
        source_url: https://en.wikipedia.org/wiki/Olympic_flame

      - edition: 11
        year: 1948
        host_city: London
        host_country: Great Britain
        top_medal_nation: United States
        notable: "First post-WWII Games; Germany and Japan excluded. Called 'Austerity Olympics' due to post-war rationing. First Games broadcast on BBC television."
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: 12
        year: 1952
        host_city: Helsinki
        host_country: Finland
        top_medal_nation: United States
        notable: "First Games for the Soviet Union; Cold War rivalry began. Emil Zatopek won marathon, 5000m, and 10000m in one week."
        notable_first: "First Olympic Games for the Soviet Union"
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: 13
        year: 1956
        host_city: Melbourne
        host_country: Australia
        top_medal_nation: Soviet Union
        notable: "First Games in Southern Hemisphere. Equestrian events held separately in Stockholm due to Australian quarantine laws. Soviet Union topped medal table for first time."
        notable_first: "First Summer Olympics in the Southern Hemisphere"
        source_url: https://en.wikipedia.org/wiki/List_of_Olympic_Games_host_cities

      - edition: 14
        year: 1960
        host_city: Rome
        host_country: Italy
        top_medal_nation: Soviet Union
        notable: "Cassius Clay (later Muhammad Ali) won boxing light-heavyweight gold. Abebe Bikila of Ethiopia won marathon barefoot — first Black African Olympic champion."
        notable_first: "First Olympic gold medal won by a Black African athlete (Abebe Bikila, marathon)"
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: 15
        year: 1964
        host_city: Tokyo
        host_country: Japan
        top_medal_nation: United States
        notable: "First Olympics in Asia. South Africa banned for apartheid policies (ban lasted until 1992). Judo and volleyball added as Olympic sports."
        notable_first: "First Summer Olympics in Asia"
        source_url: https://en.wikipedia.org/wiki/List_of_Olympic_Games_host_cities

      - edition: 16
        year: 1968
        host_city: Mexico City
        host_country: Mexico
        top_medal_nation: United States
        notable: "Bob Beamon's 8.90m long jump world record (stood until 1991). Tommie Smith and John Carlos raised Black Power fist salute on podium. High altitude (2,240m) aided sprint times."
        notable_first: "First Olympics in Latin America"
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: 17
        year: 1972
        host_city: Munich
        host_country: West Germany
        top_medal_nation: Soviet Union
        notable: "Mark Spitz won 7 gold medals (all world records) in swimming. Munich Massacre: Black September terrorists killed 11 Israeli athletes and coaches on Sept 5-6."
        source_url: https://en.wikipedia.org/wiki/Munich_massacre

      - edition: 18
        year: 1976
        host_city: Montreal
        host_country: Canada
        top_medal_nation: Soviet Union
        notable: "Nadia Comaneci earned first perfect 10 in Olympic gymnastics history (July 18, 1976, uneven bars). 29 African nations boycotted over New Zealand's rugby tour of South Africa."
        source_url: https://en.wikipedia.org/wiki/Nadia_Com%C4%83neci

      - edition: 19
        year: 1980
        host_city: Moscow
        host_country: Soviet Union
        top_medal_nation: Soviet Union
        notable: "USA-led boycott by approximately 65 nations protesting Soviet invasion of Afghanistan. USA, West Germany, Japan among boycotters. Soviet Union topped medal table."
        source_url: https://en.wikipedia.org/wiki/1980_Summer_Olympics_boycott

      - edition: 20
        year: 1984
        host_city: Los Angeles
        host_country: United States
        top_medal_nation: United States
        notable: "Soviet-led boycott by 14 Eastern Bloc nations in retaliation for 1980 boycott. Carl Lewis won 4 gold medals emulating Jesse Owens (100m, 200m, long jump, 4x100m relay)."
        source_url: https://en.wikipedia.org/wiki/1984_Summer_Olympics_boycott

      - edition: 21
        year: 1988
        host_city: Seoul
        host_country: South Korea
        top_medal_nation: Soviet Union
        notable: "Ben Johnson stripped of 100m gold after positive steroid test (Canadian sprinter). First Olympics in South Korea. First Games after end of apartheid-era boycotts began."
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: 22
        year: 1992
        host_city: Barcelona
        host_country: Spain
        top_medal_nation: Unified Team
        notable: "South Africa returned after 32-year apartheid ban. USA basketball Dream Team (Jordan, Bird, Magic) dominated. Unified Team (former Soviet states) competed together for last time."
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: 23
        year: 1996
        host_city: Atlanta
        host_country: United States
        top_medal_nation: United States
        notable: "Centennial Olympics. Michael Johnson won 200m (19.32 WR) and 400m — only man to win both at one Olympics. Centennial Olympic Park bombing killed 2."
        source_url: https://en.wikipedia.org/wiki/Michael_Johnson_(sprinter)

      - edition: 24
        year: 2000
        host_city: Sydney
        host_country: Australia
        top_medal_nation: United States
        notable: "Cathy Freeman lit the cauldron and won 400m gold — powerful moment for Aboriginal Australian reconciliation. 'Best Olympics ever' per IOC. 200 nations, 10,651 athletes."
        source_url: https://en.wikipedia.org/wiki/Cathy_Freeman

      - edition: 25
        year: 2004
        host_city: Athens
        host_country: Greece
        top_medal_nation: United States
        notable: "Olympics returned to birthplace in Athens for centennial of modern Games. Michael Phelps won 8 medals (6 gold) in debut full Olympics."
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: 26
        year: 2008
        host_city: Beijing
        host_country: China
        top_medal_nation: China
        notable: "Usain Bolt set 100m WR (9.69s later revised to 9.58s at 2009 Worlds) and 200m WR. Michael Phelps won 8 gold medals in one Games. China topped gold medal table for first time."
        notable_first: "First Summer Olympics in China; China topped gold medal table"
        source_url: https://en.wikipedia.org/wiki/Usain_Bolt

      - edition: 27
        year: 2012
        host_city: London
        host_country: Great Britain
        top_medal_nation: United States
        notable: "London became first city to host Summer Olympics three times (1908, 1948, 2012). Usain Bolt won 100m and 200m again. Michael Phelps surpassed Larisa Latynina for most Olympic medals ever."
        notable_first: "First city to host Summer Olympics three times"
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: 28
        year: 2016
        host_city: Rio de Janeiro
        host_country: Brazil
        top_medal_nation: United States
        notable: "First Olympics in South America. Simone Biles won 4 gold medals. Usain Bolt completed historic 100m-200m-relay triple for third consecutive Games."
        notable_first: "First Summer Olympics in South America"
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: 29
        year: 2020
        host_city: Tokyo
        host_country: Japan
        top_medal_nation: United States
        notable: "Postponed one year to 2021 due to COVID-19 pandemic — first Olympic postponement in history. Held without spectators. Simone Biles withdrew from team final citing mental health. Skateboarding, sport climbing, surfing, karate debuted."
        notable_first: "First Olympic Games postponed (held in 2021)"
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

      - edition: 30
        year: 2024
        host_city: Paris
        host_country: France
        top_medal_nation: United States
        notable: "Paris hosted for third time (1900, 1924, 2024). Simone Biles won 3 more golds. Breaking (breakdancing) debuted as Olympic sport — and was immediately removed for 2028. Katie Ledecky won 2 more golds bringing total to 9."
        source_url: https://en.wikipedia.org/wiki/Summer_Olympic_Games

