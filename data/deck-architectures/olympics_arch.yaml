# ============================================================
# POOL DESIGN WARNINGS
# ============================================================
pool_design_warnings:
  - "summer_host_cities vs winter_host_cities — KEEP SEPARATE. Some cities appear in both (Beijing: Summer 2008, Winter 2022). If combined, distractors become implausible (1936 Summer was Berlin, 1936 Winter was Garmisch-Partenkirchen — impossible to distinguish without season label)."

  - "olympic_medal_counts_career — potential length heterogeneity is irrelevant (they're integers) but SEMANTIC heterogeneity is real: '28' means Phelps TOTAL but also '28' could be a year value. These pools must not be mixed. Architect phase: create separate fact pools for career_medal_counts."

  - "winter_host_cities — Garmisch-Partenkirchen (24 chars) vs Oslo (4 chars) = 6x ratio. Flag for pool-homogeneity analysis. Will need homogeneityExempt because geographic naming is inherent."

  - "summer_olympians_names and winter_olympians_names — NEVER combine into one pool. The question 'Who is the most decorated Winter Olympian?' must not offer Michael Phelps as a distractor. Season-specific pools protect quiz integrity."

  - "Soviet Union vs Russia — these are SEPARATE pool members for any nation-answer pool. Soviet Union competed 1952-1988 (and 1956 Winter). Russia competed 1994 onward. 'Unified Team' (EUN) competed at 1992. 'Olympic Athletes from Russia' (OAR) at 2018. 'Russian Olympic Committee' (ROC) at 2020. Do NOT treat as synonyms."

  - "East Germany (GDR) vs Germany — SEPARATE pool members. East Germany competed as a separate team 1968-1988 (they first competed in unified German team 1956-1964 as 'Unified Team of Germany'). Birgit Fischer won GDR gold in 1980/1988 and then German gold 1992-2004."

  - "Czechoslovakia vs Czech Republic/Slovakia — SEPARATE. Czechoslovakia competed until 1992 (dissolution 1993). Czech Republic first competed 1994. Slovakia first competed 1994. Emil Zatopek = Czechoslovakia. Vera Caslavska = Czechoslovakia."

  - "Yugoslavia vs successor states — Yugoslavia (SFR Yugoslavia) hosted 1984 Winter Games in Sarajevo. Yugoslavia dissolved 1992. Bosnia and Herzegovina hosted, not present-day Serbia or Croatia."

  - "Michael Johnson disambiguation — full reference 'Michael Johnson (sprinter)' required to avoid confusion with Michael Johnson the boxer (1992 gold, USA) and other Olympians named Michael Johnson."

  - "sport_names pool — scope is enormous (hundreds of events); keep sport_names as high-level sport names not event names. Split summer_sports and winter_sports. Do NOT mix 'speed skating' (winter) and 'rowing' (summer) in one undifferentiated pool."

  - "1906 Intercalated Games — IOC derecognized these in 1949. Do NOT include facts about them. Ray Ewry competed in 1906 but his 1906 medals do NOT count in official tallies."

  - "2020 Tokyo Games — official name is '2020 Summer Olympics' even though held in 2021 due to COVID postponement. Always use '2020' as the year label."

