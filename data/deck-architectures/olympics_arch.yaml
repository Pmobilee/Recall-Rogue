        period: "1992 Summer and Winter only"
        ioc_code: EUN
        context: "Commonwealth of Independent States (former Soviet states) competed together one last time"
      - name: Russia
        period: "1994 onward Summer and Winter"
        ioc_code: RUS
        exceptions: "2018 = OAR (Olympic Athletes from Russia); 2020 = ROC (Russian Olympic Committee); 2022 = ROC"

