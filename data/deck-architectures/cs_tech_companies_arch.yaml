# NOTE: This is sub-deck 7 of the Computer Science & Technology deck.
# All facts sourced from Wikipedia/Wikidata, verified via direct article lookup.
# Wikidata QIDs included for every entry that has one.
#
# CORRECTIONS from brief:
# - Oracle co-founders: Bob Miner, Ed Oates, AND Larry Ellison (not just Ellison). Founded 1977.
# - Adobe: founded December 1982 by John Warnock and Charles Geschke (Mountain View, CA not San Jose)
# - Dell: founded May 3, 1984 (originally "PC's Limited") by Michael Dell at University of Texas Austin
#   (brief says "dorm room" which is essentially correct — he started it from his dorm at UT Austin)
# - Cisco: founded December 10, 1984 by Leonard Bosack and Sandy Lerner (in San Francisco, CA)
#   (brief says 1984 with no founders — verified founders are Bosack and Lerner, not just generic 1984)
# - Tesla: founded July 1, 2003 by Martin Eberhard and Marc Tarpenning (NOT Elon Musk)
#   Elon Musk joined in 2004 as chairman of the board (Series A investor)
# - GitHub: founded February 8, 2008 by Tom Preston-Werner, Chris Wanstrath, P.J. Hyett, Scott Chacon
#   (brief says Joel Spolsky — WRONG. Joel Spolsky co-founded Stack Overflow, not GitHub)
# - Stack Overflow: launched September 15, 2008 by Jeff Atwood and Joel Spolsky
# - Photoshop: released February 19, 1990, created by Thomas Knoll and John Knoll
#   (brief says "1990" — correct; originally created in 1987 by the Knolls but published by Adobe Feb 1990)
# - VisiCalc: created by Dan Bricklin AND Bob Frankston (not just Bricklin)
# - NVIDIA: founded 1993 by Jensen Huang, Chris Malachowsky, and Curtis Priem (not just Huang)
# - IBM: founded as CTR in 1911; renamed IBM in 1924 (correct)
# - HP: founded 1939 by Bill Hewlett and David Packard in a garage in Palo Alto, California (correct)
# - Microsoft: founded 1975 (correct, by Bill Gates and Paul Allen)
# - Apple: founded 1976 by Steve Jobs, Steve Wozniak, Ronald Wayne (correct)

