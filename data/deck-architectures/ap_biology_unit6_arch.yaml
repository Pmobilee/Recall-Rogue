deck_id: ap_biology_unit6
name: "AP Biology — Unit 6: Gene Expression and Regulation"
domain: natural_sciences
sub_domain: biology
description: "Master AP Biology Unit 6 — Gene Expression and Regulation (12-16% of exam weight). Covers DNA and RNA structure, DNA replication machinery, transcription and RNA processing in prokaryotes and eukaryotes, translation and the genetic code, regulation of gene expression at every level (chromatin remodeling, transcription factors, post-transcriptional, translational, post-translational), cell specialization through differential gene expression, mutation types and consequences, and biotechnology applications (PCR, gel electrophoresis, CRISPR-Cas9, restriction enzymes, DNA cloning). Aligned to College Board AP Biology CED Topics 6.1-6.8."
minimum_facts: 140
target_facts: 160

