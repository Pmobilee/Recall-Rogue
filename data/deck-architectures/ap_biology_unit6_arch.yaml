answer_type_pools:

  # POOL 1: term_definitions
  # "What is [term]?" or "Which term describes [definition]?"
  # Definitions of biological terms, models, and concepts
  - id: term_definitions
    format: term
    estimated_count: 32
    note: >
      Codon, anticodon, operon, operator, promoter, enhancer, silencer, transcription factor,
      spliceosome, intron, exon, mutation, point mutation, frameshift, missense, nonsense,
      silent mutation, mutagen, epigenetics, telomere, replication fork, Okazaki fragment,
      leading strand, lagging strand, reading frame, recombinant DNA, plasmid, transformation,
      totipotent, pluripotent, multipotent, euchromatin, heterochromatin, wobble.
      Answers are single-term or short-phrase definitions. Key confusions: intron vs. exon,
      missense vs. nonsense vs. silent mutation, enhancer vs. promoter vs. operator.

  # POOL 2: process_names
  # "What process [does X]?" or "What is the name of [description]?"
  # Names of biological processes and mechanisms
  - id: process_names
    format: term
    estimated_count: 22
    note: >
      Transcription, translation, DNA replication, RNA splicing, alternative splicing,
      semiconservative replication, RNA interference (RNAi), histone acetylation,
      histone deacetylation, DNA methylation, chromatin remodeling, transformation,
      PCR, gel electrophoresis, DNA cloning, CRISPR-Cas9, gene therapy, DNA fingerprinting,
      cell differentiation, cell determination, epigenetic inheritance. Answers are process
      or technique names. Key confusions: transcription vs. translation, PCR vs. DNA cloning,
      RNAi vs. siRNA vs. miRNA.

  # POOL 3: molecule_names
  # "What molecule [does X]?" or "Which molecule [is responsible for Y]?"
  # Names of enzymes, proteins, RNA types, and other molecules
  - id: molecule_names
    format: term
    estimated_count: 28
    note: >
      RNA polymerase, DNA polymerase III, DNA polymerase I, helicase, primase, DNA ligase,
      topoisomerase, single-strand binding protein (SSBP), telomerase, aminoacyl-tRNA synthetase,
      release factor, Taq polymerase, restriction enzyme, CAP (catabolite activator protein),
      repressor, spliceosome / snRNP, RISC, miRNA, siRNA, MyoD, ubiquitin, proteasome,
      Cas9, histone acetyltransferase (HAT), histone deacetylase (HDAC). Answers are protein
      or molecule names. Key confusions: helicase vs. topoisomerase, DNA Pol I vs. Pol III,
      miRNA vs. siRNA, primase vs. DNA polymerase.

  # POOL 4: location_terms
  # "Where does [process] occur?" or "In which cellular location is [molecule] found?"
  - id: location_terms
    format: term
    estimated_count: 14
    note: >
      Nucleus (transcription in eukaryotes), cytoplasm (translation, prokaryotic transcription),
      ribosome (translation), rough ER (secretory protein translation), A site / P site / E site
      (ribosomal sites), replication fork (DNA replication), nucleoid (prokaryotic DNA),
      operator (repressor binding), telomere (chromosome ends). Key confusions:
      nucleus vs. cytoplasm for transcription (eukaryotic vs. prokaryotic), A vs. P vs. E site
      functions during translation.

  # POOL 5: function_terms
  # "What is the function of [enzyme/structure/sequence]?"
  # Descriptions of molecular functions
  - id: function_terms
    format: short_answer
    estimated_count: 28
    note: >
      What does helicase do at the replication fork? What is the function of the 5' cap?
      What does the 3' poly-A tail do? What is the role of the spliceosome? What does
      telomerase do? What is the function of the A site? What does aminoacyl-tRNA synthetase
      do? What is the role of the TATA box? What does the lac repressor do? What is the
      function of CAP-cAMP? What does histone acetylation accomplish? What is the role of
      miRNA in gene regulation? Answers describe a function. Key confusions: helicase vs.
      topoisomerase roles; 5' cap vs. poly-A tail functions; lac repressor vs. CAP roles.

  # POOL 6: comparison_terms
  # Facts that frame a direct comparison between two related things
  - id: comparison_terms
    format: term
    estimated_count: 18
    note: >
      DNA vs. RNA structure (sugar, bases, strandedness), leading vs. lagging strand
      synthesis, introns vs. exons, prokaryotic vs. eukaryotic transcription (cap, tail,
      splicing, location), lac operon (inducible) vs. trp operon (repressible),
      euchromatin vs. heterochromatin, missense vs. nonsense vs. silent mutation,
      somatic vs. germline mutations, miRNA vs. siRNA, totipotent vs. pluripotent vs.
      multipotent stem cells, Sanger sequencing vs. next-generation sequencing,
      sticky ends vs. blunt ends, PCR vs. DNA cloning purpose. Answers identify one
      member of the contrast pair or the key distinguishing feature.

  # POOL 7: bracket_numbers
  # Facts with specific numerical values testable as fill-in-the-blank
  - id: bracket_numbers
    format: numeric
    estimated_count: 18
    note: >
      64 (total codons), 61 (sense codons), 3 (stop codons), 20 (amino acids in genetic
      code), 2 (hydrogen bonds in A-T), 3 (hydrogen bonds in G-C), ~200 (poly-A tail
      adenines), ~25 bp upstream (TATA box position), ~22 nucleotides (miRNA length),
      ~21 nucleotides (siRNA length), 1958 (Meselson-Stahl experiment), 1953 (Watson-Crick
      double helix), ~1,000-2,000 nt (prokaryotic Okazaki fragments), ~100-200 nt (eukaryotic
      Okazaki fragments), 95°C / 55°C / 72°C (PCR temperatures), 3 Na+ out / 2 K+ in
      (not Unit 6 but cross-referenced), 10^9 (spontaneous mutation rate denominator).
      Distractors must be nearby plausible numbers (e.g., 3 vs. 2 hydrogen bonds,
      61 vs. 64 vs. 60 codons).

