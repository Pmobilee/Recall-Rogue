# ============================================================
# CHAIN THEMES — 2 thematic zones for Unit 5
# Theme assignment: 5.1-5.2 → meiosis_genetics
#                   5.3-5.6 → mendelian_inheritance
# ============================================================

chain_themes:

  - id: 0
    name: "Meiosis and Genetic Diversity"
    ced_coverage: "Unit 5 Topics 5.1-5.2: Meiosis, Sources of Genetic Variation, Nondisjunction, Aneuploidy"
    target_facts: 32
    description: >
      The mechanics of meiosis and how sexual reproduction generates genetic variation.
      Players master each phase of meiosis I and meiosis II, understand the critical
      distinction between reductional division (meiosis I, homologs separate) and
      equational division (meiosis II, sister chromatids separate), and trace three
      sources of genetic diversity: crossing over at chiasmata during prophase I,
      random orientation of homologous pairs at metaphase I (independent assortment),
      and random fertilization. Nondisjunction, aneuploidy, trisomy, monosomy, and
      polyploidy are covered with human examples.
    key_concepts:
      # --- Topic 5.1: Meiosis ---
      - "Meiosis: two rounds of cell division producing 4 haploid daughter cells from 1 diploid parent cell"
      - "Purpose of meiosis: produce gametes (sperm and egg) with half the chromosome number of the parent"
      - "Diploid (2n) to haploid (n): humans go from 2n=46 to n=23 during meiosis"
      - "Meiosis I: reductional division — homologous chromosomes separate; reduces chromosome number by half"
      - "Meiosis II: equational division — sister chromatids separate; similar to mitosis but starts with haploid cells"
      - "Prophase I: chromosomes condense; homologous chromosomes pair up (synapsis) forming tetrads (bivalents); crossing over occurs at chiasmata"
      - "Crossing over: exchange of genetic material between non-sister chromatids of homologous chromosomes; occurs during prophase I at points called chiasmata"
      - "Metaphase I: homologous pairs (tetrads) align at the metaphase plate; orientation of each pair is random (basis of independent assortment)"
      - "Anaphase I: homologous chromosomes separate and move to opposite poles; sister chromatids remain joined at centromere"
      - "Telophase I and Cytokinesis I: two haploid cells form; each cell has n chromosomes but each chromosome still consists of two joined sister chromatids"
      - "Prophase II: chromosomes condense again in each of the two haploid cells; no crossing over occurs"
      - "Metaphase II: individual chromosomes (not pairs) align at the metaphase plate in each cell"
      - "Anaphase II: sister chromatids separate at the centromere and move to opposite poles"
      - "Telophase II and Cytokinesis II: four haploid daughter cells produced; each has n unreplicated chromosomes"
      - "Key difference from mitosis: meiosis has two divisions and produces 4 haploid cells; mitosis has one division and produces 2 diploid cells"
      - "Homologous chromosomes: a matched pair of chromosomes (one from each parent) carrying genes for the same traits but possibly different alleles"
      - "Sister chromatids: two identical DNA copies of a chromosome joined at the centromere; produced during DNA replication in S phase"
      # --- Topic 5.2: Meiosis and Genetic Diversity ---
      - "Three sources of genetic variation in sexual reproduction: crossing over, independent assortment, and random fertilization"
      - "Independent assortment: random orientation of homologous pairs at metaphase I; each pair orients independently, producing 2^n possible gamete chromosome combinations"
      - "Number of possible gamete combinations from independent assortment in humans: 2^23 = approximately 8.4 million"
      - "Crossing over creates recombinant chromosomes: new allele combinations not present in either parent chromosome"
      - "Random fertilization: any sperm can fertilize any egg; vastly multiplies the number of genetically unique offspring possible"
      - "Nondisjunction: failure of chromosomes or chromatids to separate properly during meiosis"
      - "Nondisjunction in meiosis I: both homologous chromosomes go to the same pole → gametes with n+1 or n-1 chromosomes"
      - "Nondisjunction in meiosis II: sister chromatids fail to separate → gametes with n+1 or n-1 chromosomes"
      - "Aneuploidy: condition of having an abnormal number of chromosomes (not a multiple of the haploid number)"
      - "Trisomy: having three copies of a particular chromosome (2n+1); example: Down syndrome is trisomy 21 (three copies of chromosome 21)"
      - "Monosomy: having only one copy of a particular chromosome (2n-1); often lethal; Turner syndrome (45,X) is an exception surviving to birth"
      - "Polyploidy: having more than two complete sets of chromosomes; common and often viable in plants; usually lethal in animals"

  - id: 1
    name: "Mendelian and Non-Mendelian Inheritance"
    ced_coverage: "Unit 5 Topics 5.3-5.6: Mendelian Genetics, Non-Mendelian Genetics, Environmental Effects, Chromosomal Inheritance"
    target_facts: 78
    description: >
      The full landscape of inheritance from Mendel's pea plant experiments to complex
      non-Mendelian patterns. Players master core vocabulary (gene, allele, genotype,
      phenotype, dominant, recessive), Mendel's two laws (segregation and independent
      assortment), Punnett square analysis for mono- and dihybrid crosses, test crosses,
      and probability rules. They then encounter situations Mendel's laws alone cannot
      explain: incomplete dominance, codominance, multiple alleles, polygenic traits,
      epistasis, pleiotropy, sex-linked traits, X-inactivation, genomic imprinting, and
      organelle inheritance. Environmental effects on phenotype, Morgan's Drosophila
      experiments, karyotypes, chromosomal mutations, and chi-square analysis complete
      the unit.
    key_concepts:
      # --- Topic 5.3: Mendelian Genetics ---
      - "Gregor Mendel: the father of genetics; studied inheritance in pea plants (Pisum sativum) in the 1860s using true-breeding lines"
      - "Gene: the basic unit of heredity; a segment of DNA that encodes a protein or functional RNA"
      - "Allele: an alternative form of a gene at a given chromosomal locus"
      - "Genotype: the genetic makeup of an individual for one or more genes (e.g., Bb)"
      - "Phenotype: the observable physical or biochemical characteristics of an individual (e.g., brown eyes)"
      - "Homozygous: having two identical alleles at a locus (BB or bb)"
      - "Heterozygous: having two different alleles at a locus (Bb)"
      - "Dominant allele: allele that is expressed in the phenotype of a heterozygote; represented by an uppercase letter"
      - "Recessive allele: allele whose expression is masked by a dominant allele; expressed only in homozygous recessive condition; represented by lowercase letter"
      - "Law of Segregation: the two alleles for a gene separate from each other during gamete formation; each gamete receives only one allele"
      - "Law of Independent Assortment: genes located on different (non-homologous) chromosomes assort independently into gametes during meiosis"
      - "Monohybrid cross Bb × Bb genotypic ratio: 1 BB : 2 Bb : 1 bb"
      - "Monohybrid cross Bb × Bb phenotypic ratio: 3 dominant phenotype : 1 recessive phenotype"
      - "Dihybrid cross BbRr × BbRr phenotypic ratio: 9:3:3:1 (assuming independent assortment and complete dominance)"
      - "Test cross: crossing an individual of unknown genotype with a homozygous recessive individual (bb) to determine whether the unknown is BB or Bb"
      - "Punnett square: a grid diagram used to predict the genotypic and phenotypic ratios of offspring from a genetic cross"
      - "Probability multiplication rule: for independent events, P(A and B) = P(A) × P(B)"
      - "Probability addition rule: for mutually exclusive events, P(A or B) = P(A) + P(B)"
      # --- Topic 5.4: Non-Mendelian Genetics ---
      - "Incomplete dominance: the heterozygote shows a phenotype intermediate between the two homozygous phenotypes; example: red × white snapdragons produce pink offspring"
      - "Codominance: both alleles are fully and simultaneously expressed in the heterozygote; example: blood type AB (I^A I^B) — both A and B antigens present on red blood cells"
      - "Multiple alleles: more than two alleles exist in the population for a single gene; example: ABO blood type has three alleles: I^A, I^B, and i"
      - "Polygenic inheritance: a single trait is controlled by two or more genes; produces a range of continuous phenotypic variation; examples: skin color, height, eye color"
      - "Epistasis: one gene influences or masks the expression of another gene; example: in Labrador retrievers, the E gene controls whether the B/b pigment gene is expressed (ee dogs are yellow regardless of B genotype)"
      - "Pleiotropy: a single gene affects multiple phenotypic traits; example: the sickle cell allele causes hemolytic anemia, increased malaria resistance, and multi-organ damage"
      - "Linked genes: genes located on the same chromosome tend to be inherited together and do not assort independently"
      - "Recombination frequency: the percentage of recombinant offspring produced by crossing over; used to estimate map distance between genes; 1% recombination frequency equals 1 centimorgan (cM)"
      - "Sex-linked traits: traits encoded by genes on the X chromosome; males (XY) have only one X chromosome and therefore express X-linked recessive traits more often than females (XX)"
      - "Color blindness: X-linked recessive trait; more common in males than females"
      - "Hemophilia: X-linked recessive bleeding disorder; clotting factor gene on X chromosome"
      - "Duchenne muscular dystrophy: X-linked recessive disorder caused by mutations in the dystrophin gene on the X chromosome"
      - "X-inactivation: one of the two X chromosomes in each cell of XX females is randomly and permanently inactivated early in development; the inactivated X condenses into a Barr body"
      - "Calico cats as evidence of X-inactivation: patches of orange and black fur result from random inactivation of different X chromosomes in different cell lineages"
      - "Genomic imprinting: gene expression depends on which parent contributed the allele; one parental copy is silenced by methylation; example: Prader-Willi and Angelman syndromes"
      - "Mitochondrial inheritance: mitochondria contain their own DNA and are inherited maternally through the egg cytoplasm; mitochondrial disorders are passed from mothers to all children"
      - "Chloroplast inheritance: chloroplasts contain their own DNA and are typically inherited maternally through the egg in most plant species"
      # --- Topic 5.5: Environmental Effects on Phenotype ---
      - "Phenotype is determined by both genotype and environment: phenotype = genotype + environment"
      - "Norm of reaction: the range of phenotypes that a single genotype can produce across a range of environmental conditions"
      - "Temperature-sensitive coat color in Siamese cats: the tyrosinase enzyme is heat-sensitive; cooler body extremities (ears, nose, paws, tail) produce dark pigment; warmer body core remains pale"
      - "Hydrangea flower color and soil pH: blue flowers in acidic soil (aluminum available) versus pink flowers in alkaline soil (aluminum unavailable)"
      - "Human height: polygenic inheritance significantly modified by environmental factors including nutrition, health, and disease"
      - "Phenylketonuria (PKU): autosomal recessive genetic disorder of phenylalanine metabolism; intellectual disability is prevented by strict dietary restriction of phenylalanine from birth"
      - "Twin studies: identical (monozygotic) twins raised apart allow researchers to separate the contributions of genetics from environment to phenotypic differences"
      - "Penetrance: the proportion of individuals with a given genotype who exhibit the expected phenotype; incomplete penetrance occurs when less than 100% of individuals with the genotype show the phenotype"
      # --- Topic 5.6: Chromosomal Inheritance ---
      - "Chromosome theory of inheritance (Sutton and Boveri, ~1902): genes are located on chromosomes; the behavior of chromosomes during meiosis explains Mendel's laws of segregation and independent assortment"
      - "Thomas Hunt Morgan: used Drosophila melanogaster (fruit fly) to demonstrate that genes are physically located on chromosomes; discovered X-linked inheritance through white-eye trait experiments"
      - "Morgan's white-eye experiment: white-eyed males crossed with red-eyed females; F2 showed white eyes only in males, proving eye-color gene is on the X chromosome"
      - "Karyotype: an organized display of an individual's chromosomes arranged by size and banding pattern; used clinically to detect aneuploidy and large chromosomal mutations"
      - "Deletion: a chromosomal mutation in which a segment of a chromosome is lost"
      - "Duplication: a chromosomal mutation in which a segment of a chromosome is copied, resulting in an extra copy"
      - "Inversion: a chromosomal mutation in which a segment of a chromosome is reversed end to end"
      - "Translocation: a chromosomal mutation in which a segment from one chromosome moves to a non-homologous chromosome; example: Philadelphia chromosome results from translocation between chromosomes 9 and 22 and causes chronic myelogenous leukemia (CML)"
      - "Chi-square test formula: χ² = Σ((observed - expected)² / expected); tests whether observed genetic ratios match expected Mendelian ratios"
      - "Chi-square degrees of freedom: number of phenotypic classes minus 1 (df = n - 1)"
      - "Chi-square interpretation: compare calculated χ² to critical value at p=0.05; if χ² exceeds critical value, reject null hypothesis that observed fits expected ratio"

# ============================================================
# ANSWER TYPE POOLS
# ============================================================

answer_type_pools:

  # POOL 1: term_definitions
  # "What is [term]?" or "Which term describes [definition]?"
  # Definitions of genetic and cell-division terms
  - id: term_definitions
    format: term
    estimated_count: 32
    note: >
      Meiosis, gamete, diploid, haploid, tetrad, bivalent, chiasma, synapsis, crossing
      over, independent assortment, aneuploidy, trisomy, monosomy, polyploidy, gene,
      allele, genotype, phenotype, homozygous, heterozygous, dominant, recessive,
      incomplete dominance, codominance, multiple alleles, polygenic inheritance,
      epistasis, pleiotropy, sex-linked trait, X-inactivation, Barr body, genomic
      imprinting, penetrance, norm of reaction, recombination frequency, centimorgan,
      karyotype, deletion, duplication, inversion, translocation. Answers are single
      terms or short noun phrases. Key confusions: incomplete dominance vs. codominance;
      epistasis vs. pleiotropy; trisomy vs. monosomy.

  # POOL 2: process_names
  # "What process [does X]?" or "What is the name of [biological event]?"
  # Names of meiotic events, inheritance mechanisms, and laboratory techniques
  - id: process_names
    format: term
    estimated_count: 18
    note: >
      Meiosis I, meiosis II, synapsis, crossing over, independent assortment, random
      fertilization, nondisjunction, X-inactivation, genomic imprinting, test cross,
      chi-square test, karyotyping. Answers are process or technique names.
      Key confusions: meiosis I vs. meiosis II events; nondisjunction in meiosis I
      vs. meiosis II outcomes; test cross vs. dihybrid cross.

  # POOL 3: bracket_numbers
  # Facts containing numeric values testable as fill-in-the-blank
  # e.g., "{4} haploid cells produced by meiosis", "2^{23} gamete combinations"
  - id: bracket_numbers
    format: numeric
    estimated_count: 10
    note: >
      4 haploid cells from meiosis, 2 diploid cells from mitosis, 46 (human 2n),
      23 (human n), 2^23 = ~8.4 million gamete combinations from independent assortment,
      3:1 monohybrid phenotypic ratio, 9:3:3:1 dihybrid phenotypic ratio,
      1 cM = 1% recombination, trisomy 21 (Down syndrome chromosome number),
      45,X (Turner syndrome karyotype). Distractors must be adjacent plausible numbers.

  # POOL 4: comparison_terms
  # "What is the difference between [X] and [Y]?"
  # Comparisons of related concepts, phases, or mechanisms
  - id: comparison_terms
    format: term
    estimated_count: 14
    note: >
      Meiosis I vs. meiosis II (type of division, what separates), meiosis vs. mitosis
      (divisions, products, ploidy), dominant vs. recessive (expression in heterozygote),
      homozygous vs. heterozygous, incomplete dominance vs. codominance, trisomy vs.
      monosomy, linked vs. unlinked genes (assortment behavior), sex-linked vs. autosomal
      traits (inheritance pattern by sex), penetrance vs. expressivity. Key confusions:
      equational vs. reductional division; homologs vs. sister chromatids.

  # POOL 5: organism_names
  # "Which organism is the classic model for [genetics concept]?"
  # Organism names associated with landmark experiments or genetic examples
  - id: organism_names
    format: term
    estimated_count: 5
    note: >
      Pisum sativum (pea plant — Mendel), Drosophila melanogaster (fruit fly — Morgan),
      Felis catus (calico cats — X-inactivation), Antirrhinum majus (snapdragons —
      incomplete dominance), Labrador retriever (epistasis coat color example).
      Answers are scientific or common species names.

  # POOL 6: experiment_terms
  # "What experimental tool or cross [does X]?"
  # Names of genetic analysis methods and cross types
  - id: experiment_terms
    format: term
    estimated_count: 8
    note: >
      Punnett square, test cross, monohybrid cross, dihybrid cross, chi-square test,
      karyotype, twin study, norm of reaction experiment. Answers are experimental
      method or cross-type names. Key confusions: test cross purpose (determine BB vs Bb)
      vs. other cross types; chi-square null hypothesis interpretation.

  # POOL 7: person_names
  # "Which scientist [did X]?" or "Who discovered [Y]?"
  # Scientists associated with genetics discoveries
  - id: person_names
    format: term
    estimated_count: 5
    note: >
      Gregor Mendel (laws of heredity, pea plants), Thomas Hunt Morgan (X-linkage,
      Drosophila), Walter Sutton and Theodor Boveri (chromosome theory of inheritance),
      Mary Lyon (X-inactivation, 1961). Answers are scientist surnames or full names.
      Key confusions: Mendel vs. Morgan contributions; Sutton vs. Boveri roles.

  # POOL 8: disease_syndrome_names
  # "Which condition results from [chromosomal event]?"
  # Names of genetic disorders and syndromes
  - id: disease_syndrome_names
    format: term
    estimated_count: 8
    note: >
      Down syndrome (trisomy 21), Turner syndrome (45,X monosomy), color blindness
      (X-linked recessive), hemophilia (X-linked recessive), Duchenne muscular dystrophy
      (X-linked recessive), phenylketonuria/PKU (autosomal recessive), sickle cell
      anemia (pleiotropy example), chronic myelogenous leukemia/CML (Philadelphia
      chromosome translocation). Answers are disease or syndrome names.

