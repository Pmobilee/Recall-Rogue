# --- TOPIC 5.1: MEIOSIS ---
topic_5_1:
  name: "Meiosis"
  source: "OpenStax Biology 2e, Chapter 11"
  source_url: "https://openstax.org/books/biology-2e/pages/11-introduction"
  entities:

    - term: "Meiosis"
      definition: "Two rounds of cell division producing 4 haploid daughter cells from 1 diploid parent cell"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Purpose of meiosis"
      definition: "To produce gametes (sperm and egg) with half the chromosome number of somatic cells"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Diploid to haploid in humans"
      definition: "Diploid (2n=46) reduces to haploid (n=23) during meiosis"
      pool: bracket_numbers
      chain_theme: meiosis_genetics
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Meiosis I"
      definition: "The first meiotic division; homologous chromosomes separate (reductional division); chromosome number is halved"
      pool: process_names
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Meiosis II"
      definition: "The second meiotic division; sister chromatids separate (equational division); analogous to mitosis but starts with haploid cells"
      pool: process_names
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Prophase I"
      definition: "First phase of meiosis I; chromosomes condense, homologs pair up (synapsis) forming tetrads, and crossing over occurs at chiasmata"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Synapsis"
      definition: "The pairing of homologous chromosomes during prophase I to form a tetrad (bivalent); the paired structure is held together at chiasmata"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Crossing over"
      definition: "Exchange of genetic material between non-sister chromatids of homologous chromosomes during prophase I; occurs at points called chiasmata"
      pool: process_names
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Metaphase I"
      definition: "Homologous pairs (tetrads) align at the metaphase plate; orientation of each pair is random, forming the basis of independent assortment"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Anaphase I"
      definition: "Homologous chromosomes separate and move to opposite poles; sister chromatids remain joined at the centromere"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Telophase I and Cytokinesis I"
      definition: "Two haploid cells form; each cell has n chromosomes, each still consisting of two joined sister chromatids"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Prophase II"
      definition: "Chromosomes condense again in each of the two haploid cells from meiosis I; no crossing over occurs"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 3
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Metaphase II"
      definition: "Individual chromosomes (not homologous pairs) align at the metaphase plate in each haploid cell"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Anaphase II"
      definition: "Sister chromatids separate at the centromere and move to opposite poles"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Telophase II and Cytokinesis II"
      definition: "Four haploid daughter cells produced; each has n unreplicated chromosomes"
      pool: bracket_numbers
      chain_theme: meiosis_genetics
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Meiosis vs. mitosis comparison"
      definition: "Meiosis: two divisions, 4 haploid daughter cells; mitosis: one division, 2 diploid daughter cells"
      pool: comparison_terms
      chain_theme: meiosis_genetics
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Homologous chromosomes"
      definition: "A matched pair of chromosomes — one inherited from each parent — carrying the same genes at the same loci but possibly different alleles"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Sister chromatids"
      definition: "Two identical DNA copies of a chromosome joined at the centromere; produced during DNA replication in S phase before meiosis"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Tetrad (bivalent)"
      definition: "The structure formed when two homologous chromosomes (each consisting of two sister chromatids) pair during prophase I of meiosis; contains 4 chromatids total"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

    - term: "Reductional vs. equational division"
      definition: "Meiosis I is reductional (chromosome number halved, homologs separate); meiosis II is equational (sister chromatids separate, chromosome number unchanged)"
      pool: comparison_terms
      chain_theme: meiosis_genetics
      difficulty: 3
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.1"]

# --- TOPIC 5.2: MEIOSIS AND GENETIC DIVERSITY ---
topic_5_2:
  name: "Meiosis and Genetic Diversity"
  source: "OpenStax Biology 2e, Chapter 11"
  source_url: "https://openstax.org/books/biology-2e/pages/11-introduction"
  entities:

    - term: "Three sources of genetic variation"
      definition: "Crossing over, independent assortment, and random fertilization are the three main sources of genetic variation in sexually reproducing organisms"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.2"]

    - term: "Independent assortment mechanism"
      definition: "Random orientation of homologous chromosome pairs at metaphase I; each pair orients independently, generating 2^n possible gamete chromosome combinations"
      pool: process_names
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.2"]

    - term: "Human gamete combinations from independent assortment"
      definition: "Humans (n=23) can produce 2^23 ≈ 8.4 million genetically different gametes from independent assortment alone"
      pool: bracket_numbers
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.2"]

    - term: "Recombinant chromosomes"
      definition: "Chromosomes with new allele combinations created by crossing over; carry combinations of alleles not present in either parental chromosome"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.2"]

    - term: "Random fertilization"
      definition: "Any sperm can fertilize any egg; vastly multiplies the number of genetically unique offspring beyond what crossing over and independent assortment alone produce"
      pool: process_names
      chain_theme: meiosis_genetics
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.2"]

    - term: "Nondisjunction"
      definition: "Failure of chromosomes or chromatids to separate properly during meiosis I or meiosis II; results in gametes with abnormal chromosome numbers"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.2"]

    - term: "Nondisjunction in meiosis I vs. meiosis II"
      definition: "Meiosis I nondisjunction: both homologs go to same pole (all resulting gametes are aneuploid); meiosis II nondisjunction: sister chromatids fail to separate (two of four gametes are aneuploid)"
      pool: comparison_terms
      chain_theme: meiosis_genetics
      difficulty: 3
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.2"]

    - term: "Aneuploidy"
      definition: "Condition of having an abnormal chromosome number that is not a multiple of the haploid number; caused by nondisjunction during meiosis"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.2"]

    - term: "Trisomy"
      definition: "A type of aneuploidy in which a cell has three copies of one chromosome (2n+1); example: Down syndrome is trisomy 21"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.2"]

    - term: "Down syndrome karyotype"
      definition: "Trisomy 21; the presence of three copies of chromosome 21; results from nondisjunction during meiosis"
      pool: disease_syndrome_names
      chain_theme: meiosis_genetics
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.2"]

    - term: "Monosomy"
      definition: "A type of aneuploidy in which a cell has only one copy of a particular chromosome (2n-1); often lethal; example: Turner syndrome (45,X)"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.2"]

    - term: "Turner syndrome"
      definition: "Monosomy of the sex chromosome: 45,X karyotype (one X chromosome, no second sex chromosome); one of the few monosomies viable in humans"
      pool: disease_syndrome_names
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.2"]

    - term: "Polyploidy"
      definition: "Having more than two complete sets of chromosomes (e.g., 3n, 4n); common in plants and often results in new species; usually lethal in animals"
      pool: term_definitions
      chain_theme: meiosis_genetics
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.2"]

# --- TOPIC 5.3: MENDELIAN GENETICS ---
topic_5_3:
  name: "Mendelian Genetics"
  source: "OpenStax Biology 2e, Chapter 12"
  source_url: "https://openstax.org/books/biology-2e/pages/12-introduction"
  entities:

    - term: "Gregor Mendel"
      definition: "The father of genetics; Austrian monk who studied inheritance in pea plants (Pisum sativum) in the 1860s using true-breeding lines and statistical analysis"
      pool: person_names
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Gene"
      definition: "The basic unit of heredity; a segment of DNA that encodes a protein or functional RNA molecule"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Allele"
      definition: "An alternative form of a gene; multiple alleles can exist at a given chromosomal locus in a population"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Genotype"
      definition: "The genetic makeup of an individual for one or more genes (e.g., Bb for a heterozygous individual)"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Phenotype"
      definition: "The observable physical or biochemical characteristics of an individual determined by genotype and environment (e.g., brown eyes, tall)"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Homozygous"
      definition: "Having two identical alleles at a given locus (e.g., BB or bb)"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Heterozygous"
      definition: "Having two different alleles at a given locus (e.g., Bb)"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Dominant allele"
      definition: "The allele whose phenotypic effect is expressed in the heterozygote; represented by an uppercase letter"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Recessive allele"
      definition: "The allele whose expression is masked by the dominant allele in a heterozygote; expressed only in the homozygous recessive condition; represented by a lowercase letter"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Law of Segregation"
      definition: "Mendel's first law: the two alleles for any gene separate during gamete formation, and each gamete receives only one allele"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Law of Independent Assortment"
      definition: "Mendel's second law: genes located on different (non-homologous) chromosomes assort independently into gametes during meiosis"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Monohybrid cross genotypic ratio"
      definition: "A Bb × Bb cross produces offspring in a 1 BB : 2 Bb : 1 bb genotypic ratio"
      pool: bracket_numbers
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Monohybrid cross phenotypic ratio"
      definition: "A Bb × Bb cross produces a 3:1 phenotypic ratio (3 dominant phenotype : 1 recessive phenotype) when dominance is complete"
      pool: bracket_numbers
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Dihybrid cross phenotypic ratio"
      definition: "A BbRr × BbRr cross with independent assortment produces a 9:3:3:1 phenotypic ratio among offspring"
      pool: bracket_numbers
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Test cross"
      definition: "A cross between an individual of unknown genotype and a homozygous recessive individual (e.g., bb) to determine whether the unknown is homozygous dominant (BB) or heterozygous (Bb)"
      pool: experiment_terms
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Punnett square"
      definition: "A grid diagram used to predict the genotypic and phenotypic ratios of offspring from a genetic cross by systematically combining parental gametes"
      pool: experiment_terms
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Probability multiplication rule"
      definition: "For independent genetic events, P(A and B) = P(A) × P(B); used to calculate the probability of inheriting multiple traits simultaneously"
      pool: experiment_terms
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Probability addition rule"
      definition: "For mutually exclusive genetic outcomes, P(A or B) = P(A) + P(B); used when calculating the probability of alternative genotypes"
      pool: experiment_terms
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

    - term: "Pisum sativum"
      definition: "The garden pea; the model organism used by Gregor Mendel in the 1860s to discover the fundamental laws of heredity"
      pool: organism_names
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.3"]

# --- TOPIC 5.4: NON-MENDELIAN GENETICS ---
topic_5_4:
  name: "Non-Mendelian Genetics"
  source: "OpenStax Biology 2e, Chapter 13"
  source_url: "https://openstax.org/books/biology-2e/pages/13-introduction"
  entities:

    - term: "Incomplete dominance"
      definition: "Inheritance pattern in which the heterozygote shows a phenotype intermediate between the two homozygous phenotypes; example: red × white snapdragons produce pink offspring"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Snapdragon incomplete dominance example"
      definition: "Red-flowered snapdragons (R¹R¹) crossed with white-flowered (R²R²) produce pink-flowered heterozygotes (R¹R²) — a classic example of incomplete dominance"
      pool: organism_names
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Codominance"
      definition: "Inheritance pattern in which both alleles are fully and simultaneously expressed in the heterozygote; example: AB blood type (I^A I^B) displays both A and B antigens"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Incomplete dominance vs. codominance"
      definition: "Incomplete dominance: heterozygote shows blended intermediate phenotype; codominance: both parental phenotypes are fully expressed simultaneously in the heterozygote"
      pool: comparison_terms
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Multiple alleles"
      definition: "When more than two alleles exist in the population for a single gene; example: ABO blood type is controlled by three alleles: I^A, I^B, and i"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "ABO blood type multiple alleles"
      definition: "ABO blood group system has three alleles: I^A (dominant, produces A antigen), I^B (dominant, produces B antigen), and i (recessive, no antigen); I^A and I^B are codominant with each other"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Polygenic inheritance"
      definition: "A trait controlled by two or more genes, each contributing additively to the phenotype; produces continuous variation in the population; examples: skin color, height, eye color"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Epistasis"
      definition: "Interaction in which one gene influences or masks the expression of another gene; example: in Labrador retrievers, the E gene controls whether pigment encoded by the B gene is deposited (ee dogs are yellow regardless of B/b genotype)"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 3
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Labrador retriever coat color epistasis"
      definition: "Two genes interact: B gene determines black (B_) vs. chocolate (bb) pigment; E gene controls pigment deposition — ee dogs lack pigment and are yellow regardless of B genotype"
      pool: organism_names
      chain_theme: mendelian_inheritance
      difficulty: 3
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Pleiotropy"
      definition: "A single gene that affects multiple phenotypic traits; example: the sickle cell allele causes hemolytic anemia, malaria resistance, and multi-organ damage"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Sickle cell as pleiotropy example"
      definition: "The sickle cell allele is a classic example of pleiotropy: one mutation causes hemolytic anemia, increased malaria resistance, splenic damage, and other multi-organ effects"
      pool: disease_syndrome_names
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Linked genes"
      definition: "Genes located on the same chromosome that tend to be inherited together and do not assort independently (violating Mendel's second law)"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Recombination frequency"
      definition: "The percentage of offspring that are recombinants (result of crossing over); used to estimate genetic map distance; 1% recombination frequency = 1 centimorgan (cM) = 1 map unit"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 3
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Sex-linked traits"
      definition: "Traits encoded by genes on the X chromosome; because males (XY) have only one X, X-linked recessive traits are expressed more frequently in males than females"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Color blindness"
      definition: "X-linked recessive trait affecting red-green color discrimination; more common in males (XY) than females (XX) because males need only one recessive allele to be affected"
      pool: disease_syndrome_names
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Hemophilia"
      definition: "X-linked recessive blood-clotting disorder caused by mutations in clotting factor genes on the X chromosome; affected males express the disorder; females are carriers if heterozygous"
      pool: disease_syndrome_names
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Duchenne muscular dystrophy"
      definition: "X-linked recessive disorder caused by mutations in the dystrophin gene on the X chromosome; causes progressive muscle weakness; almost exclusively affects males"
      pool: disease_syndrome_names
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "X-inactivation"
      definition: "Random and permanent inactivation of one X chromosome in each cell of XX females early in development; the inactivated X condenses into a visible Barr body"
      pool: process_names
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Barr body"
      definition: "The condensed, transcriptionally inactive X chromosome visible in the nucleus of XX female cells; result of X-inactivation; females with 2 X chromosomes have 1 Barr body"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Calico cats and X-inactivation"
      definition: "Calico cats are almost always female (XX); patches of orange and black fur arise because different cells randomly inactivate different X chromosomes carrying different coat-color alleles"
      pool: organism_names
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Genomic imprinting"
      definition: "An epigenetic phenomenon in which gene expression depends on which parent contributed the allele; one parental copy is silenced by methylation; examples include Prader-Willi and Angelman syndromes"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 3
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Mitochondrial inheritance"
      definition: "Mitochondria contain their own circular DNA and are inherited exclusively maternally through the cytoplasm of the egg; mitochondrial disorders are passed from mothers to all offspring"
      pool: process_names
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

    - term: "Chloroplast inheritance"
      definition: "Chloroplasts contain their own DNA and are typically inherited maternally through the egg in most plant species; not subject to Mendelian segregation"
      pool: process_names
      chain_theme: mendelian_inheritance
      difficulty: 3
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.4"]

# --- TOPIC 5.5: ENVIRONMENTAL EFFECTS ON PHENOTYPE ---
topic_5_5:
  name: "Environmental Effects on Phenotype"
  source: "OpenStax Biology 2e, Chapter 13"
  source_url: "https://openstax.org/books/biology-2e/pages/13-introduction"
  entities:

    - term: "Phenotype equals genotype plus environment"
      definition: "The observable phenotype of an organism results from the interaction of its genotype with environmental conditions; genotype alone does not determine phenotype"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.5"]

    - term: "Norm of reaction"
      definition: "The range of phenotypes that a single genotype can produce across a spectrum of environmental conditions; illustrates phenotypic plasticity"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 3
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.5"]

    - term: "Siamese cat temperature-sensitive coat color"
      definition: "Siamese cats show dark pigment on cooler extremities (ears, nose, paws, tail) and pale fur on the warm body core; the tyrosinase enzyme is heat-sensitive and inactive above ~33°C"
      pool: organism_names
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.5"]

    - term: "Hydrangea flower color and soil pH"
      definition: "Hydrangea flowers are blue in acidic soil (aluminum ions available to petals) and pink in alkaline soil (aluminum unavailable); same genotype produces different phenotypes based on soil chemistry"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.5"]

    - term: "Human height as polygenic plus environmental"
      definition: "Human height is controlled by many genes (polygenic) and is substantially influenced by environmental factors including nutrition, disease, and health during development"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.5"]

    - term: "Phenylketonuria (PKU)"
      definition: "Autosomal recessive disorder of phenylalanine metabolism; intellectual disability caused by phenylalanine accumulation is prevented by strict dietary restriction of phenylalanine beginning at birth — a gene-environment interaction"
      pool: disease_syndrome_names
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.5"]

    - term: "Twin studies for separating genetics and environment"
      definition: "Identical (monozygotic) twins raised apart have the same genotype but different environments; differences between them reveal environmental contributions to phenotype"
      pool: experiment_terms
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.5"]

    - term: "Penetrance"
      definition: "The proportion of individuals with a given genotype who exhibit the expected phenotype; incomplete penetrance occurs when less than 100% of individuals with the genotype display the phenotype"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 3
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.5"]

# --- TOPIC 5.6: CHROMOSOMAL INHERITANCE ---
topic_5_6:
  name: "Chromosomal Inheritance"
  source: "OpenStax Biology 2e, Chapter 15"
  source_url: "https://openstax.org/books/biology-2e/pages/15-introduction"
  entities:

    - term: "Chromosome theory of inheritance"
      definition: "The theory, developed by Walter Sutton and Theodor Boveri (~1902), that genes are physically located on chromosomes and that chromosome behavior during meiosis explains Mendel's laws of segregation and independent assortment"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.6"]

    - term: "Sutton and Boveri"
      definition: "Walter Sutton and Theodor Boveri independently proposed the chromosome theory of inheritance (~1902), connecting Mendel's hereditary factors to the behavior of chromosomes during meiosis"
      pool: person_names
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.6"]

    - term: "Thomas Hunt Morgan"
      definition: "American biologist who used Drosophila melanogaster to prove genes are physically located on chromosomes; discovered X-linked inheritance through the white-eye trait"
      pool: person_names
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.6"]

    - term: "Morgan's white-eye Drosophila experiment"
      definition: "Morgan crossed white-eyed males with red-eyed females; F2 generation showed white eyes only in males, proving the eye-color gene is located on the X chromosome — first direct proof of chromosomal gene location"
      pool: experiment_terms
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.6"]

    - term: "Drosophila melanogaster"
      definition: "The fruit fly; Thomas Hunt Morgan's model organism used to demonstrate X-linked inheritance and the physical location of genes on chromosomes"
      pool: organism_names
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.6"]

    - term: "Karyotype"
      definition: "An organized display of an individual's full chromosome complement, arranged by size and banding pattern; used clinically to detect aneuploidy, translocations, and other large chromosomal abnormalities"
      pool: experiment_terms
      chain_theme: mendelian_inheritance
      difficulty: 1
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.6"]

    - term: "Deletion"
      definition: "A chromosomal mutation in which a segment of a chromosome is lost; can cause haploinsufficiency if deleted genes are essential"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.6"]

    - term: "Duplication"
      definition: "A chromosomal mutation in which a segment of a chromosome is copied, resulting in an extra copy of those genes in the genome"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.6"]

    - term: "Inversion"
      definition: "A chromosomal mutation in which a chromosome segment is excised and reinserted in the reverse orientation; may disrupt gene expression at breakpoints"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.6"]

    - term: "Translocation"
      definition: "A chromosomal mutation in which a segment from one chromosome moves to a non-homologous chromosome; example: Philadelphia chromosome results from a reciprocal translocation between chromosomes 9 and 22"
      pool: term_definitions
      chain_theme: mendelian_inheritance
      difficulty: 2
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.6"]

    - term: "Philadelphia chromosome"
      definition: "A chromosomal translocation between chromosomes 9 and 22; creates the BCR-ABL fusion oncogene; causes chronic myelogenous leukemia (CML)"
      pool: disease_syndrome_names
      chain_theme: mendelian_inheritance
      difficulty: 3
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.6"]

    - term: "Chi-square test formula"
      definition: "χ² = Σ((observed - expected)² / expected); used to determine whether observed genetic ratios differ significantly from expected Mendelian ratios"
      pool: experiment_terms
      chain_theme: mendelian_inheritance
      difficulty: 3
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.6"]

    - term: "Chi-square degrees of freedom"
      definition: "Degrees of freedom for a genetics chi-square test = number of phenotypic classes minus 1 (df = n - 1)"
      pool: experiment_terms
      chain_theme: mendelian_inheritance
      difficulty: 3
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.6"]

    - term: "Chi-square interpretation"
      definition: "If the calculated χ² value exceeds the critical value at p=0.05 for the given degrees of freedom, reject the null hypothesis that observed ratios fit the expected Mendelian ratio"
      pool: experiment_terms
      chain_theme: mendelian_inheritance
      difficulty: 3
      tags: ["AP_Biology", "AP_Bio_Unit5", "5.6"]
