deck_id: ap_biology_unit5
name: "AP Biology — Unit 5: Heredity"
domain: natural_sciences
sub_domain: biology
description: "Master AP Biology Unit 5 — Heredity (8-11% of exam weight). Covers meiosis mechanics and the two divisions, sources of genetic variation (crossing over, independent assortment, random fertilization), nondisjunction and aneuploidy, Mendelian genetics (segregation, independent assortment, mono- and dihybrid crosses, test crosses, probability rules), non-Mendelian inheritance patterns (incomplete dominance, codominance, multiple alleles, polygenic traits, epistasis, pleiotropy, sex-linked traits, X-inactivation, genomic imprinting, organelle inheritance), environmental effects on phenotype, and the chromosomal basis of inheritance (Morgan's experiments, karyotypes, chromosomal mutations, chi-square analysis). Aligned to College Board AP Biology CED Topics 5.1-5.6 (Fall 2025)."
minimum_facts: 90
target_facts: 110

