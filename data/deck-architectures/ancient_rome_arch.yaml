    format: term
    description: Political, military, and legal vocabulary of Rome
    members:
    - consul (two annually elected chief magistrates)
    - tribune (plebeian representative with veto power)
    - dictator (temporary emergency ruler, normally 6-month limit)
    - praetor (judicial magistrate, below consul)
    - censor (official overseeing census and public morality)
    - quaestor (financial magistrate, lowest rung of cursus honorum)
    - imperium (supreme authority over civil and military matters)
    - veto (I forbid — tribune's power to block magistrates)
    - SPQR (Senatus Populusque Romanus)
    - proscription (published death list, property confiscated)
    - triumph (ceremonial procession honoring victorious general)
    - legion (primary Roman army unit, ~5,200 men in late Republic)
    - centurion (professional officer commanding a century of ~80 men)
    - fasces (bundle of rods + axe, symbol of magisterial authority)
    - princeps (first citizen — Augustus's chosen title)
    - suffete (Carthaginian magistrate equivalent to consul)

