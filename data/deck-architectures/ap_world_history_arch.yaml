# ============================================================
# SUB-DECKS — 9 sub-decks, one per CED unit
# ============================================================

sub_decks:
  - id: sd_unit1_global_tapestry
    name: "Unit 1: The Global Tapestry (c. 1200-1450)"
    chainThemeIds: [0]
    description: >
      Covers the major civilizations and state-building strategies of c. 1200-1450 across East Asia,
      Dar al-Islam, South and Southeast Asia, the Americas, Africa, and Europe. Emphasizes comparison
      of state structures, belief systems, and economic organization before transoceanic contact.

  - id: sd_unit2_networks_exchange
    name: "Unit 2: Networks of Exchange (c. 1200-1450)"
    chainThemeIds: [1]
    description: >
      Covers the Silk Roads, Mongol Empire, Indian Ocean trade, trans-Saharan routes, and their
      cultural and environmental consequences (including the Black Death). Emphasizes connectivity
      and its benefits and costs across Eurasia and Africa.

  - id: sd_unit3_land_empires
    name: "Unit 3: Land-Based Empires (c. 1450-1750)"
    chainThemeIds: [2]
    description: >
      Covers Ottoman, Safavid, Mughal, Qing, and Russian empire expansion, administrative
      techniques (devshirme, bureaucracy, tax farming), and use of religion as a tool of
      statecraft. The "Gunpowder Empires" and their comparison.

  - id: sd_unit4_transoceanic
    name: "Unit 4: Transoceanic Interconnections (c. 1450-1750)"
    chainThemeIds: [3]
    description: >
      Covers navigational technologies, causes and events of European exploration, the Columbian
      Exchange, establishment and maintenance of maritime empires, social hierarchies (casta system),
      and coercive labor systems (encomienda, slavery). Highest-stakes new-world-meets-old-world unit.

  - id: sd_unit5_revolutions
    name: "Unit 5: Revolutions (c. 1750-1900)"
    chainThemeIds: [4]
    description: >
      Covers Enlightenment ideas, the American / French / Haitian / Latin American revolutions,
      nationalism, and the Industrial Revolution (origins, spread, technology, government role,
      and economic ideologies from capitalism to communism).

  - id: sd_unit6_imperialism
    name: "Unit 6: Consequences of Industrialization (c. 1750-1900)"
    chainThemeIds: [5]
    description: >
      Covers rationales for imperialism, the Scramble for Africa, British India, economic
      imperialism (China, Ottoman Empire), indigenous responses (resistance and accommodation),
      migration patterns (indentured labor, Atlantic migration, Chinese diaspora), and abolition.

  - id: sd_unit7_global_conflict
    name: "Unit 7: Global Conflict (c. 1900-present)"
    chainThemeIds: [6]
    description: >
      Covers WWI causes (MAIN), trench warfare and new weapons, Armenian Genocide, Treaty of
      Versailles, Great Depression, rise of fascism, causes and conduct of WWII, Holocaust,
      Nanjing Massacre, atomic bombs, and Nuremberg Trials.

  - id: sd_unit8_cold_war
    name: "Unit 8: Cold War and Decolonization (c. 1900-present)"
    chainThemeIds: [7]
    description: >
      Covers Cold War origins (Truman Doctrine, Marshall Plan), Korean War, Cuban Missile Crisis,
      spread of communism (China, Vietnam, Cuba), Non-Aligned Movement, decolonization of Asia
      and Africa, apartheid, Iranian Revolution, Soviet dissolution.

  - id: sd_unit9_globalization
    name: "Unit 9: Globalization (c. 1900-present)"
    chainThemeIds: [8]
    description: >
      Covers technological revolution (computers, internet), disease (HIV/AIDS, COVID-19),
      climate change debates, economic globalization (WTO, IMF, World Bank), anti-globalization
      resistance, rise of China, cultural globalization, and international institutions (UN, EU).

# ============================================================
# QUESTION TEMPLATES — 18 templates spanning mastery 0-5
# ============================================================

question_templates:

  # --- MASTERY 0: Foundational identification ---
  - id: tmpl_ruler_identification
    template: "Which ruler {action_description}?"
    answer_pool: ruler_names
    mastery_range: [0, 1]
    note: "Pure recall of rulers from descriptions of their major actions or characteristics."

  - id: tmpl_empire_location
    template: "Which empire was centered in {region_or_capital}?"
    answer_pool: empire_dynasty_names
    mastery_range: [0, 1]
    note: "Identifies empires from geographic or capital clues — tests basic spatial knowledge."

  - id: tmpl_date_identification
    template: "In what year did {event} occur?"
    answer_pool: date_periods
    mastery_range: [0, 1]
    note: "Pure chronological recall; distractors must be nearby dates (within 10-25 years)."

  - id: tmpl_treaty_document
    template: "What was the name of the {description_of_treaty_or_document}?"
    answer_pool: treaty_document_names
    mastery_range: [0, 1]
    note: "Identifies founding documents and treaties from their content description."

  # --- MASTERY 1: Conceptual understanding ---
  - id: tmpl_concept_definition
    template: "What term describes {concept_definition}?"
    answer_pool: concept_terms
    mastery_range: [1, 2]
    note: "Concept-to-term mapping; tests understanding of political, economic, and social vocabulary."

  - id: tmpl_trade_good_origin
    template: "Which {commodity_type} originated in {region} and spread through {exchange_network}?"
    answer_pool: trade_goods
    mastery_range: [1, 2]
    note: "Trade goods with directional exchange context; requires knowing origin AND spread direction."

  - id: tmpl_technology_inventor
    template: "Which technology or invention {function_description}?"
    answer_pool: technology_inventions
    mastery_range: [1, 2]
    note: "Technology identification from function; tests understanding of how innovations changed history."

  - id: tmpl_religion_movement
    template: "Which religious movement or philosophy {characteristic_or_belief}?"
    answer_pool: religion_belief_terms
    mastery_range: [1, 2]
    note: "Religion/belief system identification from theological or historical characteristics."

  # --- MASTERY 2: Causal and structural understanding ---
  - id: tmpl_labor_system
    template: "What labor system {description_of_coercive_arrangement}?"
    answer_pool: labor_economic_terms
    mastery_range: [2, 3]
    note: "Distinguishes labor systems by specific characteristics (who, where, when, how coercive)."

  - id: tmpl_battle_significance
    template: "What was the significance of {battle_or_event}?"
    answer_pool: battle_event_names
    mastery_range: [2, 3]
    note: "Requires understanding WHY battles mattered — causation and consequence."

  - id: tmpl_organization_purpose
    template: "Which organization {purpose_or_action}?"
    answer_pool: organization_names
    mastery_range: [2, 3]
    note: "International organization identification from purpose; tests post-WWII institutional knowledge."

  - id: tmpl_doctrine_policy
    template: "What was the name of the policy or doctrine that {description_of_commitment_or_program}?"
    answer_pool: ideological_doctrine_names
    mastery_range: [2, 3]
    note: "Policy identification from purpose/content — Cold War and colonial era policies especially tested."

  # --- MASTERY 3: Comparative and analytical ---
  - id: tmpl_region_compare
    template: "How was {aspect} in {empire_or_region_A} similar to OR different from {empire_or_region_B}?"
    answer_pool: concept_terms
    mastery_range: [3, 4]
    note: "Comparison questions targeting CED historical thinking skill; answer is a concept or characteristic."

  - id: tmpl_cause_effect
    template: "What was a major cause of {event_or_development}?"
    answer_pool: concept_terms
    mastery_range: [3, 4]
    note: "Causation questions — the most tested AP historical thinking skill across all units."

  - id: tmpl_empire_admin
    template: "Which administrative technique did {empire} use to {administrative_goal}?"
    answer_pool: labor_economic_terms
    mastery_range: [3, 4]
    note: "Empire administration facts — connects empire name to specific bureaucratic or labor mechanism."

  # --- MASTERY 4-5: Synthesis and evaluation ---
  - id: tmpl_continuity_change
    template: "Which of the following represents a continuity (or change) from {earlier_period} to {later_period} regarding {topic}?"
    answer_pool: concept_terms
    mastery_range: [4, 5]
    note: "CCOT questions — second most common AP WH:M SAQ/essay prompt type; requires span of knowledge."

  - id: tmpl_mass_atrocity_context
    template: "Which mass atrocity or genocide {contextual_description}?"
    answer_pool: mass_atrocity_names
    mastery_range: [4, 5]
    note: "Requires knowing specific atrocities, their perpetrators, victims, and historical context."

  - id: tmpl_place_significance
    template: "Which location {significance_description}?"
    answer_pool: place_names
    mastery_range: [4, 5]
    note: "Place significance questions — geographic knowledge in historical context; requires deeper understanding."
