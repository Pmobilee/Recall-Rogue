    key_facts:
      - "Created by Chris Lattner in 2010 for Apple Inc."
      - "First released publicly in June 2014; Xcode 6 shipped with the Swift toolchain in September 2014"
      - "Designed to be safer, faster, and more modern than Objective-C for macOS and iOS development"
      - "Open-sourced by Apple in December 2015"
      - "Uses an LLVM-based compiler; Chris Lattner also created LLVM"

  - name: TypeScript
    year: 2012
    creators: [Anders Hejlsberg]
    organization: "Microsoft"
    wikidata: Q978185
    source_url: "https://en.wikipedia.org/wiki/TypeScript"
    achievement: "Statically typed superset of JavaScript; released publicly by Microsoft in October 2012"
    key_facts:
      - "Released to the public in October 2012 with version 0.8, after two years of internal development at Microsoft"
      - "Developed by Anders Hejlsberg — also the lead architect of C# and creator of Delphi and Turbo Pascal"
      - "A strict syntactical superset of JavaScript: any valid JavaScript is also valid TypeScript"
      - "Transpiles to JavaScript; enables catching type errors at compile time rather than runtime"
      - "Became widely adopted for large-scale JavaScript applications; used in Angular, VS Code, and many major projects"

  - name: Kotlin
    year_unveiled: 2011
    year_stable: 2016
    creators: [JetBrains]
    wikidata: Q3816639
    source_url: "https://en.wikipedia.org/wiki/Kotlin_(programming_language)"
    achievement: "Cross-platform JVM language by JetBrains; unveiled July 2011; first stable release February 2016"
    key_facts:
      - "First commit to the Kotlin Git repository was 8 November 2010"
      - "JetBrains unveiled Project Kotlin in July 2011; had been under development for about a year at that point"
      - "Designed to interoperate fully with Java while fixing many of Java's pain points"
      - "Google announced first-class Android support for Kotlin at Google I/O 2017; made preferred language for Android in 2019"
      - "First stable release (Kotlin 1.0) was on 15 February 2016"

  - name: HTML
    year: 1991
    creators: [Tim Berners-Lee]
    wikidata: Q8811
    source_url: "https://en.wikipedia.org/wiki/HTML"
    achievement: "HyperText Markup Language; the standard markup language for web pages; first described 1991"
    key_facts:
      - "First mentioned on the Internet by Tim Berners-Lee in late 1991 in a document called 'HTML Tags', describing 18 elements"
      - "Stands for HyperText Markup Language"
      - "Defines the structure and content of web pages using elements/tags"
      - "The HTML 4.01 standard (1999) and HTML5 (2014) are the most significant versions"
      - "HTML is not a programming language but a markup language — it does not contain logic, only structure"

  - name: CSS
    year_proposed: 1994
    year_first_standard: 1996
    creators: [Håkon Wium Lie, Bert Bos]
    wikidata: Q46441
    source_url: "https://en.wikipedia.org/wiki/CSS"
    achievement: "Style sheet language for web page presentation; proposed 10 October 1994 by Håkon Wium Lie"
    key_facts:
      - "CSS was first proposed by Håkon Wium Lie on 10 October 1994, while working with Tim Berners-Lee at CERN"
      - "Bert Bos's proposal was also influential; he became co-author of CSS1 and is regarded as co-creator of CSS"
      - "The first W3C CSS Recommendation (CSS1) was released in 1996"
      - "Stands for Cascading Style Sheets — describes how HTML elements should be displayed"
      - "CSS2 published 1998; CSS3 introduced as modular specifications from 1999 onwards with continuous updates"

  - name: Algol
    year: 1958
    creators: [Peter Naur, John Backus, and international committee]
    wikidata: Q188436
    source_url: "https://en.wikipedia.org/wiki/ALGOL"
    achievement: "Algorithmic language family (1958–1968) that introduced block structure and influenced almost every subsequent language"
    key_facts:
      - "ALGOL (Algorithmic Language) was first specified in 1958 by an international committee of European and American computer scientists"
      - "Introduced block structure (begin/end), lexical scoping, and nested functions"
      - "ALGOL 60 (1960) was enormously influential — described using Backus-Naur Form (BNF)"
      - "Most modern languages (C, Pascal, Java, etc.) are direct descendants of ALGOL's design"
      - "ALGOL 68 (1968) was the final major version; though complex, it pioneered many modern language features"

  - name: Pascal
    year: 1970
    creators: [Niklaus Wirth]
    wikidata: Q81571
    source_url: "https://en.wikipedia.org/wiki/Pascal_(programming_language)"
    achievement: "Structured programming language designed by Niklaus Wirth in 1968–1970; influential in CS education"
    key_facts:
      - "Designed by Niklaus Wirth in 1968–1970; named after mathematician and philosopher Blaise Pascal"
      - "Designed to encourage good programming practices using structured programming and data structuring"
      - "Became the dominant teaching language in university computer science courses during the 1970s and 1980s"
      - "Apple's Lisa and early Macintosh were primarily programmed in Pascal"
      - "Influenced Modula-2, Oberon, Ada, and Delphi"

  - name: Ada
    year: 1980
    creators: [Jean Ichbiah and team; named after Ada Lovelace]
    organization: "US Department of Defense"
    wikidata: Q154755
    source_url: "https://en.wikipedia.org/wiki/Ada_(programming_language)"
    achievement: "High-integrity language developed for US DoD; named after Ada Lovelace; first standardised 1983"
    key_facts:
      - "Designed in the late 1970s by a team led by Jean Ichbiah at CII Honeywell Bull under US DoD contract"
      - "Named in honour of Ada Lovelace, the first computer programmer"
      - "First standardised as ANSI/MIL-STD-1815 in 1983; Ada 95 was the first internationally standardised OO language"
      - "Designed for safety-critical systems: aviation, military, space, railway systems"
      - "Used in the Boeing 777, Airbus aircraft, and European Space Agency missions"

  - name: Prolog
    year: 1972
    creators: [Alain Colmerauer, Philippe Roussel]
    organization: "Université de Marseille"
    wikidata: Q163468
    source_url: "https://en.wikipedia.org/wiki/Prolog"
    achievement: "Logic programming language; first implemented 1972 by Colmerauer and Roussel in Marseille"
    key_facts:
      - "Developed by Alain Colmerauer and Philippe Roussel at the Université de Marseille in 1972"
      - "Stands for PROgramming in LOGic"
      - "Based on formal logic: programs declare facts and rules; the interpreter uses resolution to find solutions"
      - "Heavily used in artificial intelligence and computational linguistics"
      - "The Japan Fifth Generation Computer Systems project (1982–1992) chose Prolog as its core language"
