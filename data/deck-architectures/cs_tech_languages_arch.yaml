    key_facts:
      - "Created by Ross Ihaka and Robert Gentleman at the University of Auckland, New Zealand"
      - "In August 1993, Ihaka and Gentleman posted a binary of R on StatLib"
      - "Named R partly from the shared first initial of its authors (Ross and Robert) and as a reference to the S language it was inspired by"
      - "Became freely available under the GNU General Public License on 5 December 1997"
      - "Widely used in data mining, bioinformatics, data analysis, and statistical research"

  - name: Go
