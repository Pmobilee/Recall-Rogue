      - "Mozilla officially sponsored the project in 2009"
      - "The first stable release, Rust 1.0, was published in May 2015"
      - "Emphasises memory safety without a garbage collector, using an ownership and borrowing system"
      - "Named the most-loved programming language in Stack Overflow's developer survey every year from 2016 to 2023"

