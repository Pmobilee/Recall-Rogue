      - "Publicly announced in November 2009"
      - "Features garbage collection, structural typing, and CSP-style concurrency (goroutines and channels)"
      - "Often referred to as 'Golang' due to its domain name golang.org"
      - "Widely used at Google and in cloud/infrastructure software including Docker and Kubernetes"

  - name: Rust
