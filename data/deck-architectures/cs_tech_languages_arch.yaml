facts:

  - name: Assembly Language
    year: 1947
    creators: [Kathleen Booth, Andrew Donald Booth]
    wikidata: Q165436
    source_url: "https://en.wikipedia.org/wiki/Assembly_language"
    achievement: "First symbolic language to represent machine code instructions (Booth & Booth, 1947)"
    key_facts:
      - "The use of symbolic language to represent machine code is first found in Kathleen and Andrew Donald Booth's 1947 work 'Coding for A.R.C.'"
      - "Uses human-readable mnemonics (MOV, ADD, JMP) to represent binary CPU instructions"
      - "Each CPU architecture has its own distinct assembly language"
      - "The term 'assembler' (the program that translates assembly to machine code) was coined by Wilkes, Wheeler, and Gill in 1951"
      - "Assembly was the primary programming method before high-level languages; FORTRAN (1957) was the first widely used alternative"

  - name: FORTRAN
    year: 1957
    creators: [John Backus]
    organization: IBM
    wikidata: Q83303
    source_url: "https://en.wikipedia.org/wiki/Fortran"
    achievement: "First widely used high-level programming language; IBM team led by John Backus, first compiler April 1957"
    key_facts:
      - "Originally developed by IBM; a reference manual was released in 1956, but the first compilers that produced accurate code were delivered in April 1957"
      - "Stands for 'Formula Translation' (or FORmula TRANslation)"
      - "Led by John Backus, who later won the 1977 ACM Turing Award"
      - "First widely used high-level programming language — made scientific programming accessible without assembly"
      - "Still used today in scientific, engineering, and high-performance computing; Fortran 2023 is the current standard"

  - name: Lisp
    year: 1958
    creators: [John McCarthy]
    organization: MIT
    wikidata: Q132874
    source_url: "https://en.wikipedia.org/wiki/Lisp_(programming_language)"
    achievement: "Second-oldest high-level language still in use; invented by John McCarthy at MIT in 1958"
    key_facts:
      - "John McCarthy began developing Lisp in 1958 at MIT to create an AI programming language for the IBM 704"
      - "Stands for 'LISt Processing' — its primary data structure is the linked list"
      - "Second-oldest high-level programming language still in common use, after Fortran"
      - "Pioneered many features including dynamic typing, garbage collection, and recursive functions"
      - "Modern dialects include Common Lisp, Scheme, Racket, and Clojure"

  - name: COBOL
    year: 1959
    creators: [Grace Hopper (influence), CODASYL committee]
    organization: "US Department of Defense / CODASYL"
    wikidata: Q131140
    source_url: "https://en.wikipedia.org/wiki/COBOL"
    achievement: "Business-oriented language designed in 1959; influenced by Grace Hopper's FLOW-MATIC"
    key_facts:
      - "Stands for Common Business-Oriented Language"
      - "Design started in 1959 by the CODASYL (Conference/Committee on Data Systems Languages) committee"
      - "Partly based on FLOW-MATIC, designed by Grace Hopper — she was a key influence"
      - "Created as part of a US Department of Defense effort to create a portable language for data processing"
      - "Still widely used in business, finance, and mainframe systems; estimated 800 billion lines of COBOL code remain in production"

  - name: BASIC
    year: 1964
    creators: [John G. Kemeny, Thomas E. Kurtz]
    organization: "Dartmouth College"
    wikidata: Q42979
    source_url: "https://en.wikipedia.org/wiki/BASIC"
    achievement: "Beginners' All-purpose Symbolic Instruction Code; created at Dartmouth College in 1964"
    key_facts:
      - "Stands for Beginner's All-purpose Symbolic Instruction Code"
      - "Created by John G. Kemeny and Thomas E. Kurtz at Dartmouth College in 1964"
      - "Designed to allow students in non-scientific fields to write and use computer programs"
      - "Microsoft was founded in part on Gates and Allen's BASIC interpreter for the Altair 8800 (1975)"
      - "Influenced the home computer era of the 1970s and 1980s; BASIC was included on most home computers"

  - name: Smalltalk
    year: 1972
    creators: [Alan Kay, Dan Ingalls, Adele Goldberg]
    organization: "Xerox PARC"
    wikidata: Q235086
    source_url: "https://en.wikipedia.org/wiki/Smalltalk"
    achievement: "Pioneered object-oriented programming; created at Xerox PARC from 1970, first version 1972"
    key_facts:
      - "Created at Xerox PARC's Learning Research Group by Alan Kay, Dan Ingalls, Adele Goldberg, and others"
      - "Smalltalk-71 was an early design; a working interpreter was demonstrated by Alan Kay in September 1972"
      - "One of the first purely object-oriented programming languages — everything is an object"
      - "Pioneered graphical user interfaces, the desktop metaphor, and the model-view-controller (MVC) pattern"
      - "Heavily influenced Java, Python, Ruby, and most subsequent object-oriented languages"

  - name: C
    year: 1972
    creators: [Dennis Ritchie]
    organization: "Bell Labs"
    wikidata: Q15777
    source_url: "https://en.wikipedia.org/wiki/C_(programming_language)"
    achievement: "General-purpose systems language created by Dennis Ritchie at Bell Labs; developed 1969–1973"
    key_facts:
      - "Created by Dennis Ritchie at Bell Labs during 1969–1973"
      - "Developed alongside the Unix operating system — Unix was rewritten in C, making it portable across hardware"
      - "Provides relatively direct access to CPU features while remaining a high-level language"
      - "Influenced the design of countless later languages including C++, Java, C#, Objective-C, JavaScript, Python, and Rust"
      - "The influential book 'The C Programming Language' (Kernighan & Ritchie, 1978) is known as 'K&R C'"

  - name: SQL
    year: 1974
    creators: [Donald D. Chamberlin, Raymond F. Boyce]
    organization: "IBM San Jose Research Laboratory"
    wikidata: Q47607
    source_url: "https://en.wikipedia.org/wiki/SQL"
    achievement: "Domain-specific language for managing relational databases; developed at IBM in the early 1970s"
    key_facts:
      - "Developed at IBM's San Jose Research Laboratory by Donald D. Chamberlin and Raymond F. Boyce after learning about the relational model from Edgar Codd"
      - "Originally called SEQUEL (Structured English Query Language); after moving to San Jose in 1973, they began work on a 'sequel to SQUARE'"
      - "The name was shortened to SQL (dropping the vowels) due to trademark issues"
      - "First published description appeared in 1974; IBM's commercial version (System R) released in the late 1970s"
      - "The most widely used database language; ISO/IEC SQL standard maintained since 1987"

  - name: C++
    year_developed: 1979
    year_released: 1985
    creators: [Bjarne Stroustrup]
    organization: "Bell Labs"
    wikidata: Q2407
    source_url: "https://en.wikipedia.org/wiki/C%2B%2B"
    achievement: "Extension of C with object-oriented features; developed from 1979, first released 1985"
    key_facts:
      - "Created by Bjarne Stroustrup at Bell Labs; development began in 1979 as 'C with Classes'"
      - "First released externally as C++ in 1985"
      - "Extended C with object-oriented features: classes, inheritance, polymorphism"
      - "Standardised as C++98 in 1997/1998; subsequent standards: C++11, C++14, C++17, C++20, C++23"
      - "Used extensively in systems programming, game development, embedded systems, and performance-critical applications"

  - name: Objective-C
    year: 1984
    creators: [Brad Cox, Tom Love]
    organization: "Stepstone / NeXT"
    wikidata: Q188531
    source_url: "https://en.wikipedia.org/wiki/Objective-C"
    achievement: "Object-oriented extension of C; developed in the early 1980s; became Apple's primary language for macOS and iOS"
    key_facts:
      - "Developed by Brad Cox and Tom Love in the early 1980s at their company Stepstone"
      - "Adds Smalltalk-style message passing to the C programming language"
      - "Selected by Steve Jobs' NeXT company for the NeXTSTEP operating system"
      - "Became the primary programming language for macOS (via Cocoa) and iOS (via Cocoa Touch) from 1997 until being superseded by Swift (announced 2014)"
      - "Apple published the first Objective-C compiler under the GNU General Public License in 1992"

  - name: Perl
    year: 1987
    creators: [Larry Wall]
    wikidata: Q42478
    source_url: "https://en.wikipedia.org/wiki/Perl"
    achievement: "General-purpose scripting language developed by Larry Wall in 1987 for Unix text processing"
    key_facts:
      - "Developed by Larry Wall in 1987 as a general-purpose Unix scripting language for report processing"
      - "Known for the principle 'there is more than one way to do it' (TIMTOWTDI)"
      - "Became the dominant language for CGI web programming in the 1990s"
      - "Named 'Perl' — though not officially an acronym, 'Practical Extraction and Reporting Language' is a common backronym"
      - "Perl 5 (1994) is the most widely used version; Perl 7 is the planned successor"

  - name: Python
    year: 1991
    creators: [Guido van Rossum]
    wikidata: Q28865
    source_url: "https://en.wikipedia.org/wiki/Python_(programming_language)"
    achievement: "High-level general-purpose language created by Guido van Rossum; first released 1991"
    key_facts:
      - "Guido van Rossum began working on Python in the late 1980s as a successor to the ABC language"
      - "Van Rossum first released it in 1991 as Python 0.9.0"
      - "Named after the BBC comedy series 'Monty Python's Flying Circus', not the snake"
      - "Emphasises code readability via significant indentation"
      - "Became one of the most popular programming languages in the world, dominant in data science, AI/ML, and scripting"

  - name: Ruby
    year_conceived: 1993
    year_released: 1995
    creators: [Yukihiro Matsumoto]
    wikidata: Q161053
    source_url: "https://en.wikipedia.org/wiki/Ruby_(programming_language)"
    achievement: "Object-oriented scripting language conceived 1993 by Matsumoto; publicly released December 1995"
    key_facts:
      - "Conceived by Yukihiro 'Matz' Matsumoto in 1993 in Japan"
      - "First public release of Ruby 0.95 announced on Japanese domestic newsgroups on 21 December 1995"
      - "Everything in Ruby is an object, including primitive data types"
      - "Influenced by Perl, Smalltalk, Eiffel, Ada, and Lisp"
      - "The Ruby on Rails framework (2004) made Ruby highly popular for web development"

  - name: Java
    year: 1995
    creators: [James Gosling]
    organization: "Sun Microsystems"
    wikidata: Q251
    source_url: "https://en.wikipedia.org/wiki/Java_(programming_language)"
    achievement: "Platform-independent OO language created at Sun; 'write once, run anywhere'; first released 1995"
    key_facts:
      - "Created by James Gosling at Sun Microsystems; first publicly released in 1995"
      - "Originally called 'Oak' (after a tree outside Gosling's office), then 'Green', then finally 'Java' (after Java coffee)"
      - "The 'write once, run anywhere' (WORA) model: Java bytecode runs on any Java Virtual Machine (JVM)"
      - "Quickly became one of the most popular languages in the world for enterprise and web applications"
      - "Acquired by Oracle when Oracle bought Sun Microsystems in 2010"

  - name: JavaScript
    year: 1995
    creators: [Brendan Eich]
    organization: "Netscape Communications"
    wikidata: Q2005
    source_url: "https://en.wikipedia.org/wiki/JavaScript"
    achievement: "Client-side web scripting language created by Brendan Eich at Netscape in 1995"
    key_facts:
      - "Created by Brendan Eich in 1995 while working at Netscape Communications"
      - "Originally called LiveScript; renamed JavaScript to capitalise on Java's popularity at the time"
      - "Despite the similar name, JavaScript and Java are unrelated languages with very different designs"
      - "Used by 98.9% of websites as of 2025 for client-side behaviour"
      - "Standardised as ECMAScript (first edition 1997); modern standard is ECMAScript 2024"

  - name: PHP
    year: 1995
    creators: [Rasmus Lerdorf]
    wikidata: Q59
    source_url: "https://en.wikipedia.org/wiki/PHP"
    achievement: "Server-side web scripting language created by Rasmus Lerdorf; created 1993/released 1995"
    key_facts:
      - "Created by Danish-Canadian programmer Rasmus Lerdorf in 1993 and released in 1995"
      - "Originally stood for 'Personal Home Page'; now stands for the recursive backronym 'PHP: Hypertext Preprocessor'"
      - "Designed specifically for web development and easily embeds into HTML"
      - "Powers a large portion of the web including WordPress (which runs approximately 43% of all websites)"
      - "PHP 8.0 (2020) introduced JIT compilation; PHP 8.4 released in 2024"

  - name: Haskell
    year: 1990
    creators: [Committee — Simon Peyton Jones, Paul Hudak, Philip Wadler and others]
    wikidata: Q34010
    source_url: "https://en.wikipedia.org/wiki/Haskell"
    achievement: "Purely functional, statically typed language; 'Haskell 1.0' standard defined in 1990"
    key_facts:
      - "Named after logician Haskell Curry"
      - "In 1987 at FPCA '87 (Portland, Oregon), researchers agreed to form a committee to define an open standard for lazy functional languages"
      - "The first version 'Haskell 1.0' was defined in 1990 by the committee"
      - "Features include type classes, monadic I/O, lazy evaluation, and strong static typing with type inference"
      - "The Glasgow Haskell Compiler (GHC) is the primary implementation"

  - name: R
    year: 1993
    creators: [Ross Ihaka, Robert Gentleman]
    organization: "University of Auckland"
    wikidata: Q206904
    source_url: "https://en.wikipedia.org/wiki/R_(programming_language)"
