  # ─── THEORETICAL COMPUTER SCIENCE ───────────────────────────────────────────

  theoretical_cs:

    Big_O_Notation:
      wikidata_id: Q269764
      chain_theme: 4
      # Paul Bachmann introduced in "Die Analytische Zahlentheorie" (1894)
      # Edmund Landau popularized the notation — now called "Landau notation" or "Big O"
      year_introduced: 1894
      introduced_by: "Paul Bachmann"
      popularized_by: "Edmund Landau (hence 'Landau notation')"
      key_facts:
        - "Mathematical notation describing the limiting behavior of a function — used in CS to describe algorithm time/space complexity"
        - "Introduced by Paul Bachmann in 1894 in 'Die Analytische Zahlentheorie'"
        - "Popularized by Edmund Landau; also called 'Landau notation' or 'Bachmann-Landau notation'"
        - "O(1) = constant; O(log n) = logarithmic; O(n) = linear; O(n log n) = linearithmic; O(n²) = quadratic; O(2ⁿ) = exponential"
        - "Describes worst-case upper bound on growth rate — not exact running time"
        - "Essential tool for algorithm analysis and comparison"
      wikipedia: https://en.wikipedia.org/wiki/Big_O_notation

    P_vs_NP:
      wikidata_id: Q933208
      chain_theme: 4
      year_formalized: 1971
      formalized_by: "Stephen Cook"
      # Leonid Levin independently formulated an equivalent problem (1973, published)
      independent_formulation: "Leonid Levin (1973)"
      source_paper: "Cook, S.A. (1971). 'The complexity of theorem-proving procedures.' STOC '71:151–158."
      millennium_prize: true
      prize_amount_usd: 1000000
      key_facts:
        - "Asks whether every problem whose solution can be quickly verified (NP) can also be quickly solved (P)"
        - "Formally posed by Stephen Cook in 1971 in his proof of NP-completeness of SAT"
        - "Independently formulated by Leonid Levin in 1973"
        - "One of the seven Millennium Prize Problems; Clay Mathematics Institute offers $1,000,000 for a proof"
        - "Most computer scientists believe P ≠ NP, but it has not been proven either way"
        - "If P = NP, most public-key cryptography (RSA, ECC) would become insecure"
      wikipedia: https://en.wikipedia.org/wiki/P_versus_NP_problem

    Halting_Problem:
      wikidata_id: Q200538
      chain_theme: 3
      year: 1936
      proved_by: "Alan Turing"
      inventor_wikidata: Q7251
      source_paper: "Turing, A.M. (1936). 'On Computable Numbers, with an Application to the Entscheidungsproblem.' Proceedings of the London Mathematical Society 2(42):230–265."
      key_facts:
        - "Proved by Alan Turing in 1936 in his landmark paper 'On Computable Numbers'"
        - "The halting problem asks: given a program and its input, will the program eventually stop (halt)?"
        - "Turing proved this is undecidable — no algorithm can solve it for all possible inputs"
        - "Proof uses a diagonal argument (similar to Cantor's diagonalization)"
        - "First major undecidability result in computer science"
        - "Established fundamental limits on what computers can compute"
      wikipedia: https://en.wikipedia.org/wiki/Halting_problem

    Church_Turing_Thesis:
      wikidata_id: Q211452
      chain_theme: 3
      year: 1936
      authors: ["Alonzo Church", "Alan Turing"]
      # Church published lambda calculus (1936); Turing published Turing machines (1936)
      key_facts:
        - "Proposed independently by Alonzo Church and Alan Turing in 1936"
        - "States that any function computable by an algorithm can be computed by a Turing machine"
        - "Church used lambda calculus; Turing used his abstract 'Turing machine' model"
        - "A thesis, not a proven theorem — it is a definition of 'computable'"
        - "Implies that all sufficiently powerful programming languages are equivalent in what they can compute"
        - "Foundation of theoretical computer science"
      wikipedia: https://en.wikipedia.org/wiki/Church%E2%80%93Turing_thesis

    Boolean_Algebra:
      wikidata_id: Q173183
      chain_theme: 7
      year_key_work: 1854
      # Boole's first work "The Mathematical Analysis of Logic" 1847; major work "An Investigation of the Laws of Thought" 1854
      creator: "George Boole"
      creator_wikidata: Q28827
      source_work: "Boole, G. (1854). 'An Investigation of the Laws of Thought.' Walton and Maberly, London."
      key_facts:
        - "Created by George Boole in 1847 ('The Mathematical Analysis of Logic') and expanded in 1854 ('The Laws of Thought')"
        - "Algebraic system where variables have only two values: true (1) and false (0)"
        - "Core operations: AND, OR, NOT"
        - "Claude Shannon showed in 1937 that Boolean algebra can describe electrical circuits"
        - "Foundation of all digital logic, computer circuits, and programming"
        - "Boolean: named after George Boole — the data type (bool/boolean) in all programming languages"
      wikipedia: https://en.wikipedia.org/wiki/Boolean_algebra

    NP_Completeness:
      wikidata_id: Q215676
      chain_theme: 4
      year_cook_levin: 1971
      year_karp: 1972
      key_figures: ["Stephen Cook", "Leonid Levin", "Richard Karp"]
      source_paper_cook: "Cook, S.A. (1971). 'The complexity of theorem-proving procedures.' STOC '71."
      source_paper_karp: "Karp, R.M. (1972). 'Reducibility Among Combinatorial Problems.' In Miller & Thatcher (eds), Complexity of Computer Computations:85–103."
      karps_21_problems_examples: ["Travelling Salesman", "Hamiltonian Circuit", "Knapsack", "Graph Coloring", "Clique", "Vertex Cover"]
      key_facts:
        - "NP-complete problems are the hardest problems in NP — any NP problem can be reduced to them in polynomial time"
        - "Cook–Levin theorem (1971): Boolean satisfiability (SAT) was the first proven NP-complete problem"
        - "Richard Karp's 1972 paper showed 21 classic combinatorial problems are NP-complete"
        - "Karp's 21 NP-complete problems include: Travelling Salesman, Hamiltonian Circuit, Knapsack, Graph Coloring"
        - "No polynomial-time algorithm is known for any NP-complete problem"
        - "If any NP-complete problem can be solved in polynomial time, then P = NP"
      wikipedia: https://en.wikipedia.org/wiki/NP-completeness

    Turing_Completeness:
      wikidata_id: Q692652
      chain_theme: 3
      key_facts:
        - "A system is Turing-complete if it can simulate any Turing machine (i.e., compute anything computable)"
        - "Named after Alan Turing and his 1936 abstract computing model"
        - "All general-purpose programming languages (C, Python, Java, etc.) are Turing-complete"
        - "Implies: if one Turing-complete language can do it, all of them can (theoretically)"
        - "Even unexpected systems are Turing-complete: Conway's Game of Life, Minecraft redstone"
        - "Turing completeness does not guarantee efficiency — only that computation is theoretically possible"
      wikipedia: https://en.wikipedia.org/wiki/Turing_completeness

