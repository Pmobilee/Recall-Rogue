# ============================================================
# VERIFIED SOURCE DATA
# ============================================================

source_data:

  # ─── SORTING ALGORITHMS ─────────────────────────────────────────────────────

  sorting_algorithms:

    Bubble_Sort:
      wikidata_id: Q170495
      chain_theme: 0
      complexity_time_best: "O(n)"
      complexity_time_average: "O(n²)"
      complexity_time_worst: "O(n²)"
      complexity_space: "O(1)"
      in_place: true
      stable: true
      origin: "Name coined in 1950s, described by mathematicians as early as 1956 (Iverson). Popularized in textbooks as the canonical 'simple but slow' sort."
      key_facts:
        - "Repeatedly swaps adjacent elements that are in the wrong order"
        - "One of the simplest sorting algorithms to understand and implement"
        - "Worst and average case O(n²) time complexity — very slow on large inputs"
        - "Best case O(n) when array is already sorted"
        - "Primarily used for educational purposes, rarely in production"
        - "Named for the way smaller elements 'bubble' to the top"
      wikipedia: https://en.wikipedia.org/wiki/Bubble_sort

    Insertion_Sort:
      wikidata_id: Q578537
      chain_theme: 0
      complexity_time_best: "O(n)"
      complexity_time_average: "O(n²)"
      complexity_time_worst: "O(n²)"
      complexity_space: "O(1)"
      in_place: true
      stable: true
      key_facts:
        - "Builds a sorted list one element at a time, inserting each into its correct position"
        - "Efficient for small datasets and nearly-sorted arrays"
        - "Best case O(n) for already-sorted arrays; worst case O(n²)"
        - "Used as the base case within Timsort and Introsort for small sub-arrays"
        - "Online algorithm — can sort a list as it receives it"
      wikipedia: https://en.wikipedia.org/wiki/Insertion_sort

    Selection_Sort:
      wikidata_id: Q1195975
      chain_theme: 0
      complexity_time_best: "O(n²)"
      complexity_time_average: "O(n²)"
      complexity_time_worst: "O(n²)"
      complexity_space: "O(1)"
      in_place: true
      stable: false
      key_facts:
        - "Divides input into sorted and unsorted regions; repeatedly selects the minimum from unsorted"
        - "Always O(n²) regardless of input — no best-case improvement"
        - "Performs at most n−1 swaps, useful when swap cost is high"
        - "Not stable in its basic form"
      wikipedia: https://en.wikipedia.org/wiki/Selection_sort

    Merge_Sort:
      wikidata_id: Q1021459
      chain_theme: 0
      year_invented: 1945
      inventor: "John von Neumann"
      inventor_wikidata: Q80562
      complexity_time_best: "O(n log n)"
      complexity_time_average: "O(n log n)"
      complexity_time_worst: "O(n log n)"
      complexity_space: "O(n)"
      in_place: false
      stable: true
      key_facts:
        - "Invented by John von Neumann in 1945"
        - "Divide-and-conquer algorithm: recursively splits, sorts, then merges"
        - "Guaranteed O(n log n) in all cases — best, average, and worst"
        - "Stable sort — preserves original order of equal elements"
        - "Requires O(n) extra space (not in-place)"
        - "Preferred for sorting linked lists and external (disk-based) sorting"
      wikipedia: https://en.wikipedia.org/wiki/Merge_sort

    Quicksort:
      wikidata_id: Q1021451
      chain_theme: 0
      year_conceived: 1959
      year_published: 1961
      inventor: "Tony Hoare"
      inventor_wikidata: Q92462
      complexity_time_best: "O(n log n)"
      complexity_time_average: "O(n log n)"
      complexity_time_worst: "O(n²)"
      complexity_space: "O(log n)"
      in_place: true
      stable: false
      source_paper: "Hoare, C.A.R. (1962). 'Quicksort.' The Computer Journal, 5(1):10–16."
      key_facts:
        - "Developed by Tony Hoare in 1959 while working at Moscow State University; published 1961"
        - "Divide-and-conquer: selects a pivot, partitions array into elements less/greater, recurses"
        - "Average case O(n log n); worst case O(n²) on already-sorted arrays with poor pivot choice"
        - "Typically the fastest in-memory sort in practice due to cache efficiency"
        - "Most widely used general-purpose sorting algorithm"
        - "Not stable — does not preserve order of equal elements"
        - "In-place: requires only O(log n) stack space"
      wikipedia: https://en.wikipedia.org/wiki/Quicksort

    Heapsort:
      wikidata_id: Q732200
      chain_theme: 0
      year_invented: 1964
      inventor: "J.W.J. Williams"
      # Robert W. Floyd refined it in the same year
      complexity_time_best: "O(n log n)"
      complexity_time_average: "O(n log n)"
      complexity_time_worst: "O(n log n)"
      complexity_space: "O(1)"
      in_place: true
      stable: false
      source_paper: "Williams, J.W.J. (1964). 'Algorithm 232 – Heapsort.' CACM 7(6):347–348."
      key_facts:
        - "Invented by J.W.J. Williams in 1964; refined by Robert W. Floyd in the same year"
        - "Uses a binary heap data structure to repeatedly extract the maximum element"
        - "Guaranteed O(n log n) in all cases"
        - "In-place with O(1) auxiliary space"
        - "Not stable"
        - "Slower in practice than Quicksort due to poor cache locality"
      wikipedia: https://en.wikipedia.org/wiki/Heapsort

    Timsort:
      wikidata_id: Q2316648
      chain_theme: 0
      year_invented: 2002
      inventor: "Tim Peters"
      inventor_wikidata: Q92889
      used_in: ["Python (since 2.3)", "Java (Arrays.sort for objects, since Java 7)", "Android"]
      complexity_time_best: "O(n)"
      complexity_time_average: "O(n log n)"
      complexity_time_worst: "O(n log n)"
      complexity_space: "O(n)"
      in_place: false
      stable: true
      key_facts:
        - "Created by Tim Peters in 2002 for Python"
        - "Hybrid algorithm derived from merge sort and insertion sort"
        - "Default sort algorithm in Python since version 2.3 (2003)"
        - "Adopted by Java (for object arrays) since Java 7 (2011)"
        - "Exploits real-world partially-sorted data (natural runs)"
        - "Best case O(n) for already-sorted or reverse-sorted input"
        - "Stable sort — guarantees relative order of equal elements"
      wikipedia: https://en.wikipedia.org/wiki/Timsort

  # ─── SEARCH ALGORITHMS ───────────────────────────────────────────────────────

  search_algorithms:

    Binary_Search:
      wikidata_id: Q81809
      chain_theme: 0
      # Ancient concept; first published error-free version: D.H. Lehmer 1946
      year_first_correct_published: 1946
      inventor_note: "Concept ancient; first correct published algorithm by D.H. Lehmer, 1946. John Mauchly described it in 1946 lectures. Error-free version for all n: Bottenbruch 1962."
      complexity_time: "O(log n)"
      complexity_space: "O(1)"
      key_facts:
        - "Searches a sorted array by repeatedly halving the search interval"
        - "O(log n) time complexity — far faster than linear O(n) for large arrays"
        - "Requires the array to be sorted first"
        - "The concept is ancient; first described formally in computing by D.H. Lehmer in 1946"
        - "A correct version for all array sizes was published by Bottenbruch in 1962"
        - "Foundational algorithm used in database indexing, spell-checkers, game AI"
      wikipedia: https://en.wikipedia.org/wiki/Binary_search_algorithm

    Depth_First_Search:
      wikidata_id: Q740222
      chain_theme: 1
      abbreviation: DFS
      complexity_time: "O(V + E)"
      complexity_space: "O(V)"
      data_structure_used: "Stack (implicit recursion or explicit)"
      key_facts:
        - "Graph traversal that explores as far as possible along each branch before backtracking"
        - "Uses a stack (or recursion) to track the path"
        - "Time complexity O(V + E) where V = vertices, E = edges"
        - "Used for topological sorting, cycle detection, maze solving, connected components"
        - "Can get stuck in infinite loops on infinite graphs without visited tracking"
      wikipedia: https://en.wikipedia.org/wiki/Depth-first_search

    Breadth_First_Search:
      wikidata_id: Q752783
      chain_theme: 1
      abbreviation: BFS
      complexity_time: "O(V + E)"
      complexity_space: "O(V)"
      data_structure_used: Queue
      key_facts:
        - "Graph traversal that explores all neighbors at the current depth before going deeper"
        - "Uses a queue to track nodes to visit"
        - "Finds the shortest path (fewest edges) between two nodes in an unweighted graph"
        - "Time and space complexity O(V + E)"
        - "Used in GPS navigation, social network friend suggestions, web crawlers"
      wikipedia: https://en.wikipedia.org/wiki/Breadth-first_search

    A_Star_Search:
      wikidata_id: Q1011284
      chain_theme: 1
      year_published: 1968
      inventors: ["Peter Hart", "Nils Nilsson", "Bertram Raphael"]
      source_paper: "Hart, P.E., Nilsson, N.J., Raphael, B. (1968). 'A Formal Basis for the Heuristic Determination of Minimum Cost Paths.' IEEE Transactions on Systems Science and Cybernetics 4(2):100–107."
      complexity_time: "O(b^d) where b = branching factor, d = depth of solution"
      key_facts:
        - "Published in 1968 by Peter Hart, Nils Nilsson, and Bertram Raphael at SRI International"
        - "Finds the shortest path from a start node to a goal using a heuristic estimate"
        - "Combines Dijkstra's algorithm (actual cost g) with a heuristic (estimated cost h)"
        - "Complete and optimal if the heuristic is admissible (never overestimates)"
        - "Widely used in game AI pathfinding, GPS route planning, and robotics"
        - "Named for the asterisk (*) notation in the original paper representing optimal solutions"
      wikipedia: https://en.wikipedia.org/wiki/A*_search_algorithm

  # ─── GRAPH ALGORITHMS ────────────────────────────────────────────────────────

  graph_algorithms:

    Dijkstra_Algorithm:
      wikidata_id: Q623418
      chain_theme: 2
      year_conceived: 1956
      year_published: 1959
      inventor: "Edsger W. Dijkstra"
      inventor_wikidata: Q46029
      source_paper: "Dijkstra, E.W. (1959). 'A note on two problems in connexion with graphs.' Numerische Mathematik 1:269–271."
      problem_solved: "Single-source shortest path in a weighted graph with non-negative weights"
      complexity_time_naive: "O(V²)"
      complexity_time_with_heap: "O((V + E) log V)"
      key_facts:
        - "Conceived by Edsger W. Dijkstra in 1956 and published in 1959"
        - "Finds the shortest path from a source node to all other nodes in a weighted graph"
        - "Only works correctly with non-negative edge weights"
        - "Greedy algorithm: repeatedly selects the unvisited node with smallest known distance"
        - "Used in GPS navigation, network routing (OSPF protocol), and airline route planning"
        - "Dijkstra designed it in 20 minutes as a demonstration of his thinking"
      wikipedia: https://en.wikipedia.org/wiki/Dijkstra%27s_algorithm

    Bellman_Ford_Algorithm:
      wikidata_id: Q836325
      chain_theme: 2
      year_published_bellman: 1958
      year_published_ford_fulkerson: 1962
      inventors: ["Richard Bellman", "Lester Ford Jr."]
      problem_solved: "Single-source shortest path, handles negative-weight edges"
      complexity_time: "O(V × E)"
      key_facts:
        - "Published independently by Richard Bellman (1958) and Lester Ford Jr. (Ford-Fulkerson 1956/1962)"
        - "Finds shortest paths from a source to all other vertices"
        - "Unlike Dijkstra, handles graphs with negative-weight edges"
        - "Can detect negative-weight cycles (and reports their presence)"
        - "Slower than Dijkstra: O(V × E) vs O((V + E) log V)"
        - "Used in distance-vector routing protocols (e.g., RIP)"
      wikipedia: https://en.wikipedia.org/wiki/Bellman%E2%80%93Ford_algorithm

    Kruskal_Algorithm:
      wikidata_id: Q681401
      chain_theme: 2
      year_published: 1956
      inventor: "Joseph Kruskal"
      inventor_wikidata: Q976068
      source_paper: "Kruskal, J.B. (1956). 'On the shortest spanning subtree of a graph and the traveling salesman problem.' Proceedings of the AMS 7(1):48–50."
      problem_solved: "Minimum spanning tree of a connected, undirected, weighted graph"
      complexity_time: "O(E log E)"
      key_facts:
        - "Published by Joseph Kruskal in 1956"
        - "Finds the minimum spanning tree of a weighted undirected graph"
        - "Greedy approach: sorts all edges by weight, adds each edge if it doesn't form a cycle"
        - "Uses a Union-Find (disjoint set union) data structure for cycle detection"
        - "O(E log E) time — efficient for sparse graphs"
        - "A minimum spanning tree connects all vertices with minimum total edge weight"
      wikipedia: https://en.wikipedia.org/wiki/Kruskal%27s_algorithm

    Prim_Algorithm:
      wikidata_id: Q617794
      chain_theme: 2
      year_published_vojtěch: 1930
      year_published_prim: 1957
      # Rediscovered independently by Prim (1957) and Dijkstra (1959)
      inventor: "Robert C. Prim (1957); originally Vojtěch Jarník (1930)"
      problem_solved: "Minimum spanning tree of a connected, undirected, weighted graph"
      complexity_time_simple: "O(V²)"
      complexity_time_binary_heap: "O((V + E) log V)"
      key_facts:
        - "Algorithm originally published by Vojtěch Jarník in 1930; rediscovered by Robert Prim in 1957"
        - "Finds the minimum spanning tree by growing the tree one vertex at a time"
        - "Greedy: always adds the cheapest edge connecting a tree vertex to a non-tree vertex"
        - "More efficient than Kruskal for dense graphs"
        - "Also independently rediscovered by Dijkstra in 1959"
      wikipedia: https://en.wikipedia.org/wiki/Prim%27s_algorithm

    Floyd_Warshall_Algorithm:
      wikidata_id: Q745290
      chain_theme: 2
      year_published: 1962
      inventors: ["Robert Floyd", "Stephen Warshall"]
      # Roy-Floyd-Warshall; Bernard Roy 1959 also has precedence
      problem_solved: "All-pairs shortest paths in a weighted graph"
      complexity_time: "O(V³)"
      complexity_space: "O(V²)"
      key_facts:
        - "Published by Robert Floyd and Stephen Warshall in 1962"
        - "Finds shortest paths between ALL pairs of vertices simultaneously"
        - "Uses dynamic programming with O(V³) time and O(V²) space"
        - "Works with negative-weight edges (but not negative cycles)"
        - "The adjacency matrix is updated iteratively via intermediate vertex consideration"
        - "Also known as Roy–Floyd–Warshall algorithm; Bernard Roy had a similar result in 1959"
      wikipedia: https://en.wikipedia.org/wiki/Floyd%E2%80%93Warshall_algorithm

  # ─── DATA STRUCTURES ─────────────────────────────────────────────────────────

  data_structures:

    Stack:
      wikidata_id: Q128827
      chain_theme: 5
      access_pattern: "LIFO — Last In, First Out"
      operations: ["push", "pop", "peek/top"]
      complexity: "O(1) for push, pop, peek"
      key_facts:
        - "LIFO (Last In, First Out) data structure"
        - "The last element added (pushed) is the first one removed (popped)"
        - "Core operations: push (add), pop (remove), peek (view top without removing)"
        - "All core operations are O(1)"
        - "Used for: function call stacks, undo operations, expression parsing, DFS"
        - "Analogous to a stack of plates"
      wikipedia: https://en.wikipedia.org/wiki/Stack_(abstract_data_type)

    Queue:
      wikidata_id: Q185610
      chain_theme: 5
      access_pattern: "FIFO — First In, First Out"
      operations: ["enqueue", "dequeue", "peek/front"]
      complexity: "O(1) for enqueue and dequeue"
      key_facts:
        - "FIFO (First In, First Out) data structure"
        - "The first element added (enqueued) is the first one removed (dequeued)"
        - "Core operations: enqueue (add to rear), dequeue (remove from front)"
        - "All core operations are O(1)"
        - "Used for: BFS, task scheduling, print spoolers, message queues"
        - "Analogous to a line (queue) of people waiting"
      wikipedia: https://en.wikipedia.org/wiki/Queue_(abstract_data_type)

    Linked_List:
      wikidata_id: Q82511
      chain_theme: 5
      key_facts:
        - "Linear data structure where elements (nodes) are connected via pointers"
        - "Each node contains data and a reference (pointer) to the next node"
        - "Singly linked: each node points to the next; doubly linked: nodes point to both neighbors"
        - "Insertion/deletion at head: O(1); search: O(n)"
        - "No random access — must traverse from head to reach element at index n"
        - "Efficient for dynamic-size collections when insertions/deletions are frequent"
      wikipedia: https://en.wikipedia.org/wiki/Linked_list

    Binary_Search_Tree:
      wikidata_id: Q764558
      chain_theme: 5
      abbreviation: BST
      complexity_search_average: "O(log n)"
      complexity_search_worst: "O(n)"
      key_facts:
        - "Binary tree where each node's left subtree contains only values less than the node, right only greater"
        - "Average case O(log n) for search, insert, delete"
        - "Worst case O(n) if tree is unbalanced (degenerate/linked-list shape)"
        - "Self-balancing variants (AVL tree, Red-Black tree) guarantee O(log n) worst case"
        - "In-order traversal of a BST produces elements in sorted order"
      wikipedia: https://en.wikipedia.org/wiki/Binary_search_tree

    Hash_Table:
      wikidata_id: Q189533
      chain_theme: 5
      complexity_average: "O(1) for search, insert, delete"
      complexity_worst: "O(n) worst case (all keys collide)"
      key_facts:
        - "Maps keys to values using a hash function to compute an array index"
        - "Average case O(1) for lookup, insertion, and deletion"
        - "Worst case O(n) if many hash collisions occur"
        - "Collision resolution strategies: chaining (linked lists at each bucket), open addressing"
        - "Load factor (items / buckets) determines when to resize (rehash)"
        - "Used in: Python dicts, JavaScript objects, database indexes, caches"
      wikipedia: https://en.wikipedia.org/wiki/Hash_table

    Heap:
      wikidata_id: Q274012
      chain_theme: 5
      variants: ["Min-heap (smallest at root)", "Max-heap (largest at root)"]
      complexity_insert: "O(log n)"
      complexity_find_min_max: "O(1)"
      complexity_delete_min_max: "O(log n)"
      key_facts:
        - "Tree-based data structure satisfying the heap property: parent is always ≥ (max-heap) or ≤ (min-heap) its children"
        - "Find-min or find-max: O(1)"
        - "Insert and delete-min/max: O(log n)"
        - "Typically implemented as an array (binary heap)"
        - "Basis for Heapsort and priority queues"
        - "Priority queues are the primary application: scheduling, Dijkstra's algorithm, A*"
      wikipedia: https://en.wikipedia.org/wiki/Heap_(data_structure)

    Graph:
      wikidata_id: Q141488
      chain_theme: 1
      variants: ["Directed (digraph)", "Undirected", "Weighted", "Unweighted"]
