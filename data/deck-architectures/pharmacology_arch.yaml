deck_id: pharmacology
name: "Nursing Pharmacology"
domain: human_body_health
sub_domain: pharmacology
description: "Master 101 essential medications — drug classes, mechanisms of action, side effects, and nursing considerations. NCLEX-aligned."
target_facts: 450
minimum_facts: 350

# SCOPE SOURCE: NCLEX-RN 2026 Test Plan (NCSBN) + Lehne's Pharmacology for Nursing Care 12th Ed
# Drug list: Nurseslabs "101 Must-Know NCLEX Medications" cross-referenced with Lehne's chapter structure
# Pharmacology = 13-19% of NCLEX-RN exam (Pharmacological & Parenteral Therapies category)

data_sources:
  - name: NCLEX-RN 2026 Test Plan
    url: https://www.ncsbn.org/publications/2026-nclex-rn-test-plan
    license: public document
    usage: Exam scope — defines testable pharmacology content categories
  - name: Lehne's Pharmacology for Nursing Care, 12th Edition
    url: https://www.educate.elsevier.com/book/details/9780443107108
    license: textbook reference (structure only, not content)
    usage: Chapter organization — maps drug classifications to nursing curriculum
  - name: Nurseslabs 101 Must-Know NCLEX Medications
    url: https://nurseslabs.com/must-know-nclex-medications-cheat-sheet/
    license: CC-BY-SA (educational reference)
    usage: High-yield drug list with classifications and nursing pearls
  - name: DailyMed (NIH/NLM)
    url: https://dailymed.nlm.nih.gov/dailymed/
    license: public domain (US government)
    usage: FDA-approved drug labels — authoritative mechanism, indication, side effect data
  - name: Wikidata
    url: https://www.wikidata.org/
    license: CC0
    usage: Structured drug data — Wikidata IDs, ATC codes, drug classes
  - name: Wikipedia
    url: https://en.wikipedia.org/
    license: CC-BY-SA-4.0
    usage: Drug mechanism descriptions, history, clinical context

asset_sources: []

# ============================================================
# ANSWER TYPE POOLS
# ============================================================

answer_type_pools:

  # POOL 1: Generic Drug Names — "Which drug is a loop diuretic?"
  # 101 members — excellent pool size for distractor variety
  - id: drug_names
    format: name
    estimated_count: 101
    note: >
      Generic drug names only (no brand names — those go in acceptableAlternatives).
      All 101 NCLEX must-know medications. Excellent pool — players will confuse
      drugs within the same class (metoprolol vs atenolol, lisinopril vs losartan).

  # POOL 2: Drug Class Names — "What class does metoprolol belong to?"
  # ~35 distinct classes
  - id: drug_classes
    format: term
    estimated_count: 35
    note: >
      "Beta-blocker", "ACE inhibitor", "SSRI", "Loop diuretic", "Aminoglycoside", etc.
      Key confusions: ACE inhibitor vs ARB, SSRI vs SNRI vs TCA,
      first-gen vs second-gen antipsychotic, thiazide vs loop diuretic.

  # POOL 3: Mechanisms of Action — "How does lisinopril work?"
  # ~30 distinct mechanisms
  - id: mechanisms
    format: term
    estimated_count: 30
    note: >
      "Blocks angiotensin-converting enzyme", "Inhibits serotonin reuptake",
      "Blocks beta-1 receptors", "Inhibits HMG-CoA reductase", etc.
      Semantically rich pool — mechanisms within a class are similar enough to confuse.

  # POOL 4: Clinical Indications — "What condition is warfarin used to treat?"
  # ~50 distinct indications
  - id: indications
    format: term
    estimated_count: 50
    note: >
      "Hypertension", "Type 2 diabetes", "Atrial fibrillation", "Deep vein thrombosis",
      "Major depressive disorder", "Seizures", "GERD", etc.
      Multiple drugs treat the same condition — good confusion source.

  # POOL 5: Side Effects — "What is a common side effect of ACE inhibitors?"
  # ~40 distinct side effects
  - id: side_effects
    format: term
    estimated_count: 40
    note: >
      "Dry cough", "Hyperkalemia", "Ototoxicity", "Hepatotoxicity",
      "QT prolongation", "Agranulocytosis", "Stevens-Johnson syndrome", etc.
      Players confuse which drug causes which side effect constantly.

  # POOL 6: Nursing Interventions — "What should the nurse monitor for a patient on warfarin?"
  # ~35 distinct interventions
  - id: nursing_interventions
    format: term
    estimated_count: 35
    note: >
      "Monitor INR", "Check potassium levels", "Hold if HR < 60",
      "Assess for bleeding", "Monitor blood glucose", "Check peak/trough levels", etc.

  # POOL 7: Antidotes/Reversal Agents — "What is the antidote for heparin?"
  # ~15 members — small but critical pool, use syntheticDistractors
  - id: antidotes
    format: name
    estimated_count: 15
    note: >
      "Protamine sulfate" (heparin), "Vitamin K / phytonadione" (warfarin),
      "Naloxone" (opioids), "Flumazenil" (benzodiazepines), "Digoxin immune Fab" (digoxin),
      "Acetylcysteine" (acetaminophen), "Glucagon" (beta-blockers), etc.
      Small but high-yield — every nursing student must know these cold.
    syntheticDistractors:
      - "Calcium gluconate"
      - "Sodium bicarbonate"
      - "Activated charcoal"
      - "Deferoxamine"
      - "Succimer"
      - "Pralidoxime"
      - "Ipecac syrup"

  # POOL 8: Drug Interactions — "Which food should be avoided with warfarin?"
  # ~20 members
  - id: interactions
    format: term
    estimated_count: 20
    note: >
      "Vitamin K-rich foods", "Grapefruit juice", "Tyramine-containing foods",
      "Alcohol", "NSAIDs", "Antacids", etc.
      Cross-references between drug pools — tests applied knowledge.

# ============================================================
# QUESTION TEMPLATES — Mastery-driven difficulty curve
# ============================================================

question_templates:
  - id: class_from_drug
    answerPoolId: drug_classes
    questionFormat: "What drug class does {drug} belong to?"
    availableFromMastery: 0
    difficulty: 1

  - id: drug_from_class
    answerPoolId: drug_names
    questionFormat: "Which drug is a {drug_class}?"
    availableFromMastery: 1
    difficulty: 2

  - id: mechanism_from_drug
    answerPoolId: mechanisms
    questionFormat: "What is the mechanism of action of {drug}?"
    availableFromMastery: 1
    difficulty: 2

  - id: indication_from_drug
    answerPoolId: indications
    questionFormat: "What is the primary indication for {drug}?"
    availableFromMastery: 0
    difficulty: 1

  - id: drug_from_indication
    answerPoolId: drug_names
    questionFormat: "Which drug is used to treat {condition}?"
    availableFromMastery: 2
    difficulty: 3

  - id: side_effect_from_drug
    answerPoolId: side_effects
    questionFormat: "What is a common adverse effect of {drug}?"
    availableFromMastery: 2
    difficulty: 3

  - id: nursing_from_drug
    answerPoolId: nursing_interventions
    questionFormat: "What should the nurse monitor for a patient on {drug}?"
    availableFromMastery: 3
    difficulty: 4

  - id: antidote_from_drug
    answerPoolId: antidotes
    questionFormat: "What is the antidote for {drug} toxicity?"
    availableFromMastery: 2
    difficulty: 3

  - id: interaction_from_drug
    answerPoolId: interactions
    questionFormat: "Which substance should be avoided when taking {drug}?"
    availableFromMastery: 3
    difficulty: 4

  - id: drug_from_side_effect
    answerPoolId: drug_names
    questionFormat: "Which drug is associated with {side_effect}?"
    availableFromMastery: 4
    difficulty: 5

# ============================================================
# COMMON CONFUSIONS — Seeded into confusion matrix
# ============================================================

common_confusions:
  # Within-class confusions (same mechanism, different drugs)
  - ["lisinopril", "losartan"]           # ACE inhibitor vs ARB — both block RAAS
  - ["metoprolol", "amlodipine"]         # Beta-blocker vs CCB — both lower BP
  - ["furosemide", "hydrochlorothiazide"] # Loop vs thiazide diuretic
  - ["warfarin", "heparin"]              # Both anticoagulants, different mechanisms
  - ["fluoxetine", "amitriptyline"]      # SSRI vs TCA — both antidepressants
  - ["haloperidol", "clozapine"]         # First-gen vs second-gen antipsychotic
  - ["phenytoin", "carbamazepine"]       # Both anticonvulsants
  - ["morphine", "fentanyl"]             # Both opioids, different potency
  - ["insulin_lispro", "insulin_glargine"] # Rapid vs long-acting insulin
  - ["metformin", "glipizide"]           # Biguanide vs sulfonylurea
  - ["amoxicillin", "azithromycin"]      # Penicillin vs macrolide
  - ["omeprazole", "famotidine"]         # PPI vs H2 blocker
  - ["albuterol", "ipratropium"]         # Beta-2 agonist vs anticholinergic bronchodilator
  - ["prednisone", "fluticasone"]        # Systemic vs inhaled corticosteroid
  # Cross-class confusions (similar names or indications)
  - ["metoprolol", "metformin"]          # Similar names, completely different drugs
  - ["clopidogrel", "ceftriaxone"]       # Similar starting sounds
  - ["lorazepam", "losartan"]            # Similar names

# ============================================================
# SYNONYM GROUPS — Never distract each other
# ============================================================

synonym_groups:
  - id: ace_inhibitors
    members: ["lisinopril", "enalapril", "captopril"]
    reason: "All ACE inhibitors with -pril suffix — interchangeable as distractors would be confusing"
  - id: insulin_types
    members: ["insulin_lispro", "insulin_regular", "insulin_nph", "insulin_glargine"]
    reason: "All insulin preparations — quiz tests which TYPE, not whether it's insulin"

