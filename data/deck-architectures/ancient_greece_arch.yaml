# ============================================================
# FACT GENERATION GUIDANCE
# ============================================================
fact_generation:
  target_distribution:
    city_states: 45
    persian_wars: 40
    golden_age_athens: 35
    greek_philosophy: 50
    alexander_the_great: 40
    greek_religion_mythology: 30
    olympics_and_culture: 30
    total_target: 270

  priority_topics:
    - Cleisthenes reforms and Athenian democracy (sortition, Boule, Ecclesia, ostracism)
    - Sparta: agoge, helots, dual kingship, ephors, laconic speech
    - Persian Wars: Marathon, Thermopylae, Salamis, Plataea — verified numbers and key figures
    - Athens Golden Age: Pericles, Parthenon, Phidias, the three great tragedians
    - Pre-Socratic philosophers (one or two key facts per thinker)
    - Socrates, Plato, Aristotle — methods, works, legacy
    - Alexander: battles in sequence, Bucephalus, death controversy, Diadochi
    - Olympic events: pankration, pentathlon, stadion, chariot — rules and champions
    - Greek theater: structure (orchestra, skene, theatron), City Dionysia, masks, chorus
    - The Twelve Olympians: individual domains and Roman equivalents
    - Oracle at Delphi: Pythia, ambiguous prophecies, "Know Thyself"

  question_format_guidance:
    - Generate multiple question formats per topic: what/who/when/where/how
    - Include "what did X innovate or invent" questions (Aeschylus adding second actor, etc.)
    - Include number-based questions (300 Spartans, 500 Boule members, 170 rowers, etc.)
    - Include "what does the term mean" questions (laconic, agoge, pankration, ekecheiria, etc.)
    - Include roman equivalent questions for the Twelve Olympians
    - Include "who said" questions for verified quotes (molon labe, "If", etc.)

  critical_accuracy_rules:
    - DO NOT use Herodotus's inflated numbers — use modern scholarly estimates for battle sizes
    - Pheidippides: his run to SPARTA before the battle is historical (Herodotus); the run from Marathon to Athens after is NOT in Herodotus — never present it as fact
    - 300 Spartans is confirmed; total Greek force at Thermopylae was ~7,000
    - "Et tu, Brute?" is Shakespeare only — does not apply to Greek facts but serves as model for accuracy discipline
    - Molon labe at Thermopylae is confirmed by Plutarch — safe to use as a fact
    - The "come back with your shield or on it" quote is attributed to Spartan mothers generally — treat as cultural tradition, not a verified individual quote
    - Koine Greek emerged from Alexander's armies; it later became the language of the New Testament

  overlap_exclusions:
    - The existing greek_mythology.json deck covers god stories, hero myths (Heracles, Theseus, Perseus), and mythological creatures — DO NOT duplicate those; focus on INSTITUTIONAL religion (temples, oracles, festivals, practices)
    - Do not duplicate facts from ancient_rome deck (e.g., details about Alexandria post-30 BCE)

  distractor_rule: >
    MANDATORY: ALL distractors MUST be generated by the LLM reading each specific question and
    producing plausible wrong answers. NEVER pull correct_answer values from other facts in this
    dataset as distractors. Answer type pools above provide semantic categories for structuring
    distractor quality — use them as inspiration, NOT as a pool to draw from directly.
    Post-generation validation against the dataset is permitted to ensure no distractor
    accidentally matches another correct answer.

  source_fidelity_rule: >
    Workers MUST copy facts FROM the verified source data above — they MUST NOT generate factual
    content (dates, numbers, names, claims) from LLM training knowledge. Every date, casualty
    figure, and biographical detail in this file has been verified against Wikipedia. If a worker
    needs additional detail not in this file, it must use WebSearch/WebFetch tools and cite what
    it finds.
