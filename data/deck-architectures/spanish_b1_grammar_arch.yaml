      - id: tatoeba:4499358
        es: "El restaurante donde comemos siempre está lleno."
        en: "The restaurant where we always eat is full."

  - id: gp_rel_lo_que
    point: "Relative clause with lo que (abstract antecedent)"
    category: relative_clauses
    chain_theme: 6
    pool: relative_pronouns
    difficulty: 4
    pcic_ref: "B1 — Oraciones de relativo, lo que"
