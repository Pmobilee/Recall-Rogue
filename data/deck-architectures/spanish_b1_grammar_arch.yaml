deck_id: spanish_b1_grammar
name: "Spanish B1 Grammar"
domain: vocabulary
sub_domain: spanish_grammar
target_facts: 450
minimum_facts: 300
language: es

data_sources:
  - name: Instituto Cervantes PCIC B1 Grammar Inventory
    url: https://cvc.cervantes.es/ensenanza/biblioteca_ele/plan_curricular/niveles/03_gramatica_inventario_b1-b2.htm
    license: Reference only — scope/structure. Instituto Cervantes, 2011.
    usage: Authoritative B1 grammar scope. Determines which grammar points are included and their canonical descriptions.
  - name: Tatoeba
    url: https://tatoeba.org/
    license: CC BY 2.0
    usage: Verified example sentences with Spanish text + English translation + sentence ID. All sentence IDs documented in tatoeba_b1_sentences.tsv.

# -----------------------------------------------------------------
# Chain Themes (by grammar area):
#   0 — present_subjunctive   : present subjunctive forms + all trigger categories
#   1 — imperative_all        : affirmative usted/ustedes/nosotros + negative imperative all persons
#   2 — conditional           : simple conditional (regular + irregular stems)
#   3 — future_simple         : future simple (regular + irregular) + si-clauses type 1
#   4 — pluperfect            : pluperfect (había+PP) + irregular past participles B1
#   5 — double_object_pronouns: se lo/la/los/las + me/te/nos lo/la + placement rules
#   6 — relative_clauses      : que / quien / donde / lo que
#   7 — verbal_periphrases    : acabar de / volver a / seguir + gerund / llevar + gerund
#
# Answer Type Pools:
#   subj_ar_regular            : present subjunctive regular -ar forms (hable, hables, hable, etc.)
#   subj_er_ir_regular         : present subjunctive regular -er/-ir forms (coma, viva, etc.)
#   subj_irregulars_ser_estar  : sea, seas... / esté, estés... (short, 3-4 chars)
#   subj_irregulars_tener_hacer: tenga, haga, salga, ponga, venga (medium, 4-6 chars)
#   subj_irregulars_ir_querer  : vaya, quiera, pueda, sepa (medium, 4-5 chars)
#   subj_trigger_phrases       : full trigger phrase (espero que, es importante que, para que, etc.)
#   neg_imp_tu                 : no hables, no comas, no vayas, no seas (3-4 word phrases)
#   neg_imp_formal             : no hable, no coman, no hablemos (2-3 word phrases)
#   imp_formal_affirm          : hable, venga, tenga, ponga, diga, haga (usted forms)
#   imp_formal_ustedes         : hablen, vengan, tengan, salgan (ustedes forms)
#   imp_nosotros               : hablemos, comamos, vayamos, tengamos (nosotros forms)
#   conditional_regular        : hablaría, comería, viviría, hablarías, etc.
#   conditional_irregular      : haría, diría, tendría, podría, vendría, saldría, etc.
#   future_regular             : hablaré, comerás, vivirá, hablaremos, etc.
#   future_irregular           : haré, dirás, tendrá, podremos, vendrán, etc.
#   haber_imperfect            : había, habías, había, habíamos, habíais, habían
#   irregular_pp_b1            : abierto, escrito, muerto, roto, resuelto, cubierto
#   double_obj_se_combo        : se lo, se la, se los, se las (short 2-3 char combos)
#   double_obj_me_te_nos       : me lo, me la, te lo, te la, nos lo, nos la (short combos)
#   pronoun_placement_full     : full phrase showing placement (dámelo, está explicándomelo, etc.)
#   relative_pronouns          : que, quien, quienes, donde, lo que (single-word or short phrase)
#   si_clause_patterns         : full si-clause constructions (length varies, homogeneityExempt)
#   periphrasis_forms          : full periphrasis phrase (acabo de llegar, sigo estudiando, etc.)
# -----------------------------------------------------------------

chain_themes:
  - id: 0
    name: "Present Subjunctive"
    description: "Presente de subjuntivo — regular and irregular forms + all trigger categories (espero que, cuando, para que, no creo que, etc.)"
    color: "#9B59B6"
    icon: "verb"
  - id: 1
    name: "Imperative: All Persons"
    description: "Affirmative imperative (usted/ustedes/nosotros) + negative imperative all persons (uses subjunctive)"
    color: "#E74C3C"
    icon: "command"
  - id: 2
    name: "Simple Conditional"
    description: "Condicional simple — hablaría, comería + irregular stems (haría, diría, tendría, podría)"
    color: "#E67E22"
    icon: "verb"
  - id: 3
    name: "Future Simple"
    description: "Futuro simple — hablaré, comeré + irregular stems (haré, diré, tendré) + si-clauses type 1"
    color: "#3498DB"
    icon: "verb"
  - id: 4
    name: "Pluperfect & Past Participles"
    description: "Pluscuamperfecto (había + PP) + irregular past participles B1 (abierto, escrito, muerto, roto)"
    color: "#1ABC9C"
    icon: "phrase"
  - id: 5
    name: "Double Object Pronouns"
    description: "se lo/la/los/las + me/te/nos lo/la + pronoun placement with infinitives, gerunds, imperatives"
    color: "#F39C12"
    icon: "pronoun"
  - id: 6
    name: "Relative Clauses"
    description: "que / quien / donde / lo que — basic relative clause structures"
    color: "#27AE60"
    icon: "structure"
  - id: 7
    name: "Verbal Periphrases"
    description: "acabar de + inf (just did) / volver a + inf (do again) / seguir + gerund / llevar + time + gerund"
    color: "#8E44AD"
    icon: "phrase"

