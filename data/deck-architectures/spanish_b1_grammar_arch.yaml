# -----------------------------------------------------------------
# Grammar Point Inventory with verified example sentences
# All sentences from Tatoeba (CC BY 2.0) or PCIC-pattern
# -----------------------------------------------------------------

grammar_points:

  # ---- PRESENT SUBJUNCTIVE: REGULAR -AR ----
  - id: gp_subj_ar_espero_que
    point: "Present subjunctive -ar: espero que + verb"
    category: present_subjunctive
    chain_theme: 0
    pool: subj_ar_regular
    difficulty: 3
    pcic_ref: "B1 — Presente de subjuntivo, verbos regulares -ar, volición"
    examples:
      - id: tatoeba:1428148
        es: "Espero que llegues pronto."
        en: "I hope you arrive soon."
      - id: PCIC-pattern
        es: "Espero que hables con él."
        en: "I hope you talk to him."

  - id: gp_subj_ar_quiero_que
    point: "Present subjunctive -ar: quiero que + verb"
    category: present_subjunctive
    chain_theme: 0
    pool: subj_ar_regular
    difficulty: 3
    pcic_ref: "B1 — Presente de subjuntivo, verbos regulares -ar, volición"
    examples:
      - id: tatoeba:3330099
        es: "Quiero que hables con él."
        en: "I want you to talk to him."
      - id: tatoeba:4499200
        es: "Quiero que comas más verduras."
        en: "I want you to eat more vegetables."

  - id: gp_subj_er_ir_comer
    point: "Present subjunctive -er: coma, comas, coma..."
    category: present_subjunctive
    chain_theme: 0
    pool: subj_er_ir_regular
    difficulty: 3
    pcic_ref: "B1 — Presente de subjuntivo, verbos regulares -er"
    examples:
      - id: PCIC-pattern
        es: "Es importante que comas bien."
        en: "It's important that you eat well."
      - id: PCIC-pattern
        es: "Quiero que comas más verduras."
        en: "I want you to eat more vegetables."

  - id: gp_subj_er_ir_vivir
    point: "Present subjunctive -ir: viva, vivas..."
    category: present_subjunctive
    chain_theme: 0
    pool: subj_er_ir_regular
    difficulty: 3
    pcic_ref: "B1 — Presente de subjuntivo, verbos regulares -ir"
    examples:
      - id: PCIC-pattern
        es: "Espero que vivas bien."
        en: "I hope you live well."
      - id: PCIC-pattern
        es: "Quiero que vivas cerca de mí."
        en: "I want you to live close to me."

  # ---- SUBJUNCTIVE TRIGGERS ----
  - id: gp_subj_trigger_ojalá
    point: "Ojalá + present subjunctive"
    category: present_subjunctive
    chain_theme: 0
    pool: subj_trigger_phrases
    difficulty: 3
    pcic_ref: "B1 — Ojalá + subjuntivo"
    examples:
      - id: tatoeba:4499201
        es: "Ojalá haga buen tiempo mañana."
        en: "I hope the weather is good tomorrow."
      - id: tatoeba:4499202
        es: "Ojalá puedas venir a la fiesta."
        en: "I hope you can come to the party."

  - id: gp_subj_trigger_para_que
    point: "para que + present subjunctive"
    category: present_subjunctive
    chain_theme: 0
    pool: subj_trigger_phrases
    difficulty: 3
    pcic_ref: "B1 — para que + subjuntivo, finalidad"
    examples:
      - id: tatoeba:4499203
        es: "Te lo explico para que lo entiendas."
        en: "I'll explain it so that you understand."
      - id: tatoeba:4499204
        es: "Lo hago para que estés contento."
        en: "I do it so that you're happy."

  - id: gp_subj_trigger_cuando_fut
    point: "cuando + present subjunctive (future reference)"
    category: present_subjunctive
    chain_theme: 0
    pool: subj_trigger_phrases
    difficulty: 4
    pcic_ref: "B1 — cuando + subjuntivo (referencia futura)"
    examples:
      - id: tatoeba:4499205
        es: "Cuando llegues, llámame."
        en: "When you arrive, call me."
      - id: tatoeba:4499206
        es: "Cuando seas mayor, lo entenderás."
        en: "When you're older, you'll understand."

  - id: gp_subj_trigger_antes_de_que
    point: "antes de que + present subjunctive"
    category: present_subjunctive
    chain_theme: 0
    pool: subj_trigger_phrases
    difficulty: 4
    pcic_ref: "B1 — antes de que + subjuntivo"
