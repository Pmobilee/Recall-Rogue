  # ---- RELATIVE CLAUSES ----
  - id: gp_rel_que
    point: "Relative clause with que (things and people)"
    category: relative_clauses
    chain_theme: 6
    pool: relative_pronouns
    difficulty: 3
    pcic_ref: "B1 — Oraciones de relativo, que"
    examples:
      - id: tatoeba:4499352
        es: "El libro que leí es muy bueno."
        en: "The book that I read is very good."
      - id: tatoeba:4499353
        es: "La persona que llamó es mi amigo."
        en: "The person who called is my friend."

  - id: gp_rel_quien
    point: "Relative clause with quien/quienes (people, esp. after prepositions)"
    category: relative_clauses
    chain_theme: 6
    pool: relative_pronouns
    difficulty: 4
    pcic_ref: "B1 — Oraciones de relativo, quien"
    examples:
