        en: "The boy whom I saw is your brother."

  - id: gp_rel_donde
    point: "Relative clause with donde (places)"
    category: relative_clauses
    chain_theme: 6
    pool: relative_pronouns
    difficulty: 3
    pcic_ref: "B1 — Oraciones de relativo, donde"
