# CONFUSION PAIRS to seed (new + audit of existing)
common_confusions:
  # NEW pairs from expansion
  - ["Thrym", "Hrungnir"]  # Both giants Thor fights
  - ["Tanngrisnir", "Tanngnjóstr"]  # Thor's two goats, near-identical names
  - ["Ragnar Lothbrok", "Sigurd"]  # Both legendary warrior heroes
  - ["Andvaranaut", "Draupnir"]  # Both magical gold rings
  - ["Modi", "Magni"]  # Thor's sons, both strength-related names
  - ["Hervor", "Brynhild"]  # Both shieldmaiden figures
  # AUDIT of existing 147 facts - overlooked pairs
  - ["Tyr", "Thor"]  # Both warrior gods, names start with T
  - ["Niflheim", "Helheim"]  # Both cold/death realms
  - ["Skoll", "Hati"]  # Both wolves chasing celestial bodies
  - ["Gungnir", "Mjolnir"]  # Both signature god weapons
  - ["Fenrir", "Jormungandr"]  # Both Loki's monstrous children
  - ["Vanaheim", "Alfheim"]  # Both "light" peaceful realms

