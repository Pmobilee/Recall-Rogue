# ============================================================
# SYNONYM GROUPS
# ============================================================

synonym_groups:
  - id: autotroph_names
    terms: ["producer", "autotroph"]
    reason: "Producers and autotrophs are the same organisms — both refer to organisms that make their own food from inorganic sources"

  - id: heterotroph_consumer
    terms: ["consumer", "heterotroph"]
    reason: "Consumers and heterotrophs both refer to organisms that obtain organic molecules by eating other organisms"

  - id: decomposer_names
    terms: ["decomposer", "detritivore", "saprotroph"]
    reason: "These terms all refer to organisms that break down dead organic matter; detritivore and decomposer are often used interchangeably in AP Biology"

  - id: biomagnification_names
    terms: ["biological magnification", "biomagnification", "bioaccumulation"]
    reason: "Biological magnification and biomagnification are synonymous AP Biology terms; bioaccumulation sometimes used interchangeably"

  - id: primary_productivity_names
    terms: ["net primary productivity", "NPP"]
    reason: "NPP is the standard abbreviation for net primary productivity"

  - id: gpp_names
    terms: ["gross primary productivity", "GPP"]
    reason: "GPP is the standard abbreviation for gross primary productivity"

  - id: carrying_capacity
    terms: ["carrying capacity", "K"]
    reason: "K is the standard symbol for carrying capacity in population ecology equations"

  - id: growth_rate_symbol
    terms: ["intrinsic rate of increase", "rₘₐₓ", "r-max"]
    reason: "rₘₐₓ is the standard notation for the intrinsic (maximum) rate of natural increase"

# ============================================================
# DIFFICULTY TIERS
# ============================================================

difficulty_tiers:
  easy:
    description: "Core vocabulary every AP Bio student must master first — naming trophic levels, defining key terms, identifying symbiosis types"
    examples:
      - "Producers make organic molecules from inorganic sources"
      - "The 10% rule: only ~10% of energy transfers between trophic levels"
      - "Mutualism: both species benefit (+/+)"
      - "Habitat destruction is the #1 threat to biodiversity"
      - "Carrying capacity: maximum population an environment can sustain"

  medium:
    description: "Mechanism-level understanding — applying growth equations, distinguishing density-dependent vs. independent factors, explaining biogeochemical cycles"
    examples:
      - "Logistic growth equation: dN/dt = rₘₐₓN((K−N)/K)"
      - "NPP = GPP minus autotroph respiration"
      - "Nitrogen cycle: fixation → nitrification → assimilation → denitrification"
      - "r-selected vs. K-selected life history tradeoffs"
      - "Competitive exclusion principle and resource partitioning"

  hard:
    description: "Integrated ecosystem thinking — combining multiple concepts, explaining island biogeography, tracing biomagnification, and evaluating conservation strategies"
    examples:
      - "Island biogeography: immigration rate and extinction rate determine species richness equilibrium"
      - "Eutrophication cascade: nutrient runoff → algal bloom → decomposition → O₂ depletion → dead zone"
      - "Biomagnification: persistent toxins concentrate at higher trophic levels"
      - "Ocean acidification mechanism: CO₂ → H₂CO₃ → lower pH → CaCO₃ dissolution"
      - "Batesian vs. Müllerian mimicry: harmless mimics harmful vs. two harmful species resemble each other"

