# ============================================================
# CHAIN THEMES — 2 named themes for Unit 8
# (Full deck requires ≥8; unit sub-deck uses themes from parent)
# ============================================================

chain_themes:
  - id: population_ecology
    name: "Population Ecology"
    topics: "8.1, 8.3, 8.4"
    description: >
      Covers individual and population-level biology: behavior types (innate,
      learned, taxis, kinesis), thermoregulation, circadian rhythms, migration,
      optimal foraging, population growth models (exponential and logistic),
      carrying capacity, r-selected vs. K-selected strategies, survivorship curves,
      age structure, density-dependent and density-independent factors,
      competitive exclusion, resource partitioning, and predator-prey dynamics.

  - id: ecosystem_energy
    name: "Ecosystem and Energy Flow"
    topics: "8.2, 8.5, 8.6, 8.7"
    description: >
      Covers ecosystem-level processes: trophic levels, food webs, the 10% rule,
      primary productivity (GPP and NPP), biogeochemical cycles (carbon, nitrogen,
      water, phosphorus), community ecology (succession, symbiosis, keystone species,
      mimicry), biodiversity (genetic, species, ecosystem levels, island biogeography),
      and major ecosystem disruptions (habitat destruction, invasive species,
      eutrophication, biomagnification, climate change, ocean acidification).

