deck_id: ap_biology
name: "AP Biology"
domain: science
sub_domain: biology
description: "Master every concept tested on the AP Biology exam — from molecular chemistry to ecosystem ecology. Aligned to the College Board Course and Exam Description (CED)."
target_facts: 1100
minimum_facts: 900

# COMPLETENESS PHILOSOPHY:
# This deck covers EVERY topic, learning objective, and essential knowledge statement
# in the College Board AP Biology CED. An AP Biology student who masters this deck
# should be prepared for every concept tested on the exam.

exam_alignment:
  exam: "AP Biology"
  authority: "College Board"
  document: "AP Biology Course and Exam Description (CED)"
  url: "https://apcentral.collegeboard.org/courses/ap-biology"
  units: 8
  big_ideas:
    - "EVO: Evolution"
    - "ENE: Energetics"
    - "IST: Information Storage and Transmission"
    - "SYI: Systems Interactions"

# Sourcing & licensing
data_sources:
  - name: College Board AP Biology CED
    url: https://apcentral.collegeboard.org/courses/ap-biology/course
    license: educational reference
    usage: Official course structure, units, topics, learning objectives, essential knowledge statements
  - name: OpenStax Biology 2e
    url: https://openstax.org/details/books/biology-2e
    license: CC-BY-4.0
    usage: Verified factual data, definitions, process descriptions, numerical values
  - name: Wikipedia — Biology topics
    url: https://en.wikipedia.org/wiki/Biology
    license: CC-BY-SA-4.0
    usage: Cross-reference for definitions, dates, scientist names
  - name: Khan Academy AP Biology
    url: https://www.khanacademy.org/science/ap-biology
    license: educational reference
    usage: Secondary cross-reference for topic coverage and explanations

asset_sources: []

# ============================================================
# ANSWER TYPE POOLS — 11 pools covering all AP Bio question types
# ============================================================

answer_type_pools:

  # POOL 1: Term Definitions — "What is [term] in biology?"
  # Answer is a short definition or description
  - id: term_definitions
    format: term
    estimated_count: 300
    note: >
      Largest pool. "What is [term]?" format. Answers are short definitions or descriptions.
      Examples: "Chemiosmosis", "Dehydration synthesis", "Selective permeability"
      Students confuse similar terms: transcription/translation, mitosis/meiosis,
      endocytosis/exocytosis, homologous/analogous.

  # POOL 2: Process Names — "Which process does X?"
  - id: process_names
    format: name
    estimated_count: 80
    note: >
      "Which process does X?" format. Answers are process names.
      Examples: "Glycolysis", "Calvin cycle", "Transcription", "Natural selection"
      Students confuse: glycolysis/gluconeogenesis, light reactions/Calvin cycle,
      transcription/translation, replication/transcription.

  # POOL 3: Molecule Names — "What molecule does X?"
  - id: molecule_names
    format: name
    estimated_count: 60
    note: >
      "What molecule does X?" format. ATP, NADH, DNA polymerase, RuBisCO, etc.
      Students confuse: NADH/NADPH/FADH2, DNA polymerase/RNA polymerase,
      mRNA/tRNA/rRNA, glucose/fructose/galactose.

  # POOL 4: Organelle Names — "Which organelle performs X?"
  - id: organelle_names
    format: name
    estimated_count: 30
    syntheticDistractors:
      - "Centriole"
      - "Peroxisome"
      - "Nucleolus"
      - "Plasmodesma"
      - "Tonoplast"
    note: >
      "Which organelle performs X?" format. Smaller pool — needs synthetics.
      Mitochondria, chloroplast, nucleus, ribosome, ER, Golgi, lysosome, vacuole, etc.

  # POOL 5: Organism Names — model organisms and notable species
  - id: organism_names
    format: name
    estimated_count: 20
    syntheticDistractors:
      - "Paramecium"
      - "Hydra"
      - "Planaria"
      - "Amoeba"
      - "Euglena"
      - "Saccharomyces"
      - "Chlamydomonas"
      - "Neurospora"
      - "Xenopus"
      - "Danio rerio"
    note: >
      Model organisms and notable species. E. coli, Drosophila, C. elegans,
      Arabidopsis, etc. Small pool — needs many synthetics.

  # POOL 6: Location Terms — "Where does [process] occur?"
  - id: location_terms
    format: term
    estimated_count: 40
    note: >
      "Where does [process] occur?" Answers: cytoplasm, stroma, thylakoid membrane,
      inner mitochondrial membrane, matrix, nucleus, ribosome, etc.
      Students confuse: stroma/matrix, thylakoid/cristae, cytoplasm/cytosol.

  # POOL 7: Function Terms — "What is the function of X?"
  - id: function_terms
    format: term
    estimated_count: 60
    note: >
      "What is the function of X?" Answers describe what something does.
      "Catalyzes carbon fixation", "Separates sister chromatids",
      "Pumps protons across membrane", etc.

  # POOL 8: Bracket Numbers — numerical facts
  - id: bracket_numbers
    format: bracket_number
    estimated_count: 40
    note: >
      Numerical answers. "{46} chromosomes", "{23} pairs", "{3} domains of life",
      "{10}% energy transfer between trophic levels", "{2} ATP net from glycolysis",
      "{30-32} ATP from complete glucose oxidation", etc.

  # POOL 9: Comparison Terms — "How does X differ from Y?"
  - id: comparison_terms
    format: term
    estimated_count: 30
    syntheticDistractors:
      - "Convergent vs divergent"
      - "Dominant vs recessive"
      - "Endothermic vs exothermic"
    note: >
      Comparative questions. "How does X differ from Y?"
      Prokaryotic vs eukaryotic, mitosis vs meiosis, DNA vs RNA,
      light reactions vs Calvin cycle, C3 vs C4 vs CAM plants.

  # POOL 10: Experiment Terms — lab and experimental design
  - id: experiment_terms
    format: term
    estimated_count: 25
    syntheticDistractors:
      - "Null hypothesis"
      - "Type I error"
      - "Type II error"
      - "Regression analysis"
      - "Correlation coefficient"
      - "Peer review"
      - "Replication"
      - "Blinding"
    note: >
      Lab and experimental design vocabulary. Control group, independent variable,
      dependent variable, hypothesis, chi-square test. Smaller pool — needs synthetics.

  # POOL 11: Ecology Terms — ecology-specific vocabulary
  - id: ecology_terms
    format: term
    estimated_count: 40
    note: >
      Ecology-specific terms. Carrying capacity, trophic level, pioneer species,
      keystone species, r-selected/K-selected, mutualism, commensalism, parasitism,
      eutrophication, primary/secondary succession.

