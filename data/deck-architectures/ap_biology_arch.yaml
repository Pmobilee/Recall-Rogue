# ============================================================
# DIFFICULTY TIERS
# ============================================================

difficulty_tiers:
  easy:
    description: "Core vocabulary and basic processes every AP Bio student should know first"
    examples: ["DNA structure", "mitosis phases", "ATP as energy currency", "cell organelle functions"]
  medium:
    description: "Standard AP content requiring understanding of mechanisms"
    examples: ["chemiosmosis", "signal transduction steps", "Hardy-Weinberg equilibrium", "operon regulation"]
  hard:
    description: "Complex topics requiring multi-step reasoning or calculation"
    examples: ["water potential calculations", "chi-square analysis", "gene regulation hierarchy", "phylogenetic tree interpretation"]

