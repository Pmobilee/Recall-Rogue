# ============================================================
# REQUIRED EQUATIONS — from College Board CED appendix
# ============================================================

required_equations:
  - name: "Hardy-Weinberg allele frequencies"
    formula: "p + q = 1"
    variables: "p = dominant allele frequency, q = recessive allele frequency"
    unit: 7

  - name: "Hardy-Weinberg genotype frequencies"
    formula: "p² + 2pq + q² = 1"
    variables: "p² = homozygous dominant, 2pq = heterozygous, q² = homozygous recessive"
    unit: 7

  - name: "Water potential"
    formula: "Ψ = Ψs + Ψp"
    variables: "Ψ = water potential, Ψs = solute potential, Ψp = pressure potential"
    unit: 2

  - name: "Solute potential"
    formula: "Ψs = -iCRT"
    variables: "i = ionization constant, C = molar concentration, R = pressure constant, T = temperature (K)"
    unit: 2

  - name: "Exponential population growth"
    formula: "dN/dt = rₘₐₓN"
    variables: "N = population size, rₘₐₓ = max per capita growth rate, t = time"
    unit: 8

  - name: "Logistic population growth"
    formula: "dN/dt = rₘₐₓN((K-N)/K)"
    variables: "K = carrying capacity"
    unit: 8

  - name: "Chi-square"
    formula: "χ² = Σ((o-e)²/e)"
    variables: "o = observed, e = expected"
    unit: 5

  - name: "Gibbs free energy"
    formula: "ΔG = ΔH - TΔS"
    variables: "ΔG = free energy change, ΔH = enthalpy change, T = temperature, ΔS = entropy change"
    unit: 3

  - name: "Surface area of sphere"
    formula: "SA = 4πr²"
    variables: "r = radius"
    unit: 2

  - name: "Volume of sphere"
    formula: "V = (4/3)πr³"
    variables: "r = radius"
    unit: 2

  - name: "Surface area of cube"
    formula: "SA = 6s²"
    variables: "s = side length"
    unit: 2

  - name: "Volume of cube"
    formula: "V = s³"
    variables: "s = side length"
    unit: 2

# ============================================================
# NOTES
# ============================================================

notes: >
  COMPLETENESS PHILOSOPHY: This deck covers EVERY topic, learning objective, and
  essential knowledge statement in the College Board AP Biology CED. An AP Biology
  student who masters this deck should be prepared for every concept tested on the exam.

  EXAM ALIGNMENT: Facts are tagged with examTags: ["AP_Biology", "AP_Bio_Unit{N}"]
  and organized into 8 sub-decks matching CED units exactly.

  OVERLAP WITH HUMAN ANATOMY: Minimal and intentional. Human Anatomy focuses on
  gross anatomy and clinical applications. AP Biology focuses on molecular/cellular
  fundamentals and organism-level ecology. Different audience, different depth.
  Students studying both get reinforcement, not redundancy.

  Domain: science (pairs with existing computer_science, periodic_table, solar_system decks)
  Age: "teen+" (AP-level content appropriate for high school juniors/seniors and above)
  Volatile: none — biological principles don't change
