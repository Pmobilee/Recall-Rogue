# === SEEDED CONFUSION PAIRS ===

common_confusions:
  # Skeletal
  - ["radius", "ulna"]                    # Which is lateral? Which has styloid used for wrist?
  - ["tibia", "fibula"]                   # Which is weight-bearing? Which has malleolus?
  - ["atlas", "axis"]                     # C1 vs C2; which has dens? Which allows nodding?
  - ["malleus", "stapes"]                 # First vs last ossicle; TM vs oval window
  - ["trapezium", "trapezoid"]            # Adjacent carpals; naming confusion
  # Muscular
  - ["biceps brachii", "brachialis"]      # Both flex elbow; which is stronger?
  - ["gastrocnemius", "soleus"]           # Both plantarflex; which crosses knee?
  - ["supraspinatus", "infraspinatus"]    # Both rotator cuff; abduction initiation vs external rotation
  - ["sartorius", "gracilis"]             # Both cross medial knee (pes anserinus)
  - ["gluteus medius", "gluteus minimus"] # Nearly identical; different innervation emphasis
  # Nervous
  - ["CN IV Trochlear", "CN VI Abducens"] # Both motor-only; IV=SO, VI=LR
  - ["CN VII Facial", "CN IX Glossopharyngeal"] # Taste: VII=ant 2/3, IX=post 1/3
  - ["sympathetic", "parasympathetic"]    # Fight vs rest; T/L vs craniosacral; NE vs ACh
  - ["Broca's area", "Wernicke's area"]   # Production vs comprehension; both left usually
  # Digestive
  - ["duodenum", "jejunum"]              # Both small intestine; duodenum fixed/C-shaped
  - ["liver", "pancreas"]                # Both have exocrine/endocrine roles; bile vs insulin
  - ["amylase", "lipase"]                # Starch vs fat; salivary vs pancreatic
  # Endocrine
  - ["TSH", "T3/T4"]                     # Pituitary signal vs thyroid hormone
  - ["PTH", "calcitonin"]                # Opposite effects on calcium
  - ["insulin", "glucagon"]              # Opposite effects on glucose; same organ different cells
  - ["aldosterone", "cortisol"]          # Both adrenal cortex; mineralocorticoid vs glucocorticoid
  - ["ADH", "aldosterone"]               # Both affect kidney; water vs Na+/K+
  # Immune
  - ["IgG", "IgM"]                       # Most abundant vs first response
  - ["T helper CD4", "T cytotoxic CD8"]  # Helper vs killer; MHC II vs MHC I
  - ["innate", "adaptive immunity"]      # Non-specific/immediate vs specific/memory
  # Senses
  - ["rods", "cones"]                    # Dim/peripheral vs color/acuity
  - ["utricle", "saccule"]              # Linear vs vertical acceleration; both in vestibule
  - ["Meissner's", "Pacinian"]           # Light touch vs deep pressure; papillary vs deep dermis

