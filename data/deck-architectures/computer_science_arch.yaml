      - "Software Giants"
      - "Silicon Valley Origins"
      - "Garage Startups"
      - "Open Source Movement"
      - "Mobile Revolution"
      - "Cloud & AI Era"
      - "Product Firsts"

# ============================================================
# COMMON CONFUSIONS
# Entity pairs that players frequently conflate.
# Seeded into the confusion matrix for smarter distractor selection.
# ============================================================
common_confusions:
  # Pioneer pairs
  - [Ada Lovelace, Grace Hopper]           # Both women, both programming pioneers
  - [Alan Turing, Alonzo Church]           # Both 1936 computability proofs, Church-Turing thesis
  - [Dennis Ritchie, Ken Thompson]         # Both Unix, both 1983 Turing Award
  - [Vint Cerf, Robert Kahn]               # Both TCP/IP, both 2004 Turing Award
  - [Larry Page, Sergey Brin]              # Both Google co-founders
  - [John McCarthy, Marvin Minsky]         # Both MIT AI Lab co-founders
  - [Jack Kilby, Robert Noyce]             # Both integrated circuit inventors
  - [Dennis Ritchie, Brian Kernighan]      # C language association
  - [Tim Berners-Lee, Vint Cerf]           # Both "fathers of the internet"
  # Language pairs
  - [C, "C++"]                             # Stroustrup extended Ritchie's language
  - [Java, JavaScript]                     # Similar names, unrelated languages
  - [Python, Ruby]                         # Both late-1990s scripting languages
  - [Go, Rust]                             # Both modern systems languages
  - [Swift, Kotlin]                        # Both modern mobile-first languages
  - [FORTRAN, COBOL]                       # Both 1950s languages, different domains
  - [Lisp, Prolog]                         # Both AI languages
  - [Haskell, Erlang]                      # Both functional languages
  # Algorithm pairs
  - [Merge Sort, Quicksort]                # Both O(n log n) average, different trade-offs
  - ["Dijkstra's Algorithm", "Bellman-Ford Algorithm"]  # Both shortest path, different constraints
  - [BFS, DFS]                             # Both graph traversal, different order
  - [RSA, Diffie-Hellman]                  # Both public-key cryptography
  # Hardware / architecture pairs
  - [Von Neumann architecture, Harvard architecture]   # Stored-program vs separate memory
  - [DRAM, SRAM]                           # Both RAM types, different speed/density trade-offs
  - [SSD, HDD]                             # Both storage, different technology
  - [Intel 4004, Intel 8080]               # Both early Intel CPUs
  # Company / product pairs
  - [Microsoft, Apple]                     # Rival personal computing empires
  - [Google, Bing]                         # Search engine rivals
  - [Facebook, Twitter]                    # Social media platforms
  - [AWS, Azure]                           # Cloud platform rivals
  - [iOS, Android]                         # Mobile OS rivals
  - [Git, GitHub]                          # Tool vs hosting platform
  - [Docker, Kubernetes]                   # Containerisation vs orchestration
  # AI pairs
  - [Geoffrey Hinton, Yann LeCun]          # Both deep learning pioneers, both Turing Award 2018
  - [AlphaGo, AlphaFold]                   # Both DeepMind, different domains
  - [GPT-3, ChatGPT]                       # Same lineage, different interfaces
  - [ChatGPT, DALL-E]                      # Both OpenAI, different modalities

# ============================================================
# QUESTION TEMPLATES
# ============================================================
question_templates:

  - id: who_created_language
    format: "Who created the {language} programming language?"
    answer_pool: person_names
    available_from_mastery: 0
    difficulty: 1

  - id: what_language_created_by
    format: "Which programming language did {person} create?"
    answer_pool: language_names
    available_from_mastery: 0
    difficulty: 1

  - id: when_language_released
    format: "In what year was the {language} programming language first released?"
    answer_pool: bracket_numbers
    available_from_mastery: 1
    difficulty: 2

  - id: acronym_expansion
    format: "What does the acronym {acronym} stand for?"
    answer_pool: acronym_expansions
    available_from_mastery: 0
    difficulty: 1

  - id: who_invented_hardware
    format: "Who invented or developed {hardware_item}?"
    answer_pool: person_names
    available_from_mastery: 1
    difficulty: 2

  - id: algorithm_inventor
    format: "Who invented {algorithm}?"
    answer_pool: person_names
    available_from_mastery: 1
    difficulty: 2

  - id: algorithm_complexity
    format: "What is the average-case time complexity of {algorithm}?"
    answer_pool: complexity_terms
    available_from_mastery: 2
    difficulty: 3

  - id: company_founder
    format: "Who co-founded {company}?"
    answer_pool: person_names
    available_from_mastery: 0
    difficulty: 1

  - id: company_founded_year
    format: "In what year was {company} founded?"
    answer_pool: bracket_numbers
    available_from_mastery: 1
    difficulty: 2

  - id: product_company
    format: "Which company developed {product}?"
    answer_pool: company_names
    available_from_mastery: 1
    difficulty: 2

  - id: protocol_expansion
    format: "What does the protocol acronym {protocol} stand for?"
    answer_pool: acronym_expansions
    available_from_mastery: 0
    difficulty: 1

  - id: pioneer_achievement
    format: "What is {person} best known for in computer science?"
    answer_pool: technology_terms
    available_from_mastery: 2
    difficulty: 3

  - id: year_of_event
    format: "In what year did {event} occur?"
    answer_pool: bracket_numbers
    available_from_mastery: 1
    difficulty: 2

  - id: term_definition
    format: "What is the term for {description}?"
    answer_pool: technology_terms
    available_from_mastery: 0
    difficulty: 1

# ============================================================
# DIFFICULTY TIERS
# ============================================================
difficulty_tiers:
  easy:
    description: "Universally known names, products, and straightforward expansions"
    examples:
      - "Alan Turing, Tim Berners-Lee, Bill Gates, Steve Jobs"
      - "What does CPU stand for? Who co-founded Google?"
      - "Which language did Guido van Rossum create? (Python)"
      - "In what year was the iPhone announced? (2007)"

  medium:
    description: "Less obvious creator-language links, algorithm trade-offs, founding years"
    examples:
      - "Bjarne Stroustrup, Grace Hopper, Donald Knuth, Brendan Eich"
      - "Who invented Quicksort? What does COBOL stand for?"
      - "What is the worst-case complexity of Merge Sort? (O(n log n))"
      - "Which company developed the first commercial microprocessor? (Intel)"

  hard:
    description: "Specific dates, algorithm details, theory concepts, lesser-known pioneers"
    examples:
      - "Alonzo Church, John Backus, Frances Allen, Edgar F. Codd"
      - "What year did Dijkstra publish his shortest-path algorithm? (1956/1959)"
      - "Who invented DRAM and in what year? (Robert Dennard, 1966)"
      - "What is the Church-Turing thesis? What does Big-O describe?"
      - "What is Dennard scaling and when did it break down?"

# ============================================================
# SYNONYM GROUPS
# Fact IDs that quiz the same underlying fact from different angles.
# Generator must ensure these are never distractors for each other.
# ============================================================
synonym_groups:

  - id: tcp_ip_inventors
    facts: [vint_cerf, robert_kahn]
    reason: "Both co-invented TCP/IP — either name can answer 'who designed TCP/IP?'"

  - id: unix_co_creators
    facts: [dennis_ritchie, ken_thompson]
    reason: "Both co-created Unix — never distract each other on Unix questions"

  - id: google_founders
    facts: [larry_page, sergey_brin]
    reason: "Both co-founded Google — never distract each other on Google questions"

  - id: intel_founders
    facts: [robert_noyce, gordon_moore]
    reason: "Both co-founded Intel — never distract each other on Intel questions"

  - id: integrated_circuit_inventors
    facts: [jack_kilby, robert_noyce]
    reason: "Both independently invented the IC — context determines which is correct"

  - id: mit_ai_lab_founders
    facts: [john_mccarthy, marvin_minsky]
    reason: "Both co-founded MIT AI Lab — never distract each other on that question"

  - id: turing_award_1983
    facts: [dennis_ritchie, ken_thompson]
    reason: "Shared the 1983 ACM Turing Award — never distract each other on that"

  - id: turing_award_2004
    facts: [vint_cerf, robert_kahn]
    reason: "Shared the 2004 ACM Turing Award — never distract each other on that"

  - id: c_language_family
    facts: [c_language, cpp_language, objective_c]
    reason: "All directly related — C++ extends C, Objective-C extends C. Distractor generation must read question carefully."

  - id: java_javascript_names
    facts: [java_language, javascript_language]
    reason: "Similar names but unrelated languages. Must never be distractors for each other on creator or year questions."

  - id: unix_linux_relation
    facts: [unix_os, linux_kernel]
    reason: "Linux reimplements Unix concepts; both appear in 'OS history' questions. Generator must distinguish."

  - id: www_html_http_url
    facts: [world_wide_web, html_language, http_protocol, url_system]
    reason: "All invented by Tim Berners-Lee at CERN — questions about the Web, HTML, HTTP, and URL all point to the same person"
