# ============================================================
# SUB-DECKS
# 8 sub-decks, chainThemeId 0–7.
# Each references its own architecture YAML for verified source data.
# ============================================================
sub_decks:

  - id: cs_tech_pioneers
    name: "Pioneers & Visionaries"
    chainThemeId: 0
    target_facts: 35
    minimum_facts: 28
    source_file: data/deck-architectures/cs_tech_pioneers_arch.yaml
    description: >
      The people who invented computing: Babbage, Lovelace, Turing, von Neumann,
      Shannon, Hopper, and the language and algorithm pioneers who followed.
    chain_themes:
      - "Computing Founders"
      - "Turing Award Lineage"
      - "Women in Computing"
      - "Bell Labs Alumni"
      - "Language Creators"

  - id: cs_tech_hardware
    name: "Hardware & Architecture"
    chainThemeId: 1
    target_facts: 35
    minimum_facts: 28
    source_file: data/deck-architectures/cs_tech_hardware_arch.yaml
    description: >
      Physical computing: transistors, integrated circuits, microprocessors,
      storage media, Moore's Law, and the march from vacuum tubes to silicon.
    chain_themes:
      - "Silicon Milestones"
      - "Storage Evolution"
      - "Personal Computer Era"
      - "CPU Architecture"
      - "Memory Technology"

  - id: cs_tech_languages
    name: "Programming Languages"
    chainThemeId: 2
    target_facts: 35
    minimum_facts: 28
    source_file: data/deck-architectures/cs_tech_languages_arch.yaml
    description: >
      Every major programming language from FORTRAN (1957) through TypeScript (2012):
      who made them, when, and why they mattered.
    chain_themes:
      - "First-Generation Languages"
      - "Systems Languages"
      - "Web Languages"
      - "Modern Languages"
      - "Functional & Logic"

  - id: cs_tech_algorithms
    name: "Algorithms & Theory"
    chainThemeId: 3
    target_facts: 30
    minimum_facts: 25
    source_file: data/deck-architectures/cs_tech_algorithms_arch.yaml
    description: >
      Sorting, searching, graph algorithms, Big-O complexity, P vs NP,
      the halting problem, RSA, and the mathematical foundations of computing.
    chain_themes:
      - "Sorting & Searching"
      - "Graph Traversal"
      - "Shortest Paths"
      - "Theory of Computation"
      - "Complexity Classes"
      - "Famous Algorithms"
      - "Logic & Algebra"
      - "Data Structures"

  - id: cs_tech_systems
    name: "Systems, Networks & Security"
    chainThemeId: 4
    target_facts: 35
    minimum_facts: 28
    source_file: data/deck-architectures/cs_tech_systems_arch.yaml
    description: >
      Operating systems (Unix to Android), networking (ARPANET to TCP/IP),
      security (Enigma to TLS), and the protocols that power modern computing.
    chain_themes:
      - "Operating Systems"
      - "Networking Foundations"
      - "Internet Protocols"
      - "Security & Cryptography"
      - "Acronym Decode"
      - "Hardware Alphabet"
      - "Networking Acronyms"
      - "Founding Moments"

  - id: cs_tech_internet_web
    name: "The Internet & World Wide Web"
    chainThemeId: 5
    target_facts: 35
    minimum_facts: 28
    source_file: data/deck-architectures/cs_tech_internet_web_arch.yaml
    description: >
      ARPANET's first message, the Web's invention at CERN, browsers, search engines,
      social media, and how the modern internet was built.
    chain_themes:
      - "ARPANET to Internet"
      - "World Wide Web"
      - "Browsers & Search"
      - "Social Media Origins"
      - "E-Commerce Firsts"

  - id: cs_tech_ai_ml
    name: "Artificial Intelligence & Machine Learning"
    chainThemeId: 6
    target_facts: 35
    minimum_facts: 28
    source_file: data/deck-architectures/cs_tech_ai_ml_arch.yaml
    description: >
      From the 1956 Dartmouth workshop through deep learning, AlphaGo, AlphaFold,
      GPT-3, and ChatGPT: the history of AI and machine learning.
    chain_themes:
      - "AI Pioneers"
      - "AI Winters & Revivals"
      - "Deep Learning Revolution"
      - "AI Milestones"
      - "Modern Generative AI"

  - id: cs_tech_companies
    name: "Software & Tech Companies"
