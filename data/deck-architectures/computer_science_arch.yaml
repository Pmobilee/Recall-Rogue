# CS & Technology — Master Deck Architecture
# Top-level manifest for the Computer Science & Technology deck.
# All entity data verified via Wikipedia/Wikidata; see individual sub-deck files for source URLs.
# Sub-deck source files contain wikidata QIDs and primary-article URLs for every entity.

deck_id: computer_science
name: "Computer Science & Technology"
domain: general_knowledge
sub_domain: computer_science
target_facts: 300
minimum_facts: 240

data_sources:
  - name: Wikipedia — Computer scientists, hardware, languages, algorithms, systems, internet, AI
    url: https://en.wikipedia.org
    license: CC-BY-SA-4.0
    usage: >
      Primary source for all narrative facts, dates, biographical data,
      algorithm complexity values, protocol details, and company founding info.
      All facts cross-checked against individual Wikipedia articles listed in sub-deck files.
  - name: Wikidata
    url: https://www.wikidata.org
    license: CC0
    usage: >
      Structured identifiers (QIDs), birth/death dates, nationality fields,
      person-to-work links, and acronym expansions. QIDs recorded in sub-deck files.

