deck_id: french_a2_grammar
name: "French A2 Grammar"
domain: vocabulary
sub_domain: french_grammar
target_facts: 400
minimum_facts: 240
language: fr

data_sources:
  - name: Référentiel A2 pour le français (Beacco et al., Didier)
    url: https://www.didier.fr/livre/referentiel-pour-le-cadre-europeen-commun-a2.html
    license: Reference only — scope/structure. Conseil de l'Europe / Didier, 2008.
    usage: Authoritative A2 grammar scope. Determines which grammar points are included and their canonical descriptions. Cross-referenced against DELF A2 scope (France Éducation International) and Grammaire progressive du français — niveau intermédiaire (CLE International).
  - name: Tatoeba
    url: https://tatoeba.org/
    license: CC BY 2.0
    usage: Verified example sentences with French text + English translation + sentence ID. All sentence IDs documented in data/deck-architectures/_research/french/tatoeba_a2_sentences.tsv.

# -----------------------------------------------------------------
# Chain Themes (by grammar area):
#   0 — passe_compose      : passé composé avec avoir + être, past participles
#   1 — imparfait          : imparfait formation, valeurs (descriptive, habitual, contrast)
#   2 — futur_simple       : futur simple (regular + irregular stems) + futur proche review
#   3 — pronoms_cod_coi    : COD pronouns (le/la/les/me/te) + COI pronouns (lui/leur/me/te)
#   4 — pronoms_y_en       : pronom y (location/à+thing) + pronom en (de+noun/partitive)
#   5 — pronominaux_passe  : verbes pronominaux au passé composé + agreement
#   6 — comparatifs_superlatifs : comparatif (plus/moins/aussi…que) + superlatif + irregular forms
#   7 — imperatif_structures : impératif + conditionnel de politesse + si+présent + connecteurs
#
# Answer Type Pools:
#   passe_compose_avoir_forms   : compound forms with avoir (ai mangé, as fini, a pris…)
#   passe_compose_etre_forms    : compound forms with être + agreement (suis allé(e), est parti(e)…)
#   past_participles_regular    : -é/-i/-u past participles (parlé, fini, vendu)
#   past_participles_irregular  : irregular past participles (fait, eu, été, vu, pris, mis, dit…)
#   etre_forms_avoir_pres       : auxiliary forms (ai/as/a/avons/avez/ont + suis/es/est/sommes/êtes/sont)
#   imparfait_regular           : regular imparfait conjugations (-ais/-ait/-ions/-aient)
#   imparfait_etre              : être imparfait forms (étais, était, étions, étaient)
#   imparfait_faire_aller       : faire/aller imparfait forms (faisais, allais, etc.)
#   futur_simple_regular        : regular futur simple forms (parlerai, finirai, vendrai…)
#   futur_simple_irregular_stems: irregular futur stems (ser-, aur-, ir-, fer-, viendr-, pourr-, voudr-, saur-, verr-, devr-)
#   futur_simple_forms          : full futur simple conjugated forms (serai, aurai, irai…)
#   cod_pronouns                : COD pronoun forms (me, te, le, la, l', nous, vous, les)
#   coi_pronouns                : COI pronoun forms (me, te, lui, nous, vous, leur)
#   y_pronoun_uses              : y-pronoun replacement structures (J'y vais, Vas-y, Tu peux y aller)
#   en_pronoun_uses             : en-pronoun replacement structures (J'en ai, J'en veux plus, j'en ai trois)
#   reflexive_passe_forms       : reflexive past tense forms (me suis levé(e), s'est habillé(e)…)
#   comparatif_plus_moins_aussi : plus…que / moins…que / aussi…que structures
#   superlatif_forms            : le/la/les plus + adj, le/la/les moins + adj
#   comparatif_irregular        : meilleur(e), pire, mieux, le/la meilleur(e), le/la pire
#   imperatif_tu_forms          : tu imperative forms (parle, finis, prends, mange, viens, va, sois, aie)
#   imperatif_nous_vous_forms   : nous/vous imperative forms (parlons, parlez, finissons, finissez…)
#   imperatif_pronominal        : pronominal imperative forms (Lève-toi, Asseyez-vous, Dépêchons-nous)
#   conditionnel_politesse_forms: polite conditional forms (voudrais, pourrais, aimerais, devrait…)
#   si_present_structures       : si + présent + futur/impératif patterns
#   connecteurs_logiques        : coordination/cause/consequence connectors (mais, donc, parce que, quand, pendant que…)
#   time_expressions_passe      : time expressions (hier, avant-hier, la semaine dernière, il y a…)
#   depuis_pendant_ilya         : depuis vs. pendant vs. il y a structures
#   adverbes_ment               : adverbs in -ment (vraiment, lentement, rapidement, heureusement…)
#   relatif_qui_que             : relative pronouns qui (subject) and que (object)
# -----------------------------------------------------------------

chain_themes:
  - id: 0
    name: "Passé Composé"
    description: "Passé composé avec avoir et être — regular and irregular past participles, agreement with être"
    color: "#C44B4B"
    icon: "verb"
  - id: 1
    name: "Imparfait"
    description: "Imparfait formation and values — descriptive past, habitual past, contrast with passé composé"
    color: "#7B4EA6"
    icon: "verb"
  - id: 2
    name: "Futur Simple"
    description: "Futur simple — regular stems and irregular stems; futur proche (aller + inf) review"
    color: "#3A7BD5"
    icon: "verb"
  - id: 3
    name: "Pronoms COD & COI"
    description: "Direct object pronouns (le/la/les/me/te/nous/vous) and indirect object pronouns (lui/leur/me/te/nous/vous)"
    color: "#E87E2E"
    icon: "pronoun"
  - id: 4
    name: "Pronoms Y & En"
    description: "Pronom y — replacing location or à + thing; pronom en — replacing de + noun or partitive"
    color: "#4A9E6B"
    icon: "pronoun"
  - id: 5
    name: "Verbes Pronominaux au Passé"
    description: "Pronominal verbs in passé composé with être: se lever, s'habiller, se coucher + participle agreement"
    color: "#D4A017"
    icon: "verb"
  - id: 6
    name: "Comparatifs & Superlatifs"
    description: "Comparatifs (plus/moins/aussi…que), superlatifs (le/la plus), and irregular forms (meilleur, pire, mieux)"
    color: "#2E8B57"
    icon: "contrast"
  - id: 7
    name: "Impératif & Structures"
    description: "Impératif (tu/nous/vous), conditionnel de politesse (voudrais, aimerais), si + présent, connecteurs logiques"
    color: "#8B5E3C"
    icon: "command"

# -----------------------------------------------------------------
# Answer Type Pools — grammar form groupings for distractor selection
# All pools target: example_answers.length + synthetic_distractors.length >= 15
# Max/min answer length ratio must be < 3x within each pool
# -----------------------------------------------------------------

answer_type_pools:

  - id: passe_compose_avoir_forms
    description: "Passé composé forms with avoir auxiliary (ai/as/a/avons/avez/ont + past participle)"
    example_answers:
      - j'ai mangé
      - j'ai fini
      - j'ai vendu
      - j'ai fait
      - j'ai vu
      - j'ai pris
      - j'ai dit
      - il a écrit
      - nous avons eu
      - elles ont bu
      - tu as parlé
      - vous avez lu
    synthetic_distractors:
      - j'ai voulu
      - j'ai pu
      - tu as su
      - il a mis
      - nous avons couru

  - id: passe_compose_etre_forms
    description: "Passé composé forms with être auxiliary + subject agreement"
    example_answers:
      - je suis allé(e)
      - il est parti
      - elle est partie
      - ils sont venus
      - elles sont venues
      - nous sommes arrivés
      - tu es entré(e)
      - elle est née
      - il est mort
      - je suis resté(e)
      - elle est tombée
      - ils sont montés
    synthetic_distractors:
      - tu es sorti(e)
      - nous sommes rentrés
      - ils sont descendus

  - id: past_participles_regular
    description: "Regular past participles: -é (from -er), -i (from -ir), -u (from -re)"
