# -----------------------------------------------------------------
# Grammar Point Inventory with verified example sentences
# All Tatoeba IDs verified against tatoeba_a2_sentences.tsv
# -----------------------------------------------------------------

grammar_points:

  # ---- PASSÉ COMPOSÉ AVEC AVOIR — REGULAR ----
  - id: gp_pc_avoir_regular_e
    point: "Passé composé avec avoir: regular -ER participles (-é)"
    category: passe_compose
    difficulty: 2
    referentiel_ref: "A2 — Passé composé, participes passés réguliers en -é"
    examples:
      - id: tatoeba:6763
        fr: "J'ai parlé de musique."
        en: "I talked about music."
      - id: tatoeba:4290
        fr: "J'ai mangé du caviar."
        en: "I ate caviar."
      - id: tatoeba:6422
        fr: "J'ai raté l'examen."
        en: "I failed the exam."

  - id: gp_pc_avoir_regular_i
    point: "Passé composé avec avoir: regular -IR participles (-i)"
    category: passe_compose
    difficulty: 2
    referentiel_ref: "A2 — Passé composé, participes passés réguliers en -i"
    examples:
      - id: tatoeba:14768
        fr: "J'ai bien dormi."
        en: "I've had a good sleep."

  - id: gp_pc_avoir_regular_u
    point: "Passé composé avec avoir: regular -RE participles (-u)"
    category: passe_compose
