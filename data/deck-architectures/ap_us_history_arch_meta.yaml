deck_id: ap_us_history
name: "AP U.S. History"
domain: history
sub_domain: us_history
description: >
  Master the complete AP U.S. History curriculum — from pre-Columbian civilizations through
  the early 21st century. Covers all 9 CED periods, major turning points, key figures,
  landmark legislation, and Supreme Court cases tested on the APUSH exam. A student who
  masters this deck should be prepared for every question type on the AP exam. Scope is
  curriculum-driven and exam-aligned — every CED period and key concept is represented,
  weighted by exam frequency.
minimum_facts: 400
target_facts: 475

# COMPLETENESS PHILOSOPHY:
# This deck covers the COMPLETE College Board AP U.S. History Course and Exam
# Description (CED), effective Fall 2023. Content scope is derived from the official
# CED unit/topic structure, supplemented by universally-taught canonical examples
# (illustrative examples, key terms) verified against standard APUSH pedagogy.
# Facts weighted by exam percentage — Periods 3–8 (10–17% each) receive more facts.

