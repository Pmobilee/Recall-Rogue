# AP Human Geography — Deck Architecture
# Source: College Board AP Human Geography CED, Effective Fall 2020 (V.1)
# PDF: data/deck-sources/ap_human_geography/ced.pdf
# Scope reference: data/deck-sources/ap_human_geography/ced-scope.md
# Vocab reference: data/deck-sources/ap_human_geography/vocabulary-by-unit.md
#
# FACT SOURCING RULE: Every fact MUST be grounded in a CED EK statement
# listed in ced-scope.md. Authors cite the EK code (e.g., PSO-1.A.1).
# DO NOT generate facts from LLM world knowledge alone.

deck_id: ap_human_geography
name: AP Human Geography
domain: geography
sub_domain: ap_human_geography
description: >
  Complete AP Human Geography exam prep aligned to the College Board CED (Fall 2020).
  Covers all 7 units and 60 topics across the three Big Ideas: Patterns and Spatial
  Organization (PSO), Impacts and Interactions (IMP), and Spatial Patterns and
  Societal Change (SPS). 300 facts weighted proportionally to exam percentage.

target_facts: 300
minimum_facts: 280

exam_alignment:
  exam_name: AP Human Geography
  governing_body: College Board
  scope_document: "AP Human Geography Course and Exam Description, Effective Fall 2020, V.1"
  scope_url: "https://apcentral.collegeboard.org/media/pdf/ap-human-geography-course-and-exam-description.pdf"
  scope_local: "data/deck-sources/ap_human_geography/ced.pdf"
  unit_weights:
    unit_1: "8-10%"
    unit_2: "12-17%"
    unit_3: "12-17%"
    unit_4: "12-17%"
    unit_5: "12-17%"
    unit_6: "12-17%"
    unit_7: "12-17%"

data_sources:
  - name: "College Board AP HuG CED 2020"
    url: "https://apcentral.collegeboard.org/media/pdf/ap-human-geography-course-and-exam-description.pdf"
    type: official_exam_framework
    notes: "Primary authoritative source. All EK statements extracted verbatim to ced-scope.md."

# ============================================================
# ANSWER TYPE POOLS
# ============================================================
# Rules:
#   - Every pool must be semantically homogeneous (distractor test)
#   - min 5 real facts per pool; pad to 15+ with syntheticDistractors
#   - max/min correctAnswer length ratio < 3x within pool
#   - factIds array populated during fact generation phase
#   - bracket_numbers pool uses {N} notation for numeric answers

answer_type_pools:

  # --- CORE KNOWLEDGE POOLS ---

  - id: model_and_theory_names
    format: proper_noun
    estimated_count: 22
    note: >
      Named geographic models and theories (not descriptions). Examples:
      Demographic Transition Model, Von Thunen Model, Burgess Concentric-Zone Model,
      Rostow's Stages of Economic Growth, Wallerstein's World System Theory,
      Dependency Theory, Malthusian Theory, Ravenstein's Laws, Central Place Theory,
      Rank-Size Rule, Epidemiological Transition Model, Bid-Rent Theory,
      Hoyt Sector Model, Harris-Ullman Multiple-Nuclei Model, Galactic City Model,
      Least Cost Theory, Gravity Model, Environmental Determinism, Possibilism.
    factIds: []
    syntheticDistractors:
      - "Christaller's Hexagonal Theory"
      - "Weber's Industrial Location Theory"
      - "Tobler's First Law of Geography"
      - "Zipf's Rank-Size Rule"
      - "Losch's Market Area Theory"

  - id: geographer_names
    format: proper_noun
    estimated_count: 14
    note: >
      Named theorists and geographers explicitly cited in the CED.
      Examples: Thomas Malthus, Ernst Ravenstein, Johann von Thunen,
      Immanuel Wallerstein, Walter Christaller, Walter Rostow, Ernest Burgess,
      Homer Hoyt, Chauncy Harris, Edward Ullman.
    factIds: []
    syntheticDistractors:
      - "Alfred Weber"
      - "August Losch"
      - "Waldo Tobler"
      - "Carl Sauer"
      - "Yi-Fu Tuan"

  - id: concept_term_definitions
    format: short_phrase
    estimated_count: 40
    note: >
      Core AP HuG vocabulary terms (1–5 words). Examples: sequent occupance,
      cultural relativism, ethnocentrism, time-space compression, distance decay,
      lingua franca, creolization, devolution, gerrymandering, shatterbelt,
      choke point, bid-rent theory, carrying capacity, agglomeration, multiplier effect.
      Answers are the term name (not the definition — question gives definition).
    factIds: []
    syntheticDistractors:
      - "perceptual filtering"
      - "spatial autocorrelation"
      - "isotropic plain"
      - "territorial morphology"
      - "geodemographic clustering"

  - id: agriculture_practice_names
    format: short_phrase
    estimated_count: 14
    note: >
      Named agricultural practices and farming systems. Examples:
      shifting cultivation, nomadic herding, slash and burn, market gardening,
      plantation agriculture, mixed crop-livestock farming, pastoral nomadism,
      subsistence agriculture, monoculture, aquaculture, community-supported agriculture,
      organic farming, fair trade farming.
      Answers are 1–4 word practice names; no mixing with effects or regions.
    factIds: []
    syntheticDistractors:
      - "intercropping"
      - "crop rotation"
      - "polyculture"
      - "agropastoralism"
      - "hydroponics"

  - id: religion_and_language_terms
    format: short_phrase
    estimated_count: 16
    note: >
      Specific religions, language concepts, and cultural diffusion terms explicitly named
      in the CED. Examples: universalizing religion, ethnic religion, Christianity, Islam,
      Buddhism, Sikhism, Hinduism, Judaism, lingua franca, creolization, language family,
      dialect, Indo-European, relocation diffusion, hierarchical diffusion, stimulus diffusion.
    factIds: []
    syntheticDistractors:
      - "syncretism"
      - "nativism"
      - "cultural hearth"
      - "Afro-Asiatic"
      - "Sino-Tibetan"

  - id: political_term_names
    format: short_phrase
    estimated_count: 20
    note: >
      Political geography terms: nation-state, stateless nation, multinational state,
      sovereignty, self-determination, colonialism, neocolonialism, superimposed boundary,
      relic boundary, antecedent boundary, subsequent boundary, consequent boundary,
      geometric boundary, unitary state, federal state, centrifugal force, centripetal force,
      devolution, shatterbelt, choke point.
    factIds: []
    syntheticDistractors:
      - "exclave"
      - "enclave"
      - "irredentism"
      - "balkanization"
      - "political ecology"

  - id: urban_model_names
    format: proper_noun
    estimated_count: 10
    note: >
      Named urban structure models. Examples: Burgess Concentric-Zone Model,
      Hoyt Sector Model, Harris-Ullman Multiple-Nuclei Model, Galactic City Model,
      Latin American City Model, Southeast Asian City Model, African City Model,
      Central Place Theory, Rank-Size Rule, Primate City concept.
      Short answer: model name only (2–5 words). Separate from model_and_theory_names
      to allow urban-specific question templates.
    factIds: []
    syntheticDistractors:
      - "Bid-Rent Urban Model"
      - "Edge City Theory"
      - "Squatter Settlement Model"
      - "Metropolitan Statistical Area Model"
      - "Urban Gravity Model"

  - id: economic_indicator_names
    format: short_phrase
    estimated_count: 12
    note: >
      Named economic and development measures. Examples: GDP, GNP, GNI per capita,
      Human Development Index (HDI), Gender Inequality Index (GII), infant mortality rate,
      literacy rate, total fertility rate, natural increase rate, dependency ratio.
      Answers are the indicator acronym or short name (2–5 words max).
    factIds: []
    syntheticDistractors:
      - "Gini coefficient"
      - "Purchasing Power Parity (PPP)"
      - "Inequality-adjusted HDI (IHDI)"
      - "Multidimensional Poverty Index (MPI)"
      - "Human Capital Index (HCI)"

  - id: migration_type_names
    format: short_phrase
    estimated_count: 12
    note: >
      Named migration types and related statuses. Examples: forced migration,
      voluntary migration, transnational migration, chain migration, step migration,
      transhumance, rural-to-urban migration, internally displaced person (IDP),
      refugee, asylum seeker, brain drain, remittances.
    factIds: []
    syntheticDistractors:
      - "circular migration"
      - "seasonal migration"
      - "return migration"
      - "guest worker program"
      - "economic migrant"

  - id: boundary_type_names
    format: short_phrase
    estimated_count: 8
    note: >
      Types of political boundaries explicitly named in CED. Examples:
      relic boundary, superimposed boundary, antecedent boundary,
      subsequent boundary, consequent boundary, geometric boundary,
      defined boundary, delimited boundary, demarcated boundary.
      Answers are the boundary type (2 words). Pool is homogeneous: all answers
      are boundary type names, not descriptions.
    factIds: []
    syntheticDistractors:
      - "natural boundary"
      - "maritime boundary"
      - "buffer boundary"
      - "contested boundary"
      - "colonial boundary"

  - id: diffusion_type_names
    format: short_phrase
    estimated_count: 6
    note: >
      Types of cultural diffusion named in CED. Examples: relocation diffusion,
      expansion diffusion, contagious diffusion, hierarchical diffusion,
      stimulus diffusion.
      Answers are 2-word diffusion type names only.
    factIds: []
    syntheticDistractors:
      - "reverse diffusion"
      - "digital diffusion"
      - "cultural osmosis"
      - "spatial propagation"
      - "network diffusion"

  - id: state_shape_names
    format: single_word_or_short_phrase
    estimated_count: 5
    note: >
      State shape types: compact, elongated, prorupt, fragmented, perforated.
      Answers are single-word shape descriptors. Examples used in CED include
      Kenya (compact), Chile (elongated), Thailand (prorupt),
      Indonesia/Philippines (fragmented), South Africa (perforated).
    factIds: []
    homogeneityExempt: true
    homogeneityExemptNote: "Only 5 members by definition; cannot be expanded without LLM invention."
    syntheticDistractors:
      - "landlocked"
      - "archipelagic"
      - "enclave"
      - "corridor"
      - "peninsular"

  - id: survey_method_names
    format: short_phrase
    estimated_count: 3
    note: >
      Land survey methods named in CED: metes and bounds, township and range,
      long-lot system. Pool is intentionally small — question templates must be
      recognition-style ("which survey method creates long narrow strips?").
    factIds: []
    homogeneityExempt: true
    homogeneityExemptNote: "Only 3 canonical CED survey methods exist; homogeneity rule waived."
    syntheticDistractors:
      - "cadastral survey"
      - "grid survey system"
      - "radial survey method"
      - "strip field system"
      - "allodial survey"

  - id: economic_sector_names
    format: single_word_or_short_phrase
    estimated_count: 5
    note: >
      Economic sectors: primary, secondary, tertiary, quaternary, quinary.
      Answers are single-word sector names only.
    factIds: []
    homogeneityExempt: true
    homogeneityExemptNote: "Exactly 5 sectors per CED; inherent pool size limit."
    syntheticDistractors:
      - "senary"
      - "informal"
      - "extractive"
      - "industrial"
      - "service"

  - id: development_theory_names
    format: proper_noun
    estimated_count: 8
    note: >
      Named theories of development explicitly in CED: Rostow's Stages of Economic Growth,
      Wallerstein's World System Theory, dependency theory, commodity dependence.
      Also includes: core-periphery model, neoliberalism, comparative advantage.
    factIds: []
    syntheticDistractors:
      - "modernization theory"
      - "structuralist theory"
      - "growth pole theory"
      - "cumulative causation theory"
      - "underdevelopment theory"

  - id: region_type_names
    format: short_phrase
    estimated_count: 6
    note: >
      Types of geographic regions: formal region, functional region, perceptual region,
      vernacular region, nodal region, uniform region. Answers are the region type name.
    factIds: []
    syntheticDistractors:
      - "transitional region"
      - "cultural hearth region"
      - "metropolitan region"
      - "physiographic region"
      - "administrative region"

  - id: organization_names
    format: proper_noun
    estimated_count: 10
    note: >
      Named international organizations explicitly in CED: UN, NATO, EU,
      African Union, ASEAN, WTO, IMF, Mercosur, OPEC.
      Answers are organization names (full or acronym as commonly used on AP exam).
    factIds: []
    syntheticDistractors:
      - "G20"
      - "World Bank"
      - "NAFTA"
      - "OECD"
      - "APEC"

  - id: urban_challenge_terms
    format: short_phrase
    estimated_count: 10
    note: >
      Urban challenge vocabulary: redlining, blockbusting, gentrification, urban renewal,
      disamenity zone, squatter settlement, edge city, exurb, boomburb, brownfield,
      urban growth boundary, environmental injustice.
    factIds: []
    syntheticDistractors:
      - "exclusionary zoning"
      - "eminent domain"
      - "urban heat island"
      - "fiscal zoning"
      - "deed restriction"

  # --- NUMERIC BRACKET POOL ---
  - id: bracket_numbers
    format: bracket_number
    estimated_count: 20
    note: >
      Numeric answers using {N} bracket notation. Covers: DTM stages (1–5),
      Rostow stages (5), population density numbers, unit exam weightings (8-10% vs 12-17%),
      number of units (7), Big Ideas (3), Ravenstein law distances, specific dates
      (Berlin Conference 1884, Columbian Exchange 1492, Green Revolution decade).
      Answers stored as {N} e.g., {5}, {1492}, {1884}.
    factIds: []
    syntheticDistractors: []

# ============================================================
# SUB-DECKS
# ============================================================
# 7 sub-decks, one per CED unit.
# Target facts proportional to exam weighting.
# Unit 1 = 8-10% → ~27 facts. Units 2-7 = 12-17% → ~45 facts each.
# Total: 27 + 5×45 + 40 = ~292 → round to 300 with padding.

sub_decks:

  - id: unit_1_thinking_geographically
    name: "Unit 1: Thinking Geographically"
    description: >
      Maps, GIS, spatial concepts (distance decay, time-space compression),
      environmental determinism vs. possibilism, scales of analysis, region types.
    target_facts: 27
    exam_weight: "8-10%"
    topics:
      - "1.1 Introduction to Maps"
      - "1.2 Geographic Data"
      - "1.3 The Power of Geographic Data"
      - "1.4 Spatial Concepts"
      - "1.5 Human-Environmental Interaction"
      - "1.6 Scales of Analysis"
      - "1.7 Regional Analysis"

  - id: unit_2_population_migration
    name: "Unit 2: Population and Migration"
    description: >
      Population density types, DTM stages, epidemiological transition, Malthus,
      push-pull migration theory, Ravenstein's laws, forced vs. voluntary migration,
      IDPs, refugees, chain migration, step migration.
    target_facts: 46
    exam_weight: "12-17%"
    topics:
      - "2.1 Population Distribution"
      - "2.2 Consequences of Population Distribution"
      - "2.3 Population Composition"
      - "2.4 Population Dynamics"
      - "2.5 The Demographic Transition Model"
      - "2.6 Malthusian Theory"
      - "2.7 Population Policies"
      - "2.8 Women and Demographic Change"
      - "2.9 Epidemiological Transition"
      - "2.10 Causes of Migration"
      - "2.11 Forced and Voluntary Migration"
      - "2.12 Effects of Migration"

  - id: unit_3_cultural_patterns
    name: "Unit 3: Cultural Patterns and Processes"
    description: >
      Cultural traits, cultural landscapes, sequent occupance, cultural relativism,
      diffusion types (relocation/contagious/hierarchical/stimulus), language families,
      lingua franca, universalizing vs. ethnic religions, acculturation, syncretism.
    target_facts: 44
    exam_weight: "12-17%"
    topics:
      - "3.1 Introduction to Culture"
      - "3.2 Cultural Landscapes"
      - "3.3 Types of Diffusion"
      - "3.4 Historical Causes of Diffusion"
      - "3.5 Contemporary Causes of Diffusion"
      - "3.6 Diffusion of Religion and Language"
      - "3.7 Effects of Diffusion"
      - "3.8 Effects of Diffusion (continued)"

  - id: unit_4_political_patterns
    name: "Unit 4: Political Patterns and Processes"
    description: >
      Nation-states, sovereignty, colonialism, neocolonialism, boundary types,
      state shapes, gerrymandering, devolution, centrifugal/centripetal forces,
      supranational organizations, Berlin Conference, UNCLOS/EEZ.
    target_facts: 46
    exam_weight: "12-17%"
    topics:
      - "4.1 Introduction to Political Geography"
      - "4.2 Political Power and Territoriality"
      - "4.3 Colonialism and Imperialism"
      - "4.4 Shapes of States"
      - "4.5 Internal Boundaries"
      - "4.6 Internal Organization of States"
      - "4.7 Forms of Governance"
      - "4.8 Defining Devolutionary Forces"
      - "4.9 Challenges to Sovereignty"
      - "4.10 Consequences of Centrifugal and Centripetal Forces"

  - id: unit_5_agriculture_rural
    name: "Unit 5: Agriculture and Rural Land-Use"
    description: >
      Farming intensity spectrum, settlement patterns, survey methods, agricultural
      hearths, Columbian Exchange, Agricultural Revolutions, Green Revolution,
      Von Thunen model, bid-rent theory, commodity chains, food security challenges.
    target_facts: 46
    exam_weight: "12-17%"
    topics:
      - "5.1 Introduction to Agriculture"
      - "5.2 Settlement Patterns and Survey Methods"
      - "5.3 Agricultural Origins"
      - "5.4 Diffusion of Agriculture"
      - "5.5 The Green Revolution"
      - "5.6 Agricultural Production Regions"
      - "5.7 Spatial Organization of Agriculture"
      - "5.8 Von Thunen Model"
      - "5.9 The Global System of Agriculture"
      - "5.10 Consequences of Agricultural Practices"
      - "5.11 Challenges of Contemporary Agriculture"
      - "5.12 Women in Agriculture"

  - id: unit_6_cities_urban
    name: "Unit 6: Cities and Urban Land-Use"
    description: >
      Site and situation, megacities, world cities, urban hierarchy, rank-size rule,
      urban structure models (Burgess/Hoyt/Harris-Ullman/Latin American/SE Asian/African),
      suburbanization, edge cities, redlining, gentrification, New Urbanism, smart growth.
    target_facts: 46
    exam_weight: "12-17%"
    topics:
      - "6.1 The Origin and Influences of Urbanization"
      - "6.2 Cities Across the World"
      - "6.3 Cities and Globalization"
      - "6.4 The Size and Distribution of Cities"
      - "6.5 The Internal Structure of Cities"
      - "6.6 Density and Land Use"
      - "6.7 Infrastructure"
      - "6.8 Urban Sustainability"
      - "6.9 Urban Data"
      - "6.10 Challenges of Urban Changes"
      - "6.11 Challenges of Urban Sustainability"

  - id: unit_7_industrial_economic
    name: "Unit 7: Industrial and Economic Development"
    description: >
      Industrial Revolution causes, economic sectors, least cost theory, break-of-bulk,
      development measures (GDP/HDI/GII), Rostow's stages, Wallerstein's World System,
      dependency theory, trade organizations (WTO/IMF/Mercosur/OPEC), outsourcing,
      deindustrialization, special economic zones, sustainable development goals.
    target_facts: 45
    exam_weight: "12-17%"
    topics:
      - "7.1 The Industrial Revolution"
      - "7.2 Economic Sectors and Patterns"
      - "7.3 Measures of Development"
      - "7.4 Women and Economic Development"
      - "7.5 Theories of Development"
      - "7.6 Trade and the World Economy"
      - "7.7 Changes as a Result of the World Economy"
      - "7.8 Sustainable Development"

# ============================================================
# CHAIN THEMES
# ============================================================
# Knowledge deck: requires ≥8 chain themes total, ≥3 per run
# Theme names should feel engaging, not just unit titles
# Each theme anchors a coherent sub-pool of facts

