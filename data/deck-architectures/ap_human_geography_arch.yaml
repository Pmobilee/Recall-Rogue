    emoji: "🏚"

  - id: engines_of_industry
    name: "Engines of Industry"
    description: "Industrial Revolution, economic sectors, least cost theory, industrial location"
    unit_coverage: [7]
    emoji: "⚙"

  - id: measuring_development
    name: "Measuring Development"
    description: "GDP/HDI/GII metrics, Rostow's stages, Wallerstein's World System, dependency theory"
    unit_coverage: [7]
    emoji: "📈"

  - id: global_trade_web
    name: "The Global Trade Web"
    description: "WTO, IMF, OPEC, Mercosur, special economic zones, outsourcing, deindustrialization"
    unit_coverage: [7]
    emoji: "🌐"

# ============================================================
# QUESTION TEMPLATES
# ============================================================
# Templates map pool IDs to question patterns.
# {term} = the correct answer. {definition} = its definition.
# All bracket placeholders are lower_snake_case.

question_templates:

  - id: qt_define_term
    pattern: "What geographic term refers to {definition}?"
    answer_pool: concept_term_definitions
    note: "Definition → term. Most common AP HuG question type."

  - id: qt_term_to_definition
    pattern: "Which of the following best defines {term}?"
    answer_pool: concept_term_definitions
    note: "Term → definition (multiple choice). Pool provides wrong-answer distractors."

  - id: qt_which_model
    pattern: "Which model or theory {model_description}?"
    answer_pool: model_and_theory_names
    note: "Identifies the correct model from its description."

  - id: qt_who_developed
    pattern: "Which geographer or theorist {contribution_description}?"
    answer_pool: geographer_names
    note: "Associates a contribution with its author."

  - id: qt_which_farming
    pattern: "Which type of agriculture {practice_description}?"
    answer_pool: agriculture_practice_names
    note: "Identifies farming system from description."

  - id: qt_which_diffusion
    pattern: "When {diffusion_scenario}, which type of diffusion is occurring?"
    answer_pool: diffusion_type_names
    note: "Scenario → diffusion type."

  - id: qt_boundary_type
    pattern: "A boundary that {boundary_description} is called a {___}."
    answer_pool: boundary_type_names
    note: "Fill-in-blank identifies boundary type from description."

  - id: qt_state_shape
    pattern: "A state whose territory {shape_description} is described as {___}."
    answer_pool: state_shape_names
    note: "Shape description → shape name."

  - id: qt_migration_type
    pattern: "Which migration type or status describes {migration_scenario}?"
    answer_pool: migration_type_names
    note: "Scenario → migration category."

  - id: qt_economic_indicator
    pattern: "Which economic indicator measures {indicator_description}?"
    answer_pool: economic_indicator_names
    note: "Description → indicator name/acronym."

  - id: qt_economic_sector
    pattern: "Which economic sector includes {sector_example_activity}?"
    answer_pool: economic_sector_names
    note: "Activity description → sector name."

  - id: qt_development_theory
    pattern: "Which theory of development {theory_description}?"
    answer_pool: development_theory_names
    note: "Theory description → theory name."

  - id: qt_urban_model
    pattern: "Which urban land-use model {model_description}?"
    answer_pool: urban_model_names
    note: "Urban model description → model name."

  - id: qt_region_type
    pattern: "A region defined by {region_characteristic} is an example of a {___} region."
    answer_pool: region_type_names
    note: "Region characteristic → region type."

  - id: qt_organization
    pattern: "Which international organization {org_description}?"
    answer_pool: organization_names
    note: "Organization role/description → organization name."

  - id: qt_religion_language
    pattern: "Which religion or language concept {rl_description}?"
    answer_pool: religion_and_language_terms
    note: "Religion/language scenario → term."

  - id: qt_urban_challenge
    pattern: "The practice of {challenge_description} is known as {___}."
    answer_pool: urban_challenge_terms
    note: "Urban challenge description → term name."

  - id: qt_numeric
    pattern: "{numeric_question_stem}"
    answer_pool: bracket_numbers
    note: "Numeric answer using {N} bracket. Examples: DTM stage count, exam percentage, key dates."

# ============================================================
# DIFFICULTY TIERS
# ============================================================
# Tier 1 (easy): Direct vocabulary recognition, one-step recall
# Tier 2 (medium): Application of concept to scenario, model identification
# Tier 3 (hard): Compare/contrast two models, multi-step inference, nuanced distinctions

difficulty_tiers:
  - tier: 1
    description: "Vocabulary recall — define a term or match a definition"
    target_percent: 35
  - tier: 2
    description: "Concept application — identify model from scenario, compare two terms"
    target_percent: 45
  - tier: 3
    description: "Critical analysis — strengths/limitations of models, cross-unit synthesis"
    target_percent: 20

# ============================================================
# COMMON CONFUSIONS (for distractor design)
# ============================================================
# These pairs are commonly mixed up on the AP exam.
# Distractor generators should prioritize these as wrong-answer choices.

common_confusions:
  - pair: ["arithmetic density", "physiological density"]
    note: "Students confuse total land vs. arable land in denominator"

  - pair: ["CBR", "TFR"]
    note: "Both measure birth rates but at different levels of analysis"

  - pair: ["push factor", "pull factor"]
    note: "Direction of motivation is often reversed"

  - pair: ["forced migration", "voluntary migration"]
    note: "Gray areas (economic desperation) cause confusion"

  - pair: ["refugee", "internally displaced person (IDP)"]
    note: "Both flee conflict but IDPs stay within their country"

  - pair: ["relocation diffusion", "expansion diffusion"]
    note: "Relocation = origin loses trait; expansion = origin retains trait"

  - pair: ["contagious diffusion", "hierarchical diffusion"]
    note: "Both are expansion subtypes but spread via different paths"

  - pair: ["universalizing religion", "ethnic religion"]
    note: "Students often misclassify Hinduism as universalizing"

  - pair: ["nation-state", "multinational state"]
    note: "Most modern states are multinational, not true nation-states"

  - pair: ["unitary state", "federal state"]
    note: "Power distribution direction is often reversed"

  - pair: ["centrifugal force", "centripetal force"]
    note: "Physics analogy often inverted: centrifugal = pulls apart, centripetal = holds together"

  - pair: ["antecedent boundary", "subsequent boundary"]
    note: "Time sequence relative to settlement is reversed by students"

  - pair: ["superimposed boundary", "consequent boundary"]
    note: "Superimposed = ignores cultural patterns; consequent = reflects them"

  - pair: ["Von Thunen model", "bid-rent theory"]
    note: "Both deal with distance from market/center but at different scales"

  - pair: ["intensive agriculture", "extensive agriculture"]
    note: "Input per land unit vs. land area per output is reversed"

  - pair: ["Burgess concentric-zone model", "Hoyt sector model"]
    note: "Zone shape (rings vs. wedges) and time period are confused"

  - pair: ["rank-size rule", "primate city"]
    note: "Rank-size = distribution follows pattern; primate = one city dominates disproportionately"

  - pair: ["GDP", "HDI"]
    note: "GDP is economic only; HDI includes health and education dimensions"

  - pair: ["Rostow's Stages of Economic Growth", "Wallerstein's World System Theory"]
    note: "Rostow = linear progression all countries can achieve; Wallerstein = structural inequality maintained"

  - pair: ["dependency ratio", "natural increase rate"]
    note: "Both are population measures but measure entirely different things"

  - pair: ["metes and bounds", "township and range"]
    note: "Irregular vs. grid patterns; students confuse which creates the checkerboard Midwest landscape"

  - pair: ["edge city", "exurb"]
    note: "Edge city has commercial/employment center; exurb is residential beyond suburbs"

  - pair: ["environmental determinism", "possibilism"]
    note: "Determinism = environment controls humans; possibilism = humans adapt to environment"

