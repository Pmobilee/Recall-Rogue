    emoji: "🌊"

  - id: cultures_in_motion
    name: "Cultures in Motion"
    description: "Cultural diffusion types, cultural landscapes, sequent occupance, acculturation"
    unit_coverage: [3]
    emoji: "🎭"

  - id: faiths_and_tongues
    name: "Faiths and Tongues"
    description: "Universalizing vs. ethnic religions, language families, lingua franca, creolization"
