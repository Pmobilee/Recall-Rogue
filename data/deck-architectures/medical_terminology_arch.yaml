notes: >
  COMPLETENESS TARGET: This deck covers EVERY major prefix (~80), suffix (~55),
  and root/combining form (~200) used in standard medical terminology courses,
  plus ~110 common conditions and ~55 procedures that demonstrate how the
  parts combine. A student who masters this deck can decode any medical term.

  The deck is organized so sub-decks can be studied independently:
  - Start with Prefixes + Suffixes (the modifier toolkit)
  - Then Body Roots (the vocabulary core)
  - Then Conditions + Procedures (applied knowledge)

  This mirrors how medical terminology courses are taught:
  word parts first, then body systems, then applied terms.

  Cross-references between sub-decks are critical:
  - A prefix fact about "hyper-" should reference "hypertension" from conditions
  - A root fact about "hepat/o" should reference "hepatitis" and "hepatectomy"
  - A suffix fact about "-itis" should reference multiple conditions using it

  Domain: human_body_health (pairs with existing Human Anatomy deck)
  Age: "all" for basic terms, "teen+" for complex clinical conditions
  Volatile: none — Latin/Greek roots don't change
