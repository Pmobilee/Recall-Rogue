# ============================================================
# CHAIN THEMES — 3 named themes for Unit 3
# (minimum ≥3 themes per run; these match parent deck chain_themes)
# ============================================================

chain_themes:
  - id: enzymes
    name: "Enzymes"
    topics: ["3.1", "3.2"]
    description: "Enzyme structure, active sites, cofactors, inhibition types, kinetics, and temperature/pH effects"

  - id: photosynthesis
    name: "Photosynthesis"
    topics: ["3.4"]
    description: "Light reactions (PSII, PSI, ETC, chemiosmosis, photophosphorylation) and Calvin cycle (carbon fixation, G3P, C3/C4/CAM, photorespiration)"

  - id: cellular_respiration
    name: "Cellular Respiration"
    topics: ["3.3", "3.5", "3.6", "3.7"]
    description: "Bioenergetics (ATP, ΔG, thermodynamics, anabolism/catabolism), glycolysis, pyruvate oxidation, citric acid cycle, ETC, oxidative phosphorylation, and fermentation"

# ============================================================
# COMMON CONFUSIONS — drives distractor pairing
# ============================================================

common_confusions:
  # Enzyme confusions
  - ["lock-and-key model", "induced-fit model"]
  - ["cofactor", "coenzyme"]
  - ["competitive inhibition", "noncompetitive inhibition", "allosteric activation"]
  - ["Vmax", "Km"]
  - ["activation energy (Ea)", "free energy change (ΔG)"]
  - ["substrate", "active site", "enzyme-substrate complex"]

  # Energetics confusions
  - ["exergonic", "endergonic"]
  - ["anabolism", "catabolism"]
  - ["first law of thermodynamics", "second law of thermodynamics"]
  - ["ATP", "ADP", "AMP"]
  - ["NADH", "NADPH", "FADH2"]

  # Photosynthesis confusions
  - ["Photosystem I (P700)", "Photosystem II (P680)"]
  - ["thylakoid membrane", "stroma"]
  - ["light reactions", "Calvin cycle"]
  - ["chlorophyll a", "chlorophyll b", "carotenoids"]
  - ["absorption spectrum", "action spectrum"]
  - ["C3 plants", "C4 plants", "CAM plants"]
  - ["carbon fixation", "reduction phase", "regeneration phase"]
  - ["RuBP", "G3P", "3-PGA"]
  - ["RuBisCO", "ATP synthase", "pyruvate dehydrogenase"]

  # Cellular respiration confusions
  - ["glycolysis", "citric acid cycle", "electron transport chain"]
  - ["matrix (mitochondria)", "stroma (chloroplast)"]
  - ["inner mitochondrial membrane", "outer mitochondrial membrane"]
  - ["Complex I", "Complex II", "Complex III", "Complex IV"]
  - ["substrate-level phosphorylation", "oxidative phosphorylation"]
  - ["pyruvate", "acetyl-CoA", "oxaloacetate", "citrate"]

  # Fermentation confusions
  - ["lactic acid fermentation", "alcoholic fermentation"]
  - ["obligate aerobe", "obligate anaerobe", "facultative anaerobe"]
  - ["aerobic respiration ATP yield", "fermentation ATP yield"]

# ============================================================
# SYNONYM GROUPS
# ============================================================

synonym_groups:
  - id: krebs_tca_citric
    members: ["citric acid cycle", "Krebs cycle", "TCA cycle", "tricarboxylic acid cycle"]
    reason: "All names for the same metabolic cycle"
  - id: light_independent
    members: ["Calvin cycle", "light-independent reactions", "dark reactions"]
    reason: "All names for the carbon fixation cycle in the stroma"
  - id: chemiosmosis_mitchell
    members: ["chemiosmosis", "Mitchell hypothesis"]
    reason: "The same process of proton-gradient-driven ATP synthesis"
  - id: lactic_acid
    members: ["lactic acid fermentation", "lactate fermentation"]
    reason: "Same fermentation pathway; lactic acid and lactate are the same compound at physiological pH"
  - id: noncompetitive_allosteric
    members: ["noncompetitive inhibition", "allosteric inhibition"]
    reason: "Often used interchangeably; inhibitor binds site other than active site"
  - id: g3p_pgal
    members: ["G3P", "PGAL", "glyceraldehyde-3-phosphate"]
    reason: "All names for the 3-carbon sugar product of the Calvin cycle"
  - id: etc_chain
    members: ["electron transport chain", "ETC", "respiratory chain"]
    reason: "All names for the series of protein complexes in the inner mitochondrial membrane"

# ============================================================
# DIFFICULTY TIERS
# ============================================================

difficulty_tiers:
  easy:
    description: "Core vocabulary every AP Bio student sees in the first week of Unit 3"
    examples:
      - "ATP as energy currency"
      - "Overall photosynthesis equation"
      - "Glycolysis location (cytoplasm)"
      - "Net 2 ATP from glycolysis"
      - "O₂ as final electron acceptor"
      - "Lactic acid fermentation in muscles"
  medium:
    description: "Standard AP content requiring understanding of mechanisms and pathways"
    examples:
      - "Induced-fit model vs lock-and-key"
      - "PSII vs PSI roles and wavelengths"
      - "Carbon fixation by RuBisCO"
      - "C3 vs C4 vs CAM adaptations"
      - "Substrate-level vs oxidative phosphorylation"
      - "Feedback inhibition mechanism"
  hard:
    description: "Complex topics requiring multi-step reasoning or precise numerical recall"
    examples:
      - "Michaelis-Menten kinetics (Km definition)"
      - "Calvin cycle stoichiometry (9 ATP, 6 NADPH per 3 turns)"
      - "Why FADH₂ yields fewer ATP than NADH (Complex II doesn't pump H⁺)"
      - "Photorespiration mechanism and conditions"
      - "Proton gradient direction and ATP synthase rotation"
      - "ETC complex I, II, III, IV substrates and products"

