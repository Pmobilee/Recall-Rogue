# ============================================================
# NOTES
# ============================================================

notes: >
  UNIT 3 SCOPE: Topics 3.1–3.7 as defined in the College Board AP Biology CED.
  Exam weight 12–16% makes this one of the highest-yield units on the exam.

  FACT SOURCING: All numerical values (ATP yields, wavelengths, temperatures, pH optima,
  stoichiometric inputs/outputs) are verified against OpenStax Biology 2e (CC-BY-4.0)
  and cross-referenced with Wikipedia. No facts are generated from LLM training knowledge.

  CHAIN THEMES: Three themes cover the full unit — enzymes (Topics 3.1–3.2),
  photosynthesis (Topic 3.4), and cellular_respiration (Topics 3.3, 3.5–3.7).
  The bioenergetics topic (3.3) is assigned to cellular_respiration as it provides
  the thermodynamic foundation for respiration.

  POOL DESIGN: Comparison terms pool is critical for this unit — students are tested
  heavily on distinguishing paired/tripled concepts (PSII vs PSI, C3 vs C4 vs CAM,
  competitive vs noncompetitive inhibition, etc.).

  PARENT DECK: This architecture feeds into ap_biology_unit3 sub-deck of the parent
  ap_biology deck. Pool IDs (term_definitions, process_names, molecule_names,
  location_terms, function_terms, bracket_numbers) are consistent with the parent deck schema.

  TOTAL VERIFIED FACTS IN THIS ARCH: ~110 fact entries documented in verified_facts section.
  Generation workers should expand these into full DeckFact JSON, adding quizQuestion
  (where not specified), correctAnswer, distractors (LLM-generated), explanation, and
  funScore/difficulty fields. Target: 160 facts total in the generated deck.
