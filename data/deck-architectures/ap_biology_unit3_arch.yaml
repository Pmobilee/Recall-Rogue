  - id: identify_molecule
    questionFormat: "What molecule {description}?"
    answerPoolId: molecule_names
    availableFromMastery: 1
    difficulty: 2

  - id: identify_location
    questionFormat: "Where does {process} occur?"
    answerPoolId: location_terms
