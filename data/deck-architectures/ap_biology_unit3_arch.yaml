answer_type_pools:

  # POOL 1: Term Definitions — definitions, mechanisms, and descriptions
  - id: term_definitions
    format: term
    estimated_count: 65
    note: >
      The largest pool for Unit 3. Covers enzyme definitions, thermodynamic terms,
      photosynthesis components, respiration stages, and fermentation descriptions.
      "What is [term]?" format. Students frequently confuse paired concepts:
      lock-and-key vs induced-fit, exergonic vs endergonic, PSII vs PSI,
      competitive vs noncompetitive inhibition, C3 vs C4 vs CAM.

  # POOL 2: Process Names — named processes students must identify
  - id: process_names
    format: name
    estimated_count: 18
    note: >
      Named biological processes: glycolysis, citric acid cycle, Calvin cycle,
      carbon fixation, photophosphorylation, pyruvate oxidation, chemiosmosis,
      lactic acid fermentation, alcoholic fermentation, catalysis.
      Students confuse: glycolysis/TCA, light reactions/Calvin cycle, aerobic/fermentation.

  # POOL 3: Molecule Names — specific molecules students must identify
  - id: molecule_names
    format: name
    estimated_count: 22
    note: >
      ATP, NADH, NADPH, FADH₂, RuBisCO, RuBP, 3-PGA, G3P, acetyl-CoA, oxaloacetate,
      citrate, pyruvate, chlorophyll a/b, carotenoids, CoQ, cytochrome c, pyruvate
      dehydrogenase complex, ribozyme. Students confuse NADH/NADPH/FADH₂.

  # POOL 4: Location Terms — where processes occur
  - id: location_terms
    format: term
    estimated_count: 12
    syntheticDistractors:
      - "Outer mitochondrial membrane"
      - "Intermembrane space"
      - "Endoplasmic reticulum"
      - "Golgi apparatus"
      - "Plasma membrane"
      - "Nucleus"
    note: >
      Cytoplasm, thylakoid membrane, stroma, mitochondrial matrix, inner mitochondrial
      membrane, cristae. Students frequently confuse stroma vs matrix, thylakoid vs cristae.

  # POOL 5: Function Terms — what something does
  - id: function_terms
    format: term
    estimated_count: 12
    note: >
      Answers describe the role or function of a structure/molecule/process.
      "Final electron acceptor", "products of light reactions", "NAD⁺ regeneration",
      "activation energy lowering", "carbon fixation role of RuBisCO".

  # POOL 6: Bracket Numbers — quantitative facts
  - id: bracket_numbers
    format: bracket_number
    estimated_count: 18
    note: >
      Numerical answers in {brackets}. Examples: {2} net ATP from glycolysis,
      {30-32} total ATP per glucose, {680}nm for PSII, {700}nm for PSI,
      {9} ATP per 3 Calvin cycle turns, {6} NADPH per 3 Calvin turns,
      {3} NADH per TCA turn, {1} FADH₂ per TCA turn, {37}°C optimum for human enzymes,
      {2} NADH from glycolysis, {26-28} ATP from ETC, {6} turns for one glucose.

  # POOL 7: Comparison Terms — contrasting concepts
  - id: comparison_terms
    format: term
    estimated_count: 12
    syntheticDistractors:
      - "Eukaryote vs. prokaryote"
      - "Anabolism vs. catabolism"
      - "Mitosis vs. meiosis"
      - "DNA vs. RNA"
      - "Homologous vs. analogous structures"
    note: >
      Comparative/contrast questions. C3 vs. C4 vs. CAM, competitive vs. noncompetitive
      inhibition, PSII before PSI, NADH vs. FADH₂ ATP yield, aerobic vs. fermentation,
      absorption spectrum vs. action spectrum, lock-and-key vs. induced-fit.

