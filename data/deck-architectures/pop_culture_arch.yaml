pool_design_notes: >
  After fact generation, run node scripts/verify-all-decks.mjs to check pool homogeneity (check #20).
  Key pools to watch for length tells:
  - game_titles: "Pac-Man" (6) vs "Grand Theft Auto V" (18) — may need game_short_titles + game_long_titles split
  - tv_show_names: "Lost" (4) vs "The Fresh Prince of Bel-Air" (29) — likely needs split
  - franchise_ip_names: "LEGO" (4) vs "Marvel Cinematic Universe" (24) — likely needs split
  Run node scripts/pool-homogeneity-analysis.mjs --deck pop_culture after build to confirm.
  All pools need syntheticDistractors padded to 15+ after initial fact population.
  bracket_numbers pool is homogeneityExempt due to inherent numeric type variation.

# ============================================================
# GENERATION NOTES FOR WORKERS
# ============================================================
generation_notes: >
  - Maximum 30 facts per Sonnet worker batch (32K token limit)
  - Each fact MUST include: id, quizQuestion, correctAnswer, explanation, difficulty (1-5),
    funScore (1-10), answerTypePoolId, chainThemeId
  - correctAnswer must be concise — core answer only, no parenthetical elaborations
  - NEVER include em-dashes in correctAnswer — put elaboration in explanation field
  - ALL distractors must be LLM-generated from the specific question context
  - NEVER pull distractors from other facts' correctAnswer values
  - Workers FORMAT the verified source data above — they do NOT invent new facts
  - After assembly, run the full quality pipeline per .claude/rules/deck-quality.md
