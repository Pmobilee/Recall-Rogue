# ============================================================
# ANSWER TYPE POOLS
# ============================================================
answer_type_pools:

  - id: tv_show_names
    description: "TV series titles — sitcoms, dramas, animation, reality, streaming"
    format: name
    homogeneityExempt: false
    member_examples:
      - "Seinfeld"
      - "Game of Thrones"
      - "The Simpsons"
      - "Squid Game"
      - "Breaking Bad"
      - "Stranger Things"
      - "Friends"
      - "The Wire"
    design_notes: >
      All members are TV series title strings. Lengths range from 4 to ~25 chars.
      Check max/min ratio; may need split into short_titles (≤12 chars) vs long_titles (>12 chars)
      if length tells appear after pool population.

  - id: game_titles
    description: "Video game titles — arcade, console, PC, mobile"
    format: name
    homogeneityExempt: false
    member_examples:
      - "Minecraft"
      - "Pac-Man"
      - "Tetris"
      - "Fortnite"
      - "Elden Ring"
      - "Wii Sports"
      - "Among Us"
      - "Grand Theft Auto V"
    design_notes: >
      All members are game title strings. Verify length distribution; "Pac-Man" (6) vs
      "Grand Theft Auto V" (18) may trigger homogeneity flag — consider splitting
      classic_arcade_titles (short) vs modern_game_titles (longer) if ratio >3x.

  - id: character_names
    description: "Fictional characters across TV, games, comics"
    format: name
    homogeneityExempt: false
    member_examples:
      - "Spider-Man"
      - "Batman"
      - "Homer Simpson"
      - "Baby Yoda"
      - "Master Chief"
      - "Pikachu"
    design_notes: >
      Character names only, not real people. May need split: superhero_names vs
      animated_character_names vs game_character_names depending on pool size after population.

  - id: person_names_creators
    description: "Real people — creators, designers, showrunners, streamers, platform founders"
    format: name
    homogeneityExempt: false
    member_examples:
      - "Shigeru Miyamoto"
      - "Stan Lee"
      - "Matt Groening"
      - "Mark Zuckerberg"
      - "MrBeast"
      - "Vince Gilligan"
      - "J.K. Rowling"
    design_notes: >
      Real human names only. May need split: game_designers, comic_creators, tv_creators,
      platform_founders, digital_creators if pool grows large enough (>30 facts).

  - id: company_studio_names
    description: "Studios, networks, publishers, developers"
    format: name
    homogeneityExempt: false
    member_examples:
      - "Nintendo"
      - "HBO"
      - "Namco"
      - "Blizzard"
      - "Image Comics"
      - "Naughty Dog"
      - "Larian Studios"
    design_notes: >
      Organization names. Short (Nintendo/HBO) vs long (Larian Studios) should be fine
      as distractor set is plausible regardless of length in this pool.

  - id: franchise_ip_names
    description: "Major franchise and IP names"
    format: name
    homogeneityExempt: false
    member_examples:
      - "Pokémon"
      - "Star Wars"
      - "Harry Potter"
      - "Marvel Cinematic Universe"
      - "Hello Kitty"
      - "Transformers"
      - "Call of Duty"
    design_notes: >
      Franchise/IP strings. "MCU" / "Marvel Cinematic Universe" — use full name for consistency.
      Check max/min; single-word vs multi-word franchises may trigger flag.

  - id: platform_console_names
    description: "Consoles, networks, streaming platforms"
    format: name
    homogeneityExempt: false
    member_examples:
      - "PlayStation 2"
      - "Nintendo Switch"
      - "Netflix"
      - "Disney+"
      - "Game Boy"
      - "Nintendo 64"
      - "TikTok"
    design_notes: >
      Mixed platform types (consoles + streaming services). Consider splitting
      gaming_consoles vs streaming_platforms if used in separate question templates.

  - id: meme_viral_names
    description: "Meme names and viral content identifiers"
    format: name
    homogeneityExempt: false
    member_examples:
      - "Rickroll"
      - "Doge"
      - "Nyan Cat"
      - "Keyboard Cat"
      - "Pepe the Frog"
      - "Baby Shark"
      - "Gangnam Style"
    design_notes: >
      Short identifiers for memes/viral content. Pool is semantically coherent.
      Add synthetic distractors (other well-known memes) to reach 15+ easily.

  - id: genre_format_names
    description: "Genre and format terms across media"
    format: term
    homogeneityExempt: false
    member_examples:
      - "sitcom"
      - "prestige drama"
      - "battle royale"
      - "MMORPG"
      - "graphic novel"
      - "reality TV"
      - "streaming original"
    design_notes: >
      Short genre/format terms. Use for questions like "What genre is X?" or
      "What format pioneered Y?". Synthetic distractors easy to generate.

  - id: bracket_numbers
    description: "Years, sales figures, view counts, episode counts, revenue figures"
    format: bracket
    homogeneityExempt: true
    homogeneityExemptNote: >
      Bracket pool contains inherently variable numeric types: years (4 digits),
      view counts (in billions), sales figures (in millions), and revenue (in dollars).
      The numeric format varies by question type — each question only surfaces
      contextually appropriate distractors drawn from the same numeric register.
    member_examples:
      - "1989"
      - "2004"
      - "350 million"
      - "$1 billion"
      - "76.3 million"
      - "59"
    design_notes: >
      Bracket pools are exempt from homogeneity as the question context disambiguates
      the numeric register. Worker must tag each number with its type
      (year / count_millions / count_billions / revenue_dollars / award_count)
      so the quiz engine can generate same-register distractors.

