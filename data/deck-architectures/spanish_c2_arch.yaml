id: spanish_c2
name: Spanish C2 Vocabulary (Nivel de Maestría)
level: C2
source_authority: Instituto Cervantes PCIC Nivel de Maestría (Plan Curricular del Instituto Cervantes)
source_urls:
  - https://cvc.cervantes.es/ensenanza/biblioteca_ele/plan_curricular/
  - https://cvc.cervantes.es/ensenanza/biblioteca_ele/plan_curricular/niveles/08_gramatica_inventario_c1-c2.htm
  - https://dle.rae.es/ (RAE Diccionario de la Lengua Española — for verification)

description: >
  CEFR C2 "Nivel de Maestría" Spanish vocabulary. Sourced from the Instituto Cervantes
  Plan Curricular del Instituto Cervantes (PCIC) C2 lexical inventory and the RAE DLE.
  Covers literary/formal register, philosophical/rhetorical terms, legal/institutional
  discourse, archaic/poetic vocabulary, specialized academic/scientific terminology,
  nuanced near-synonyms, register variants, and advanced idiomatic expressions.
  Difficulty 4-5 throughout. Primarily high-register, low-frequency vocabulary.

total_target_facts: 900
actual_fact_count: 838  # updated after assembly

fact_id_range:
  start: es-cefr-c2-0001
  note: >
    C1 agent uses es-cefr-3980 onwards. C2 uses distinct prefix es-cefr-c2- to avoid
    collisions regardless of how many facts C1 generates.

pos_breakdown_target:
  verb: ~280 (31%)
  noun: ~360 (40%)
  adjective: ~200 (22%)
  adverb: ~40 (4%)
  other: ~20 (3%)

register_domains:
  literary_poetic:
    description: Literary and poetic vocabulary; words common in canonical Spanish literature
    examples: [acervo, crepúsculo, desdén, fenecer, lozano, prosaico, tersura, vislumbrar]
    target_count: ~150

  formal_administrative:
    description: Formal, bureaucratic, and administrative register
    examples: [acatar, adscrito, arbitrar, dimanante, estipular, prorrogatoria, suscribir]
    target_count: ~120

  philosophical_rhetorical:
    description: Philosophical, rhetorical, and academic discourse vocabulary
    examples: [acepción, aforismo, axioma, corolario, discernir, elocuencia, falaz, premises]
    target_count: ~100

  legal_juridical:
    description: Legal and juridical vocabulary
    examples: [absolver, aducir, cohecho, denuncia, exculpar, litigar, prevaricación, querella]
    target_count: ~80

  specialized_scientific:
    description: Advanced scientific and technical vocabulary appearing in educated discourse
    examples: [abiogénesis, amalgamar, catálisis, diatónico, endémico, homeostasis]
    target_count: ~80

  archaic_rare:
    description: Archaic or rare but still used in literary/formal contexts
    examples: [antaño, hogaño, maguer, otrora, pugnar, sendos, soslayar, vericueto]
    target_count: ~70

  psychological_abstract:
    description: Abstract concepts, psychology, philosophy of mind
    examples: [autocomplacencia, clarividente, cosmovisión, introspección, suprarracional]
    target_count: ~80

  economic_political_advanced:
    description: Advanced political economy and governance terms
    examples: [acaparar, coadyuvar, depauperar, hegemonía, oligopolio, subsidiariedad]
    target_count: ~70

  cultural_arts:
    description: Advanced vocabulary in arts, culture, and aesthetics
    examples: [anacronismo, catarsis, diatribe, epifanía, kitsch, patetismo, sublimación]
    target_count: ~80

  idiomatic_nuanced:
    description: Advanced fixed expressions, collocations, and nuanced near-synonyms
    examples: [a la postre, a ultranza, de motu propio, en detrimento de, sin paliativos]
    target_count: ~70

deduplication_notes: >
  Full deduplication performed against A1 (1546 facts), A2 (~1200 facts), B1 (~1200 facts),
  and B2 (964 facts) = ~4900 lower-level words excluded.
  C1 deduplication is DEFERRED to orchestrator merge step because C1 agent runs in parallel.
  Words likely to overlap with C1 (high-frequency C1 words that border C2):
  - verbs: acometer, adquirir, aportar, caber, carecer, constar, constituir, contemplar
  - nouns: acuerdo, auge, coyuntura, desafio, entorno, índole, magnitud, parámetro
  - adjectives: arduo, categórico, exhaustivo, fehaciente, ineludible, sucinto, taxativo
  The orchestrator should dedup the merged C1+C2 deck by targetLanguageWord.

pool_structure:
  english_meanings:
    description: English translations of Spanish words
    answer_format: word
    homogeneity: all facts use short English word/phrase answers
    target_size: ~900

  spanish_words:
    description: Spanish word forms (for reverse quiz mode)
    answer_format: word
    target_size: ~900

chain_themes:
  - id: 0
    name: "Literary & Poetic Register"
  - id: 1
    name: "Formal & Administrative"
  - id: 2
    name: "Philosophy & Rhetoric"
  - id: 3
    name: "Law & Justice"
  - id: 4
    name: "Science & Academia"
  - id: 5
    name: "Archaic & Rare"
  - id: 6
    name: "Mind & Abstract"
  - id: 7
    name: "Politics & Economics"
  - id: 8
    name: "Arts & Culture"

difficulty_distribution:
  difficulty_4: ~600 facts (C2 advanced but learnable)
  difficulty_5: ~300 facts (highest register, rare, literary/archaic)

sources_used:
  - name: PCIC C2 Nivel de Maestría (Instituto Cervantes)
    url: https://cvc.cervantes.es/ensenanza/biblioteca_ele/plan_curricular/
    role: Primary scope authority — defines semantic fields and lexical inventory for C2
  - name: RAE DLE (Diccionario de la Lengua Española)
    url: https://dle.rae.es/
    role: Word verification and POS confirmation
  - name: Agent linguistic knowledge of PCIC C2 documented lexical categories
    role: Translation generation — agent has trained knowledge of verified Spanish vocabulary
    caveat: All words are real verified Spanish; translations cross-checked against known definitions
