    answer_pool: bracket_numbers
    available_from_mastery: 3
    difficulty: 4

# === SEEDED CONFUSION PAIRS ===

common_confusions:
  # Virginia pair — created by Civil War secession
  - ["Virginia", "West Virginia"]             # West Virginia split FROM Virginia during Civil War; same-name confusion
  # Carolina pairs
  - ["North Carolina", "South Carolina"]      # Sister states; confused capitals (Raleigh vs Columbia), nicknames
  # Dakota pairs
  - ["North Dakota", "South Dakota"]          # Admitted same day; confused capitals (Bismarck vs Pierre), largest cities (Fargo vs Sioux Falls)
  # New England "New" states
  - ["New York", "New Jersey"]                # Adjacent, both major metro areas; confused capitals (Albany vs Trenton)
  - ["New York", "New Hampshire"]             # Name similarity; both northeastern
  - ["New Jersey", "New Hampshire"]           # "New" + starts with same letter combination
  # M-state cluster (6 states starting with M — high confusion zone)
  - ["Missouri", "Mississippi"]               # Both southern M-states; confused capitals (Jefferson City vs Jackson)
  - ["Missouri", "Michigan"]                  # Both large M-states; different regions
  - ["Missouri", "Minnesota"]                 # M-states; Minnesota is Midwest (north), Missouri is South
  - ["Mississippi", "Michigan"]               # Both M-states; very different regions
  - ["Minnesota", "Michigan"]                 # Both Great Lakes states; twin cities vs Detroit area confusion
  - ["Montana", "Minnesota"]                  # Both northern M-states; Montana is West, Minnesota is Midwest
  # Washington confusion
  - ["Washington", "Washington D.C."]         # State vs federal district; critical and constant confusion
  # Capital vs largest city — the most common category of confusion
  - ["New York (Albany)", "New York City"]    # Albany is capital, NYC is largest city
  - ["Illinois (Springfield)", "Chicago"]     # Springfield is capital, Chicago is largest
  - ["California (Sacramento)", "Los Angeles"] # Sacramento is capital, LA is largest
  - ["Florida (Tallahassee)", "Jacksonville"] # Tallahassee is capital, Jacksonville is largest
  - ["Michigan (Lansing)", "Detroit"]         # Lansing is capital, Detroit is largest
  - ["Texas (Austin)", "Houston"]             # Austin is capital, Houston is largest
  - ["Pennsylvania (Harrisburg)", "Philadelphia"] # Harrisburg is capital, Philadelphia is largest
  - ["Nevada (Carson City)", "Las Vegas"]     # Carson City is capital, Las Vegas is largest
  # Similar nickname confusions
  - ["Delaware", "Pennsylvania"]              # Both original colony; first vs second to ratify
  - ["Georgia", "South Carolina"]             # Both southeast; confused because SC fired first Civil War shots
  - ["Ohio", "Indiana"]                       # Adjacent midwest states; both have major industrial history
  - ["Oregon", "Washington"]                  # Adjacent Pacific Northwest; both have "evergreen" associations
  - ["Idaho", "Wyoming"]                      # Adjacent mountain west; similar landscape, low population
  - ["Utah", "Colorado"]                      # Both Mountain West; national parks vs skiing associations
  - ["Alaska", "Hawaii"]                      # Both last two states admitted (49th and 50th) same year (1959)

# === SYNONYM GROUPS ===

synonym_groups:
  - id: washington_disambiguation
    fact_ids: []
    reason: "Washington state vs Washington D.C. — entirely different entities, constant confusion"
  - id: kansas_city_disambiguation
    fact_ids: []
    reason: "Kansas City, Missouri vs Kansas City, Kansas — twin cities, different states, Missouri is larger"
  - id: charleston_disambiguation
    fact_ids: []
    reason: "Charleston, SC (major city) vs Charleston, WV (state capital) — same name, very different states"
  - id: west_virginia_independence
    fact_ids: []
    reason: "West Virginia is NOT a western part of Virginia — it's a fully separate state that seceded from Virginia"
  - id: new_mexico_age
    fact_ids: []
    reason: "Santa Fe was founded in 1610, decades before the Pilgrims arrived — older than the US itself"
  - id: dakota_same_day
    fact_ids: []
    reason: "North and South Dakota were admitted on the exact same day (November 2, 1889) — no official first vs second"
  - id: rhode_island_size
    fact_ids: []
    reason: "Rhode Island is the smallest state by area; Wyoming is the smallest by population (Alaska is largest by area)"
  - id: hawaii_only_island_state
    fact_ids: []
    reason: "Hawaii is the only US state made entirely of islands AND the only state not in North America geographically"

# === DIFFICULTY TIERS ===

difficulty_tiers:
  easy:  # universally known facts
    - "California — Golden State, largest population, Sacramento capital"
    - "Texas — Lone Star State, 2nd largest area and population, Austin capital"
    - "New York — Empire State, Albany capital (not NYC)"
    - "Florida — Sunshine State, Disney World, Tallahassee capital"
    - "Alaska — Last Frontier, largest area, 49th state"
    - "Hawaii — Aloha State, 50th state, only island state"
    - "Delaware — First State, 1st to ratify Constitution"
    - "Massachusetts — Bay State, Boston Tea Party, Harvard"
    - "Washington — Evergreen State, always confused with D.C."
  medium:  # commonly known with some education
    - "Illinois — Land of Lincoln, Springfield capital (not Chicago)"
    - "Ohio — Buckeye State, Columbus capital, 8 presidents born here"
    - "Pennsylvania — Keystone State, Harrisburg capital (not Philadelphia)"
    - "Virginia — Old Dominion, Mother of Presidents, Richmond capital"
    - "North Carolina and South Carolina — sister states, Raleigh vs Columbia"
    - "North Dakota and South Dakota — admitted same day, Bismarck vs Pierre"
    - "Wyoming — Equality State, Yellowstone, least populous, Cheyenne capital"
    - "Montana — Big Sky Country, Helena capital, Little Bighorn"
    - "Colorado — Centennial State, Denver capital, 53 peaks over 14000 ft"
    - "Utah — Beehive State, Salt Lake City capital, 5 national parks"
    - "Tennessee — Volunteer State, Nashville capital and country music center"
    - "Louisiana — Pelican State, Baton Rouge capital (not New Orleans)"
  hard:  # requires specific knowledge
    - "Montpelier — Vermont capital, smallest state capital by population"
    - "Pierre — South Dakota capital, pronounced 'Peer'"
    - "Frankfort — Kentucky capital (not Frankfurt, not Louisville)"
