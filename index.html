<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Cinzel font (self-hosted for offline/Steam support and CSP compliance) -->
    <style>
      @font-face {
        font-family: 'Cinzel';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url(/fonts/cinzel-latin.woff2) format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Cinzel';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url(/fonts/cinzel-latin.woff2) format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Cinzel';
        font-style: normal;
        font-weight: 900;
        font-display: swap;
        src: url(/fonts/cinzel-latin.woff2) format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
    </style>

    <!-- Kreon font (self-hosted card text font, Slay the Spire style) -->
    <style>
      @font-face {
        font-family: 'Kreon';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url(/fonts/kreon-latin.woff2) format('woff2');
      }
    </style>

    <!-- Lora font (self-hosted RPG body font) -->
    <style>
      @font-face {
        font-family: 'Lora';
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url(/fonts/lora-latin.woff2) format('woff2');
      }
      @font-face {
        font-family: 'OpenDyslexic';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url(/fonts/opendyslexic-regular.woff) format('woff');
      }
      @font-face {
        font-family: 'OpenDyslexic';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url(/fonts/opendyslexic-bold.woff) format('woff');
      }
    </style>

    <!-- Resource hints: preload WASM for sql.js (used by factsDB, loaded after first paint) -->
    <link rel="preload" href="/sql-wasm.wasm" as="fetch" crossorigin>

    <!-- Resource hints: API server DNS/connection warm-up -->
    <link rel="dns-prefetch" href="https://api.recallrogue.com">
    <link rel="preconnect" href="https://api.recallrogue.com" crossorigin>

    <!-- Security: Content Security Policy (injected per environment by Vite csp-inject plugin) -->

    <!-- Primary metadata -->
    <meta name="description" content="Recall Rogue — A card roguelite where knowledge is power. Answer to charge your cards, chain related facts for massive damage, and descend into ever-harder dungeons." />
    <meta name="keywords" content="educational game, spaced repetition, card roguelite, pixel art, progressive web app, learn history, language learning" />
    <link rel="canonical" href="https://recallrogue.com/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://recallrogue.com/" />
    <meta property="og:title"       content="Recall Rogue — Delve Deep. Learn Everything." />
    <meta property="og:description" content="A card roguelite where knowledge is power. Answer to charge your cards, chain related facts for massive damage, and descend into ever-harder dungeons." />
    <meta property="og:image"       content="https://recallrogue.com/social/og-cover.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="en_US" />
    <meta property="og:site_name"   content="Recall Rogue" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Recall Rogue — Delve Deep. Learn Everything." />
    <meta name="twitter:description" content="A card roguelite where knowledge is power. Answer to charge your cards, chain related facts for massive damage." />
    <meta name="twitter:image"       content="https://recallrogue.com/social/og-cover.png" />

    <!-- PWA / App metadata -->
    <meta name="application-name" content="Recall Rogue" />
    <meta name="apple-mobile-web-app-title" content="Recall Rogue" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="color-scheme" content="dark" />

    <title>Recall Rogue</title>
  </head>
  <body>
    <div id="app">
      <div id="splash" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0a1a;z-index:9999;font-family:monospace;color:#4ecca3;">
        <div style="text-align:center;">
          <div style="font-size:2rem;letter-spacing:4px;margin-bottom:1rem;">RECALL ROGUE</div>
          <div style="width:120px;height:3px;background:#1a1a2e;border-radius:2px;margin:0 auto;overflow:hidden;">
            <div style="width:40%;height:100%;background:#4ecca3;border-radius:2px;animation:load 1.2s ease-in-out infinite;"></div>
          </div>
        </div>
      </div>
      <style>
        @keyframes load { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }
      </style>
    </div>

    <!-- Last-resort crash overlay: shown only on fatal JS errors before/during Svelte init.
         Pure vanilla DOM — no framework dependency, works even when Svelte itself is broken. -->
    <div id="rr-crash-overlay" style="display:none;position:fixed;inset:0;z-index:99999;background:#0a0e1a;align-items:center;justify-content:center;font-family:monospace;">
      <div style="max-width:480px;width:90%;background:#111827;border:1px solid #4ecca3;border-radius:8px;padding:32px;text-align:center;color:#c8d8e8;">
        <div style="color:#4ecca3;font-size:1.5rem;letter-spacing:2px;margin-bottom:16px;">SOMETHING WENT WRONG</div>
        <p style="margin:0 0 8px;font-size:0.9rem;line-height:1.5;">Recall Rogue hit an unexpected error. Your save data is safe.</p>
        <button onclick="window.location.reload()" style="margin-top:20px;padding:10px 28px;background:#4ecca3;color:#0a0e1a;border:none;border-radius:4px;font-family:monospace;font-size:1rem;font-weight:700;letter-spacing:1px;cursor:pointer;">Restart Game</button>
        <div style="margin-top:20px;text-align:left;">
          <button onclick="var d=document.getElementById('rr-crash-detail');d.style.display=d.style.display==='none'?'block':'none';" style="background:none;border:none;color:#4ecca3;font-family:monospace;font-size:0.75rem;cursor:pointer;padding:0;">Error details &#9660;</button>
          <pre id="rr-crash-detail" style="display:none;margin:8px 0 0;padding:8px;background:#0a0e1a;border-radius:4px;font-size:0.7rem;color:#ff6b6b;white-space:pre-wrap;word-break:break-all;max-height:120px;overflow-y:auto;"></pre>
        </div>
      </div>
    </div>

    <!-- Crash overlay activation: listens for fatal errors during early load only.
         Heuristic: error within 10 s of page load AND Svelte has not yet replaced #splash. -->
    <script>
      (function() {
        var startTime = Date.now();
        window.addEventListener('error', function(ev) {
          var elapsed = Date.now() - startTime;
          var appEl = document.getElementById('app');
          // Only activate within the first 10 seconds, and only while #splash is still
          // the sole child of #app (Svelte has not mounted yet — i.e., the app is broken).
          var svelteNotMounted = appEl && appEl.children.length <= 2 &&
            document.getElementById('splash') !== null;
          if (elapsed < 10000 && svelteNotMounted) {
            var overlay = document.getElementById('rr-crash-overlay');
            var detail = document.getElementById('rr-crash-detail');
            if (overlay) {
              overlay.style.display = 'flex';
              if (detail && ev.message) {
                detail.textContent = ev.message + (ev.filename ? '\n' + ev.filename + ':' + ev.lineno : '');
              }
            }
          }
        });
      })();
    </script>

    <script>
      // Dev-only SW cleanup: remove stale cache-first workers during local runs.
      // In production this must stay disabled so offline/PWA behavior works.
      const host = window.location.hostname;
      const isLocalDev =
        host === 'localhost' ||
        host === '127.0.0.1' ||
        host === '0.0.0.0' ||
        host.endsWith('.local');
      const forceCleanup = window.location.search.includes('swcleanup=1');

      if ((isLocalDev || forceCleanup) && 'serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
        if (typeof caches !== 'undefined') {
          caches.keys().then(function(names) {
            names.forEach(function(n) { caches.delete(n); });
          });
        }
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
