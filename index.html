<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Cinzel font for landscape desktop headings and tab labels -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Resource hints: preload WASM for sql.js (used by factsDB, loaded after first paint) -->
    <link rel="preload" href="/sql-wasm.wasm" as="fetch" crossorigin>

    <!-- Resource hints: API server DNS/connection warm-up -->
    <link rel="dns-prefetch" href="https://api.terragacha.com">
    <link rel="preconnect" href="https://api.terragacha.com" crossorigin>

    <!-- Security: Content Security Policy (injected per environment by Vite csp-inject plugin) -->

    <!-- Primary metadata -->
    <meta name="description" content="Recall Rogue — Descend into arcane dungeons. Learn real history, science, and languages through a card roguelite powered by spaced repetition. Free to play on web." />
    <meta name="keywords" content="educational game, spaced repetition, card roguelite, pixel art, progressive web app, learn history, language learning" />
    <link rel="canonical" href="https://terragacha.com/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://terragacha.com/" />
    <meta property="og:title"       content="Recall Rogue — Delve Deep. Learn Everything." />
    <meta property="og:description" content="Descend into arcane dungeons. Answer to activate cards, master knowledge through spaced repetition, and conquer the depths." />
    <meta property="og:image"       content="https://terragacha.com/social/og-cover.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="en_US" />
    <meta property="og:site_name"   content="Recall Rogue" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Recall Rogue — Delve Deep. Learn Everything." />
    <meta name="twitter:description" content="A spaced-repetition card roguelite. Master knowledge one card at a time." />
    <meta name="twitter:image"       content="https://terragacha.com/social/og-cover.png" />

    <!-- PWA / App metadata -->
    <meta name="application-name" content="Recall Rogue" />
    <meta name="apple-mobile-web-app-title" content="Recall Rogue" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="color-scheme" content="dark" />

    <title>Recall Rogue</title>
  </head>
  <body>
    <div id="app">
      <div id="splash" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0a1a;z-index:9999;font-family:monospace;color:#4ecca3;">
        <div style="text-align:center;">
          <div style="font-size:2rem;letter-spacing:4px;margin-bottom:1rem;">RECALL ROGUE</div>
          <div style="width:120px;height:3px;background:#1a1a2e;border-radius:2px;margin:0 auto;overflow:hidden;">
            <div style="width:40%;height:100%;background:#4ecca3;border-radius:2px;animation:load 1.2s ease-in-out infinite;"></div>
          </div>
        </div>
      </div>
      <style>
        @keyframes load { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }
      </style>
    </div>
    <script>
      // Dev-only SW cleanup: remove stale cache-first workers during local runs.
      // In production this must stay disabled so offline/PWA behavior works.
      const host = window.location.hostname;
      const isLocalDev =
        host === 'localhost' ||
        host === '127.0.0.1' ||
        host === '0.0.0.0' ||
        host.endsWith('.local');
      const forceCleanup = window.location.search.includes('swcleanup=1');

      if ((isLocalDev || forceCleanup) && 'serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
        if (typeof caches !== 'undefined') {
          caches.keys().then(function(names) {
            names.forEach(function(n) { caches.delete(n); });
          });
        }
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
