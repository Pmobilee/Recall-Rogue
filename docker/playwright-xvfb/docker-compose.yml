# Parallel agent browser testing via Docker + Xvfb
#
# Each service is an isolated Chrome instance with its own virtual display.
# No locks, no screen clutter, full WebGL via SwiftShader.
#
# Usage:
#   docker compose -f docker/playwright-xvfb/docker-compose.yml up agent-1
#   docker compose -f docker/playwright-xvfb/docker-compose.yml up  # all 3
#
# Screenshots land in /tmp/rr-test-output/ inside each container.
# Mount a host volume to extract them.

services:
  agent-1:
    build:
      context: .
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DEV_SERVER=http://host.docker.internal:5173
      - AGENT_ID=agent-1
    volumes:
      - agent1-output:/tmp/rr-test-output
    shm_size: '2gb'  # Chrome needs shared memory

  agent-2:
    build:
      context: .
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DEV_SERVER=http://host.docker.internal:5173
      - AGENT_ID=agent-2
    volumes:
      - agent2-output:/tmp/rr-test-output
    shm_size: '2gb'

  agent-3:
    build:
      context: .
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DEV_SERVER=http://host.docker.internal:5173
      - AGENT_ID=agent-3
    volumes:
      - agent3-output:/tmp/rr-test-output
    shm_size: '2gb'

volumes:
  agent1-output:
  agent2-output:
  agent3-output:
